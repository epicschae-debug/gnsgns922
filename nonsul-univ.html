.chips{display:flex;gap:8px;margin:18px 0 14px;overflow-x:auto;scrollbar-width:none;animation:rise .5s .08s ease both}

.sec{font-size:13px;color:var(--muted);font-weight:600;margin:20px 2px 10px}
.list{display:flex;flex-direction:column;gap:10px}
.u{display:block;background:var(--ink-2);border:1px solid var(--line);border-radius:15px;padding:13px 15px;text-decoration:none;color:inherit;transition:.18s;animation:rise .4s ease both}
.u:active{transform:scale(.98);background:var(--ink-3)}
@media(hover:hover){.u:hover{background:var(--ink-3);border-color:#3a4660}}
.u .row1{display:flex;align-items:center;flex-wrap:wrap;gap:7px;row-gap:5px}
.u .name{font-size:15.5px;font-weight:700;letter-spacing:-.01em}
.date{flex:none;font-size:11px;font-weight:700;color:var(--gold);background:var(--gold-soft);border:1px solid #f5b54440;padding:2.5px 8px;border-radius:99px}
.u .go{font-size:12px;color:var(--gold);font-weight:600;margin-left:auto;flex:none}
.u .go::after{content:' \2197'}
.badge{flex:none;font-size:10.5px;font-weight:700;padding:2.5px 8px;border-radius:99px}
.badge.seo{background:var(--gold-soft);color:var(--gold)}
.badge.yak{background:var(--mint-soft);color:var(--mint)}
.badge.med{background:var(--rose-soft);color:var(--rose)}
.u .meta{margin-top:6px;font-size:11.5px;color:var(--muted);line-height:1.55}
.u .meta+.meta{margin-top:2px}
.u .meta b{color:#b9c4dd;font-weight:600}

const out=document.getElementById('out');
function render(f){
  let html='',cur='',i=0;
  const B={seo:'<span class="badge seo">서술형</span>',yak:'<span class="badge yak">약술형</span>',med:'<span class="badge med">메디컬</span>'};
  UNIV.filter(u=>f==='all'||u.type===f).forEach(u=>{
    if(u.g!==cur){if(cur)html+='</div>';cur=u.g;html+='<div class="sec">'+cur+'</div><div class="list">';i=0;}
    html+='<a class="u" style="animation-delay:'+Math.min(i*0.03,0.3)+'s" href="'+u.url+'" target="_blank" rel="noopener">'
      +'<div class="row1"><span class="name">'+u.name+'</span><span class="date">'+u.date+'</span>'+B[u.type]+'<span class="go">바로가기</span></div>'
      +'<div class="meta">최저 <b>'+u.min+'</b> &middot; '+u.ratio+' &middot; <b>'+u.range+'</b>'+(u.ppl?' &middot; <b>'+u.ppl+'</b>':'')+'</div>'
      +'<div class="meta"><span class="lv-'+u.lv+'">난이도 '+u.lv+'</span> &middot; '+u.exam+'</div></a>';
    i++;
  });
  out.innerHTML=html+(cur?'</div>':'');
}
render('all');
document.querySelectorAll('.chip').forEach(c=>c.addEventListener('click',()=>{
  document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));
  c.classList.add('on');render(c.dataset.f);
}));
</script>
