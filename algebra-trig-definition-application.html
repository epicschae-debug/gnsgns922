<style>
:root{--ink:#0c1019;--ink2:#141a26;--ink3:#1c2433;--line:#28324a;--text:#eef2fb;--muted:#8893ad;--gold:#f5b544;--mint:#5fd6b4;--red:#ff8d76;--blue:#6db6ff}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',system-ui,sans-serif;background:var(--ink);color:var(--text);line-height:1.62;padding:18px 14px 120px}
.wrap{max-width:840px;margin:0 auto}
h1{font-size:19px;font-weight:800;letter-spacing:-.02em}
.sub{font-size:12.5px;color:var(--muted);margin:4px 0 12px}
.stat{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
.chip{font-size:11.5px;font-weight:700;padding:5px 11px;border-radius:999px;background:var(--ink3);border:1px solid var(--line)}
.chip b{color:var(--gold)}
/* 번호판 */
.padwrap{background:var(--ink2);border:1px solid var(--line);border-radius:12px;margin-bottom:14px;overflow:hidden}
.padh{display:flex;align-items:center;gap:8px;padding:9px 13px;cursor:pointer;user-select:none;font-size:12.5px;font-weight:700}
.padh .ar{margin-left:auto;color:var(--muted);transition:.2s}
.padh.open .ar{transform:rotate(180deg)}
.pad{display:none;flex-wrap:wrap;gap:5px;padding:0 12px 13px}
.pad.show{display:flex}
.pad .dot{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;cursor:pointer;color:#0a0e16;opacity:.86;transition:.1s}
.pad .dot:hover{opacity:1;transform:scale(1.12);outline:2px solid #fff3}
.pad .dot.cur{outline:2px solid #fff;opacity:1}
.legend{display:flex;gap:11px;flex-wrap:wrap;font-size:11px;color:var(--muted);padding:0 12px 11px}
.legend i{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:4px;vertical-align:-1px}
/* 카드 */
.card{display:none;background:var(--ink2);border:1px solid var(--line);border-radius:16px;padding:18px 18px 20px}
.card.show{display:block}
.ctop{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:13px}
.no{font-size:25px;font-weight:800;color:var(--gold);letter-spacing:-.02em;line-height:1}
.utag{font-size:11px;font-weight:800;padding:3px 10px;border-radius:999px;color:#0a0e16}
.badge{font-size:10.5px;font-weight:800;padding:3px 9px;border-radius:999px;border:1px solid currentColor}
.badge.bin{color:var(--red)}.badge.seo{color:var(--mint)}
.sub2{font-size:11.5px;color:var(--muted);font-weight:600}
.topic{font-size:10.5px;color:#6d7890;margin-left:auto;font-weight:600}
.q{font-size:15.5px;line-height:1.75;margin:6px 0 4px;word-break:keep-all;overflow-wrap:anywhere}
.qimg{display:block;max-width:min(100%,340px);margin:14px auto 6px;background:#fbfbf8;border-radius:10px;padding:12px;border:1px solid #2a3550}
.qimg.wide{max-width:min(100%,540px)}
.boki{background:#101725;border:1px solid #233150;border-radius:11px;padding:12px 14px;margin:12px 0}
.boki .bttl{font-size:11px;font-weight:800;color:var(--gold);text-align:center;margin-bottom:7px;letter-spacing:.08em}
.bk{display:block;font-size:14.5px;margin:5px 0;word-break:keep-all;overflow-wrap:anywhere}
.choices{display:flex;flex-direction:column;gap:7px;margin:14px 0 2px}
.choices .ch{font-size:14.5px;padding:9px 13px;border:1px solid var(--line);border-radius:10px;background:#101725;display:flex;gap:9px;align-items:flex-start;overflow-wrap:anywhere}
.choices .ch .cn{color:var(--blue);font-weight:800;flex:none}
.revbtn{margin-top:16px;font-size:13px;font-weight:700;padding:10px 16px;border-radius:10px;border:1px solid var(--gold);background:transparent;color:var(--gold);cursor:pointer;width:100%}
.revbtn:hover{background:rgba(245,181,68,.1)}
.rev{display:none;margin-top:14px;border-top:1px dashed var(--line);padding-top:14px}
.rev.show{display:block}
.ansline{font-size:15px;font-weight:800;margin-bottom:10px}
.ansline .lab{color:var(--muted);font-weight:700;font-size:12px;margin-right:8px}
.ansline .v{color:var(--mint)}
.solttl{font-size:11px;font-weight:800;color:var(--gold);letter-spacing:.06em;margin-bottom:6px}
.sol{font-size:14px;line-height:1.85;color:#d7deec}
.sol .st{display:block;margin:6px 0;padding-left:14px;border-left:2px solid #2a3550;word-break:keep-all;overflow-wrap:anywhere}
/* 페이저 */
.pager{position:fixed;left:0;right:0;bottom:0;background:rgba(12,16,25,.97);border-top:1px solid var(--line);backdrop-filter:blur(8px);padding:10px 12px;z-index:50}
.pinner{max-width:840px;margin:0 auto;display:flex;align-items:center;gap:7px}
.pbtn{font-size:13px;font-weight:800;padding:9px 12px;border-radius:10px;border:1px solid var(--line);background:var(--ink3);color:var(--text);cursor:pointer;white-space:nowrap}
.pbtn:hover{border-color:var(--gold);color:var(--gold)}
.pbtn:active{transform:scale(.96)}
.pbtn.wide{flex:1}
select{font-family:inherit;font-size:13px;font-weight:700;padding:9px 8px;border-radius:10px;border:1px solid var(--line);background:var(--ink3);color:var(--text);cursor:pointer;max-width:46%}
.hint{font-size:10.5px;color:#6d7890;text-align:center;margin-top:6px}
@media(max-width:560px){.q{font-size:15px}.no{font-size:22px}.hint{display:none}}
</style></head>

const P=[{"no":1,"unit":0,"sub":"육십분법과 호도법","q":"어떤 공터의 중앙에는 깃발이 꽂혀 있고 깃발을 중심으로 적당한 길이의 반지름을 가진 원형의 걷기 트랙이 그어져 있다. 철수가 이 트랙의 한 지점을 출발하여 반지름의 길이의 4배만큼 걸었을 때, 깃발을 중심으로 출발점으로부터 몇 도만큼 회전했는지 육십분법으로 계산하면?","choices":["\\(\\dfrac{180}{\\pi}^\\circ\\)","\\(\\dfrac{360}{\\pi}^\\circ\\)","\\(\\dfrac{540}{\\pi}^\\circ\\)","\\(\\dfrac{720}{\\pi}^\\circ\\)","\\(\\dfrac{900}{\\pi}^\\circ\\)"],"ans":"④","sol":["호의 길이가 반지름의 4배이므로 중심각의 크기는 \\(4\\) 라디안이다.","\\(4 \\times \\dfrac{180^\\circ}{\\pi} = \\dfrac{720}{\\pi}^\\circ\\)"]},{"no":2,"unit":0,"sub":"호도법 · 현의 길이","q":"그림과 같이 중심이 O이고 넓이가 \\(16\\pi\\)인 원 위의 두 점 A, B에 대하여 호 AB의 길이는 반지름의 길이의 2배이다. 선분 AB의 길이는? (단, 호 AB에 대한 중심각의 크기 \\(\\theta\\)는 \\(0<\\theta<\\pi\\)이다.)","choices":["\\(4\\sin 1\\)","\\(8\\sin 1\\)","\\(4\\sin 2\\)","\\(8\\sin 2\\)","\\(16\\sin 1\\)"],"ans":"②","sol":["넓이가 \\(16\\pi\\)이므로 반지름은 \\(4\\). 호가 반지름의 2배이므로 중심각 \\(\\theta=2\\) (라디안).","O에서 AB에 내린 수선의 발을 H라 하면 OH는 \\(\\angle\\mathrm{AOB}\\)의 이등분선이므로 \\(\\angle\\mathrm{AOH}=1\\).","\\(\\overline{\\mathrm{AB}} = 2\\overline{\\mathrm{AH}} = 2 \\times 4\\sin 1 = 8\\sin 1\\)"]},{"no":3,"unit":0,"sub":"사분면의 각 \\((\\theta/2)\\)","topic":"선행 278","q":"\\(\\theta\\)가 제3사분면의 각일 때, 각 \\(\\dfrac{\\theta}{2}\\)를 나타내는 동경이 존재하는 사분면을 바르게 고른 것은?","choices":["제1사분면, 제2사분면","제1사분면, 제3사분면","제2사분면, 제3사분면","제2사분면, 제4사분면","제3사분면, 제4사분면"],"ans":"④","sol":["제3사분면이면 \\(2n\\pi + \\pi < \\theta < 2n\\pi + \\dfrac{3}{2}\\pi\\)이므로 \\(n\\pi + \\dfrac{\\pi}{2} < \\dfrac{\\theta}{2} < n\\pi + \\dfrac{3}{4}\\pi\\).","\\(n=2k\\)이면 \\(\\dfrac{\\theta}{2}\\)는 제2사분면, \\(n=2k+1\\)이면 제4사분면의 각이다.","따라서 제2사분면, 제4사분면."]},{"no":4,"unit":0,"sub":"사분면의 각 \\((\\theta/3)\\)","flag":"빈출","q":"\\(\\theta\\)가 제4사분면의 각일 때, 각 \\(\\dfrac{\\theta}{3}\\)를 나타내는 동경이 존재하지 <u>않는</u> 사분면을 구하시오.","ans":"제1사분면","sol":["제4사분면이면 \\(2n\\pi + \\dfrac{3}{2}\\pi < \\theta < 2n\\pi + 2\\pi\\)이므로 \\(\\dfrac{2n\\pi}{3} + \\dfrac{\\pi}{2} < \\dfrac{\\theta}{3} < \\dfrac{2n\\pi}{3} + \\dfrac{2}{3}\\pi\\).","\\(n=3k\\): 제2사분면, \\(n=3k+1\\): 제3사분면, \\(n=3k+2\\): 제4사분면.","따라서 제2·제3·제4사분면에는 존재하므로 존재하지 않는 사분면은 제1사분면."]},{"no":5,"unit":0,"sub":"두 동경의 위치 관계; 일치","topic":"선행 277","q":"\\(\\dfrac{\\pi}{2}<\\theta<\\pi\\)인 각 \\(\\theta\\)를 나타내는 동경과 각 \\(4\\theta\\)를 나타내는 동경이 서로 일치할 때, 각 \\(\\theta\\)의 크기는?","choices":["\\(\\dfrac{7}{12}\\pi\\)","\\(\\dfrac{2}{3}\\pi\\)","\\(\\dfrac{3}{4}\\pi\\)","\\(\\dfrac{5}{6}\\pi\\)","\\(\\dfrac{11}{12}\\pi\\)"],"ans":"②","sol":["두 동경이 일치하므로 \\(4\\theta - \\theta = 2n\\pi\\) (단, \\(n\\)은 정수).","\\(3\\theta = 2n\\pi\\)에서 \\(\\theta = \\dfrac{2n}{3}\\pi\\).","\\(\\dfrac{\\pi}{2} < \\dfrac{2n}{3}\\pi < \\pi\\)에서 \\(\\dfrac{3}{4} < n < \\dfrac{3}{2}\\), 정수 \\(n=1\\). \\(\\therefore \\theta = \\dfrac{2}{3}\\pi\\)"]},{"no":6,"unit":0,"sub":"두 동경의 위치 관계; \\(y\\)축 대칭","topic":"선행 279","q":"\\(\\pi<\\theta<2\\pi\\)일 때, 두 각 \\(2\\theta\\)와 \\(4\\theta\\)를 나타내는 동경이 \\(y\\)축에 대하여 대칭이 되도록 하는 모든 각 \\(\\theta\\)의 크기의 합은?","choices":["\\(\\dfrac{23}{6}\\pi\\)","\\(4\\pi\\)","\\(\\dfrac{25}{6}\\pi\\)","\\(\\dfrac{13}{3}\\pi\\)","\\(\\dfrac{9}{2}\\pi\\)"],"ans":"⑤","sol":["\\(y\\)축 대칭이므로 \\(2\\theta + 4\\theta = (2n+1)\\pi\\), 즉 \\(6\\theta = (2n+1)\\pi\\), \\(\\theta = \\dfrac{2n+1}{6}\\pi\\).","\\(\\pi < \\dfrac{2n+1}{6}\\pi < 2\\pi\\)에서 \\(\\dfrac{5}{2} < n < \\dfrac{11}{2}\\), 정수 \\(n=3,4,5\\).","\\(\\theta = \\dfrac{7}{6}\\pi, \\dfrac{9}{6}\\pi, \\dfrac{11}{6}\\pi\\). 합은 \\(\\dfrac{7}{6}\\pi + \\dfrac{9}{6}\\pi + \\dfrac{11}{6}\\pi = \\dfrac{9}{2}\\pi\\)"]},{"no":7,"unit":1,"sub":"부채꼴의 호의 길이와 넓이 (원뿔)","q":"그림과 같은 밑면의 반지름의 길이가 6이고 높이가 8인 원뿔의 겉넓이는?","choices":["\\(84\\pi\\)","\\(88\\pi\\)","\\(92\\pi\\)","\\(96\\pi\\)","\\(100\\pi\\)"],"ans":"④","sol":["모선의 길이는 \\(\\sqrt{6^2+8^2}=10\\). 옆면(부채꼴)의 호의 길이는 밑면 둘레 \\(12\\pi\\)와 같다.","(겉넓이) \\(= \\dfrac{1}{2}\\times 10 \\times 12\\pi + \\pi \\times 6^2 = 60\\pi + 36\\pi = 96\\pi\\)"]},{"no":8,"unit":1,"sub":"부채꼴의 호의 길이와 넓이","q":"중심이 O이고 반지름의 길이가 6인 원 위에 점 A가 있다. 반직선 OA를 시초선으로 했을 때, 두 각 \\(\\dfrac{5}{6}\\pi\\), \\(-\\dfrac{8}{3}\\pi\\)를 나타내는 동경이 이 원과 만나는 점을 각각 P, Q라 하자. 선분 PQ를 포함하는 부채꼴 OPQ의 넓이는?","choices":["\\(3\\pi\\)","\\(4\\pi\\)","\\(6\\pi\\)","\\(9\\pi\\)","\\(12\\pi\\)"],"ans":"④","sol":["\\(-\\dfrac{8}{3}\\pi = -4\\pi + \\dfrac{4}{3}\\pi\\)이므로 동경은 \\(\\dfrac{4}{3}\\pi\\)와 같다.","부채꼴 OPQ의 중심각은 \\(\\dfrac{4}{3}\\pi - \\dfrac{5}{6}\\pi = \\dfrac{\\pi}{2}\\).","넓이 \\(= \\dfrac{1}{2}\\times 6^2 \\times \\dfrac{\\pi}{2} = 9\\pi\\)"]},{"no":9,"unit":1,"sub":"부채꼴의 넓이의 활용","topic":"교육청 기출","q":"그림과 같이 반지름의 길이가 4이고 중심각의 크기가 \\(\\dfrac{\\pi}{6}\\)인 부채꼴 OAB가 있다. 선분 OA 위의 점 P에 대하여 선분 PA를 지름으로 하고 선분 OB에 접하는 반원을 C라 할 때, 부채꼴 OAB의 넓이를 \\(S_1\\), 반원 C의 넓이를 \\(S_2\\)라 하자. \\(S_1-S_2\\)의 값은?","choices":["\\(\\dfrac{\\pi}{9}\\)","\\(\\dfrac{2}{9}\\pi\\)","\\(\\dfrac{\\pi}{3}\\)","\\(\\dfrac{4}{9}\\pi\\)","\\(\\dfrac{5}{9}\\pi\\)"],"ans":"④","sol":["반원 C의 중심을 Q, 반지름을 \\(r\\)이라 하면 \\(\\overline{\\mathrm{OQ}}=4-r\\), 접점 H에 대하여 \\(\\overline{\\mathrm{QH}}=r\\).","직각삼각형 OQH에서 \\(\\sin\\dfrac{\\pi}{6} = \\dfrac{r}{4-r}\\), \\(\\dfrac{1}{2} = \\dfrac{r}{4-r}\\)에서 \\(3r=4\\), \\(r=\\dfrac{4}{3}\\).","\\(S_1 = \\dfrac{1}{2}\\times 4^2 \\times \\dfrac{\\pi}{6} = \\dfrac{4}{3}\\pi\\), \\(S_2 = \\dfrac{1}{2}\\pi\\left(\\dfrac{4}{3}\\right)^2 = \\dfrac{8}{9}\\pi\\).","\\(S_1 - S_2 = \\dfrac{4}{3}\\pi - \\dfrac{8}{9}\\pi = \\dfrac{4}{9}\\pi\\)"]},{"no":10,"unit":1,"sub":"부채꼴의 둘레와 넓이의 최대·최소","flag":"빈출","q":"둘레의 길이가 36인 부채꼴의 넓이의 최댓값을 구하고, 이때의 부채꼴의 중심각의 크기를 구하시오.","ans":"넓이 81, 중심각 2","sol":["반지름 \\(r\\), 호의 길이 \\(l\\), 넓이 \\(S\\)라 하면 \\(l = 36-2r\\).","\\(S = \\dfrac{1}{2}rl = \\dfrac{1}{2}r(36-2r) = -(r-9)^2 + 81\\).","\\(r=9\\)일 때 최댓값 \\(81\\). 이때 \\(81 = \\dfrac{1}{2}\\times 9^2 \\times \\theta\\)에서 \\(\\theta = 2\\)."]},{"no":11,"unit":1,"sub":"부채꼴의 넓이의 활용","flag":"빈출","q":"그림과 같은 두 부채꼴 AOB, COD에 대하여 두 호 AB, CD의 길이가 각각 12, 8이다. 색칠한 부분의 넓이가 30일 때, 색칠한 부분의 둘레의 길이를 구하시오.","ans":"26","sol":["반지름을 각각 \\(r_1, r_2\\), 중심각을 \\(\\theta\\)라 하면 \\(r_1\\theta=12\\), \\(r_2\\theta=8\\)에서 \\(r_2 = \\dfrac{2}{3}r_1\\).","넓이: \\(\\dfrac{1}{2} \\(\\dfrac{7}{2}\\pi\\)","\\(4\\pi\\)","\\(\\dfrac{9}{2}\\pi\\)","\\(5\\pi\\)","\\(\\dfrac{11}{2}\\pi\\)"],"ans":"②","sol":["\\(\\cos\\theta=\\dfrac{x+1}{2}\\), \\(\\sin\\theta=\\dfrac{y-3}{2}\\)를 \\(\\cos^2\\theta+\\sin^2\\theta=1\\)에 대입.","\\(\\left(\\dfrac{x+1}{2}\\right)^2+\\left(\\dfrac{y-3}{2}\\right)^2=1\\), \\((x+1)^2+(y-3)^2=4\\).","반지름 2인 원이므로 둘레 \\(=2\\pi\\times 2=4\\pi\\)"]},{"no":30,"unit":3,"sub":"삼각함수 사이의 관계; 식의 값","topic":"교육청 기출 · 선행 343","q":"그림과 같이 단위원 위의 점 P\\((x,y)\\)에 대하여 동경 OP가 \\(x\\)축의 양의 방향과 이루는 각의 크기가 \\(\\theta\\)이고 \\(\\dfrac{y}{x}+\\dfrac{x}{y}=-\\dfrac{5}{2}\\)일 때, \\(\\sin\\theta-\\cos\\theta\\)의 값은? (단, \\(x<0\\), \\(y>0\\)이고, O는 원점이다.)","choices":["\\(\\dfrac{1}{5}\\)","\\(\\dfrac{\\sqrt{5}}{5}\\)","\\(\\dfrac{2\\sqrt{5}}{5}\\)","\\(\\dfrac{3\\sqrt{5}}{5}\\)","\\(\\dfrac{4\\sqrt{5}}{5}\\)"],"ans":"④","sol":["\\(x=\\cos\\theta\\), \\(y=\\sin\\theta\\)이므로 \\(\\dfrac{y}{x}+\\dfrac{x}{y}=\\dfrac{1}{\\cos\\theta\\sin\\theta}=-\\dfrac{5}{2}\\)에서 \\(\\cos\\theta\\sin\\theta=-\\dfrac{2}{5}\\).","\\((\\sin\\theta-\\cos\\theta)^2=1-2\\times\\left(-\\dfrac{2}{5}\\right)=\\dfrac{9}{5}\\). \\(x<0\\), \\(y>0\\)이므로 \\(\\sin\\theta-\\cos\\theta>0\\).","\\(\\therefore \\sin\\theta-\\cos\\theta=\\dfrac{3\\sqrt{5}}{5}\\)"]},{"no":31,"unit":3,"sub":"삼각함수의 정의 · 관계","topic":"교육청 기출","q":"그림과 같이 원 \\(x^2+y^2=1\\) 위의 두 점 A\\((1,0)\\), B에 대하여 점 A에서의 접선이 선분 OB의 연장선과 만나는 점을 T, 점 B에서 \\(x\\)축에 내린 수선의 발을 H라 하자. \\(\\angle\\mathrm{AOB}=\\theta\\)일 때, \\(\\dfrac{\\overline{\\mathrm{OH}}}{\\overline{\\mathrm{BH}}}=\\dfrac{3}{2}\\overline{\\mathrm{AT}}\\)가 성립한다. \\(\\sin\\theta\\cos\\theta\\tan\\theta\\)의 값은? (단, O는 원점이다.)","choices":["\\(\\dfrac{1}{5}\\)","\\(\\dfrac{2}{5}\\)","\\(\\dfrac{3}{5}\\)","\\(\\dfrac{4}{5}\\)","\\(1\\)"],"ans":"②","sol":["\\(\\overline{\\mathrm{OH}}=\\cos\\theta\\), \\(\\overline{\\mathrm{BH}}=\\sin\\theta\\), \\(\\overline{\\mathrm{AT}}=\\tan\\theta\\).","\\(\\dfrac{\\cos\\theta}{\\sin\\theta}=\\dfrac{3}{2}\\tan\\theta\\)에서 \\(\\cos^2\\theta=\\dfrac{3}{2}\\sin^2\\theta\\).","\\(\\sin^2\\theta+\\dfrac{3}{2}\\sin^2\\theta=1\\)에서 \\(\\sin^2\\theta=\\dfrac{2}{5}\\). \\(\\therefore \\sin\\theta\\cos\\theta\\tan\\theta=\\sin^2\\theta=\\dfrac{2}{5}\\)"]}];
const WIDE=new Set([354,355,360,361,362,365,366,329]); // 가로로 긴 그림

/* ---- 출력 파이프라인: fmt = brk(wrapLong(esc(s))) ---- */
function esc(s){
  return String(s).replace(/\\\(([\s\S]*?)\\\)/g,function(m,inner){
    return "\\("+inner.replace(/</g,"&lt;").replace(/>/g,"&gt;")+"\\)";
  });
}
function wrapLong(s){
  return String(s).replace(/\\\(([\s\S]*?)\\\)/g,function(m,inner){
    if(inner.length<=60) return m;
    var marked=inner.replace(/ (=|\+|-) /g,"\u0001$1 ");
    var parts=marked.split("\u0001").filter(function(x){return x.length});
    if(parts.length<=1) return m;
    return parts.map(function(p){return "\\("+p.trim()+"\\)";}).join("<wbr>");
  });
}
function brk(s){
  return String(s).replace(/\s*(\([1-9]\)|[⑴⑵⑶⑷⑸])/g,function(m,g,off){
    return (off===0?"":"<br>")+g;
  });
}
function fmt(s){return brk(wrapLong(esc(s)));}

/* ---- 카드 빌드 ---- */
function build(){
  let html="";
  P.forEach((p,i)=>{
    const col=UNITCOL[p.unit]||"#888";
    const U=UNITS[p.unit]||{u:"",t:""};
    let badge="";
    if(p.flag==="빈출") badge=`<span class="badge bin">빈출</span>`;
    else if(p.flag==="서술형") badge=`<span class="badge seo">서술형</span>`;
    let top=`<div class="ctop"><span class="no">${p.no}</span>`+
      `<span class="utag" style="background:${col}">${U.u}</span>`+
      (badge||"")+
      `<span class="sub2">${p.sub?fmt(p.sub):""}</span>`+
      (p.topic?`<span class="topic">${p.topic}</span>`:"")+`</div>`;
    let body=`<div class="q">${fmt(p.q)}</div>`;
    if(IMG[p.no]) body+=`<img class="qimg${WIDE.has(p.no)?' wide':''}" src="${IMG[p.no]}" loading="lazy" alt="문제 ${p.no} 그림">`;
    if(p.boki){
      body+=`<div class="boki"><div class="bttl">＜ 보 기 ＞</div>`+
        p.boki.map(b=>`<span class="bk">${fmt(b)}</span>`).join("")+`</div>`;
    }
    if(p.choices){
      const cn=["①","②","③","④","⑤"];
      body+=`<div class="choices">`+
        p.choices.map((c,k)=>`<div class="ch"><span class="cn">${cn[k]}</span><span>${fmt(c)}</span></div>`).join("")+
        `</div>`;
    }
    let rev=`<div class="rev" id="rev${p.no}"><div class="ansline"><span class="lab">정답</span><span class="v">${fmt(p.ans)}</span></div>`;
    if(p.sol&&p.sol.length){
      rev+=`<div class="solttl">풀이</div><div class="sol">`+
        p.sol.map(s=>`<span class="st">${fmt(s)}</span>`).join("")+`</div>`;
    }
    rev+=`</div>`;
    html+=`<div class="card" id="card${p.no}" data-i="${i}">${top}${body}`+
      `<button class="revbtn" onclick="rev(${p.no})" id="rb${p.no}">정답 · 풀이 보기</button>`+rev+`</div>`;
  });
  document.getElementById("cards").innerHTML=html;
  // 번호판
  let pad="", leg="";
  P.forEach(p=>{ pad+=`<div class="dot" style="background:${UNITCOL[p.unit]}" data-no="${p.no}" onclick="showP(${p.no})">${p.no}</div>`; });
  document.getElementById("pad").innerHTML=pad;
  UNITS.forEach((u,i)=>{ leg+=`<span><i style="background:${UNITCOL[i]}"></i>${u.u} ${u.t}</span>`; });
  document.getElementById("legend").innerHTML=leg;
  // 드롭다운
  let sel="";
  P.forEach(p=>{ sel+=`<option value="${p.no}">${p.no}. ${UNITS[p.unit].t}${p.flag?(" · "+p.flag):""}</option>`; });
  document.getElementById("sel").innerHTML=sel;
  document.getElementById("cImg").textContent=Object.keys(IMG).length;
}

/* ---- 네비게이션 ---- */
let curIdx=0, hist=[];
function renderCur(scroll, pushHist){
  P.forEach(p=>{document.getElementById("card"+p.no).classList.remove("show");});
  document.querySelectorAll(".pad .dot").forEach(d=>d.classList.remove("cur"));
  const p=P[curIdx];
  const card=document.getElementById("card"+p.no);
  card.classList.add("show");
  const dot=document.querySelector('.pad .dot[data-no="'+p.no+'"]'); if(dot)dot.classList.add("cur");
  document.getElementById("sel").value=p.no;
  document.querySelector("#cCur b").textContent=p.no+"번";
  if(window.MathJax&&MathJax.typesetPromise) MathJax.typesetPromise([card]);
  if(scroll) window.scrollTo({top:0,behavior:"smooth"});
}
function showP(no){
  const i=P.findIndex(p=>p.no==no);
  if(i<0) return;
  if(i!==curIdx) hist.push(curIdx);
  curIdx=i; renderCur(true);
}
function step(d){
  let ni=curIdx+d; ni=Math.max(0,Math.min(P.length-1,ni));
  if(ni!==curIdx){ hist.push(curIdx); curIdx=ni; renderCur(true);}
}
function jump(d){
  let ni=curIdx+d; ni=Math.max(0,Math.min(P.length-1,ni));
  if(ni!==curIdx){ hist.push(curIdx); curIdx=ni; renderCur(true);}
}
function goBack(){ if(hist.length){ curIdx=hist.pop(); renderCur(true);} }
function rev(no){
  const r=document.getElementById("rev"+no), b=document.getElementById("rb"+no);
  const on=r.classList.toggle("show");
  b.textContent=on?"정답 · 풀이 숨기기":"정답 · 풀이 보기";
  if(on&&window.MathJax&&MathJax.typesetPromise) MathJax.typesetPromise([r]);
}
function togglePad(){
  document.getElementById("pad").classList.toggle("show");
  document.getElementById("padh").classList.toggle("open");
}
document.addEventListener("keydown",e=>{
  if(e.target.tagName==="SELECT")return;
  if(e.key==="ArrowLeft")step(-1);
  else if(e.key==="ArrowRight")step(1);
});
build();
curIdx=0; renderCur(false);
</script>
