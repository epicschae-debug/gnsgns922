<style>:root{--ink:#0c1019;--ink-2:#141a26;--ink-3:#1c2433;--line:#28324a;--text:#eef2fb;--muted:#8893ad;--gold:#f5b544;--gold-soft:#f5b54422;--mint:#5fd6b4;--red:#ff8d76;--r:18px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Pretendard',system-ui,sans-serif;background:var(--ink);color:var(--text);min-height:100vh;background-image:radial-gradient(900px 480px at 50% -8%,#1d2740 0,transparent 60%),radial-gradient(var(--line) 1px,transparent 1px);background-size:100% 100%,22px 22px;background-attachment:fixed;display:flex;justify-content:center;padding:0 14px calc(24px + env(safe-area-inset-bottom));line-height:1.55}
.app{width:100%;max-width:440px;padding-top:calc(20px + env(safe-area-inset-top))}
.top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.back{width:38px;height:38px;flex:none;border-radius:11px;background:var(--ink-2);border:1px solid var(--line);display:grid;place-items:center;color:var(--text);text-decoration:none;font-size:20px}
.back:active{background:var(--ink-3)}
.htitle{font-size:19px;font-weight:800;letter-spacing:-.02em}
.hsub{font-size:12px;color:var(--muted);margin-top:1px}

/* ===== 문제 카드 ===== */
.qcard{background:linear-gradient(180deg,#18202f,#121826);border:1px solid var(--line);border-radius:16px;padding:17px 16px 18px;box-shadow:0 12px 34px #0007}
.qhead{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:11px}
.qsrc{font-size:12px;color:var(--gold);font-weight:700;letter-spacing:.02em;display:flex;align-items:center;gap:6px}
.qtoday{font-size:10px;background:var(--gold);color:#0c1019;font-weight:800;padding:2px 7px;border-radius:999px;letter-spacing:.02em}
.qtotal{flex:none;font-size:12px;font-weight:800;color:var(--text);background:#202c44;border:1px solid #30405f;padding:5px 11px;border-radius:999px}
.qtags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid #232e47}
.tag{font-size:11.5px;font-weight:600;padding:4px 10px;border-radius:8px;background:#1b2540;color:#aeb9d4;border:1px solid #2a3754}
.tag.lv{font-weight:700}
.tag.easy{color:var(--mint);border-color:#5fd6b455;background:#5fd6b417}
.tag.mid{color:var(--gold);border-color:#f5b54455;background:var(--gold-soft)}
.tag.hard{color:var(--red);border-color:#ff8d7655;background:#ff8d7615}
.qbody{font-size:14.5px;line-height:1.7;color:#e9eef8}
.stem{margin-bottom:15px}
.sub{display:flex;gap:10px;align-items:flex-start;margin:12px 0}
.sub .num{flex:none;width:23px;height:23px;border-radius:50%;background:var(--gold-soft);color:var(--gold);font-size:12px;font-weight:700;display:grid;place-items:center;margin-top:2px}
.sub .stxt{flex:1}
.sub .pt{flex:none;font-size:11px;color:var(--muted);font-weight:700;margin-top:4px;white-space:nowrap}
.qfig{margin-top:15px;background:#fff;border-radius:11px;padding:9px}
.qfig img{width:100%;display:block;border-radius:5px}
.qfig .cap{text-align:center;font-size:11px;color:#7d8aa5;margin-top:5px}
.katex{font-size:1.02em}

.nav{display:flex;align-items:center;gap:10px;margin-top:13px}
.nav button{flex:1;height:46px;border-radius:13px;border:1px solid var(--line);background:var(--ink-2);color:var(--text);font-size:15px;font-weight:600;font-family:inherit}
.nav button:active{background:var(--ink-3)}
.nav button:disabled{opacity:.35}
.idx{flex:none;min-width:50px;text-align:center;font-size:14px;color:var(--muted);font-variant-numeric:tabular-nums}
.todaybtn{margin-top:9px;height:40px;width:100%;border-radius:12px;border:1px solid #f5b54455;background:var(--gold-soft);color:var(--gold);font-size:13px;font-weight:700;font-family:inherit}

.sec{font-size:13px;color:var(--muted);font-weight:700;margin:26px 2px 11px}
.notice{background:var(--ink-2);border:1px solid var(--line);border-radius:14px;padding:15px 16px;font-size:14px;color:#dbe2f0;line-height:1.6}
.notice .ndate{font-size:11.5px;color:var(--gold);font-weight:700;margin-bottom:7px}
.dday{background:linear-gradient(135deg,#2a1f12,#161019);border:1px solid #3a2f1c;border-radius:16px;padding:18px;text-align:center;position:relative;overflow:hidden}
.dday::after{content:'';position:absolute;right:-30px;top:-30px;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,#f5b54422,transparent 70%)}
.dday .lab{font-size:12.5px;color:var(--muted)}
.dday .big{font-size:38px;font-weight:800;color:var(--gold);letter-spacing:-.02em;margin:3px 0;line-height:1.1}
.dday .sub2{font-size:12px;color:var(--muted)}
.menu{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.mbtn{background:var(--ink-2);border:1px solid var(--line);border-radius:14px;padding:16px 8px;text-align:center;text-decoration:none;color:inherit;display:block;transition:.15s}
.mbtn:active{background:var(--ink-3)}
.mbtn .mi{font-size:22px;display:block;margin-bottom:7px}
.mbtn b{font-size:13px;font-weight:600;display:block}
.mbtn.kakao{background:#3b2f0e;border-color:#5a4a16}
.mbtn.kakao .mi{color:var(--gold)}
.foot{text-align:center;color:var(--muted);font-size:11px;margin-top:26px;line-height:1.6}

  stem:"아래 그림과 같이 지면을 $x$축, 지면에 수직인 방향을 $y$축으로 하는 좌표평면을 설정하고, 시각 $t=0$일 때 원점 $\\mathrm{O}$로부터 발사된 공의 위치를 점 $\\mathrm{P}(x,y)$로 나타내었다. 공을 원점 $\\mathrm{O}$에서 속력 $v_0$로 $x$축의 양의 방향과 예각 $\\theta$를 이루는 방향으로 발사했다고 하면 시각 $t$일 때 공의 속도는 $\\vec{v}=(v_0\\cos\\theta,\\ -10t+v_0\\sin\\theta)$로 주어진다. 공이 $x$축으로부터 높이가 36인 한 지점을 지날 때 관측된 속도가 $\\vec{v}=(15,24)$라 할 때, 다음 물음에 답하시오.",

  stem:"단백질의 종류는 아미노산의 종류, 수, 배열 순서에 의해 결정된다. 아미노산의 형태는 좌우가 비대칭이므로 종류가 $n$가지인 아미노산 $m$개로 만들 수 있는 단백질 종류의 수는 $n^{m}$가지이다. (예: A, B, C 세 종류 두 개로 만드는 단백질은 $9(=3^2)$가지) 다음 물음에 답하시오.",
  subs:[["1","A, B, C, D 네 종류의 아미노산 5개로 이루어진 단백질들 중에서 아미노산 A를 두 개 이상 포함한 종류의 수를 구하시오.","7점"],["2","E, F, G 세 종류의 아미노산이 각각 2개씩 있다. 이들 총 6개 중에서 5개를 골라 만들 수 있는 단백질 종류의 수를 구하시오.","8점"]],

  stem:"두 함수 $f(x)=\\dfrac{x+3}{4x+8}$, $g(x)=-\\dfrac{x-3}{x-4}$에 대하여 다음 물음에 답하시오.",
  subs:[["1","두 함수 $y=f(x),y=g(x)$의 그래프의 점근선으로 둘러싸인 도형의 넓이를 구하시오.","5점"],["2","$y=f(x)$의 점근선의 교점을 P라 하자. 네 변이 좌표축에 평행하고 대각선의 교점이 P인 정사각형 ABCD의 두 꼭짓점 A, C가 $y=f(x)$ 위에 있을 때, 꼭짓점 B의 좌표를 구하시오. (단, A의 $x$좌표는 $-2$보다 작고 B의 $x$좌표는 $-2$보다 크다.)","10점"],["3","$y=h(x)$는 $y=f(x)$를 $x$축에 대해 대칭이동, $y=k(x)$는 $y=g(x)$를 $y$축 방향으로 $b$만큼 평행이동한 것일 때, 두 그래프의 점근선으로 둘러싸인 도형이 정사각형이 되도록 하는 실수 $b$의 값을 모두 구하시오.","10점"]],

  stem:"오른쪽 그림과 같이 반지름의 길이가 1인 원 $\\mathrm{O}$ 위에 고정된 점 $\\mathrm{A}$가 있다. 원 위를 움직이는 두 점 $\\mathrm{P},\\mathrm{Q}$에 대하여 호 $\\mathrm{PQ}$는 점 $\\mathrm{A}$를 포함하고, 호 $\\mathrm{AQ}$의 길이는 호 $\\mathrm{AP}$의 길이의 2배이다. 점 $\\mathrm{P}$에서 $\\overline{\\mathrm{OQ}}$에 내린 수선의 발을 $\\mathrm{H}$, 호 $\\mathrm{AP}$의 길이를 $a\\ \\left(0<a<\\dfrac{\\pi}{6}\\right)$로 할 때, 부채꼴 $\\mathrm{OPQ}$에서 삼각형 $\\mathrm{OPQ}$를 제외한 활꼴의 넓이를 $f(a)$, 삼각형 $\\mathrm{PHQ}$의 넓이를 $g(a)$라 한다. 다음 물음에 답하시오.",

  subs:[["1","삼각형들의 변을 따라 $\\mathrm{B}$에서 점 $(k,0)$에 이르는 최단 경로의 개수를 $f(k)$라 할 때, $R_1$의 $f(0),f(1)$과 $R_2$의 $f(0),f(1),f(2)$를 구하고 $R_n$의 $f(k)$를 $k$에 대한 식으로 나타내시오. $(k=0,1,\\cdots,n)$","5점"],["2","$R_n$에서 $g(n)=\\displaystyle\\sum_{k=0}^{n}f(k)$를 $n$에 대한 식으로 나타내고, $\\displaystyle\\sum_{n=1}^{\\infty}\\dfrac{1}{g(n)}$의 값을 구하시오.","10점"],["3","$R_n$에서 한 번 지난 점은 다시 지나지 않고 변을 따라 $\\mathrm{B}$에서 $\\mathrm{A}$로 가는 경로 중 가장 긴 것의 길이를 $n$에 대한 식으로 나타내시오.","10점"]],

  subs:[["1","이 곡선 위의 $t=\\dfrac{5\\pi}{12}$에 대응되는 점의 $x$좌표를 $a\\sqrt{2}+b\\sqrt{6}$으로 나타낼 때 유리수 $a$, $b$의 값을 각각 구하시오.","5점"],["2","이 곡선 위의 $t=\\alpha$에 대응되는 점에서 접하는 접선이 $x$축, $y$축과 만나는 점의 좌표를 각각 $\\alpha$에 대한 식으로 나타내시오.","10점"],["3","이 곡선 위의 $t=\\alpha\\ \\left(0<\\alpha<\\dfrac{\\pi}{4}\\right)$에 대응되는 점에서 접하는 접선이 $x$축과 $y$축에 의해 잘려서 만들어지는 선분의 길이가 $2\\sqrt{7}$일 때, $\\alpha$의 값을 구하시오.","10점"]],

  stem:"안이 들여다보이지 않는 상자에 모양과 크기가 같아서 구분할 수 없는 $n$개의 탁구공이 들어있는데, 그 중 $6$개는 노란색, 나머지는 모두 흰색이다. 이 상자에서 임의로 꺼낸 $4$개의 탁구공 중에서 $2$개는 노란색, $2$개는 흰색 공일 확률을 $p_n$이라 할 때, $p_n$의 최댓값을 구하려고 한다. (단, $n\\ge 8$이다.) 다음 물음에 답하시오.",

  stem:"중심이 점 $\\mathrm{O}$이고 반지름의 길이가 $1$인 원에 내접하는 정$n$각형에서 이웃한 두 꼭짓점을 각각 $\\mathrm{P}_n,\\ \\mathrm{Q}_n$이라고 하고, 점 $\\mathrm{O}$에서 선분 $\\mathrm{P}_n\\mathrm{Q}_n$에 내린 수선의 발을 $\\mathrm{R}_n$이라고 하자. 이 정$n$각형에 내접하는 원 $\\mathrm{O}_n$의 넓이를 $a_n$, 둘레의 길이를 $b_n$이라 하자. (단, $n$은 $3$ 이상의 자연수)",

  stem:"구간 $[0,2]$에서 연속인 함수 $f(x)$에 대하여 $F(x)=\\displaystyle\\int_0^x f(t)\\,dt$로 정의할 때 다음 조건이 모두 성립한다고 하자.<div style='border:1px solid #ffffff33;border-radius:8px;padding:8px 12px;margin:10px 0;font-size:13.5px'>(가) $1\\le x\\le 2$이면 $f(x)\\le 4-\\cos\\pi x$이다.<br>(나) $0\\le x\\le 1$이면 $f(x)=a\\sin\\pi x+b\\cos\\pi x$이다. ($a,\\ b$는 상수)<br>(다) $F(1)=2,\\ F(2)=6$</div>",
  subs:[["1","$f\\!\\left(\\dfrac{3}{2}\\right)$의 값을 구하시오.","10점"],["2","상수 $a,\\ b$의 값을 구하시오.","8점"],["3","$F\\!\\left(\\dfrac{1}{2}\\right)+F\\!\\left(\\dfrac{3}{2}\\right)$의 값을 구하시오.","7점"]],

{ no:"2021 기출 · 문제 3", topic:"수학Ⅰ · 삼각함수", level:"상", total:"25점",
  stem:"아래 그림과 같이 반지름의 길이가 $2\\pi$인 원에 내접하는 정삼각형 $\\mathrm{ABC}$를 다음 세 조건을 만족하는 반지름의 길이가 $r$인 원의 호로 이루어진 길 위로 굴리려고 한다.<div style='border:1px solid #ffffff33;border-radius:8px;padding:8px 12px;margin:10px 0;font-size:13.5px'>(가) 정수 $n$에 대하여 원 $C_n$은 $x$축 위에 차례대로 놓인 점 $\\mathrm{O}_n$을 중심으로 하고 반지름의 길이가 $r$인 원이고, 선분 $\\mathrm{O}_n\\mathrm{O}_{n+1}$의 길이는 $n$의 값과 관계없이 모두 같다.<br>(나) 원 $C_n$과 원 $C_{n+1}$의 두 교점 중 $x$축 위쪽에서 만나는 점을 $\\mathrm{P}_n$이라 할 때, 중심각의 크기가 $\\pi$보다 작은 부채꼴 $\\mathrm{O}_n\\mathrm{P}_n\\mathrm{P}_{n-1}$의 호 $\\mathrm{P}_{n-1}\\mathrm{P}_n$의 길이는 정삼각형 $\\mathrm{ABC}$의 한 변 $\\mathrm{AB}$의 길이와 같다.<br>(다) 정삼각형 $\\mathrm{ABC}$의 한 꼭짓점 $\\mathrm{A}$가 점 $\\mathrm{P}_0$에 있을 때, 직선 $\\mathrm{AB}$는 원 $C_1$에 접하고, 직선 $\\mathrm{AC}$는 원 $C_0$에 접한다.</div>",
  subs:[["1","선분 $\\mathrm{AB}$의 길이와 반지름의 길이 $r$ (선분 $\\mathrm{O}_n\\mathrm{P}_n$의 길이)를 구하시오.","12점"],["2","조건 (가)~(다)를 만족하는 원의 호로 이루어진 길을 따라 정삼각형 $\\mathrm{ABC}$가 한 바퀴 굴렀을 때 점 $\\mathrm{A}$가 점 $\\mathrm{A}'$으로 옮겨졌다. 선분 $\\mathrm{AA}'$의 길이를 구하시오.","5점"],["3","위의 그림과 같이 원 $C_1$ 위의 점 $\\mathrm{R}$와 원 $C_2$ 위의 점 $\\mathrm{S}$를 연결한 직선이 두 원 $C_1$과 $C_2$에 동시에 접하고, 점 $\\mathrm{Q}$는 두 원 $C_1$과 $C_2$의 두 교점 중 $\\mathrm{P}_1$이 아닌 점이다. 선분 $\\mathrm{RS}$, 호 $\\mathrm{RQ}$, 호 $\\mathrm{QS}$로 둘러싸인 색칠된 도형의 넓이를 구하시오.","8점"]],

{ no:"2021 모의 · 문제 4", topic:"경우의 수 · 수열의 합", level:"중상", total:"25점",
  stem:"자연수 $n$에 대하여 $\\mathrm{A}(0,0)$, $\\mathrm{B}(n,0)$, $\\mathrm{C}(n,n)$, $\\mathrm{D}(0,n)$을 꼭짓점으로 갖는 정사각형 $\\mathrm{ABCD}$의 네 변과 $1\\le k\\le n-1$을 만족하는 자연수 $k$에 대하여 점 $(0,k)$와 점 $(n,k)$를 연결하는 $x$축에 평행한 $(n-1)$개의 선분, 점 $(k,0)$과 점 $(k,n-k)$를 연결하는 $y$축에 평행한 $(n-1)$개의 선분을 추가하여 그림과 같은 도로망을 만들었다. (그림은 $n=6$인 경우의 예시임)",
  subs:[["1","자연수 $n$에 대하여 $\\mathrm{A}$에서 $\\mathrm{C}$로 가는 최단 경로의 수를 $n$에 대한 식으로 표현하시오.","8점"],["2","주어진 도로망에 놓여 있는 한 변의 길이가 $k$인 정사각형의 개수를 $a_k$라 할 때, 위의 그림과 같이 $n=6$인 경우 $1\\le k\\le 6$인 자연수 $k$에 대해 $a_k$를 각각 구하시오.","5점"],["3","주어진 자연수 $n$에 대해 $\\displaystyle\\sum_{k=1}^{n}a_k$를 $n$에 대한 식으로 표현하시오.","12점"]],

/* ===================================================== */
const LV={"중하":"easy","중":"easy","중상":"mid","상":"hard"};
const N=PROBLEMS.length;
const now=new Date();
const doy=Math.floor((now-new Date(now.getFullYear(),0,0))/86400000);
const todayIdx=((doy%N)+N)%N;
let cur=todayIdx;
const w=['일','월','화','수','목','금','토'];
const dstr=(now.getMonth()+1)+'월 '+now.getDate()+'일 ('+w[now.getDay()]+')';
document.getElementById('dateline').textContent=dstr+' · 매일 새 문제';
document.getElementById('ndate').textContent=dstr;
document.getElementById('notice').textContent=NOTICE;
const exam=new Date(2026,10,19);
const diff=Math.ceil((exam-new Date(now.getFullYear(),now.getMonth(),now.getDate()))/86400000);
document.getElementById('dday').textContent='D-'+diff;
document.getElementById('ddaysub').textContent='약 '+Math.floor(diff/30)+'개월 '+(diff%30)+'일 남음';
function renderProblem(){
  const p=PROBLEMS[cur];
  document.getElementById('qsrc').innerHTML=p.no+(cur===todayIdx?' <span class="qtoday">오늘</span>':'');
  document.getElementById('qtotal').textContent='총 '+p.total;
  document.getElementById('qtags').innerHTML='<span class="tag">'+p.topic+'</span><span class="tag lv '+(LV[p.level]||'mid')+'">난이도 '+p.level+'</span>';
  let h='<div class="stem">'+p.stem+'</div>';
  p.subs.forEach(s=>{h+='<div class="sub"><span class="num">'+s[0]+'</span><span class="stxt">'+s[1]+'</span><span class="pt">'+s[2]+'</span></div>';});
  if(p.fig) h+='<div class="qfig"><img src="'+p.fig+'" alt="그림"><div class="cap">[그림]</div></div>';
  document.getElementById('qbody').innerHTML=h;
  document.getElementById('idx').textContent=(cur+1)+' / '+N;
  document.getElementById('prev').disabled=(cur===0);
  document.getElementById('next').disabled=(cur===N-1);
  if(window.renderMathInElement) renderMathInElement(document.getElementById('qbody'),{delimiters:[{left:'$',right:'$',display:false}],throwOnError:false});
}
function go(d){cur=Math.min(N-1,Math.max(0,cur+d));renderProblem();}
function goToday(){cur=todayIdx;renderProblem();}
document.addEventListener('DOMContentLoaded',renderProblem);
window.addEventListener('load',renderProblem);
</script>
