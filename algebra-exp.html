<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>지수 · 개념 + 예제</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<script>
window.MathJax = {
  tex: { inlineMath: [['\\(', '\\)']], displayMath: [['$$','$$'],['\\[','\\]']] },
  svg: { fontCache: 'global' },
  startup: { typeset: false }
};
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.min.js" id="MathJax-script" async></script>
<style>
  :root{
    --paper:#FAF7F0; --ink:#23262e; --muted:#6f7480;
    --navy:#22356f; --navy2:#33489a; --blue:#2f5fb0; --blue-soft:#eef5fd; --blue-line:#cfe2f7;
    --approach-bg:#e9f1fc; --approach-ink:#1f56a6;
    --solve-bg:#f3e9fb; --solve-ink:#7a3aa0;
    --alt:#9aa0ad;
    --orange:#e08327; --orange-bg:#fff8ef; --orange-line:#f1d8b4;
    --card:#ffffff; --hair:#e7e2d6;
    --geo:#197a6b; --geo-bg:#e6f4f0; --geo-line:#bfe4db;
    /* 개념 본문용 (예제 톤에 맞춤) */
    --arith:#22356f; --arith-tint:#eef5fd; --arith-edge:#cfe2f7;
    --geom:#197a6b; --geom-tint:#e6f4f0; --geom-edge:#bfe4db;
    --amber:#B7791F; --amber-tint:#FBF3E2;
  }
  *{box-sizing:border-box}
  html,body{height:100%;}
  body{
    margin:0; background:var(--paper); color:var(--ink);
    font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',system-ui,sans-serif;
    font-size:16px; line-height:1.7; -webkit-font-smoothing:antialiased; overflow:hidden;
  }
  .app{display:flex; flex-direction:column; height:100dvh; max-width:780px; margin:0 auto; background:var(--paper);}

  /* ── 상단바 ── */
  .topbar{flex:none; padding:11px 16px 10px; border-bottom:1px solid var(--hair); background:var(--paper); position:relative; z-index:5;}
  .top-row{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:9px;}
  .ttl .eyebrow{font-size:.72rem; font-weight:700; color:var(--blue); letter-spacing:.03em;}
  .ttl h1{margin:.05em 0 0; font-size:1.08rem; font-weight:800; letter-spacing:-.02em;}
  /* 모드 탭 */
  .mode-tabs{display:inline-flex; background:#eee9dc; border-radius:11px; padding:3px; gap:2px; flex:none;}
  .mode-tab{
    border:none; background:transparent; color:var(--muted); font-family:inherit;
    font-weight:800; font-size:.86rem; padding:7px 16px; border-radius:9px; cursor:pointer; transition:.12s;
  }
  .mode-tab.active{background:#fff; color:var(--navy); box-shadow:0 1px 3px rgba(0,0,0,.12);}

  .grid-nav{display:flex; flex-direction:column; gap:7px;}
  .gn-row{display:grid; grid-template-columns:54px 1fr; align-items:center; gap:9px;}
  .gn-label{font-size:.7rem; font-weight:800; text-align:center; padding:4px 0; border-radius:7px;}
  .gn-label.ar{background:var(--blue-soft); color:var(--navy);}
  .gn-label.ge{background:var(--geo-bg); color:var(--geo);}
  .gn-nums{display:flex; gap:5px; flex-wrap:wrap;}
  .gn-num{
    width:30px; height:30px; border-radius:50%; border:1.5px solid var(--hair);
    background:#fff; color:var(--ink); font-weight:800; font-size:.8rem;
    font-variant-numeric:tabular-nums; cursor:pointer; display:grid; place-items:center;
    transition:.12s; padding:0; line-height:1;
  }
  .gn-num:hover{border-color:var(--blue);}
  .gn-num.ar.active{background:var(--navy); color:#fff; border-color:var(--navy); box-shadow:0 2px 6px rgba(34,53,111,.3);}
  .gn-num.ge.active{background:var(--geo); color:#fff; border-color:var(--geo); box-shadow:0 2px 6px rgba(25,122,107,.3);}

  /* ── 뷰어 ── */
  .viewer{flex:1 1 auto; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:16px;}
  .card{background:var(--card); border:1px solid var(--hair); border-radius:18px; padding:20px 20px 18px; margin:0;
    box-shadow:0 1px 2px rgba(40,40,60,.04), 0 8px 24px rgba(40,40,60,.04);}
  .card-head{display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:14px;}
  .badge{display:inline-flex; align-items:center; gap:9px;
    background:linear-gradient(135deg,var(--navy),var(--navy2)); color:#fff;
    padding:6px 8px 6px 13px; border-radius:999px; font-weight:800; font-size:.8rem;
    box-shadow:0 3px 8px rgba(34,53,111,.22);}
  .badge.geo{background:linear-gradient(135deg,#15695c,#1f8f7d);}
  .badge .num{background:#fff; color:var(--navy); width:24px; height:24px; border-radius:50%;
    display:grid; place-items:center; font-size:.88rem; font-variant-numeric:tabular-nums;}
  .badge.geo .num{color:#15695c;}
  .topic-tag{font-size:.72rem; font-weight:800; padding:3px 9px; border-radius:6px; background:var(--blue-soft); color:var(--blue);}
  .topic-tag.geo{background:var(--geo-bg); color:var(--geo);}
  .ex-title{font-size:1.04rem; font-weight:800; color:var(--blue); flex:1 1 100%; line-height:1.35;}
  .ex-title.geo{color:var(--geo);}

  /* 예제 문제 */
  .problem{background:var(--blue-soft); border:1px solid var(--blue-line); border-radius:14px; padding:15px 17px;}
  .problem.geo{background:var(--geo-bg); border-color:var(--geo-line);}
  .problem .intro{font-weight:600;}
  ol.parts{margin:.5em 0 0; padding-left:0; list-style:none; counter-reset:p;}
  ol.parts li{counter-increment:p; padding-left:1.9em; position:relative; margin:.4em 0;}
  ol.parts li::before{content:"(" counter(p) ")"; position:absolute; left:0; font-weight:700; color:var(--blue); font-variant-numeric:tabular-nums;}
  .problem.geo ol.parts li::before{color:var(--geo);}

  /* 해설 토글 */
  .sol-bar{display:flex; align-items:center; gap:12px; margin:18px 2px 4px;}
  .sol-bar .lbl{font-weight:800; font-size:.9rem; color:var(--muted);}
  .switch{position:relative; display:inline-block; width:50px; height:28px; flex:none;}
  .switch input{opacity:0; width:0; height:0;}
  .slider{position:absolute; inset:0; cursor:pointer; background:#cfcabb; border-radius:999px; transition:.2s;}
  .slider::before{content:""; position:absolute; height:22px; width:22px; left:3px; top:3px; background:#fff; border-radius:50%; transition:.2s; box-shadow:0 1px 3px rgba(0,0,0,.25);}
  .switch input:checked + .slider{background:var(--navy);}
  .card.geo .switch input:checked + .slider{background:var(--geo);}
  .switch input:checked + .slider::before{transform:translateX(22px);}
  .sol-state{font-size:.82rem; color:var(--muted); font-weight:700;}
  .solution{display:none; margin-top:6px;}
  .solution.open{display:block;}

  .block{margin-top:18px;}
  .label{display:inline-block; font-weight:800; font-size:.8rem; padding:4px 12px; border-radius:8px; margin-bottom:8px;}
  .label.approach{background:var(--approach-bg); color:var(--approach-ink);}
  .label.solve{background:var(--solve-bg); color:var(--solve-ink);}
  .label.alt{background:#fff; color:var(--alt); border:1px solid #e2e0da; font-size:.74rem; padding:3px 10px;}
  .lines{padding-left:4px;}
  .lines .line{margin:.18em 0;}
  .lines .line.eq{padding-left:1.1em; margin:.28em 0;}
  .note{color:var(--muted); font-size:.9em;}
  .answer{display:inline-flex; align-items:center; gap:10px; margin-top:18px; border:1.5px solid var(--navy); border-radius:10px; padding:6px 14px 6px 6px; font-weight:700;}
  .answer .k{background:var(--navy); color:#fff; padding:3px 10px; border-radius:6px; font-size:.8rem;}
  .card.geo .answer{border-color:var(--geo);} .card.geo .answer .k{background:var(--geo);}
  .bible{margin-top:20px; background:var(--orange-bg); border:1px solid var(--orange-line); border-radius:14px; padding:16px 18px; position:relative;}
  .bible .tag{position:absolute; top:-12px; left:16px; background:var(--orange); color:#fff; font-weight:800; font-size:.72rem; padding:3px 11px; border-radius:7px;}
  .bible .body{margin-top:6px; font-size:.93rem; color:#5a4a36;}

  /* ── 개념 본문 (concept-view) ── */
  .cv .concept-card{border-radius:14px; padding:10px 20px; margin-bottom:18px;}
  .cv.ar .concept-card{background:var(--arith-tint); border:1px solid var(--arith-edge);}
  .cv.ge .concept-card{background:var(--geom-tint); border:1px solid var(--geom-edge);}
  .cv .def-row{display:grid; grid-template-columns:130px 1fr; gap:14px; padding:13px 0; align-items:start;}
  .cv .def-row+.def-row{border-top:1px dashed var(--hair);}
  .cv .def-label{font-weight:700; font-size:14px;}
  .cv.ar .def-label{color:var(--arith);}
  .cv.ge .def-label{color:var(--geom);}
  .cv .def-body{font-size:15px;}
  .cv .concept-body{padding-left:2px;}
  .cv .prose{margin:14px 0;}
  .cv .formula{position:relative; margin:20px 0; padding:20px 20px 14px; border-radius:12px; background:var(--card); border:1px solid var(--hair);}
  .cv.ar .formula{border-left:4px solid var(--arith);}
  .cv.ge .formula{border-left:4px solid var(--geom);}
  .cv .formula-tag{position:absolute; top:-11px; left:18px; font-size:11.5px; font-weight:700; padding:3px 11px; border-radius:999px; color:#fff;}
  .cv.ar .formula-tag{background:var(--arith);}
  .cv.ge .formula-tag{background:var(--geom);}
  .cv .formula-math{overflow-x:auto;}
  .cv .note{margin:16px 0; padding:13px 18px; border-radius:10px; background:var(--amber-tint); border-left:3px solid var(--amber); font-size:14px; color:#5a4517;}
  .cv .note b{color:#3d2e0d;}
  .cv .example{margin:18px 0; padding:18px 20px 16px; border-radius:12px; background:var(--card); border:1px dashed var(--hair);}
  .cv .example-label{display:inline-block; font-weight:700; font-size:12.5px; letter-spacing:.08em; padding:3px 12px; border-radius:6px; margin-bottom:8px; color:var(--ink); background:#F0ECE0;}
  .cv .example-list{margin:6px 0 0; padding-left:1.4em;}
  .cv .example-list li{margin:9px 0; font-size:14.5px;}
  .cv .derive{margin:18px 0; padding:18px 20px; border-radius:12px; background:#FAF9F4; border:1px solid var(--hair);}
  .cv .derive-title{font-weight:700; font-size:14px; color:var(--muted); margin-bottom:10px;}
  .cv .derive-line{padding:3px 0; overflow-x:auto;}
  .cv .derive-rule{border:none; border-top:1.5px solid var(--ink); margin:6px 0;}
  .cv .tablewrap{overflow-x:auto; margin:18px 0;}
  .cv table.fin{border-collapse:collapse; width:100%; font-size:14px; background:var(--card);}
  .cv table.fin th, .cv table.fin td{border:1px solid var(--hair); padding:8px 10px; text-align:center;}
  .cv.ar table.fin thead th{background:var(--arith-tint); color:var(--arith); font-weight:700;}
  .cv.ge table.fin thead th{background:var(--geom-tint); color:var(--geom); font-weight:700;}
  .cv table.fin td:first-child, .cv table.fin th:first-child{font-weight:600; background:#FAFAF6;}
  mjx-container{overflow-x:auto; overflow-y:visible; max-width:100%;}
  /* 개념 정의칸 안의 display 수식이 윗줄/카드 경계에 가려지지 않도록 여백 확보 */
  .cv .def-body mjx-container[display="true"]{margin:.45em 0 .25em;}

  /* ── 페이저 ── */
  .pager{flex:none; display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:10px 16px calc(10px + env(safe-area-inset-bottom)); border-top:1px solid var(--hair); background:var(--paper);}
  .pager button{border:1.5px solid var(--navy); background:#fff; color:var(--navy); padding:9px 18px; border-radius:11px;
    font-size:.92rem; font-weight:800; cursor:pointer; font-family:inherit; transition:.12s; flex:1; max-width:160px;}
  .pager button:hover:not(:disabled){background:var(--navy); color:#fff;}
  .pager button:disabled{opacity:.32; cursor:default; border-color:var(--hair); color:var(--muted);}
  .pager .counter{font-weight:800; font-variant-numeric:tabular-nums; color:var(--muted); font-size:.9rem; white-space:nowrap;}

  @media (max-width:430px){
    .gn-num{width:28px; height:28px; font-size:.76rem;}
    .gn-row{grid-template-columns:48px 1fr; gap:7px;}
    .ttl h1{font-size:.98rem;}
    .mode-tab{padding:6px 13px; font-size:.82rem;}
    .viewer{padding:13px;}
    .card{padding:17px 15px 16px;}
    .pager button{padding:9px 10px;}
    .cv .def-row{grid-template-columns:1fr; gap:4px;}
  }

  /* 뒤로가기 */
  .topbar .backbtn{flex:none;width:30px;height:30px;display:grid;place-items:center;border-radius:9px;background:#eee9dc;color:var(--ink);text-decoration:none;font-size:18px;line-height:1;}
  .topbar .backbtn:active{background:#e0dac9;}
  .top-row .ttl{flex:1 1 auto;min-width:0;}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="top-row">
      <a class="backbtn" href="sub-algebra.html" aria-label="뒤로">&#8592;</a>
      <div class="ttl">
        <div class="eyebrow">Ⅰ. 지수함수와 로그함수 · 01단원</div>
        <h1>지수</h1>
      </div>
      <div class="mode-tabs" id="modeTabs">
        <button class="mode-tab active" data-mode="concept">개념</button>
        <button class="mode-tab" data-mode="example">예제</button>
      </div>
    </div>
    <div class="grid-nav" id="gridNav"></div>
  </header>
  <main class="viewer" id="viewer"></main>
  <nav class="pager">
    <button id="prevBtn">◀ 이전</button>
    <span class="counter" id="counter"></span>
    <button id="nextBtn">다음 ▶</button>
  </nav>
</div>

<script id="concepts" type="application/json">{"concepts": [{"topic": "거듭제곱과 거듭제곱근", "no": 1, "title": "거듭제곱과 지수법칙 (중학교 복습)", "html": "<div class=\"concept-card\"><div class=\"def-row\"><div class=\"def-label\">거듭제곱</div><div class=\"def-body\">실수 \\(a\\)와 자연수 \\(n\\)에 대하여 \\(a\\)를 \\(n\\)번 곱한 것을 \\(a\\)의 <b>\\(n\\)제곱</b>이라 하고 \\(a^n\\)으로 나타낸다. 이때 \\(a^n\\)에서 \\(a\\)를 거듭제곱의 <b>밑</b>, \\(n\\)을 거듭제곱의 <b>지수</b>라 한다.</div></div></div>\n<div class=\"concept-body\"><p class=\"prose\">\\(a,\\ a^2,\\ a^3,\\ \\cdots\\)을 통틀어 \\(a\\)의 <b>거듭제곱</b>이라 한다. 자연수 지수에 대하여 다음 지수법칙이 성립한다.</p><div class=\"formula\"><span class=\"formula-tag\">지수법칙 (자연수 \\(m,\\ n\\))</span><div class=\"formula-math\" style=\"line-height:1.9;\"><div style=\"padding:3px 0;\">① \\(a^m a^n=a^{m+n}\\)</div><div style=\"padding:3px 0;\">② \\((a^m)^n=a^{mn}\\)</div><div style=\"padding:3px 0;\">③ \\((ab)^n=a^n b^n\\)</div><div style=\"padding:3px 0;\">④ \\(\\left(\\dfrac{a}{b}\\right)^{n}=\\dfrac{a^n}{b^n}\\ (b\\ne 0)\\)</div></div></div><div class=\"formula\"><span class=\"formula-tag\">나눗셈 (\\(a\\ne 0\\))</span><div class=\"formula-math\">\\[a^m\\div a^n=\\begin{cases}a^{m-n} & (m&gt;n)\\\\[2pt]1 & (m=n)\\\\[2pt]\\dfrac{1}{a^{n-m}} & (m&lt;n)\\end{cases}\\]</div></div><div class=\"note\"><b>주의</b> 다음은 자주 하는 실수이다. \\(a^m+a^n\\ne a^{m+n}\\), \\(a^m\\times a^n\\ne a^{mn}\\), \\((a^m)^n\\ne a^{m^n}\\)이다.</div><div class=\"example\"><span class=\"example-label\">보기</span><ol class=\"example-list\"><li>\\(ab^2\\times a^3 b^5=a^{1+3}b^{2+5}=a^4 b^7\\)</li><li>\\((a^3 b^2)^3\\div(a^2 b)^2=a^9 b^6\\div a^4 b^2=a^5 b^4\\)</li></ol></div></div>"}, {"topic": "거듭제곱과 거듭제곱근", "no": 2, "title": "거듭제곱근", "html": "<div class=\"concept-card\"><div class=\"def-row\"><div class=\"def-label\">거듭제곱근</div><div class=\"def-body\">\\(n\\)이 \\(2\\) 이상의 자연수일 때, \\(n\\)제곱하여 실수 \\(a\\)가 되는 수, 즉 방정식 $$x^n=a$$ 를 만족시키는 수 \\(x\\)를 \\(a\\)의 <b>\\(n\\)제곱근</b>이라 한다. \\(a\\)의 제곱근, 세제곱근, 네제곱근, \\(\\cdots\\)을 통틀어 \\(a\\)의 <b>거듭제곱근</b>이라 한다.</div></div></div>\n<div class=\"concept-body\"><p class=\"prose\">예를 들어 세제곱하여 \\(a\\)가 되는 수, 즉 \\(x^3=a\\)를 만족시키는 수 \\(x\\)를 \\(a\\)의 세제곱근이라 한다. 실수 \\(a\\)의 \\(n\\)제곱근은 복소수의 범위에서 \\(n\\)개가 있음이 알려져 있다.</p><div class=\"derive\"><div class=\"derive-title\">\\(-27\\)의 세제곱근 (복소수 범위)</div><div class=\"derive-line\">\\(x^3=-27,\\quad x^3+27=0\\)</div><div class=\"derive-line\">\\((x+3)(x^2-3x+9)=0\\)</div><div class=\"derive-line\">\\(\\therefore x=-3\\ \\text{ 또는 }\\ x=\\dfrac{3\\pm 3\\sqrt3\\,i}{2}\\)</div></div><div class=\"note\">고등학교 과정에서는 거듭제곱근 중 <b>실수인 것</b>만 다룬다. 위에서 \\(-27\\)의 세제곱근 중 실수인 것은 \\(-3\\)뿐이다.</div><div class=\"example\"><span class=\"example-label\">보기</span><ol class=\"example-list\"><li>\\(16\\)의 네제곱근: \\(x^4=16\\)에서 \\(x^4-16=0\\), \\((x^2+4)(x+2)(x-2)=0\\) \\(\\therefore x=\\pm 2\\) 또는 \\(x=\\pm 2i\\)</li></ol></div></div>"}, {"topic": "거듭제곱과 거듭제곱근", "no": 3, "title": "a의 실수인 n제곱근", "html": "<div class=\"concept-card\"><div class=\"def-row\"><div class=\"def-label\">실수인 \\(n\\)제곱근</div><div class=\"def-body\">\\(n\\)이 \\(2\\) 이상의 자연수일 때, 실수 \\(a\\)의 \\(n\\)제곱근 중 실수인 것은 \\(y=x^n\\)의 그래프와 직선 \\(y=a\\)의 교점의 \\(x\\)좌표와 같다.</div></div></div>\n<div class=\"concept-body\"><p class=\"prose\"><b>\\(n\\)이 홀수일 때</b> \\(y=x^n\\)의 그래프는 원점에 대하여 대칭이므로 직선 \\(y=a\\)와의 교점은 \\(a\\)의 값에 관계없이 오직 한 개이다. 이것을 \\(\\sqrt[n]{a}\\)로 나타낸다.</p><figure style=\"margin:6px 0 2px;\"><svg viewBox=\"0 0 220 170\" xmlns=\"http://www.w3.org/2000/svg\" style=\"display:block;width:100%;max-width:240px;height:auto;margin:0 auto;\">\n<line x1=\"20\" y1=\"85\" x2=\"200\" y2=\"85\" stroke=\"#c9c4b6\" stroke-width=\"1\"/>\n<line x1=\"110\" y1=\"15\" x2=\"110\" y2=\"155\" stroke=\"#c9c4b6\" stroke-width=\"1\"/>\n<path d=\"M40 150 C 95 150, 95 95, 110 85 C 125 75, 125 20, 180 20\" fill=\"none\" stroke=\"var(--arith)\" stroke-width=\"2.2\"/>\n<line x1=\"20\" y1=\"50\" x2=\"200\" y2=\"50\" stroke=\"#cf7a3a\" stroke-width=\"1.6\" stroke-dasharray=\"4 3\"/>\n<circle cx=\"142\" cy=\"50\" r=\"3.4\" fill=\"var(--arith)\"/>\n<text x=\"196\" y=\"80\" font-size=\"11\" fill=\"#8a8f9a\">x</text>\n<text x=\"116\" y=\"26\" font-size=\"11\" fill=\"#8a8f9a\">y=x<tspan dy=\"-4\" font-size=\"8\">n</tspan></text>\n<text x=\"24\" y=\"45\" font-size=\"11\" fill=\"#cf7a3a\">y=a</text>\n</svg><figcaption style=\"font-size:.72rem;color:#8a8f9a;margin-top:4px;text-align:center;\">\\(n\\)이 홀수: 실수인 \\(n\\)제곱근은 \\(\\sqrt[n]{a}\\) 하나</figcaption></figure><p class=\"prose\"><b>\\(n\\)이 짝수일 때</b> \\(y=x^n\\)의 그래프는 \\(y\\)축에 대하여 대칭이므로, \\(a>0\\)이면 교점이 두 개(양수 \\(\\sqrt[n]{a}\\), 음수 \\(-\\sqrt[n]{a}\\)), \\(a=0\\)이면 \\(0\\) 하나, \\(a<0\\)이면 교점이 없다.</p><figure style=\"margin:6px 0 2px;\"><svg viewBox=\"0 0 220 170\" xmlns=\"http://www.w3.org/2000/svg\" style=\"display:block;width:100%;max-width:240px;height:auto;margin:0 auto;\">\n<line x1=\"20\" y1=\"150\" x2=\"200\" y2=\"150\" stroke=\"#c9c4b6\" stroke-width=\"1\"/>\n<line x1=\"110\" y1=\"15\" x2=\"110\" y2=\"158\" stroke=\"#c9c4b6\" stroke-width=\"1\"/>\n<path d=\"M55 20 C 85 145, 100 150, 110 150 C 120 150, 135 145, 165 20\" fill=\"none\" stroke=\"var(--geom)\" stroke-width=\"2.2\"/>\n<line x1=\"20\" y1=\"55\" x2=\"200\" y2=\"55\" stroke=\"#cf7a3a\" stroke-width=\"1.6\" stroke-dasharray=\"4 3\"/>\n<circle cx=\"78\" cy=\"55\" r=\"3.4\" fill=\"var(--geom)\"/>\n<circle cx=\"142\" cy=\"55\" r=\"3.4\" fill=\"var(--geom)\"/>\n<text x=\"196\" y=\"145\" font-size=\"11\" fill=\"#8a8f9a\">x</text>\n<text x=\"116\" y=\"26\" font-size=\"11\" fill=\"#8a8f9a\">y=x<tspan dy=\"-4\" font-size=\"8\">n</tspan></text>\n<text x=\"24\" y=\"50\" font-size=\"11\" fill=\"#cf7a3a\">y=a (a&gt;0)</text>\n</svg><figcaption style=\"font-size:.72rem;color:#8a8f9a;margin-top:4px;text-align:center;\">\\(n\\)이 짝수: \\(a>0\\)이면 \\(\\pm\\sqrt[n]{a}\\) 두 개</figcaption></figure><div class=\"tablewrap\"><table class=\"fin\"><thead><tr><th></th><th>\\(a>0\\)</th><th>\\(a=0\\)</th><th>\\(a<0\\)</th></tr></thead><tbody><tr><td>\\(n\\)이 홀수</td><td>\\(\\sqrt[n]{a}\\)</td><td>\\(0\\)</td><td>\\(\\sqrt[n]{a}\\)</td></tr><tr><td>\\(n\\)이 짝수</td><td>\\(\\sqrt[n]{a},\\ -\\sqrt[n]{a}\\)</td><td>\\(0\\)</td><td>없다.</td></tr></tbody></table></div><div class=\"note\">‘\\(a\\)의 \\(n\\)제곱근’과 ‘\\(n\\)제곱근 \\(a\\)’는 다르다. 앞의 것은 \\(x^n=a\\)를 만족시키는 모든 \\(x\\)를 뜻하고, 뒤의 것은 그중 하나인 \\(\\sqrt[n]{a}\\)를 뜻한다.</div><div class=\"example\"><span class=\"example-label\">보기</span><ol class=\"example-list\"><li>\\(8\\)의 세제곱근 중 실수인 것: \\(\\sqrt[3]{8}=2\\)</li><li>\\(81\\)의 네제곱근 중 실수인 것: \\(\\sqrt[4]{81}=3,\\ -\\sqrt[4]{81}=-3\\)</li><li>\\(-16\\)의 네제곱근 중 실수인 것: 없다.</li></ol></div></div>"}, {"topic": "거듭제곱과 거듭제곱근", "no": 4, "title": "거듭제곱근의 성질", "html": "<div class=\"concept-card\"><div class=\"def-row\"><div class=\"def-label\">성질</div><div class=\"def-body\">\\(a>0,\\ b>0\\)이고 \\(m,\\ n\\)이 \\(2\\) 이상의 자연수일 때 다음이 성립한다.</div></div></div>\n<div class=\"concept-body\"><div class=\"formula\"><span class=\"formula-tag\">거듭제곱근의 성질</span><div class=\"formula-math\" style=\"line-height:1.9;\"><div style=\"padding:3px 0;\">① \\((\\sqrt[n]{a})^{n}=a\\)</div><div style=\"padding:3px 0;\">② \\(\\sqrt[n]{a}\\,\\sqrt[n]{b}=\\sqrt[n]{ab}\\)</div><div style=\"padding:3px 0;\">③ \\(\\dfrac{\\sqrt[n]{a}}{\\sqrt[n]{b}}=\\sqrt[n]{\\dfrac{a}{b}}\\)</div><div style=\"padding:3px 0;\">④ \\((\\sqrt[n]{a})^{m}=\\sqrt[n]{a^m}\\)</div><div style=\"padding:3px 0;\">⑤ \\(\\sqrt[m]{\\sqrt[n]{a}}=\\sqrt[mn]{a}\\)</div><div style=\"padding:3px 0;\">⑥ \\(\\sqrt[np]{a^{mp}}=\\sqrt[n]{a^m}\\quad(p\\text{는 자연수})\\)</div></div></div><p class=\"prose\"><b>②의 확인:</b> 양변을 \\(n\\)제곱하면 \\((\\sqrt[n]{a}\\,\\sqrt[n]{b})^n=(\\sqrt[n]{a})^n(\\sqrt[n]{b})^n=ab\\)이고, \\(\\sqrt[n]{a}\\,\\sqrt[n]{b}>0\\)이므로 \\(ab\\)의 양의 \\(n\\)제곱근, 즉 \\(\\sqrt[n]{ab}\\)이다.</p><div class=\"note\"><b>주의</b> 거듭제곱근의 성질은 <b>근호 안의 수가 양수일 때만</b> 성립한다. \\(n\\)이 짝수일 때 근호 안이 음수인 경우는 정의하지 않는다. (단, \\(n=2\\)일 때 \\(\\sqrt{-1}=i\\)로 정의한다.)</div><div class=\"example\"><span class=\"example-label\">보기</span><ol class=\"example-list\"><li>\\(\\sqrt[5]{2}\\,\\sqrt[5]{16}=\\sqrt[5]{2\\times 16}=\\sqrt[5]{32}=\\sqrt[5]{2^5}=2\\)</li><li>\\(\\sqrt{\\sqrt[3]{729}}=\\sqrt[6]{729}=\\sqrt[6]{3^6}=3\\)</li><li>\\(\\sqrt[8]{16}=\\sqrt[8]{2^4}=\\sqrt{2}\\)</li></ol></div></div>"}, {"topic": "지수의 확장", "no": 1, "title": "정수인 지수", "html": "<div class=\"concept-card\"><div class=\"def-row\"><div class=\"def-label\">정의</div><div class=\"def-body\">\\(a\\ne 0\\)이고 \\(n\\)이 자연수일 때 $$a^0=1,\\qquad a^{-n}=\\dfrac{1}{a^n}$$ 로 정의한다.</div></div></div>\n<div class=\"concept-body\"><p class=\"prose\">지수법칙 \\(a^m a^n=a^{m+n}\\)이 \\(m=0\\), \\(m=-n\\)일 때도 성립하도록 위와 같이 정의한다.</p><div class=\"derive\"><div class=\"derive-title\">정의의 근거</div><div class=\"derive-line\">\\(a^0 a^n=a^{0+n}=a^n=1\\times a^n\\) 이므로 \\(a^0=1\\)</div><div class=\"derive-line\">\\(a^{-n}a^n=a^{-n+n}=a^0=1\\) 이므로 \\(a^{-n}=\\dfrac{1}{a^n}\\)</div></div><div class=\"formula\"><span class=\"formula-tag\">지수법칙 (정수 \\(m,\\ n\\),\\ \\(a\\ne 0,\\ b\\ne 0\\))</span><div class=\"formula-math\" style=\"line-height:1.9;\"><div style=\"padding:3px 0;\">① \\(a^m a^n=a^{m+n}\\)</div><div style=\"padding:3px 0;\">② \\(a^m\\div a^n=a^{m-n}\\)</div><div style=\"padding:3px 0;\">③ \\((a^m)^n=a^{mn}\\)</div><div style=\"padding:3px 0;\">④ \\((ab)^n=a^n b^n\\)</div></div></div><div class=\"note\">밑 \\(a\\)에 대하여 \\(a\\ne 0\\)이어야 한다. 자연수 \\(n\\)에 대하여 \\(0^n=0\\)이지만 \\(0^0,\\ 0^{-n}\\)은 정의하지 않는다.</div><div class=\"example\"><span class=\"example-label\">보기</span><ol class=\"example-list\"><li>\\(5^{-5}\\div 5^{-3}=5^{-5-(-3)}=5^{-2}=\\dfrac{1}{25}\\)</li><li>\\(3^2\\times 3^{-4}=3^{2+(-4)}=3^{-2}=\\dfrac{1}{9}\\)</li><li>\\((2^3\\times 5)^{-2}=2^{-6}\\times 5^{-2}=\\dfrac{1}{400}\\)</li></ol></div></div>"}, {"topic": "지수의 확장", "no": 2, "title": "유리수인 지수", "html": "<div class=\"concept-card\"><div class=\"def-row\"><div class=\"def-label\">정의</div><div class=\"def-body\">\\(a>0\\)이고 \\(m,\\ n\\,(n\\ge 2)\\)이 정수일 때 $$a^{\\frac{m}{n}}=\\sqrt[n]{a^m},\\qquad a^{\\frac{1}{n}}=\\sqrt[n]{a}$$ 로 정의한다.</div></div></div>\n<div class=\"concept-body\"><p class=\"prose\">지수법칙 \\((a^p)^q=a^{pq}\\)가 유리수 지수에서도 성립하도록 정의한다. \\(\\left(a^{\\frac{m}{n}}\\right)^{n}=a^{\\frac{m}{n}\\times n}=a^m\\)이고 \\(a^{\\frac{m}{n}}>0\\)이므로 \\(a^{\\frac{m}{n}}\\)은 \\(a^m\\)의 양의 \\(n\\)제곱근, 즉 \\(\\sqrt[n]{a^m}\\)이다.</p><div class=\"formula\"><span class=\"formula-tag\">지수법칙 (유리수 \\(r,\\ s\\),\\ \\(a>0,\\ b>0\\))</span><div class=\"formula-math\" style=\"line-height:1.9;\"><div style=\"padding:3px 0;\">① \\(a^r a^s=a^{r+s}\\)</div><div style=\"padding:3px 0;\">② \\(a^r\\div a^s=a^{r-s}\\)</div><div style=\"padding:3px 0;\">③ \\((a^r)^s=a^{rs}\\)</div><div style=\"padding:3px 0;\">④ \\((ab)^r=a^r b^r\\)</div></div></div><div class=\"note\"><b>주의</b> 유리수 지수는 <b>밑이 양수</b>일 때만 정의한다. \\((-3)^{\\frac12}\\), \\((-2)^{\\frac14}\\)처럼 쓰는 것은 의미가 없다. 또 \\(\\sqrt[n]{a^m}\\)에서 \\(n\\)은 \\(2\\) 이상의 자연수여야 하므로 \\(5^{-\\frac23}=\\sqrt[3]{5^{-2}}\\)로 표현한다.</div><div class=\"example\"><span class=\"example-label\">보기</span><ol class=\"example-list\"><li>\\(25^{\\frac12}=\\sqrt{25}=5\\)</li><li>\\(27^{\\frac23}=\\sqrt[3]{27^2}=\\sqrt[3]{(3^3)^2}=\\sqrt[3]{3^6}=9\\)</li><li>\\(5^{-\\frac43}\\times 5^{\\frac13}=5^{-\\frac43+\\frac13}=5^{-1}=\\dfrac15\\)</li></ol></div></div>"}, {"topic": "지수의 확장", "no": 3, "title": "실수인 지수", "html": "<div class=\"concept-card\"><div class=\"def-row\"><div class=\"def-label\">정의</div><div class=\"def-body\">\\(a>0\\)일 때 임의의 실수 \\(x\\)에 대하여 \\(a^x\\)을 정의할 수 있다. 무리수 \\(x\\)에 한없이 가까워지는 유리수들에 대한 \\(a^{(\\text{유리수})}\\)가 한없이 가까워지는 일정한 수를 \\(a^x\\)으로 정의한다.</div></div></div>\n<div class=\"concept-body\"><p class=\"prose\">예를 들어 \\(\\sqrt2=1.414\\cdots\\)에 가까워지는 유리수 \\(1,\\ 1.4,\\ 1.41,\\ 1.414,\\ \\cdots\\)를 지수로 갖는 \\(2^1,\\ 2^{1.4},\\ 2^{1.41},\\ \\cdots\\)은 어떤 일정한 수에 한없이 가까워진다. 그 수를 \\(2^{\\sqrt2}\\)으로 정의한다.</p><div class=\"formula\"><span class=\"formula-tag\">지수법칙 (실수 \\(x,\\ y\\),\\ \\(a>0,\\ b>0\\))</span><div class=\"formula-math\" style=\"line-height:1.9;\"><div style=\"padding:3px 0;\">① \\(a^x a^y=a^{x+y}\\)</div><div style=\"padding:3px 0;\">② \\(a^x\\div a^y=a^{x-y}\\)</div><div style=\"padding:3px 0;\">③ \\((a^x)^y=a^{xy}\\)</div><div style=\"padding:3px 0;\">④ \\((ab)^x=a^x b^x\\)</div></div></div><p class=\"prose\">지수가 자연수·정수·유리수·실수일 때 지수법칙의 구조는 같지만 <b>밑의 조건</b>이 다르다.</p><div class=\"tablewrap\"><table class=\"fin\"><thead><tr><th>지수 \\(x\\)</th><th>자연수</th><th>정수</th><th>유리수</th><th>실수</th></tr></thead><tbody><tr><td>밑 \\(a\\)</td><td>모든 실수</td><td>\\(a\\ne 0\\)</td><td>\\(a>0\\)</td><td>\\(a>0\\)</td></tr></tbody></table></div><div class=\"note\">실수 지수에서도 밑이 양수인 조건이 필요하다. 예를 들어 \\((-2)^{\\sqrt3}\\)은 정의하지 않으며 의미 없는 수로 생각한다.</div><div class=\"example\"><span class=\"example-label\">보기</span><ol class=\"example-list\"><li>\\(3^{\\sqrt5}\\times 3^{2\\sqrt5}=3^{\\sqrt5+2\\sqrt5}=3^{3\\sqrt5}\\)</li><li>\\((2^{2\\sqrt2})^{\\sqrt2}=2^{2\\sqrt2\\times\\sqrt2}=2^4=16\\)</li></ol></div></div>"}]}</script>
<script id="examples" type="application/json">{"unit": "Ⅰ. 지수함수와 로그함수 — 01. 지수", "source": "대수 (본책) · 대표 예제", "count": 8, "examples": [{"no": 1, "topic": "거듭제곱과 거듭제곱근", "title": "거듭제곱근의 뜻", "problem_intro": "보기에서 옳은 것만을 있는 대로 고르시오.", "problem_parts": ["ㄱ. \\(27\\)의 세제곱근은 \\(3\\)뿐이다.", "ㄴ. \\(-16\\)의 네제곱근 중 실수인 것은 없다.", "ㄷ. \\(-\\sqrt2\\,i\\)는 \\(4\\)의 네제곱근 중 하나이다.", "ㄹ. \\(-6\\)의 세제곱근 중 실수인 것은 \\(1\\)개이다.", "ㅁ. 네제곱근 \\(81\\)은 \\(3\\)이다."], "approach": ["실수 \\(a\\)와 자연수 \\(n\\,(n\\ge 2)\\)에 대하여 \\(a\\)의 \\(n\\)제곱근은 방정식 \\(x^n=a\\)의 근 \\(x\\)이다.", "\\(a\\)의 \\(n\\)제곱근 중 실수인 것은 \\(n\\)의 홀짝과 \\(a\\)의 부호에 따라 정해진다."], "solution": ["ㄱ. \\(x^3=27\\)에서 \\(x^3-27=0\\), \\((x-3)(x^2+3x+9)=0\\)", "\\(\\therefore x=3\\) 또는 \\(x=\\dfrac{-3\\pm 3\\sqrt3\\,i}{2}\\)", "복소수 범위에서 세제곱근은 \\(3\\)개이므로 거짓이다. (거짓)", "ㄴ. \\(x^4=-16\\)을 만족시키는 실수 \\(x\\)는 없으므로 참이다. (참)", "ㄷ. \\(x^4=4\\)에서 \\((x^2+2)(x^2-2)=0\\) \\(\\therefore x=\\pm\\sqrt2\\) 또는 \\(x=\\pm\\sqrt2\\,i\\)", "따라서 \\(-\\sqrt2\\,i\\)는 \\(4\\)의 네제곱근 중 하나이다. (참)", "ㄹ. \\(-6<0\\)이고 세제곱근(\\(n\\)이 홀수)이므로 실수인 것은 \\(\\sqrt[3]{-6}\\)의 \\(1\\)개이다. (참)", "ㅁ. 네제곱근 \\(81\\)은 \\(\\sqrt[4]{81}=\\sqrt[4]{3^4}=3\\)이다. (참)", "따라서 옳은 것은 ㄴ, ㄷ, ㄹ, ㅁ이다."], "alt_solution": [], "answer": "ㄴ, ㄷ, ㄹ, ㅁ", "bible": "‘\\(a\\)의 \\(n\\)제곱근’은 \\(x^n=a\\)를 만족시키는 모든 \\(x\\)(복소수 포함)를 뜻하고, ‘\\(n\\)제곱근 \\(a\\)’는 그중 실수인 \\(\\sqrt[n]{a}\\)를 뜻한다. 두 표현을 혼동하지 않도록 주의한다."}, {"no": 2, "topic": "거듭제곱과 거듭제곱근", "title": "거듭제곱근의 계산", "problem_intro": "다음 중 옳은 것은?", "problem_parts": ["\\(\\sqrt[4]{(-6)^4}+\\sqrt[3]{\\sqrt[3]{64}}=4\\)", "\\(\\sqrt[5]{2}\\times\\sqrt[5]{16}\\times\\sqrt[5]{32}=2\\)", "\\(\\sqrt[3]{3}\\times\\sqrt[6]{81}=9\\)", "\\(\\sqrt[3]{54}\\div\\sqrt[3]{2^7}=\\dfrac{3}{2}\\)", "\\((\\sqrt[3]{7})^4-\\sqrt{\\sqrt[3]{49}}=6\\sqrt[3]{7}\\)"], "approach": ["거듭제곱근의 성질 \\((\\sqrt[n]{a})^n=a\\), \\(\\sqrt[n]{a}\\,\\sqrt[n]{b}=\\sqrt[n]{ab}\\), \\(\\sqrt[m]{\\sqrt[n]{a}}=\\sqrt[mn]{a}\\) 등을 이용한다.", "밑이 다른 거듭제곱근의 곱은 근호의 지수를 최소공배수로 통일한 뒤 계산한다."], "solution": ["① \\(\\sqrt[4]{(-6)^4}+\\sqrt[3]{\\sqrt[3]{64}}=\\sqrt[4]{6^4}+\\sqrt[9]{2^6}=6+2^{\\frac23}=6+\\sqrt[3]{4}\\) (거짓)", "② \\(\\sqrt[5]{2}\\times\\sqrt[5]{16}\\times\\sqrt[5]{32}=\\sqrt[5]{2\\times 2^4\\times 2^5}=\\sqrt[5]{2^{10}}=2^2=4\\) (거짓)", "③ \\(\\sqrt[3]{3}\\times\\sqrt[6]{81}=3^{\\frac13}\\times 3^{\\frac46}=3^{\\frac13+\\frac23}=3\\) (거짓)", "④ \\(\\sqrt[3]{54}\\div\\sqrt[3]{2^7}=\\sqrt[3]{\\dfrac{54}{128}}=\\sqrt[3]{\\dfrac{27}{64}}=\\dfrac{3}{4}\\) (거짓)", "⑤ \\((\\sqrt[3]{7})^4-\\sqrt{\\sqrt[3]{49}}=7^{\\frac43}-7^{\\frac13}=7\\cdot 7^{\\frac13}-7^{\\frac13}=6\\cdot 7^{\\frac13}=6\\sqrt[3]{7}\\) (참)", "따라서 옳은 것은 ⑤이다."], "alt_solution": [], "answer": "⑤", "bible": "\\(\\sqrt[n]{a}\\,\\sqrt[m]{b}\\) 꼴은 \\(m\\)과 \\(n\\)의 최소공배수를 이용하여 근호의 지수를 통일한 후 계산한다. 또는 \\(\\sqrt[n]{a^m}=a^{\\frac{m}{n}}\\)으로 바꾸어 지수법칙으로 계산하면 편리하다."}, {"no": 1, "topic": "지수의 확장", "title": "지수의 확장", "problem_intro": "다음 식을 간단히 하시오.", "problem_parts": ["\\(12^{\\frac23}\\div 2^{\\frac12}\\times 18^{\\frac16}\\)", "\\(\\left\\{\\left(\\dfrac{8}{125}\\right)^{-\\frac19}\\right\\}^{6}\\times\\left\\{\\left(\\dfrac{4}{5}\\right)^{\\sqrt2-1}\\right\\}^{\\sqrt2+1}\\)", "\\(\\{(-6)^6\\}^{\\frac12}\\times(2^{\\sqrt3}\\div 3^{\\sqrt{12}})^{\\sqrt3}\\)"], "approach": ["밑을 소인수분해하여 거듭제곱 꼴로 나타낸 후 지수법칙을 적용한다.", "지수가 유리수일 때의 지수법칙은 밑이 양수일 때만 성립함에 주의한다."], "solution": ["⑴ \\(12^{\\frac23}\\div 2^{\\frac12}\\times 18^{\\frac16}=(2^2\\times 3)^{\\frac23}\\div 2^{\\frac12}\\times(2\\times 3^2)^{\\frac16}\\)", "\\(=2^{\\frac43}\\times 3^{\\frac23}\\div 2^{\\frac12}\\times 2^{\\frac16}\\times 3^{\\frac13}\\)", "\\(=2^{\\frac43-\\frac12+\\frac16}\\times 3^{\\frac23+\\frac13}=2\\times 3=6\\)", "⑵ \\(\\left(\\dfrac{8}{125}\\right)^{-\\frac19}=\\left(\\dfrac25\\right)^{3\\times(-\\frac19)}=\\left(\\dfrac25\\right)^{-\\frac13}\\)이므로", "(주어진 식)\\(=\\left(\\dfrac25\\right)^{-\\frac13\\times 6}\\times\\left(\\dfrac45\\right)^{(\\sqrt2-1)(\\sqrt2+1)}=\\left(\\dfrac25\\right)^{-2}\\times\\dfrac45\\)", "\\(=\\dfrac{25}{4}\\times\\dfrac45=5\\)", "⑶ \\(\\{(-6)^6\\}^{\\frac12}=6^{6\\times\\frac12}=6^3\\)이고", "(주어진 식)\\(=6^3\\times\\left(\\dfrac{2^{\\sqrt3}}{3^{\\sqrt{12}}}\\right)^{\\sqrt3}=6^3\\times\\dfrac{2^3}{3^{6}}=(2\\times3)^3\\times\\dfrac{2^3}{3^6}\\)", "\\(=\\dfrac{2^{3+3}}{3^{6-3}}=\\dfrac{2^6}{3^3}=\\dfrac{64}{27}\\)"], "alt_solution": [], "answer": "⑴ \\(6\\)　⑵ \\(5\\)　⑶ \\(\\dfrac{64}{27}\\)", "bible": "⑶에서 지수가 유리수일 때의 지수법칙은 밑이 양수일 때만 성립하므로 \\(\\{(-6)^6\\}^{\\frac12}=(-6)^{6\\times\\frac12}=(-6)^3=-216\\)으로 계산하지 않도록 주의한다. 괄호 안을 먼저 양수로 만든 뒤 지수법칙을 적용한다."}, {"no": 2, "topic": "지수의 확장", "title": "지수의 확장의 활용", "problem_intro": "다음 물음에 답하시오.", "problem_parts": ["\\(\\left(\\dfrac{1}{64}\\right)^{\\frac1n}\\)이 자연수가 되도록 하는 정수 \\(n\\)의 값을 모두 구하시오.", "세 수 \\(\\sqrt[6]{11},\\ \\sqrt[4]{5},\\ \\sqrt[3]{3}\\)의 대소를 비교하시오."], "approach": ["⑴ 밑을 \\(2\\)의 거듭제곱으로 나타낸 뒤 지수가 자연수가 되는 조건을 찾는다.", "⑵ 세 수를 유리수 지수로 나타낸 뒤 지수를 같게 하여 밑의 대소를 비교한다."], "solution": ["⑴ \\(\\left(\\dfrac{1}{64}\\right)^{\\frac1n}=(2^{-6})^{\\frac1n}=2^{-\\frac6n}\\)이므로", "\\(-\\dfrac6n\\)이 자연수일 때 주어진 값이 자연수가 된다.", "따라서 정수 \\(n\\)의 값은 \\(-6,\\ -3,\\ -2,\\ -1\\)이다.", "⑵ 세 수를 유리수 지수로 나타내면 \\(\\sqrt[6]{11}=11^{\\frac16},\\ \\sqrt[4]{5}=5^{\\frac14},\\ \\sqrt[3]{3}=3^{\\frac13}\\)", "\\(6,\\ 4,\\ 3\\)의 최소공배수가 \\(12\\)이므로 지수를 같게 하면", "\\(11^{\\frac16}=(11^2)^{\\frac{1}{12}}=121^{\\frac{1}{12}}\\)", "\\(5^{\\frac14}=(5^3)^{\\frac{1}{12}}=125^{\\frac{1}{12}}\\)", "\\(3^{\\frac13}=(3^4)^{\\frac{1}{12}}=81^{\\frac{1}{12}}\\)", "\\(81<121<125\\)이므로 \\(81^{\\frac1{12}}<121^{\\frac1{12}}<125^{\\frac1{12}}\\)", "\\(\\therefore \\sqrt[3]{3}<\\sqrt[6]{11}<\\sqrt[4]{5}\\)"], "alt_solution": [], "answer": "⑴ \\(-6,\\ -3,\\ -2,\\ -1\\)　⑵ \\(\\sqrt[3]{3}<\\sqrt[6]{11}<\\sqrt[4]{5}\\)", "bible": "⑵는 근호의 지수를 최소공배수로 통일하여 근호 안의 수끼리 비교해도 된다. \\(\\sqrt[6]{11}=\\sqrt[12]{121},\\ \\sqrt[4]{5}=\\sqrt[12]{125},\\ \\sqrt[3]{3}=\\sqrt[12]{81}\\)에서 \\(81<121<125\\)이므로 같은 결론을 얻는다."}, {"no": 3, "topic": "지수의 확장", "title": "지수법칙과 곱셈 공식", "problem_intro": "양수 \\(a,\\ b\\)에 대하여 다음 식을 간단히 하시오.", "problem_parts": ["\\((a^{\\frac12}+1)(a^{\\frac12}-1)\\)", "\\((a-b)\\div(a^{\\frac13}-b^{\\frac13})\\)"], "approach": ["곱셈 공식과 지수법칙을 함께 이용한다.", "지수가 유리수라 공식이 잘 보이지 않으면 \\(a^{\\frac13}=X\\) 등으로 치환한다."], "solution": ["⑴ \\((a^{\\frac12}+1)(a^{\\frac12}-1)=(a^{\\frac12})^2-1^2=a-1\\)", "⑵ \\(a-b=(a^{\\frac13})^3-(b^{\\frac13})^3\\)이므로", "\\(a-b=(a^{\\frac13}-b^{\\frac13})(a^{\\frac23}+a^{\\frac13}b^{\\frac13}+b^{\\frac23})\\)", "\\(\\therefore (a-b)\\div(a^{\\frac13}-b^{\\frac13})=a^{\\frac23}+a^{\\frac13}b^{\\frac13}+b^{\\frac23}\\)"], "alt_solution": ["⑵ \\(a^{\\frac13}=X,\\ b^{\\frac13}=Y\\)로 놓으면 \\(a=X^3,\\ b=Y^3\\)이므로", "\\((a-b)\\div(a^{\\frac13}-b^{\\frac13})=(X^3-Y^3)\\div(X-Y)\\)", "\\(=\\dfrac{(X-Y)(X^2+XY+Y^2)}{X-Y}=X^2+XY+Y^2\\)", "\\(=a^{\\frac23}+a^{\\frac13}b^{\\frac13}+b^{\\frac23}\\)"], "answer": "⑴ \\(a-1\\)　⑵ \\(a^{\\frac23}+a^{\\frac13}b^{\\frac13}+b^{\\frac23}\\)", "bible": "자주 쓰는 곱셈 공식: \\((x+y)(x-y)=x^2-y^2\\), \\(x^3-y^3=(x-y)(x^2+xy+y^2)\\), \\(x^3+y^3=(x+y)(x^2-xy+y^2)\\). 지수가 유리수일 때는 \\(a^{\\frac1k}\\)을 한 문자로 치환하면 공식이 또렷하게 보인다."}, {"no": 4, "topic": "지수의 확장", "title": "지수법칙과 곱셈 공식의 활용", "problem_intro": "\\(a^{\\frac12}+a^{-\\frac12}=5\\)일 때, 다음 식의 값을 구하시오. (단, \\(a>0\\))", "problem_parts": ["\\(a+a^{-1}\\)", "\\(a^{\\frac32}+a^{-\\frac32}\\)"], "approach": ["\\(a^p+a^{-p}=k\\) 꼴이 주어지면 양변을 제곱·세제곱하거나 곱셈 공식의 변형을 이용한다.", "\\(a^{2p}+a^{-2p}=(a^p+a^{-p})^2-2\\), \\(a^{3p}+a^{-3p}=(a^p+a^{-p})^3-3(a^p+a^{-p})\\)"], "solution": ["⑴ \\(a^{\\frac12}+a^{-\\frac12}=5\\)의 양변을 제곱하면 \\((a^{\\frac12}+a^{-\\frac12})^2=5^2\\)", "\\(a+2+a^{-1}=25\\) \\(\\therefore a+a^{-1}=23\\)", "⑵ \\(a^{\\frac12}+a^{-\\frac12}=5\\)의 양변을 세제곱하면 \\((a^{\\frac12}+a^{-\\frac12})^3=5^3\\)", "\\(a^{\\frac32}+3a^{\\frac12}+3a^{-\\frac12}+a^{-\\frac32}=125\\)", "\\(a^{\\frac32}+a^{-\\frac32}+3(a^{\\frac12}+a^{-\\frac12})=125\\)", "\\(a^{\\frac32}+a^{-\\frac32}+3\\times 5=125\\) \\(\\therefore a^{\\frac32}+a^{-\\frac32}=110\\)"], "alt_solution": ["\\(a^{\\frac12}=X\\)로 놓으면 \\(a^{-\\frac12}=\\dfrac1X\\)이므로 \\(X+\\dfrac1X=5\\)", "⑴ \\(a+a^{-1}=X^2+\\dfrac{1}{X^2}=\\left(X+\\dfrac1X\\right)^2-2=5^2-2=23\\)", "⑵ \\(a^{\\frac32}+a^{-\\frac32}=X^3+\\dfrac{1}{X^3}=\\left(X+\\dfrac1X\\right)^3-3\\left(X+\\dfrac1X\\right)=5^3-3\\times5=110\\)"], "answer": "⑴ \\(23\\)　⑵ \\(110\\)", "bible": "\\(a^p-a^{-p}=k\\) 꼴이 주어진 경우도 마찬가지로 양변을 제곱·세제곱한다. \\(a^{2p}+a^{-2p}=(a^p-a^{-p})^2+2\\), \\(a^{3p}-a^{-3p}=(a^p-a^{-p})^3+3(a^p-a^{-p})\\)임을 이용한다."}, {"no": 5, "topic": "지수의 확장", "title": "분모·분자에 \\(a^x,\\ a^{-x}\\) 꼴을 포함한 식", "problem_intro": "\\(a^{2x}=3\\)일 때, 다음 식의 값을 구하시오. (단, \\(a>0\\))", "problem_parts": ["\\(\\dfrac{a^x-a^{-x}}{a^x+a^{-x}}\\)", "\\(\\dfrac{a^{3x}-a^{-3x}}{2a^x+5a^{-x}}\\)"], "approach": ["분모와 분자에 각각 \\(a^x\\)을 곱하여 \\(a^{2x}\\)과 상수로 이루어진 식으로 변형한다.", "\\(a^{4x}=(a^{2x})^2\\), \\(a^{-2x}=(a^{2x})^{-1}\\)임을 이용한다."], "solution": ["⑴ 분모·분자에 각각 \\(a^x\\)을 곱하면", "\\(\\dfrac{a^x-a^{-x}}{a^x+a^{-x}}=\\dfrac{a^x(a^x-a^{-x})}{a^x(a^x+a^{-x})}=\\dfrac{a^{2x}-1}{a^{2x}+1}=\\dfrac{3-1}{3+1}=\\dfrac12\\)", "⑵ 분모·분자에 각각 \\(a^x\\)을 곱하면", "\\(\\dfrac{a^{3x}-a^{-3x}}{2a^x+5a^{-x}}=\\dfrac{a^{4x}-a^{-2x}}{2a^{2x}+5}=\\dfrac{(a^{2x})^2-(a^{2x})^{-1}}{2a^{2x}+5}\\)", "\\(=\\dfrac{3^2-\\dfrac13}{2\\times3+5}=\\dfrac{\\dfrac{26}{3}}{11}=\\dfrac{26}{33}\\)"], "alt_solution": [], "answer": "⑴ \\(\\dfrac12\\)　⑵ \\(\\dfrac{26}{33}\\)", "bible": "\\(a^{kx}\\)의 값이 주어지고 \\(\\dfrac{a^{qx}-a^{-qx}}{a^{px}+a^{-px}}\\) 꼴의 값을 구할 때는 분모·분자에 적당한 \\(a^x\\)을 곱하여 주어진 \\(a^{kx}\\)을 포함한 식으로 변형한다."}, {"no": 6, "topic": "지수의 확장", "title": "밑이 서로 다른 식의 계산", "problem_intro": "다음 물음에 답하시오.", "problem_parts": ["\\(3^x=16,\\ 24^y=128\\)일 때, \\(\\dfrac4x-\\dfrac7y\\)의 값을 구하시오.", "\\(2^x=5^y=10^z\\)일 때, \\(\\dfrac1x+\\dfrac1y-\\dfrac1z\\)의 값을 구하시오. (단, \\(xyz\\ne 0\\))"], "approach": ["조건식의 밑이 서로 다를 때는 식을 변형하여 밑을 통일하는 것이 핵심이다.", "\\(a^x=b\\ \\Leftrightarrow\\ a=b^{\\frac1x}\\) (단, \\(a>0,\\ b>0,\\ x\\ne 0\\))임을 이용한다."], "solution": ["⑴ \\(3^x=16\\)에서 \\((3^x)^{\\frac1x}=(2^4)^{\\frac1x}\\) \\(\\therefore 3=2^{\\frac4x}\\) ……㉠", "\\(24^y=128\\)에서 \\((24^y)^{\\frac1y}=(2^7)^{\\frac1y}\\) \\(\\therefore 24=2^{\\frac7y}\\) ……㉡", "㉠\\(\\div\\)㉡을 하면 \\(\\dfrac{3}{24}=2^{\\frac4x-\\frac7y}\\), 즉 \\(2^{-3}=2^{\\frac4x-\\frac7y}\\)", "\\(\\therefore \\dfrac4x-\\dfrac7y=-3\\)", "⑵ \\(2^x=5^y=10^z=k\\)로 놓으면 \\(k>0\\)이고, \\(xyz\\ne0\\)에서 \\(k\\ne1\\)이다.", "\\(2=k^{\\frac1x},\\ 5=k^{\\frac1y},\\ 10=k^{\\frac1z}\\)", "\\(2\\times5\\div10=k^{\\frac1x+\\frac1y-\\frac1z}\\), 즉 \\(1=k^{\\frac1x+\\frac1y-\\frac1z}\\)", "\\(\\therefore \\dfrac1x+\\dfrac1y-\\dfrac1z=0\\)"], "alt_solution": [], "answer": "⑴ \\(-3\\)　⑵ \\(0\\)", "bible": "\\(a^x=b\\)에서 \\(a=b^{\\frac1x}\\)로 바꾸면 서로 다른 밑을 같은 밑으로 통일할 수 있다. ⑴은 우변이 모두 \\(2\\)의 거듭제곱이라 밑을 \\(2\\)로, ⑵는 밑이 모두 다르므로 공통값 \\(k\\)로 통일하였다."}]}</script>
<script>
const CONCEPTS = JSON.parse(document.getElementById('concepts').textContent).concepts;
const EXAMPLES = JSON.parse(document.getElementById('examples').textContent).examples;
const isGeo = x => x.topic === '지수의 확장';
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

let mode = 'concept';          // 'concept' | 'example'
let idx = { concept:0, example:0 };  // 모드별 현재 위치 기억
let showSol = false;           // 예제 해설 펼침 여부

function list(){ return mode === 'concept' ? CONCEPTS : EXAMPLES; }

/* ── 라인/블록 (예제 해설용) ── */
function lineEl(text){
  const t = text.trim();
  const div = document.createElement('div');
  const isEq = t.startsWith('\\(') || t.startsWith('\\[');
  div.className = 'line' + (isEq ? ' eq' : '');
  div.innerHTML = esc(text).replace(/(（[^）]*）|\([^()]*이용[^()]*\))\s*$/u, '<span class="note">$1</span>');
  return div;
}
function blockEl(labelText, labelClass, lines){
  const wrap = document.createElement('div'); wrap.className = 'block';
  const lab = document.createElement('span'); lab.className = 'label ' + labelClass; lab.textContent = labelText;
  wrap.appendChild(lab);
  const box = document.createElement('div'); box.className = 'lines';
  lines.forEach(l => box.appendChild(lineEl(l)));
  wrap.appendChild(box);
  return wrap;
}

/* ── 번호 그리드 ── */
const gridNav = document.getElementById('gridNav');
function buildGrid(){
  gridNav.innerHTML = '';
  const data = list();
  [['거듭제곱·거듭제곱근','거듭제곱과 거듭제곱근','ar'],['지수의 확장','지수의 확장','ge']].forEach(([label,topic,cls])=>{
    const row = document.createElement('div'); row.className = 'gn-row';
    const lab = document.createElement('div'); lab.className = 'gn-label ' + cls; lab.textContent = label;
    const nums = document.createElement('div'); nums.className = 'gn-nums';
    data.forEach((x,i)=>{
      if(x.topic !== topic) return;
      const b = document.createElement('button');
      b.className = 'gn-num ' + cls;
      b.textContent = x.no;
      b.dataset.idx = i;
      b.addEventListener('click', ()=> goTo(i));
      nums.appendChild(b);
    });
    row.appendChild(lab); row.appendChild(nums);
    gridNav.appendChild(row);
  });
  updateGrid();
}
function updateGrid(){
  document.querySelectorAll('.gn-num').forEach(b=>{
    b.classList.toggle('active', Number(b.dataset.idx) === idx[mode]);
  });
}

/* ── 렌더 ── */
const viewer = document.getElementById('viewer');
function render(){
  const data = list();
  const cur = idx[mode];
  const x = data[cur];
  const geo = isGeo(x);
  viewer.innerHTML = '';

  if(mode === 'concept'){
    const card = document.createElement('section');
    card.className = 'card cv ' + (geo ? 'ge geo' : 'ar');
    const head = document.createElement('div'); head.className = 'card-head';
    head.innerHTML =
      `<span class="badge${geo?' geo':''}">개념 <span class="num">${String(x.no).padStart(2,'0')}</span></span>`+
      `<span class="topic-tag${geo?' geo':''}">${x.topic}</span>`+
      `<span class="ex-title${geo?' geo':''}">${x.title}</span>`;
    card.appendChild(head);
    const body = document.createElement('div');
    body.innerHTML = x.html;   // 개념 본문은 완성된 HTML 그대로
    card.appendChild(body);
    viewer.appendChild(card);
  } else {
    const card = document.createElement('section');
    card.className = 'card' + (geo ? ' geo':'');
    const head = document.createElement('div'); head.className = 'card-head';
    head.innerHTML =
      `<span class="badge${geo?' geo':''}">대표 예제 <span class="num">${String(x.no).padStart(2,'0')}</span></span>`+
      `<span class="topic-tag${geo?' geo':''}">${x.topic}</span>`+
      `<span class="ex-title${geo?' geo':''}">${esc(x.title)}</span>`;
    card.appendChild(head);

    const prob = document.createElement('div'); prob.className = 'problem' + (geo?' geo':'');
    prob.appendChild(Object.assign(document.createElement('div'),{className:'intro',innerHTML:esc(x.problem_intro)}));
    if(x.problem_parts && x.problem_parts.length){
      const ol = document.createElement('ol'); ol.className='parts';
      x.problem_parts.forEach(p=>{ const li=document.createElement('li'); li.innerHTML=esc(p); ol.appendChild(li); });
      prob.appendChild(ol);
    }
    card.appendChild(prob);

    const bar = document.createElement('div'); bar.className = 'sol-bar';
    bar.innerHTML =
      `<span class="lbl">풀이·해설</span>`+
      `<label class="switch"><input type="checkbox" id="solSwitch"${showSol?' checked':''}><span class="slider"></span></label>`+
      `<span class="sol-state" id="solState">${showSol?'펼침':'접힘'}</span>`;
    card.appendChild(bar);

    const sol = document.createElement('div'); sol.className = 'solution' + (showSol?' open':'');
    if(x.approach && x.approach.length) sol.appendChild(blockEl('바로 접근','approach',x.approach));
    if(x.solution && x.solution.length) sol.appendChild(blockEl('바른 풀이','solve',x.solution));
    if(x.alt_solution && x.alt_solution.length) sol.appendChild(blockEl('다른 풀이','alt',x.alt_solution));
    const ans = document.createElement('div'); ans.className='answer';
    ans.innerHTML = `<span class="k">정답</span><span>${esc(x.answer)}</span>`;
    sol.appendChild(ans);
    if(x.bible){
      const b = document.createElement('div'); b.className='bible';
      b.innerHTML = `<span class="tag">Bible Says</span><div class="body">${esc(x.bible).replace(/\n/g,'<br>')}</div>`;
      sol.appendChild(b);
    }
    card.appendChild(sol);
    viewer.appendChild(card);

    const sw = document.getElementById('solSwitch');
    sw.addEventListener('change', ()=>{
      showSol = sw.checked;
      sol.classList.toggle('open', showSol);
      document.getElementById('solState').textContent = showSol ? '펼침' : '접힘';
    });
  }

  updateGrid();
  document.getElementById('counter').textContent = `${cur+1} / ${data.length}`;
  document.getElementById('prevBtn').disabled = cur === 0;
  document.getElementById('nextBtn').disabled = cur === data.length - 1;
  viewer.scrollTop = 0;
  typesetNode(viewer);
}

function goTo(i){
  const data = list();
  idx[mode] = Math.max(0, Math.min(data.length-1, i));
  render();
}
function setMode(m){
  if(m === mode) return;
  mode = m;
  document.querySelectorAll('.mode-tab').forEach(b=> b.classList.toggle('active', b.dataset.mode===m));
  buildGrid();
  render();
}

/* ── MathJax typeset (해당 노드만) ── */
function typesetNode(node){
  if(window.MathJax && window.MathJax.typesetPromise){
    window.MathJax.typesetClear && window.MathJax.typesetClear([node]);
    window.MathJax.typesetPromise([node]).catch(e=>console.error('MathJax:', e));
  } else {
    setTimeout(()=>typesetNode(node), 50);
  }
}

/* ── 컨트롤 ── */
document.getElementById('modeTabs').addEventListener('click', e=>{
  const b = e.target.closest('.mode-tab'); if(b) setMode(b.dataset.mode);
});
document.getElementById('prevBtn').addEventListener('click', ()=> goTo(idx[mode]-1));
document.getElementById('nextBtn').addEventListener('click', ()=> goTo(idx[mode]+1));
document.addEventListener('keydown', ev=>{
  if(ev.key === 'ArrowLeft') goTo(idx[mode]-1);
  else if(ev.key === 'ArrowRight') goTo(idx[mode]+1);
});
let tx=null, ty=null;
viewer.addEventListener('touchstart', e=>{ const t=e.changedTouches[0]; tx=t.clientX; ty=t.clientY; }, {passive:true});
viewer.addEventListener('touchend', e=>{
  if(tx===null) return;
  const t=e.changedTouches[0];
  const dx=t.clientX-tx, dy=t.clientY-ty;
  if(Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)*1.5){
    if(dx < 0) goTo(idx[mode]+1); else goTo(idx[mode]-1);
  }
  tx=ty=null;
}, {passive:true});

buildGrid();
render();
</script>
</body>
