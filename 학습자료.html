<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>학습자료</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>:root{--ink:#0c1019;--ink-2:#141a26;--ink-3:#1c2433;--line:#28324a;--text:#eef2fb;--muted:#8893ad;--gold:#f5b544;--gold-soft:#f5b54422;--mint:#5fd6b4;--red:#ff8d76}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Pretendard',system-ui,sans-serif;background:var(--ink);color:var(--text);min-height:100vh;background-image:radial-gradient(900px 480px at 50% -8%,#1d2740 0,transparent 60%),radial-gradient(var(--line) 1px,transparent 1px);background-size:100% 100%,22px 22px;background-attachment:fixed;display:flex;justify-content:center;padding:0 14px calc(28px + env(safe-area-inset-bottom));line-height:1.55}
.app{width:100%;max-width:440px;padding-top:calc(20px + env(safe-area-inset-top))}
.top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.back{width:38px;height:38px;flex:none;border-radius:11px;background:var(--ink-2);border:1px solid var(--line);display:grid;place-items:center;color:var(--text);text-decoration:none;font-size:20px}
.htitle{font-size:19px;font-weight:800;letter-spacing:-.02em}
.hsub{font-size:12px;color:var(--muted);margin-top:1px}
.mode{display:flex;gap:8px;margin-bottom:12px}
.mbtn{flex:1;height:40px;border-radius:11px;border:1px solid var(--line);background:var(--ink-2);color:var(--muted);font-size:13px;font-weight:700;font-family:inherit}
.mbtn.on{background:var(--gold-soft);color:var(--gold);border-color:#f5b54455}
.chips{display:flex;gap:7px;overflow-x:auto;padding-bottom:10px;margin-bottom:8px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:none;font-size:12.5px;font-weight:600;padding:7px 12px;border-radius:999px;background:var(--ink-2);color:#aeb9d4;border:1px solid var(--line);font-family:inherit;white-space:nowrap}
.chip i{font-style:normal;color:var(--muted);font-size:11px;font-weight:700}
.chip.on{background:var(--gold-soft);color:var(--gold);border-color:#f5b54455}
.chip.on i{color:var(--gold)}
.search{width:100%;height:42px;border-radius:12px;background:var(--ink-2);border:1px solid var(--line);color:var(--text);font-size:14px;font-family:inherit;padding:0 14px;margin-bottom:12px}
.search::placeholder{color:var(--muted)}
.qcard{background:linear-gradient(180deg,#18202f,#121826);border:1px solid var(--line);border-radius:16px;padding:15px 14px 16px;box-shadow:0 12px 34px #0007}
.qhead{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:11px}
.qsrc{font-size:12.5px;color:var(--gold);font-weight:700}
.qtotal{flex:none;font-size:11.5px;font-weight:800;color:var(--text);background:#202c44;border:1px solid #30405f;padding:5px 11px;border-radius:999px}
.qtags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:13px;padding-bottom:13px;border-bottom:1px solid #232e47}
.tag{font-size:11.5px;font-weight:600;padding:4px 10px;border-radius:8px;background:#1b2540;color:#aeb9d4;border:1px solid #2a3754}
.qfig{background:#fff;border-radius:11px;padding:11px 10px;overflow-x:auto}
.qfig img{width:100%;display:block;border-radius:4px}
.gobar{display:flex;gap:10px;margin-top:13px}
.gobar a,.gobar button{flex:1;height:46px;border-radius:13px;border:1px solid var(--line);background:var(--ink-2);color:var(--text);font-size:14px;font-weight:700;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;text-decoration:none}
.gobar .shuffle{background:var(--gold);color:#1a1205;border-color:var(--gold);flex:1.4}
.gobar button:active{transform:scale(.98)}
.poolnote{font-size:11.5px;color:var(--muted);text-align:center;margin-top:11px}
.cnt{font-size:12px;color:var(--muted);margin:2px 2px 12px}
.item{background:linear-gradient(180deg,#18202f,#121826);border:1px solid var(--line);border-radius:14px;padding:13px 14px;margin-bottom:10px}
.imeta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:7px}
.badge{font-size:11px;font-weight:800;padding:3px 9px;border-radius:8px;background:#1b2540;color:#aeb9d4;border:1px solid #2a3754}
.uni{font-size:13px;font-weight:700}.sub{font-size:11px;color:var(--mint);font-weight:700;margin-left:auto}
.smeta{font-size:11.5px;color:var(--muted)}.note{font-size:13px;color:#dbe2f0;margin-top:6px;word-break:keep-all}
.hide{display:none}
.foot{text-align:center;color:var(--muted);font-size:11px;margin-top:22px;line-height:1.6}
</style></head><body>
<div class="app">
  <div class="top"><a class="back" href="nonsul.html">&#8592;</a>
    <div><div class="htitle">학습자료</div><div class="hsub">기출 대문항 · 랜덤 뽑기 / 유형 검색</div></div></div>

  <div class="mode">
    <button class="mbtn on" id="mRand">&#127922; 랜덤 문항</button>
    <button class="mbtn" id="mSearch">&#128269; 유형 검색</button>
  </div>

  <div id="randView">
    <div class="chips" id="randChips"></div>
    <div class="qcard">
      <div class="qhead"><div class="qsrc" id="qsrc"></div><div class="qtotal" id="qtotal"></div></div>
      <div class="qtags" id="qtags"></div>
      <div class="qfig"><img id="qimg" src="" alt="문제"></div>
      <div class="gobar">
        <a id="goUniv" href="#">대학 페이지 &#8250;</a>
        <button class="shuffle" id="shuffle">다음 문제 &#127922;</button>
      </div>
    </div>
    <div class="poolnote" id="poolnote"></div>
  </div>

  <div id="searchView" class="hide">
    <div class="chips" id="sChips"></div>
    <input class="search" id="q" placeholder="대학·키워드 검색 (예: 가톨릭, 곡선, 점화식)">
    <div class="cnt" id="cnt"></div>
    <div id="list"></div>
  </div>

  <div class="foot">우측 <b>다음 문제 &#127922;</b>를 누를 때마다 임의의 대문항이 바뀝니다<br>풀이 가능한 대학 페이지부터 순차 확대 중</div>
</div>
<script src="manifest.js"></script>
<script>
const POOL=(typeof MANIFEST!=='undefined')?MANIFEST:[];
const IDX =(typeof INDEX!=='undefined')?INDEX:[];
const TYPES=["미분","적분","기하(도형·곡선·벡터)","경우의 수·확률","수열·급수","함수의 극한·연속","삼각함수","방정식·부등식","통계","집합·명제·정수","지수·로그"];
const SHORT={"미분":"미분","적분":"적분","기하(도형·곡선·벡터)":"기하","경우의 수·확률":"확률","수열·급수":"수열","함수의 극한·연속":"극한","삼각함수":"삼각","방정식·부등식":"방정식","통계":"통계","집합·명제·정수":"집합","지수·로그":"지로"};
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

let randType="전체",lastImg=null;
function randChips(){
  let h='<button class="chip on" data-t="전체">전체 <i>'+POOL.length+'</i></button>';
  const c={};POOL.forEach(p=>c[p.type]=(c[p.type]||0)+1);
  TYPES.filter(t=>c[t]).forEach(t=>h+='<button class="chip" data-t="'+t+'">'+SHORT[t]+' <i>'+c[t]+'</i></button>');
  document.getElementById('randChips').innerHTML=h;
}
function pickRandom(){
  let arr=POOL.filter(p=>randType==='전체'||p.type===randType);
  if(!arr.length){document.getElementById('poolnote').textContent='이 유형은 준비 중이에요';return;}
  let p=arr[Math.floor(Math.random()*arr.length)];
  if(arr.length>1){let g=0;while(p.img===lastImg&&g++<8)p=arr[Math.floor(Math.random()*arr.length)];}
  lastImg=p.img;
  document.getElementById('qsrc').textContent=p.univ+' · '+p.exam;
  document.getElementById('qtotal').textContent=p.book+'권';
  document.getElementById('qtags').innerHTML='<span class="tag">'+esc(p.type)+'</span><span class="tag">'+esc(p.year)+'</span>';
  document.getElementById('qimg').src=p.img;
  const g=document.getElementById('goUniv');
  if(p.page){g.style.display='';g.href=p.page;}else{g.style.display='none';}
  document.getElementById('poolnote').textContent='풀 '+arr.length+'문항 중 임의 출제';
  window.scrollTo(0,0);
}
document.getElementById('shuffle').addEventListener('click',pickRandom);
document.getElementById('randChips').addEventListener('click',e=>{
  const b=e.target.closest('.chip');if(!b)return;
  document.querySelectorAll('#randChips .chip').forEach(c=>c.classList.remove('on'));
  b.classList.add('on');randType=b.dataset.t;pickRandom();
});

let sType="전체",sQ="";
function sChips(){
  let h='<button class="chip on" data-t="전체">전체 <i>'+IDX.length+'</i></button>';
  const c={};IDX.forEach(r=>c[r.type]=(c[r.type]||0)+1);
  TYPES.filter(t=>c[t]).forEach(t=>h+='<button class="chip" data-t="'+t+'">'+SHORT[t]+' <i>'+c[t]+'</i></button>');
  document.getElementById('sChips').innerHTML=h;
}
function renderList(){
  let arr=IDX.filter(r=>(sType==='전체'||r.type===sType));
  if(sQ){const q=sQ.toLowerCase();arr=arr.filter(r=>(r.univ+r.track+r.note+r.type).toLowerCase().includes(q));}
  document.getElementById('cnt').textContent=arr.length+'문항';
  let h='';
  for(const r of arr.slice(0,400)){
    h+='<div class="item"><div class="imeta"><span class="badge">'+esc(r.type)+'</span>'
      +'<span class="uni">'+esc(r.univ)+(r.track?' '+esc(r.track):'')+'</span>'
      +'<span class="sub">'+esc(r.q)+(r.sub?'-'+esc(r.sub):'')+'</span></div>'
      +'<div class="smeta">'+esc(r.year)+' · '+esc(r.exam)+' · '+esc(r.book)+'권</div>'
      +(r.note?'<div class="note">'+esc(r.note)+'</div>':'')+'</div>';
  }
  if(arr.length>400)h+='<div class="cnt">상위 400문항 표시 · 검색으로 좁혀보세요</div>';
  document.getElementById('list').innerHTML=h||'<div class="cnt">결과 없음</div>';
}
document.getElementById('sChips').addEventListener('click',e=>{
  const b=e.target.closest('.chip');if(!b)return;
  document.querySelectorAll('#sChips .chip').forEach(c=>c.classList.remove('on'));
  b.classList.add('on');sType=b.dataset.t;renderList();
});
document.getElementById('q').addEventListener('input',e=>{sQ=e.target.value.trim();renderList();});

function setMode(m){
  document.getElementById('mRand').classList.toggle('on',m==='rand');
  document.getElementById('mSearch').classList.toggle('on',m==='search');
  document.getElementById('randView').classList.toggle('hide',m!=='rand');
  document.getElementById('searchView').classList.toggle('hide',m!=='search');
}
document.getElementById('mRand').onclick=()=>setMode('rand');
document.getElementById('mSearch').onclick=()=>{setMode('search');if(!document.getElementById('list').innerHTML)renderList();};

randChips();pickRandom();sChips();
</script>
</body></html>
