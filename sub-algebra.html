<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>대수</title><link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"><style>:root{--ink:#0c1019;--ink-2:#141a26;--ink-3:#1c2433;--line:#28324a;--text:#eef2fb;--muted:#8893ad;--gold:#f5b544;--gold-soft:#f5b54422;--mint:#5fd6b4;--r:18px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Pretendard',system-ui,sans-serif;background:var(--ink);color:var(--text);min-height:100vh;background-image:radial-gradient(900px 480px at 50% -8%,#1d2740 0,transparent 60%),radial-gradient(var(--line) 1px,transparent 1px);background-size:100% 100%,22px 22px;background-attachment:fixed;display:flex;justify-content:center;padding:0 16px 48px;line-height:1.5}
.app{width:100%;max-width:440px;padding-top:calc(24px + env(safe-area-inset-top))}
.top{display:flex;align-items:center;gap:12px;margin-bottom:18px;animation:rise .5s ease both}
.back{width:38px;height:38px;flex:none;border-radius:11px;background:var(--ink-2);border:1px solid var(--line);display:grid;place-items:center;color:var(--text);text-decoration:none;font-size:20px;line-height:1}
.back:active{background:var(--ink-3)}
.htitle{font-size:20px;font-weight:800;letter-spacing:-.02em}
.hsub{font-size:12.5px;color:var(--muted);margin-top:1px}
.sec{font-size:13px;color:var(--muted);font-weight:600;margin:22px 2px 11px}
.units{display:flex;flex-direction:column;gap:14px}
.ublock{animation:rise .5s ease both}
.uname{font-size:13.5px;font-weight:700;color:var(--gold);margin:0 2px 7px;letter-spacing:-.02em}
.uareas{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.ucell{position:relative;background:var(--ink-2);border:1px solid var(--line);border-radius:12px;padding:13px 3px;text-align:center;color:var(--text);font-size:13px;font-weight:600;cursor:pointer;transition:.16s;letter-spacing:-.02em}
.ucell:active{background:var(--ink-3)}
@media(hover:hover){.ucell:hover{border-color:#3a4660;transform:translateY(-2px)}}
.ucell.ready{border-color:var(--mint);background:#13211d;color:var(--mint)}
.ucell.ready::after{content:"";position:absolute;top:7px;right:7px;width:5px;height:5px;border-radius:50%;background:var(--mint)}
.naesin{display:flex;align-items:center;gap:13px;background:var(--ink-2);border:1px solid var(--line);border-radius:14px;padding:15px 16px;color:var(--text);cursor:pointer;transition:.16s;animation:rise .5s ease both;margin-bottom:9px}
.naesin:active{background:var(--ink-3)}
@media(hover:hover){.naesin:hover{border-color:#3a4660}}
.naesin .n{width:30px;height:30px;flex:none;border-radius:9px;background:var(--gold-soft);color:var(--gold);display:grid;place-items:center;font-weight:700;font-size:15px}
.naesin .tx{flex:1}.naesin .tx b{font-size:15px;font-weight:600}.naesin .tx span{display:block;font-size:12px;color:var(--muted);margin-top:2px}
.naesin .arr{color:var(--muted);font-size:16px}
.foot{text-align:center;color:var(--muted);font-size:11.5px;margin-top:28px;line-height:1.6}
@keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.viewer{position:fixed;inset:0;z-index:60;background:var(--ink);display:none;flex-direction:column}
.viewer.on{display:flex;animation:slideup .22s ease both}
.vbar{display:flex;align-items:center;gap:11px;padding:calc(9px + env(safe-area-inset-top)) 13px 9px;border-bottom:1px solid var(--line);background:var(--ink-2)}
.vbar .vback{width:34px;height:34px;flex:none;border-radius:10px;background:var(--ink-3);border:1px solid var(--line);color:var(--text);display:grid;place-items:center;font-size:18px;cursor:pointer}
.vbar .vback:active{background:var(--ink)}
.vbar .vtit{font-size:14.5px;font-weight:700;letter-spacing:-.01em;line-height:1.25}
.vbar .vtit small{display:block;font-size:11px;color:var(--mint);font-weight:600;margin-top:1px}
.viewer iframe{flex:1;width:100%;border:0;background:#fff}
@keyframes slideup{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}</style></head><body>
<div class="app">
  <div class="top"><a class="back" href="godeung.html">&#8592;</a>
    <div><div class="htitle">대수</div><div class="hsub">단원과 학습 영역을 선택하세요</div></div></div>
  <div class="sec">단원별 학습 &nbsp;·&nbsp; 개념 / 기본 / 응용 / 변별력</div>
  <div class="units" id="units"></div>
  <div class="sec">단원 통합</div>
  <div id="extra"></div>
  <div class="foot">각 칸에 교재(HTML)와 유튜브 강의가 연결됩니다<br>● 표시는 자료 연결이 완료된 항목 · 문제집과 무관하게 들어와 확인·복습하세요</div>
</div>
<div class="viewer" id="viewer">
  <div class="vbar"><button class="vback" id="vback" aria-label="닫기">&#8592;</button>
    <div class="vtit" id="vtit">개념<small id="vsub"></small></div></div>
  <iframe id="vframe" title="개념 뷰어" referrerpolicy="no-referrer"></iframe>
</div>
<script>
const UNITS = ["지수","로그","지수함수","로그함수","지수방정식","로그방정식","삼각함수정의","삼각함수그래프","사인코사인법칙","등차등비수열","수열의합Σ","수학적귀납법"];
const AREAS = ["개념","기본","응용","변별력"];
const PLACEHOLDER = "material-template.html";
const LINKS = {
  "지수|개념": "algebra-exp.html",
  "로그|개념": "algebra-log.html",
  "지수함수|개념": "algebra-exp-function.html",
  "로그함수|개념": "algebra-log-function.html",
  "지수방정식|개념": "algebra-exp-equation.html",
  "로그방정식|개념": "algebra-log-equation.html",
  "등차등비수열|개념": "algebra-sequence.html",
  "등차등비수열|기본": "algebra-sequence-basic.html",
  "등차등비수열|응용": "algebra-sequence-application.html",
  "등차등비수열|변별력": "algebra-sequence-discrimination.html",
  "수열의합Σ|개념": "algebra-series.html",
  "수학적귀납법|개념": "algebra-induction.html",
  "삼각함수정의|개념": "algebra-trig-definition.html",
  "삼각함수정의|기본": "algebra-trig-definition-basic.html",
  "삼각함수정의|응용": "algebra-trig-definition-application.html",
  "삼각함수정의|변별력": "algebra-trig-definition-discrimination.html",
  "삼각함수그래프|개념": "algebra-trig-graph.html",
  "삼각함수그래프|기본": "algebra-trig-graph-basic.html",
  "삼각함수그래프|응용": "algebra-trig-graph-application.html",
  "삼각함수그래프|변별력": "algebra-trig-graph-discrimination.html",
  "사인코사인법칙|개념": "algebra-trig-application.html",
  "사인코사인법칙|기본": "algebra-trig-app-basic.html",
  "사인코사인법칙|응용": "algebra-trig-app-application.html",
  "사인코사인법칙|변별력": "algebra-trig-app-discrimination.html"
};
const EXTRA = [
  {icon:"📝", title:"내신대비", desc:"학교별 기출 대비 (단원 통합)", file:PLACEHOLDER},
  {icon:"★", title:"100점문항", desc:"유형분류를 넘어서는 최고난도 (킬러)", file:PLACEHOLDER}
];
const viewer=document.getElementById("viewer"), vframe=document.getElementById("vframe"),
      vtit=document.getElementById("vtit"), vsub=document.getElementById("vsub");
function loadFrame(url){ try{ vframe.contentWindow.location.replace(url); }catch(e){ vframe.src=url; } }
function openViewer(url,title,sub){
  vtit.firstChild.textContent=title; vsub.textContent=sub||"";
  viewer.classList.add("on"); document.body.style.overflow="hidden";
  if(!history.state||!history.state.viewer) history.pushState({viewer:1},"");
  loadFrame(url);
}
function closeViewer(){
  viewer.classList.remove("on"); document.body.style.overflow="";
  loadFrame("about:blank");
}
document.getElementById("vback").onclick=function(){ if(history.state&&history.state.viewer) history.back(); else closeViewer(); };
window.addEventListener("popstate",function(){ if(viewer.classList.contains("on")) closeViewer(); });
const wrap=document.getElementById("units");
UNITS.forEach(function(u,i){
  const block=document.createElement("div");
  block.className="ublock"; block.style.animationDelay=(i*0.035)+"s";
  const name=document.createElement("div"); name.className="uname"; name.textContent=u;
  const areas=document.createElement("div"); areas.className="uareas";
  AREAS.forEach(function(area){
    const key=u+"|"+area, linked=LINKS[key];
    const cell=document.createElement("div");
    cell.className="ucell"+(linked?" ready":"");
    cell.textContent=area;
    cell.onclick=function(){ openViewer(linked||PLACEHOLDER, u, area+(linked?"":" · 준비중")); };
    areas.appendChild(cell);
  });
  block.appendChild(name); block.appendChild(areas); wrap.appendChild(block);
});
const ex=document.getElementById("extra");
EXTRA.forEach(function(it){
  const row=document.createElement("div"); row.className="naesin";
  row.innerHTML='<div class="n">'+it.icon+'</div><div class="tx"><b>'+it.title+'</b><span>'+it.desc+'</span></div><div class="arr">&#8250;</div>';
  row.onclick=function(){ openViewer(it.file, it.title, it.desc); };
  ex.appendChild(row);
});
</script>
</body></html>
