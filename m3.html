<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>중3</title><link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"><style>:root{--ink:#0c1019;--ink-2:#141a26;--ink-3:#1c2433;--line:#28324a;--text:#eef2fb;--muted:#8893ad;--gold:#f5b544;--gold-soft:#f5b54422;--mint:#5fd6b4;--r:18px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Pretendard',system-ui,sans-serif;background:var(--ink);color:var(--text);min-height:100vh;background-image:radial-gradient(900px 480px at 50% -8%,#1d2740 0,transparent 60%),radial-gradient(var(--line) 1px,transparent 1px);background-size:100% 100%,22px 22px;background-attachment:fixed;display:flex;justify-content:center;padding:0 16px 48px;line-height:1.5}
.app{width:100%;max-width:440px;padding-top:calc(24px + env(safe-area-inset-top))}
.top{display:flex;align-items:center;gap:12px;margin-bottom:18px;animation:rise .5s ease both}
.back{width:38px;height:38px;flex:none;border-radius:11px;background:var(--ink-2);border:1px solid var(--line);display:grid;place-items:center;color:var(--text);text-decoration:none;font-size:20px;line-height:1}
.back:active{background:var(--ink-3)}
.htitle{font-size:20px;font-weight:800;letter-spacing:-.02em}
.hsub{font-size:12.5px;color:var(--muted);margin-top:1px}
.sec{font-size:13px;color:var(--muted);font-weight:600;margin:22px 2px 11px}
.list{display:flex;flex-direction:column;gap:10px}
.row{display:flex;align-items:center;gap:13px;background:var(--ink-2);border:1px solid var(--line);border-radius:14px;padding:15px 16px;text-decoration:none;color:inherit;transition:.16s;animation:rise .5s ease both}
.row:active{background:var(--ink-3)}
@media(hover:hover){.row:hover{border-color:#3a4660}}
.row .n{width:34px;height:34px;flex:none;border-radius:10px;background:var(--gold-soft);color:var(--gold);display:grid;place-items:center;font-weight:700;font-size:15px}
.row .tx{flex:1}.row .tx b{font-size:15.5px;font-weight:600}.row .tx span{display:block;font-size:12px;color:var(--muted);margin-top:2px}
.row .arr{color:var(--muted);font-size:16px}
.row:nth-child(2){animation-delay:.04s}.row:nth-child(3){animation-delay:.08s}.row:nth-child(4){animation-delay:.12s}.row:nth-child(5){animation-delay:.16s}.row:nth-child(6){animation-delay:.2s}.row:nth-child(7){animation-delay:.24s}
.foot{text-align:center;color:var(--muted);font-size:11.5px;margin-top:28px;line-height:1.6}
@keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.task2{background:var(--ink-2);border:1px solid var(--line);border-radius:var(--r);padding:15px 18px;animation:rise .5s .05s both}
.task2 ul{list-style:none;display:flex;flex-direction:column;gap:8px}
.task2 li{font-size:14px;line-height:1.45;display:flex;gap:9px}
.task2 li::before{content:'\25B8';color:var(--gold)}
.acc{display:flex;flex-direction:column;gap:10px}
details{background:var(--ink-2);border:1px solid var(--line);border-radius:14px;overflow:hidden;animation:rise .5s ease both}
details:nth-child(2){animation-delay:.05s}details:nth-child(3){animation-delay:.1s}
summary{list-style:none;cursor:pointer;display:flex;align-items:center;gap:11px;padding:15px 16px;font-size:15px}
summary::-webkit-details-marker{display:none}
summary .date{font-size:11.5px;color:var(--gold);background:var(--gold-soft);border-radius:7px;padding:3px 9px;flex:none;font-weight:600}
summary b{flex:1;font-weight:600}
summary .chev{color:var(--muted);transition:.2s;font-size:13px}
details[open] summary .chev{transform:rotate(180deg)}
details .bd{padding:0 16px 16px}
details .bd p{font-size:14px;color:#dfe5f2;line-height:1.6;margin:4px 0 13px}
.view{display:inline-block;background:var(--gold);color:#1a1205;font-weight:700;font-size:13.5px;padding:9px 16px;border-radius:10px;text-decoration:none}</style></head><body>
<div class="app">

      <div class="bd"><p>이 강의에서 다룬 내용을 적으세요.</p>
      <a class="view" href="material-template.html" target="_blank">자료 보기 &#8594;</a></div>
    </details>
    <details>
      <summary><span class="date">5/27</span><b>1강 · 제목을 입력</b><span class="chev">&#9662;</span></summary>

      <a class="view" href="material-template.html" target="_blank">자료 보기 &#8594;</a></div>
    </details>
  </div>
  <div class="foot">새 자료는 맨 위에 추가하면 최신순으로 쌓입니다</div>
</div></body></html>
