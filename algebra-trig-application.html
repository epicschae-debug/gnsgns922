<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>삼각함수의 활용 · 개념 + 예제</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">

<style>
  :root{
    --paper:#FAF7F0; --ink:#23262e; --muted:#6f7480;
    --navy:#22356f; --navy2:#33489a; --blue:#2f5fb0; --blue-soft:#eef5fd; --blue-line:#cfe2f7;
    --approach-bg:#e9f1fc; --approach-ink:#1f56a6;
    --solve-bg:#f3e9fb; --solve-ink:#7a3aa0;
    --alt:#9aa0ad;
    --orange:#e08327; --orange-bg:#fff8ef; --orange-line:#f1d8b4;
    --card:#ffffff; --hair:#e7e2d6;
    --geo:#197a6b; --geo-bg:#e6f4f0; --geo-line:#bfe4db;
    /* 개념 본문용 (예제 톤에 맞춤) */
    --arith:#22356f; --arith-tint:#eef5fd; --arith-edge:#cfe2f7;
    --geom:#197a6b; --geom-tint:#e6f4f0; --geom-edge:#bfe4db;
    --amber:#B7791F; --amber-tint:#FBF3E2;
  }
  *{box-sizing:border-box}
  html,body{height:100%;}
  body{
    margin:0; background:var(--paper); color:var(--ink);
    font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',system-ui,sans-serif;
    font-size:16px; line-height:1.7; -webkit-font-smoothing:antialiased; overflow:hidden;
  }
  .app{display:flex; flex-direction:column; height:100dvh; max-width:780px; margin:0 auto; background:var(--paper);}

  /* ── 상단바 ── */
  .topbar{flex:none; padding:11px 16px 10px; border-bottom:1px solid var(--hair); background:var(--paper); position:relative; z-index:5;}
  .top-row{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:9px;}
  .ttl .eyebrow{font-size:.72rem; font-weight:700; color:var(--blue); letter-spacing:.03em;}
  .ttl h1{margin:.05em 0 0; font-size:1.08rem; font-weight:800; letter-spacing:-.02em;}
  /* 모드 탭 */
  .mode-tabs{display:inline-flex; background:#eee9dc; border-radius:11px; padding:3px; gap:2px; flex:none;}
  .mode-tab{
    border:none; background:transparent; color:var(--muted); font-family:inherit;
    font-weight:800; font-size:.86rem; padding:7px 16px; border-radius:9px; cursor:pointer; transition:.12s;
  }
  .mode-tab.active{background:#fff; color:var(--navy); box-shadow:0 1px 3px rgba(0,0,0,.12);}

  .grid-nav{display:flex; flex-direction:column; gap:7px;}
  .gn-row{display:grid; grid-template-columns:54px 1fr; align-items:center; gap:9px;}
  .gn-label{font-size:.7rem; font-weight:800; text-align:center; padding:4px 0; border-radius:7px;}
  .gn-label.ar{background:var(--blue-soft); color:var(--navy);}
  .gn-label.ge{background:var(--geo-bg); color:var(--geo);}
  .gn-nums{display:flex; gap:5px; flex-wrap:wrap;}
  .gn-num{
    width:30px; height:30px; border-radius:50%; border:1.5px solid var(--hair);
    background:#fff; color:var(--ink); font-weight:800; font-size:.8rem;
    font-variant-numeric:tabular-nums; cursor:pointer; display:grid; place-items:center;
    transition:.12s; padding:0; line-height:1;
  }
  .gn-num:hover{border-color:var(--blue);}
  .gn-num.ar.active{background:var(--navy); color:#fff; border-color:var(--navy); box-shadow:0 2px 6px rgba(34,53,111,.3);}
  .gn-num.ge.active{background:var(--geo); color:#fff; border-color:var(--geo); box-shadow:0 2px 6px rgba(25,122,107,.3);}

  /* ── 뷰어 ── */
  .viewer{flex:1 1 auto; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:16px;}
  .card{background:var(--card); border:1px solid var(--hair); border-radius:18px; padding:20px 20px 18px; margin:0;
    box-shadow:0 1px 2px rgba(40,40,60,.04), 0 8px 24px rgba(40,40,60,.04);}
  .card-head{display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:14px;}
  .badge{display:inline-flex; align-items:center; gap:9px;
    background:linear-gradient(135deg,var(--navy),var(--navy2)); color:#fff;
    padding:6px 8px 6px 13px; border-radius:999px; font-weight:800; font-size:.8rem;
    box-shadow:0 3px 8px rgba(34,53,111,.22);}
  .badge.geo{background:linear-gradient(135deg,#15695c,#1f8f7d);}
  .badge .num{background:#fff; color:var(--navy); width:24px; height:24px; border-radius:50%;
    display:grid; place-items:center; font-size:.88rem; font-variant-numeric:tabular-nums;}
  .badge.geo .num{color:#15695c;}
  .topic-tag{font-size:.72rem; font-weight:800; padding:3px 9px; border-radius:6px; background:var(--blue-soft); color:var(--blue);}
  .topic-tag.geo{background:var(--geo-bg); color:var(--geo);}
  .ex-title{font-size:1.04rem; font-weight:800; color:var(--blue); flex:1 1 100%; line-height:1.35;}
  .ex-title.geo{color:var(--geo);}

  /* 예제 문제 */
  .problem{background:var(--blue-soft); border:1px solid var(--blue-line); border-radius:14px; padding:15px 17px;}
  .problem.geo{background:var(--geo-bg); border-color:var(--geo-line);}
  .problem .intro{font-weight:600;}
  ol.parts{margin:.5em 0 0; padding-left:0; list-style:none; counter-reset:p;}
  ol.parts li{counter-increment:p; padding-left:1.9em; position:relative; margin:.4em 0;}
  ol.parts li::before{content:"(" counter(p) ")"; position:absolute; left:0; font-weight:700; color:var(--blue); font-variant-numeric:tabular-nums;}
  .problem.geo ol.parts li::before{color:var(--geo);}

  /* 해설 토글 */
  .sol-bar{display:flex; align-items:center; gap:12px; margin:18px 2px 4px;}
  .sol-bar .lbl{font-weight:800; font-size:.9rem; color:var(--muted);}
  .switch{position:relative; display:inline-block; width:50px; height:28px; flex:none;}
  .switch input{opacity:0; width:0; height:0;}
  .slider{position:absolute; inset:0; cursor:pointer; background:#cfcabb; border-radius:999px; transition:.2s;}
  .slider::before{content:""; position:absolute; height:22px; width:22px; left:3px; top:3px; background:#fff; border-radius:50%; transition:.2s; box-shadow:0 1px 3px rgba(0,0,0,.25);}
  .switch input:checked + .slider{background:var(--navy);}
  .card.geo .switch input:checked + .slider{background:var(--geo);}
  .switch input:checked + .slider::before{transform:translateX(22px);}
  .sol-state{font-size:.82rem; color:var(--muted); font-weight:700;}
  .solution{display:none; margin-top:6px;}
  .solution.open{display:block;}

  .block{margin-top:18px;}
  .label{display:inline-block; font-weight:800; font-size:.8rem; padding:4px 12px; border-radius:8px; margin-bottom:8px;}
  .label.approach{background:var(--approach-bg); color:var(--approach-ink);}
  .label.solve{background:var(--solve-bg); color:var(--solve-ink);}
  .label.alt{background:#fff; color:var(--alt); border:1px solid #e2e0da; font-size:.74rem; padding:3px 10px;}
  .lines{padding-left:4px;}
  .lines .line{margin:.18em 0;}
  .lines .line.eq{padding-left:1.1em; margin:.28em 0;}
  .note{color:var(--muted); font-size:.9em;}
  .answer{display:inline-flex; align-items:center; gap:10px; margin-top:18px; border:1.5px solid var(--navy); border-radius:10px; padding:6px 14px 6px 6px; font-weight:700;}
  .answer .k{background:var(--navy); color:#fff; padding:3px 10px; border-radius:6px; font-size:.8rem;}
  .card.geo .answer{border-color:var(--geo);} .card.geo .answer .k{background:var(--geo);}
  .bible{margin-top:20px; background:var(--orange-bg); border:1px solid var(--orange-line); border-radius:14px; padding:16px 18px; position:relative;}
  .bible .tag{position:absolute; top:-12px; left:16px; background:var(--orange); color:#fff; font-weight:800; font-size:.72rem; padding:3px 11px; border-radius:7px;}
  .bible .body{margin-top:6px; font-size:.93rem; color:#5a4a36;}

  /* ── 개념 본문 (concept-view) ── */
  .cv .concept-card{border-radius:14px; padding:10px 20px; margin-bottom:18px;}
  .cv.ar .concept-card{background:var(--arith-tint); border:1px solid var(--arith-edge);}
  .cv.ge .concept-card{background:var(--geom-tint); border:1px solid var(--geom-edge);}
  .cv .def-row{display:grid; grid-template-columns:130px 1fr; gap:14px; padding:13px 0; align-items:start;}
  .cv .def-row+.def-row{border-top:1px dashed var(--hair);}
  .cv .def-label{font-weight:700; font-size:14px;}
  .cv.ar .def-label{color:var(--arith);}
  .cv.ge .def-label{color:var(--geom);}
  .cv .def-body{font-size:15px;}
  .cv .concept-body{padding-left:2px;}
  .cv .prose{margin:14px 0;}
  .cv .formula{position:relative; margin:20px 0; padding:20px 20px 14px; border-radius:12px; background:var(--card); border:1px solid var(--hair);}
  .cv.ar .formula{border-left:4px solid var(--arith);}
  .cv.ge .formula{border-left:4px solid var(--geom);}
  .cv .formula-tag{position:absolute; top:-11px; left:18px; font-size:11.5px; font-weight:700; padding:3px 11px; border-radius:999px; color:#fff;}
  .cv.ar .formula-tag{background:var(--arith);}
  .cv.ge .formula-tag{background:var(--geom);}
  .cv .formula-math{overflow-x:auto;}
  .cv .note{margin:16px 0; padding:13px 18px; border-radius:10px; background:var(--amber-tint); border-left:3px solid var(--amber); font-size:14px; color:#5a4517;}
  .cv .note b{color:#3d2e0d;}
  .cv .example{margin:18px 0; padding:18px 20px 16px; border-radius:12px; background:var(--card); border:1px dashed var(--hair);}
  .cv .example-label{display:inline-block; font-weight:700; font-size:12.5px; letter-spacing:.08em; padding:3px 12px; border-radius:6px; margin-bottom:8px; color:var(--ink); background:#F0ECE0;}
  .cv .example-list{margin:6px 0 0; padding-left:1.4em;}
  .cv .example-list li{margin:9px 0; font-size:14.5px;}
  .cv .derive{margin:18px 0; padding:18px 20px; border-radius:12px; background:#FAF9F4; border:1px solid var(--hair);}
  .cv .derive-title{font-weight:700; font-size:14px; color:var(--muted); margin-bottom:10px;}
  .cv .derive-line{padding:3px 0; overflow-x:auto;}
  .cv .derive-rule{border:none; border-top:1.5px solid var(--ink); margin:6px 0;}
  .cv .tablewrap{overflow-x:auto; margin:18px 0;}
  .cv table.fin{border-collapse:collapse; width:100%; font-size:14px; background:var(--card);}
  .cv table.fin th, .cv table.fin td{border:1px solid var(--hair); padding:8px 10px; text-align:center;}
  .cv.ar table.fin thead th{background:var(--arith-tint); color:var(--arith); font-weight:700;}
  .cv.ge table.fin thead th{background:var(--geom-tint); color:var(--geom); font-weight:700;}
  .cv table.fin td:first-child, .cv table.fin th:first-child{font-weight:600; background:#FAFAF6;}
  mjx-container{overflow-x:auto; overflow-y:visible; max-width:100%;}
  /* 개념 정의칸 안의 display 수식이 윗줄/카드 경계에 가려지지 않도록 여백 확보 */
  .cv .def-body mjx-container[display="true"]{margin:.45em 0 .25em;}

  /* ── 페이저 ── */
  .pager{flex:none; display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:10px 16px calc(10px + env(safe-area-inset-bottom)); border-top:1px solid var(--hair); background:var(--paper);}
  .pager button{border:1.5px solid var(--navy); background:#fff; color:var(--navy); padding:9px 18px; border-radius:11px;
    font-size:.92rem; font-weight:800; cursor:pointer; font-family:inherit; transition:.12s; flex:1; max-width:160px;}
  .pager button:hover:not(:disabled){background:var(--navy); color:#fff;}
  .pager button:disabled{opacity:.32; cursor:default; border-color:var(--hair); color:var(--muted);}
  .pager .counter{font-weight:800; font-variant-numeric:tabular-nums; color:var(--muted); font-size:.9rem; white-space:nowrap;}

  @media (max-width:430px){
    .gn-num{width:28px; height:28px; font-size:.76rem;}
    .gn-row{grid-template-columns:48px 1fr; gap:7px;}
    .ttl h1{font-size:.98rem;}
    .mode-tab{padding:6px 13px; font-size:.82rem;}
    .viewer{padding:13px;}
    .card{padding:17px 15px 16px;}
    .pager button{padding:9px 10px;}
    .cv .def-row{grid-template-columns:1fr; gap:4px;}
  }

  /* 뒤로가기 */
  .topbar .backbtn{flex:none;width:30px;height:30px;display:grid;place-items:center;border-radius:9px;background:#eee9dc;color:var(--ink);text-decoration:none;font-size:18px;line-height:1;}
  .topbar .backbtn:active{background:#e0dac9;}
  .top-row .ttl{flex:1 1 auto;min-width:0;}
</style>
</head>

=\"derive-line\">\\(A=120°\\)이므로 \\(0°<B<60°\\)　\\(\\therefore B=30°\\)</div></div></div></div>"}, {"topic": "사인법칙과 코사인법칙", "no": 2, "title": "코사인법칙", "html": "<div class=\"concept-card\"><div class=\"def-row\"><div class=\"def-label\">코사인법칙</div><div class=\"def-body\">삼각형의 세 변의 길이와 한 각의 코사인 사이에는 일정한 관계가 성립한다. <b>두 변과 그 끼인각</b>을 알 때 나머지 변을, <b>세 변</b>을 알 때 각의 크기를 구할 수 있다.</div></div></div><div class=\"concept-body\"><div class=\"formula\"><span class=\"formula-tag\">코사인법칙</span>삼각형 \\(ABC\\)에서$$a^2=b^2+c^2-2bc\\cos A$$$$b^2=c^2+a^2-2ca\\cos B$$$$c^2=a^2+b^2-2ab\\cos C$$<figure style=\"margin:16px 0 2px;text-align:center;\"><img src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAASAAAADSCAMAAADdcO0UAAABgFBMVEX+/v5lYmO6ubnV1NWZl5fJyMjo6Oh1c3SKiIkjHyClpKQ4NDVcWVlKRkdwbW6Afn4oJSVBPj4xLS6wrq9gXV6Qjo7Qz89RTU5ST1Byb3CRj5AzLzAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAADjvhqIAAAKRklEQVR42u2dibabNhCGQfsG5i5Jmvb937MsxsZGkm3QMvhK5zR1c5Jb+Dyaf34xSFVVxnUghI930awA8g3V1QWQbzRdVwB5Bm5rqQog9xAISVMAeWZYVemOFUCuQXlVcUkKINfgtIckmwLIM8P6XyQugBwzTAy//itFAeSYYePlMqkLIPv4rMfRSVoAWS9XsHEQyQsg26jPV8u6zwLINv7MH4xEBZDFyF/Ei8i6AFprvNbz1XKZqJo+ECDWfPTjNEbS+LHBBRAA3SyACqACqAAqgAqggEPUqADy8qnr8lTDVSsSSYbVjsawAsgyWknQuBzERVkws15shXs6p/4fViLo3qc27ehR++gZstCQhAgrgOaBG43OfGo2htGQrXUxq9ervAjYcLnnf6EUi2YHAHSZSkOCRucP46oHJgVQHybtnIZ6PhMRNs2xkqT70VxWxYbMM6+4nuq5mkbmhwO6KtUoYNdgmj+bhv1YQGjZojBWP5f/OqfpMUVp9kMBtRrdOrDFlao5HQ2ffygg3S4vs65vPDxOlqbhAmJ3PG77OfgSGIs4y2ACYrcNUoOsn+6u++Z3iP5ZgNRdibwUsEWaXoRNa34SIHM3Y24F7Jq1l8tmBv8gQGiFol5fZKo0DQ7Qyn/eC5ilFJoSFfoRgFptiRRrQyK6S9wsTtMZLEDspviZBczeTLZyrFSytwdkVusX3MVn6Vhjij1ws2pP0CvH6spf7wWoXd/f8IzHnVk88N4QEDOmelbALI5 )</div></div></div></div>"}, {"topic": "삼각형의 넓이", "no": 1, "title": "삼각형의 넓이", "html": "<div class=\"concept-card\"><div class=\"def-row\"><div class=\"def-label\">삼각형의 넓이</div><div class=\"def-body\">두 변의 길이와 그 끼인각의 크기를 알면 삼각함수를 이용하여 삼각형의 넓이를 구할 수 있다.</div></div></div><div class=\"concept-body\"><div class=\"formula\"><span class=\"formula-tag\">두 변과 끼인각</span>삼각형 \\(ABC\\)의 넓이를 \\(S\\)라 하면$$S=\\frac{1}{2}bc\\sin A=\\frac{1}{2}ca\\sin B=\\frac{1}{2}ab\\sin C$$<figure style=\"margin:16px 0 2px;text-align:center;\"><img src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAASMAAACuCAMAAABKp5utAAABgFBMVEX+/v7g8ahlYmO6ubnW1dWZl5e0vo/p6OkjHyBwbmvZ6aTKycl1c3OIhoekoqNcWVk4NDVKRkfDz5ijqoUpJSaFiHWAfn5BPj57e2+Pk3vQ358xLS5RTU6rtIqwrq/K15tgXV6an4AzLzByb3C8x5ORj4+Rj5DQz8/g3+BST1Cxr7DAv78AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAADejnKIAAAJZElEQVR42u2da3ubOBOG0SkS0Qm1NGnSbLaHPb3v/v//t4DtGIwAGSQhbOaDe7VXGuD2aPRoZpCyLLhBxIpsQ4YQin5NnRnGd0ZjpkhGmNgZjboRzWj5c2c0YlRXH98Z2hkNG1HVxzuDO6PRoVZZWe6MhofawYEEUzujwaFmYG2G6Z3R8FA72LeS7ozshk+xWjCyM7KbPF2OM7Mzstt5oVYwvBlGUVdOgsnToPvJDN4Ko4g3Sszz8/OBzNtzbWJndCO2M9oZ7Yx2RvfMCAuodkbjl9TVmlarndGgUXNY+Iud0aDl6P8NI4gyxCTeGfUiUf1R8fnjSwOJkkLvjC4W/YxWV4Qwf3zMG0jV0MsyvjNqRaImlS0gfADgA1I1+lLPJEVkdJjKeMXmERwhHa5NZdpl2+gx+wnCzwB0IWV096N6nB1TefjoRheQ6rwkuW9GZwASwhcAbJBoXqA7ZoQ+4g2tqPwO7JAyLu+YEf2INwrCr+Bsr7ADqf4BepeM2heokHxqMQKfakhtLCTB+m14RrolpRv9CC4hdZZuVBd3x6iNqHajBwDGIWXo3hh1EPHzxD8GqRpx6J4YdX67OOnHKUi4yO9UZ2ObGw14kkyoihuUkSaXy5AXYLPfLJDwffiR7iaHav34amUEPlsTkwjdPCN5kT8jXf3Yg9RT2byQt87oUgxe6sdpSJku6K3Ho+6VKv0IwJWQ0C37Ee0tKSz60QFSCsE7FKPikhHvLUMcIckC3yYj3dOAdv3YsS92SGjtZW4YRsq46se2PdaQLDxocZN+1JuOKv34AwAXSOklI2Pls4f1oxukgt8Wo7z/PJV+/ALAAki8ILfECFnCx6h+dIJEjb4hRpa5Go0sQ5y  ["⑴ \\(a+b=5k\\), \\(b+c=8k\\), \\(c+a=7k\\)　（단, \\(k>0\\)）로 놓고", "세 식을 변끼리 더하면 \\(2(a+b+c)=20k\\)　\\(\\therefore a+b+c=10k\\)", "\\(\\therefore a=2k\\), \\(b=3k\\), \\(c=5k\\)", "\\(\\sin A:\\sin B:\\sin C=a:b:c\\)", "\\(=2:3:5\\)", "⑵ \\(A+B+C=180°\\)이므로", "\\(A=180°\\times\\dfrac{1}{6}=30°\\), \\(B=30°\\), \\(C=180°\\times\\dfrac{4}{6}=120°\\)", "\\(a:b:c=\\sin A:\\sin B:\\sin C\\)", "\\(=\\sin 30°:\\sin 30°:\\sin 120°\\)", "\\(=\\dfrac{1}{2}:\\dfrac{1}{2}:\\dfrac{\\sqrt{3}}{2}=1:1:\\sqrt{3}\\)"], "alt_solution": [], "answer": "⑴ \\(2:3:5\\)　⑵ \\(1:1:\\sqrt{3}\\)", "bible": "삼각형 \\(ABC\\)의 세 변의 길이의 비는 사인법칙에 의하여 \\(a:b:c=\\sin A:\\sin B:\\sin C\\)이다. 이때 \\(a:b:c\\neq A:B:C\\)인 것에 주의하자."}, {"no": 3, "topic": "사인법칙과 코사인법칙", "title": "코사인법칙", "problem_intro": "삼각형 \\(ABC\\)에서 \\(C=30°\\), \\(a=4\\), \\(b=2\\sqrt{3}\\)일 때, \\(A\\), \\(B\\), \\(c\\)를 각각 구하시오.", "problem_parts": [], "approach": ["삼각형 \\(ABC\\)에서", "\\(c^2=a^2+b^2-2ab\\cos C\\)로 \\(c\\)를 먼저 구한다."], "solution": ["코사인법칙에 의하여", "\\(c^2=4^2+(2\\sqrt{3})^2\\)", "\\(\\quad-\\,2\\times4\\times2\\sqrt{3}\\times\\cos 30°\\)", "\\(=16+12-2\\times4\\times2\\sqrt{3}\\times\\dfrac{\\sqrt{3}}{2}=4\\)", "\\(c>0\\)이므로 \\(c=2\\)", "사인법칙에 의하여 \\(\\dfrac{4}{\\sin A}=\\dfrac{2}{\\sin 30°}\\)이므로 \\(2\\sin A=4\\sin 30°\\)", "\\(2\\sin A=4\\times\\dfrac{1}{2}\\)　\\(\\therefore \\sin A=1\\)", "\\(\\therefore A=90°\\)　（∵ \\(0°<A<180°\\)）", "\\(\\therefore B=180°-(90°+30°)=60°\\)"], "alt_solution": [], "answer": "\\(A=90°\\), \\(B=60°\\), \\(c=2\\)", "bible": "다음과 같은 경우 코사인법칙을 이용하여 구한다. 삼각형 \\(ABC\\)에서 ① 두 변의 길이와 그 끼인각의 크기가 주어질 때, 나머지 한 변의 길이 ② 세 변의 길이가 주어질 때, 세 각의 크기"}, {"no": 4, "topic": "사인법칙과 코사인법칙", "title": "코사인법칙의 변형", "problem_intro": "삼각형 \\(ABC\\)에서 \\(a=1+\\sqrt{3}\\), \\(b=2\\), \\(c=\\sqrt{2}\\)일 때, \\(B\\), \\(C\\)를 각각 구하시오.", "problem_parts": [], "approach": ["코사인법칙의 변형을 이용한다.", "\\(\\cos B=\\dfrac{c^2+a^2-b^2}{2ca}\\), \\(\\cos C=\\dfrac{a^2+b^2-c^2}{2ab}\\)"], "solution": ["코사인법칙에 의하여", "\\(\\cos B=\\dfrac{(\\sqrt{2})^2+(1+\\sqrt{3})^2-2^2}{2\\times\\sqrt{2}\\times(1+\\sqrt{3})}\\)", "\\(=\\dfrac{2+4+2\\sqrt{3}-4}{2\\sqrt{2}(1+\\sqrt{3})}\\)", "\\(=\\dfrac{2(1+\\sqrt{3})}{2\\sqrt{2}(1+\\sqrt{3})}=\\dfrac{\\sqrt{2}}{2}\\)", "\\(\\therefore B=45°\\)　（∵ \\(0°<B<180°\\)）", "사인법칙에 의하여 \\(\\dfrac{2}{\\sin 45°}=\\dfrac{\\sqrt{2}}{\\sin C}\\)이므로 \\(2\\sin C=\\sqrt{2}\\sin 45°\\)", "\\(2\\sin C=\\sqrt{2}\\times\\dfrac{\\sqrt{2}}{2}\\)　\\(\\therefore \\sin C=\\dfrac{1}{2}\\)", "\\(\\therefore C=30°\\)　（∵ \\(0°<C<135°\\)）"], "alt_solution": ["코사인법칙에 의하여", "\\(\\cos C=\\dfrac{(1+\\sqrt{3})^2+2^2-(\\sqrt{2})^2}{2\\times(1+\\sqrt{3})\\times2}\\)", "\\(=\\dfrac{4+2\\sqrt{3}+4-2}{4(1+\\sqrt{3})}\\)", "\\(=\\dfrac{2\\sqrt{3}(1+\\sqrt{3})}{4(1+\\sqrt{3})}=\\dfrac{\\sqrt{3}}{2}\\)", "\\(\\therefore C=30°\\)　（∵ \\(0°<C<135°\\)）"], "answer": "\\(B=45°\\), \\(C=30°\\)", "bible": "삼각형의 세 변의 길이를 알 때 코사인법칙으로 최대각·최소각을 구할 수 있다. 최대각은 길이가 가장 긴 변의 대각, 최소각은 길이가 가장 짧은 변의 대각이다."}, {"no": 5, "topic": "사인법칙과 코사인법칙", "title": "삼각형의 모양 결정", "problem_intro": "다음 등식을 만족시키는 삼각형 \\(ABC\\)는 어떤 삼각형인지 구하시오.", "problem_parts": ["\\(b\\sin B=c\\sin C\\)", "\\(a\\cos B-c=b\\cos A\\)"], "approach": ["\\(\\sin\\)에 대한 식은 \\(\\sin A=\\dfrac{a}{2R}\\) 등을, \\(\\cos\\)에 대한 식은 코사인법칙의 변형을 대입한다.", "세 변의 길이는 양수이므로 \\(a>0\\), \\(b>0\\), \\(c>0\\)임에 주의한다."], "solution": ["⑴ 외접원의 반지름을 \\(R\\)라 하면 \\(\\sin B=\\dfrac{b}{2R}\\), \\(\\sin C=\\dfrac{c}{2R}\\)", "대입하면 \\(b\\times\\dfrac{b}{2R}=c\\times\\dfrac{c}{2R}\\)　\\(\\therefore b^2=c^2\\)", "\\(\\therefore b=c\\)　（∵ \\(b>0\\), \\(c>0\\)）", "따라서 \\(b=c\\)인 이등변삼각형이다.", "⑵ \\(\\cos A=\\dfrac{b^2+c^2-a^2}{2bc}\\), \\(\\cos B=\\dfrac{c^2+a^2-b^2}{2ca}\\)를 대입하면", "\\(a\\times\\dfrac{c^2+a^2-b^2}{2ca}-c\\)", "\\(\\qquad=b\\times\\dfrac{b^2+c^2-a^2}{2bc}\\)", "\\(\\dfrac{c^2+a^2-b^2}{2c}-c=\\dfrac{b^2+c^2-a^2}{2c}\\)", "\\(c^2+a^2-b^2-2c^2=b^2+c^2-a^2\\)　\\(\\therefore a^2=b^2+c^2\\)", "따라서 \\(A=90°\\)인 직각삼각형이다."], "alt_solution": [], "answer": "⑴ \\(b=c\\)인 이등변삼각형　⑵ \\(A=90°\\)인 직각삼각형", "bible": "세 변의 길이 \\(a\\), \\(b\\), \\(c\\)에 대하여 ① \\(c^2=a^2+b^2\\)이면 \\(C=90°\\)인 직각삼각형 ② \\(c^2>a^2+b^2\\)이면 둔각삼각형 ③ \\(c^2<a^2+b^2\\)（\\(c\\)가 가장 긴 변）이면 예각삼각형 ④ \\(a=b\\)이면 \\(a=b\\)인 이등변삼각형"}, {"no": 6, "topic": "사인법칙과 코사인법칙", "title": "사인법칙과 코사인법칙의 활용", "problem_intro": "다음 물음에 답하시오.", "problem_parts": ["\\(90\\,\\mathrm{m}\\)만큼 떨어진 \\(A\\), \\(B\\) 지점에서 하늘에 떠 있는 열기구를 올려다본 각의 크기가 각각 \\(45°\\), \\(75°\\)일 때, 열기구와 \\(B\\) 지점 사이의 거리를 구하시오.　（단, 열기구의 크기는 무시한다.）", "세 지점 \\(A\\), \\(B\\), \\(C\\)를 측정하였더니 \\(\\overline{AC}=8\\sqrt{2}\\,\\mathrm{km}\\), \\(\\overline{BC}=12\\,\\mathrm{km}\\), \\(\\angle C=45°\\)이었다. 두 지점 \\(A\\), \\(B\\) 사이를 직선으로 잇는 다리의 길이를 구하시오."], "figure": "<div style=\"display:flex;flex-wrap:wrap;gap:16px;justify-content:center;align-items:flex-start;margin-top:12px;\"><figure style=\"margin:0;text-align:center;flex:0 1 auto;\"><img src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAPgAAADqCAMAAAC4EXipAAABgFBMVEX+/v5lYmPo6OiMiYqYlpe1tLQjHyD++ZXIx8fX19eEwOl2dHSmpKVJRkf4pHE4NTVaV1gpJSZDPDqxr7CBf4CAfX40LSqQjY7LxnrGhV5ZRzerdlRrTDtgXV1sZ0lgZFLqm2vj3oYyMC12qs2gnp6Ri1q9XyPSjGIzLzBwbm6NYUdFNy5tVUB9WEKxrGzX0oFIQTpIWGJZUTtVcIR/ueCCveXTmibdk2b0oW9RTk9tmrp2dlinp3K6fVmwrq7d0Ffs54x8stjAaibEdCjMkzbAvr8/QTxRU0dae5NrUz5hh6J3YVVzcU+hnWTMhyfRqETXtT3cw0PYwVDr0L8sLjI0PEQ8SVVCP0BASlBMZHZRZnNnka5yb3CFXESBeVGda06/ZyS9oY/FfTHIhzXPimDAv8DXqS7TpTner5LQy3zQz8/58ewAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAqmA/mAAAKV0lEQVR42u2d+VujOhfHkwApSEKgRaytOm7juIzr6Dj7nTvL3bf33nff9/X///1NCN2wtrUWCIHzjA72UeFDzjn5fgNYAOqoo4466qijjjrqqKOOOuqoo4466qijjjrqqKMiYS+vn7Gz9WW7UtQI4qPoJXvx643oCENUGW6IDzsPG2eXS5efNU46h1VBR+x4s9NunP52aWnpSbvR7mweM6cC3A7uepy78XKHg++8bHByr4srUOrstbf6sNFobC+J2OZbD1e910z/+l7zvCanbfgxuC82m563BjXntqJN79EGhz39Igb/4pRv/3HVexa90bux4Uee93iLw756EYO/eMW3tzqe9whr3dpXjj1v80Kkd9zbeHcTo9+42PS84xWdwekqH9tvBeuDyxj86oH44lvxMtM60595Xrcdgy/JiMFPu57nRRrnuvOYAx6LEm98noCL+ayx9SV/fU3jubzF5zLv8VvBihNwLL5oiBOy1tIXnMTgjbHgm2tE4xE/Ory+/vLmiG+tXR8edTQecWftdbc  ⑴", "problem_intro": "다음 물음에 답하시오.", "problem_parts": ["삼각형 \\(ABC\\)에서 \\(a=4\\), \\(b=8\\)이고 넓이가 \\(8\\)일 때, \\(C\\)를 구하시오.", "삼각형 \\(ABC\\)에서 \\(a=\\sqrt{21}\\), \\(c=4\\), \\(A=60°\\)일 때, 삼각형 \\(ABC\\)의 넓이를 구하시오."], "approach": ["두 변의 길이와 그 끼인각을 알 때 \\(S=\\dfrac{1}{2}bc\\sin A=\\dfrac{1}{2}ca\\sin B=\\dfrac{1}{2}ab\\sin C\\)", "⑵ 끼인각이 아닌 각이 주어졌으므로 코사인법칙으로 나머지 변을 먼저 구한다."], "solution": ["⑴ 넓이가 \\(8\\)이므로 \\(8=\\dfrac{1}{2}\\times4\\times8\\times\\sin C\\)　\\(\\therefore \\sin C=\\dfrac{1}{2}\\)", "\\(0°<C<180°\\)이므로 \\(C=30°\\) 또는 \\(C=150°\\)", "⑵ 코사인법칙에 의하여 \\((\\sqrt{21})^2=b^2+4^2-2\\times b\\times4\\times\\cos 60°\\)", "\\(21=b^2+16-8b\\times\\dfrac{1}{2}\\), \\(b^2-4b-5=0\\), \\((b+1)(b-5)=0\\)", "\\(\\therefore b=5\\)　（∵ \\(b>0\\)）", "따라서 넓이는 \\(\\dfrac{1}{2}\\times5\\times4\\times\\sin 60°=10\\times\\dfrac{\\sqrt{3}}{2}=5\\sqrt{3}\\)"], "alt_solution": [], "answer": "⑴ \\(C=30°\\) 또는 \\(150°\\)　⑵ \\(5\\sqrt{3}\\)", "bible": "삼각형의 넓이를 이용하여 사각형의 넓이를 구할 때는 ➊ 사각형을 두 개의 삼각형으로 나누고 ➋ 사인법칙 또는 코사인법칙으로 변의 길이나 각의 크기를 구한 뒤 ➌ 각 삼각형의 넓이를 구해 더한다."}, {"no": 2, "topic": "삼각형의 넓이", "title": "삼각형의 넓이 ⑵ — 여러 가지 방법", "problem_intro": "삼각형 \\(ABC\\)에서 \\(a=5\\), \\(b=7\\), \\(c=8\\)일 때, 다음을 구하시오.", "problem_parts": ["삼각형 \\(ABC\\)의 넓이", "외접원의 반지름의 길이", "내접원의 반지름의 길이"], "approach": ["세 변을 알 때 ➊ 코사인법칙으로 한 각의 코사인을 구하고 ➋ \\(\\sin^2\\theta+\\cos^2\\theta=1\\)로 사인을 구한 뒤 ➌ \\(S=\\dfrac{1}{2}ab\\sin C\\)로 넓이를 구한다.", "외접원은 \\(S=\\dfrac{abc}{4R}\\), 내접원은 \\(S=\\dfrac{1}{2}r(a+b+c)\\)를 이용한다."], "solution": ["⑴ 코사인법칙에 의하여 \\(\\cos C=\\dfrac{5^2+7^2-8^2}{2\\times5\\times7}=\\dfrac{1}{7}\\)", "\\(0°<C<180°\\)이므로 \\(\\sin C=\\sqrt{1-\\left(\\dfrac{1}{7}\\right)^2}=\\dfrac{4\\sqrt{3}}{7}\\)", "\\(\\therefore S=\\dfrac{1}{2}\\times5\\times7\\times\\dfrac{4\\sqrt{3}}{7}=10\\sqrt{3}\\)", "⑵ \\(S=\\dfrac{abc}{4R}\\)에서 \\(10\\sqrt{3}=\\dfrac{5\\times7\\times8}{4R}\\)　\\(\\therefore R=\\dfrac{7\\sqrt{3}}{3}\\)", "⑶ \\(S=\\dfrac{1}{2}r(a+b+c)\\)에서 \\(10\\sqrt{3}=\\dfrac{1}{2}r(5+7+8)\\)　\\(\\therefore r=\\sqrt{3}\\)"], "alt_solution": ["⑴ 헤론의 공식에서 \\(s=\\dfrac{5+7+8}{2}=10\\)이므로", "\\(s-a=5\\), \\(s-b=3\\), \\(s-c=2\\)", "\\(S=\\sqrt{10\\times5\\times3\\times2}=\\sqrt{300}\\)", "\\(=10\\sqrt{3}\\)"], "answer": "⑴ \\(10\\sqrt{3}\\)　⑵ \\(\\dfrac{7\\sqrt{3}}{3}\\)　⑶ \\(\\sqrt{3}\\)", "bible": "헤론의 공식 — 세 변의 길이가 주어질 때 \\(S=\\sqrt{s(s-a)(s-b)(s-c)}\\)　（단, \\(s=\\dfrac{a+b+c}{2}\\)）"}, {"no": 3, "topic": "삼각형의 넓이", "title": "사각형의 넓이", "problem_intro": "다음 물음에 답하시오.", "problem_parts": ["\\(\\overline{AB}=4\\), \\(\\overline{BC}=6\\), \\(\\overline{AC}=8\\)인 평행사변형 \\(ABCD\\)의 넓이를 구하시오.", "두 대각선 \\(\\overline{AC}\\), \\(\\overline{BD}\\)가 이루는 예각의 크기가 \\(45°\\)이고 넓이가 \\(16\\sqrt{2}\\)인 등변사다리꼴 \\(ABCD\\)의 대각선의 길이를 구하시오."], "figure": "<div style=\"display:flex;flex-wrap:wrap;gap:16px;justify-content:center;align-items:flex-start;margin-top:12px;\"><figure style=\"margin:0;text-align:center;flex:0 1 auto;\"><img src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAATAAAACtCAMAAAAAqtPoAAABgFBMVEX+/v632PJlYmMjHyDp6emsyeCz0+wzMjTX1taFl6elwdjJyMiWrcG4t7d2dXampKWWlZU9QEZWXmhaV1htfImdt8uKh4hIRkdmbncpJSexr7BKUFh4iZiMo7VBPT6AfX6wz+eBi5WBf4CjvNF5gIpgXV6UprYxLS5lcn5wbm5YYmywr68vLjEzLzA6PEFJTlRyb3CJnrDAv8DQz89CP0BQTU5fanZiX2B3fISQjo+futDAvr8AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAvlC5RAAAKIklEQVR42u2dCZeiuhaFY04gCDJoVAS1qq/Vdbur+87Tm/7//3phUAERgxoSlLN69VirpTYnX3bOtiiEhhpqqKGGGmqooYYaSlJZQV6+1cXLkd4LRtwlAHMd57v3Ekh/NS/yH6DJAJys2SiTfXcosAcSDP0ZSf50Ap8CeSDB0DvIXTEMLSF4JMF8eJG6wWBkQfhIglkAMvfKwEUoBOuBBCMArsQX+jsRDZYPJBj/rUSIWR/pPaFDhwnWMv2/GfzxUAxz5L1OmG8sH48jmCtzvTgUJ8UgKjjZHlWdYJ5MIr/+kb3w0ewFuE/lWSeCkUimDQsPZu99b8uShmP/6o1iJ4IxKtEjOYfXi6Ksvf1ELxoBhBiHjOmv2JH06XHFDbHMc95vh/0X58ejcInxHGD9X3M0mk0B5qORMdK2PIzTdrLCF178Br//R6oF9yOW3w7C4EsqHjgYfzZXADMzuSIj0Q3W84We OUGUXEz2dG8TsfJa4P5Czfyy2vaxtIA4lUbcXFzXiiYwqFCny+nYHRjWZArMc3yFctmd9xMjzy2r1/TqtxICMPfZXMlpsXqZbNDK9nR4O+lccboaOJGKeWv6peY8qVs24aR/61xdf3VWcZxdMiMk1qOGSzyzQaTgxuP5m5UhZSPkNpssLGHIeZuFAOqCd1sMDYi5sPcjRy12WZz9s/kRdyCGkbjZncLOC0ae0hWvorGcq1vmw5vAukn/ijF+KAJ5Eh7WnXbzeavh35sUc4xlwV+oMfHt7rm32zz1pO8lqonL7ZA22yzzTbbbLPNNtvM3v4DV5BEo3hj4/8AAAAASUVORK5CYII=\" alt=\"⑵ 등변사다리꼴\" style=\"display:block;width:100%;max-width:300px;height:auto;margin:0 auto;border-radius:8px;\"/><figcaption style=\"font-size:.72rem;color:#8a8f9a;margin-top:3px;\">⑵ 등변사다리꼴</figcaption></figure></div>", "approach": ["⑴ 평행사변형의 넓이 \\(S=ab\\sin\\theta\\)", "⑵ 두 대각선이 이루는 각을 이용한 사각형의 넓이 \\(S=\\dfrac{1}{2}ab\\sin\\theta\\)"], "solution": ["⑴ 삼각형 \\(ABC\\)에서 코사인법칙에 의하여", "\\(\\cos B=\\dfrac{4^2+6^2-8^2}{2\\times4\\times6}=-\\dfrac{1}{4}\\)", "\\(0°<B<180°\\)이므로 \\(\\sin B=\\sqrt{1-\\left(-\\dfrac{1}{4}\\right)^2}=\\dfrac{\\sqrt{15}}{4}\\)", "\\(\\therefore S=4\\times6\\times\\dfrac{\\sqrt{15}}{4}=6\\sqrt{15}\\)", "⑵ 대각선의 길이를 \\(x\\)라 하면 두 대각선의 길이가 같으므로 \\(\\overline{AC}=\\overline{BD}=x\\)", "\\(16\\sqrt{2}=\\dfrac{1}{2}\\times x\\times x\\times\\sin 45°\\)", "\\(=\\dfrac{1}{2}x^2\\times\\dfrac{\\sqrt{2}}{2}\\)", "\\(x^2=64\\)　\\(\\therefore x=8\\)　（∵ \\(x>0\\)）"], "alt_solution": [], "answer": "⑴ \\(6\\sqrt{15}\\)　⑵ \\(8\\)", "bible": "등변사다리꼴의 성질 ① 평행하지 않은 두 변의 길이가 같다. ② 두 밑각의 크기가 같다. ③ 두 대각선의 길이가 같다."}]}</script>
<script>
const CONCEPTS = JSON.parse(document.getElementById('concepts').textContent).concepts;
const EXAMPLES = JSON.parse(document.getElementById('examples').textContent).examples;
const isGeo = x => x.topic === '삼각형의 넓이';
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

let mode = 'concept';          // 'concept' | 'example'
let idx = { concept:0, example:0 };  // 모드별 현재 위치 기억
let showSol = false;           // 예제 해설 펼침 여부

function list(){ return mode === 'concept' ? CONCEPTS : EXAMPLES; }

/* ── 라인/블록 (예제 해설용) ── */
function lineEl(text){
  const t = text.trim();
  const div = document.createElement('div');
  const isEq = t.startsWith('\\(') || t.startsWith('\\[');
  div.className = 'line' + (isEq ? ' eq' : '');
  div.innerHTML = esc(text).replace(/(（[^）]*）|\([^()]*이용[^()]*\))\s*$/u, '<span class="note">$1</span>');
  return div;
}
function blockEl(labelText, labelClass, lines){
  const wrap = document.createElement('div'); wrap.className = 'block';
  const lab = document.createElement('span'); lab.className = 'label ' + labelClass; lab.textContent = labelText;
  wrap.appendChild(lab);
  const box = document.createElement('div'); box.className = 'lines';
  lines.forEach(l => box.appendChild(lineEl(l)));
  wrap.appendChild(box);
  return wrap;
}

/* ── 번호 그리드 ── */
const gridNav = document.getElementById('gridNav');
function buildGrid(){
  gridNav.innerHTML = '';
  const data = list();
  [['사인·코사인','사인법칙과 코사인법칙','ar'],['삼각형 넓이','삼각형의 넓이','ge']].forEach(([label,topic,cls])=>{
    const row = document.createElement('div'); row.className = 'gn-row';
    const lab = document.createElement('div'); lab.className = 'gn-label ' + cls; lab.textContent = label;
    const nums = document.createElement('div'); nums.className = 'gn-nums';
    data.forEach((x,i)=>{
      if(x.topic !== topic) return;
      const b = document.createElement('button');
      b.className = 'gn-num ' + cls;
      b.textContent = x.no;
      b.dataset.idx = i;
      b.addEventListener('click', ()=> goTo(i));
      nums.appendChild(b);
    });
    row.appendChild(lab); row.appendChild(nums);
    gridNav.appendChild(row);
  });
  updateGrid();
}
function updateGrid(){
  document.querySelectorAll('.gn-num').forEach(b=>{
    b.classList.toggle('active', Number(b.dataset.idx) === idx[mode]);
  });
}

/* ── 렌더 ── */
const viewer = document.getElementById('viewer');
function render(){
  const data = list();
  const cur = idx[mode];
  const x = data[cur];
  const geo = isGeo(x);
  viewer.innerHTML = '';

  if(mode === 'concept'){
    const card = document.createElement('section');
    card.className = 'card cv ' + (geo ? 'ge geo' : 'ar');
    const head = document.createElement('div'); head.className = 'card-head';
    head.innerHTML =
      `<span class="badge${geo?' geo':''}">개념 <span class="num">${String(x.no).padStart(2,'0')}</span></span>`+
      `<span class="topic-tag${geo?' geo':''}">${x.topic}</span>`+
      `<span class="ex-title${geo?' geo':''}">${x.title}</span>`;
    card.appendChild(head);
    const body = document.createElement('div');
    body.innerHTML = x.html;   // 개념 본문은 완성된 HTML 그대로
    card.appendChild(body);
    viewer.appendChild(card);
  } else {
    const card = document.createElement('section');
    card.className = 'card' + (geo ? ' geo':'');
    const head = document.createElement('div'); head.className = 'card-head';
    head.innerHTML =
      `<span class="badge${geo?' geo':''}">대표 예제 <span class="num">${String(x.no).padStart(2,'0')}</span></span>`+
      `<span class="topic-tag${geo?' geo':''}">${x.topic}</span>`+
      `<span class="ex-title${geo?' geo':''}">${esc(x.title)}</span>`;
    card.appendChild(head);

    const prob = document.createElement('div'); prob.className = 'problem' + (geo?' geo':'');
    prob.appendChild(Object.assign(document.createElement('div'),{className:'intro',innerHTML:esc(x.problem_intro)}));
    if(x.problem_parts && x.problem_parts.length){
      const ol = document.createElement('ol'); ol.className='parts';
      x.problem_parts.forEach(p=>{ const li=document.createElement('li'); li.innerHTML=esc(p); ol.appendChild(li); });
      prob.appendChild(ol);
    }
    if(x.figure){ const fg=document.createElement('div'); fg.className='prob-figs'; fg.innerHTML=x.figure; prob.appendChild(fg); }
    card.appendChild(prob);

    const bar = document.createElement('div'); bar.className = 'sol-bar';
    bar.innerHTML =
      `<span class="lbl">풀이·해설</span>`+
      `<label class="switch"><input type="checkbox" id="solSwitch"${showSol?' checked':''}><span class="slider"></span></label>`+
      `<span class="sol-state" id="solState">${showSol?'펼침':'접힘'}</span>`;
    card.appendChild(bar);

    const sol = document.createElement('div'); sol.className = 'solution' + (showSol?' open':'');
    if(x.approach && x.approach.length) sol.appendChild(blockEl('바로 접근','approach',x.approach));
    if(x.solution && x.solution.length) sol.appendChild(blockEl('바른 풀이','solve',x.solution));
    if(x.alt_solution && x.alt_solution.length) sol.appendChild(blockEl('다른 풀이','alt',x.alt_solution));
    const ans = document.createElement('div'); ans.className='answer';
    ans.innerHTML = `<span class="k">정답</span><span>${esc(x.answer)}</span>`;
    sol.appendChild(ans);
    if(x.bible){
      const b = document.createElement('div'); b.className='bible';
      b.innerHTML = `<span class="tag">Bible Says</span><div class="body">${esc(x.bible).replace(/\n/g,'<br>')}</div>`;
      sol.appendChild(b);
    }
    card.appendChild(sol);
    viewer.appendChild(card);

    const sw = document.getElementById('solSwitch');
    sw.addEventListener('change', ()=>{
      showSol = sw.checked;
      sol.classList.toggle('open', showSol);
      document.getElementById('solState').textContent = showSol ? '펼침' : '접힘';
    });
  }

  updateGrid();
  document.getElementById('counter').textContent = `${cur+1} / ${data.length}`;
  document.getElementById('prevBtn').disabled = cur === 0;
  document.getElementById('nextBtn').disabled = cur === data.length - 1;
  viewer.scrollTop = 0;
  typesetNode(viewer);
}

function goTo(i){
  const data = list();
  idx[mode] = Math.max(0, Math.min(data.length-1, i));
  render();
}
function setMode(m){
  if(m === mode) return;
  mode = m;
  document.querySelectorAll('.mode-tab').forEach(b=> b.classList.toggle('active', b.dataset.mode===m));
  buildGrid();
  render();
}

/* ── MathJax typeset (해당 노드만) ── */
function typesetNode(node){
  if(window.MathJax && window.MathJax.typesetPromise){
    window.MathJax.typesetClear && window.MathJax.typesetClear([node]);
    window.MathJax.typesetPromise([node]).catch(e=>console.error('MathJax:', e));
  } else {
    setTimeout(()=>typesetNode(node), 50);
  }
}

/* ── 컨트롤 ── */
document.getElementById('modeTabs').addEventListener('click', e=>{
  const b = e.target.closest('.mode-tab'); if(b) setMode(b.dataset.mode);
});
document.getElementById('prevBtn').addEventListener('click', ()=> goTo(idx[mode]-1));
document.getElementById('nextBtn').addEventListener('click', ()=> goTo(idx[mode]+1));
document.addEventListener('keydown', ev=>{
  if(ev.key === 'ArrowLeft') goTo(idx[mode]-1);
  else if(ev.key === 'ArrowRight') goTo(idx[mode]+1);
});
let tx=null, ty=null;
viewer.addEventListener('touchstart', e=>{ const t=e.changedTouches[0]; tx=t.clientX; ty=t.clientY; }, {passive:true});
viewer.addEventListener('touchend', e=>{
  if(tx===null) return;
  const t=e.changedTouches[0];
  const dx=t.clientX-tx, dy=t.clientY-ty;
  if(Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)*1.5){
    if(dx < 0) goTo(idx[mode]+1); else goTo(idx[mode]-1);
  }
  tx=ty=null;
}, {passive:true});

buildGrid();
render();
</script>
<script>if(location.hash.indexOf('embed')>=0){var s=document.createElement('style');s.textContent='.topbar .backbtn,.topbar .mode-tabs{display:none!important}.topbar{padding-top:6px!important}';document.head.appendChild(s);}</script></body>
</html>
