<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>오늘의 논제</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<style>
:root{--ink:#0c1019;--ink-2:#141a26;--ink-3:#1c2433;--line:#28324a;--text:#eef2fb;--muted:#8893ad;--gold:#f5b544;--gold-soft:#f5b54422;--mint:#5fd6b4;--nav-h:64px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Pretendard',system-ui,sans-serif;background:var(--ink);color:var(--text);
 background-image:radial-gradient(900px 480px at 50% -8%,#1d2740 0,transparent 60%),radial-gradient(var(--line) 1px,transparent 1px);
 background-size:100% 100%,22px 22px;line-height:1.55}
.wrap{height:100dvh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;
 padding:calc(12px + env(safe-area-inset-top)) 14px calc(var(--nav-h) + env(safe-area-inset-bottom) + 10px)}
.top{display:flex;align-items:center;gap:10px;flex:none;margin-bottom:10px}
.back{width:36px;height:36px;flex:none;border-radius:11px;background:var(--ink-2);border:1px solid var(--line);display:grid;place-items:center;color:var(--text);text-decoration:none;font-size:19px}
.htitle{font-size:18px;font-weight:800;letter-spacing:-.02em}
.hsub{font-size:11px;color:var(--muted);margin-top:1px}
.chips{display:flex;gap:6px;flex:none;margin-bottom:10px;overflow-x:auto;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:none;font-size:12px;font-weight:700;padding:6px 12px;border-radius:999px;background:var(--ink-2);border:1px solid var(--line);color:var(--muted);cursor:pointer;font-family:inherit}
.chip.on{background:var(--gold);color:#0c1019;border-color:var(--gold)}
.qcard{flex:1 1 auto;min-height:0;display:flex;flex-direction:column;
 background:linear-gradient(180deg,#18202f,#121826);border:1px solid var(--line);
 border-radius:16px;box-shadow:0 12px 34px #0007;overflow:hidden}
.qhead{flex:none;display:flex;justify-content:space-between;align-items:center;gap:10px;padding:15px 16px 0}
.qtags{display:flex;gap:6px}
.tag{font-size:11px;font-weight:600;padding:4px 9px;border-radius:8px;background:#1b2540;color:#aeb9d4;border:1px solid #2a3754}
.tag.lv{color:var(--gold);border-color:#f5b54455;background:var(--gold-soft);font-weight:700}
.qsubj{flex:none;font-size:11.5px;font-weight:800;color:var(--text);background:#202c44;border:1px solid #30405f;padding:5px 10px;border-radius:999px}
.qscroll{flex:1 1 auto;min-height:0;overflow-y:auto;padding:14px 16px 16px;-webkit-overflow-scrolling:touch}
.qscroll::-webkit-scrollbar{width:5px}.qscroll::-webkit-scrollbar-thumb{background:#2a3754;border-radius:3px}
.qtext{font-size:16px;line-height:2.0;word-break:keep-all;color:#eef2fb}
.qtext p{margin:0 0 15px}.qtext p:last-child{margin-bottom:0}
.qtext b{color:var(--gold);font-weight:800}
.katex{font-size:1.05em}.katex-display{margin:14px 0;overflow-x:auto;overflow-y:hidden;padding:2px 0}
.fold{margin-top:18px}
.foldbtn{width:100%;padding:13px;border-radius:13px;border:1px solid #30405f;background:#1b2540;font-weight:800;font-size:14px;cursor:pointer;font-family:inherit;color:var(--mint)}
.foldbtn:active{background:#223054}
.foldbox{display:none;margin-top:12px;padding:16px;border-radius:13px;background:#101725;border:1px solid #243250;font-size:14.5px;line-height:1.95;word-break:keep-all;color:#c8d2e8}
.foldbox.open{display:block}.foldbox p{margin:0 0 12px}.foldbox p:last-child{margin-bottom:0}
.foldbox b{color:var(--mint)}
.nav{position:fixed;left:0;right:0;bottom:0;height:calc(var(--nav-h) + env(safe-area-inset-bottom));
 padding:0 14px env(safe-area-inset-bottom);background:rgba(12,16,25,.94);backdrop-filter:blur(10px);
 border-top:1px solid var(--line);display:flex;align-items:center;gap:8px;max-width:480px;margin:0 auto}
.nav button{flex:1;height:44px;border-radius:12px;border:1px solid var(--line);background:var(--ink-2);color:var(--text);font-weight:800;font-size:14px;cursor:pointer;font-family:inherit}
.nav button:active{background:var(--ink-3)}
.nav .idx{flex:none;min-width:62px;text-align:center;font-size:12.5px;font-weight:800;color:var(--muted)}
.qtoday{font-size:9.5px;background:var(--gold);color:#0c1019;font-weight:800;padding:2px 6px;border-radius:999px;margin-left:6px;vertical-align:middle}
</style></head><body>
<div class="wrap">
  <div class="top"><a class="back" href="nonsul.html">&#8592;</a>
    <div><div class="htitle">오늘의 논제 <span id="today" class="qtoday">TODAY</span></div><div class="hsub" id="dateline">&mdash;</div></div></div>
  <div class="chips" id="chips"></div>
  <div class="qcard">
    <div class="qhead"><div class="qtags" id="qtags"></div><div class="qsubj" id="qsubj"></div></div>
    <div class="qscroll">
      <div class="qtext" id="qbody"></div>
      <div class="fold">
        <button class="foldbtn" id="solbtn" onclick="toggleSol()">해설 보기 &#9662;</button>
        <div class="foldbox" id="solbox"></div>
      </div>
    </div>
  </div>
</div>
<div class="nav">
  <button onclick="go(-1)">&#8249; 이전</button>
  <div class="idx" id="idx"></div>
  <button onclick="go(1)">다음 &#8250;</button>
</div>
<button id="todayFab" onclick="goToday()" title="오늘의 논제로"
  style="position:fixed;right:16px;bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 14px);
  width:52px;height:52px;border-radius:50%;border:1px solid #f5b54466;background:var(--gold);
  color:#0c1019;font-size:22px;font-weight:800;cursor:pointer;box-shadow:0 6px 20px #0009;z-index:50">&#128197;</button>
<script src="nonje-data.js"></script>
<script>
let FILTER='전체', list=NONJE.slice(), cur=0;
function seed(){const n=new Date();return Math.floor((n-new Date(n.getFullYear(),0,0))/864e5)+n.getFullYear()*366;}
function rebuild(){list=FILTER==='전체'?NONJE.slice():NONJE.filter(d=>d.grp===FILTER);}
function todayIdx(){return seed()%list.length;}
// 핵심: < > & 를 이스케이프해서 부등호가 태그로 먹히지 않게. KaTeX는 텍스트노드의 '<'를 정상 인식.
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function bold(s){return s.replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>');}  // **강조**
function paras(arr){return arr.map(p=>'<p>'+bold(esc(p))+'</p>').join('');}
function kt(el){
  if(!window.renderMathInElement)return;
  try{renderMathInElement(el,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],throwOnError:false,strict:false});}catch(e){}
}
function render(){
  const d=list[cur];
  document.getElementById('qsubj').textContent=d.subject;
  document.getElementById('qtags').innerHTML='<span class="tag lv">'+esc(d.type)+'</span>';
  document.getElementById('today').style.display=(cur===todayIdx())?'inline-block':'none';
  var fab=document.getElementById('todayFab'); if(fab) fab.style.display=(cur===todayIdx())?'none':'grid';
  const qb=document.getElementById('qbody'); qb.innerHTML=paras(d.q_p); kt(qb);
  document.getElementById('idx').textContent=(cur+1)+' / '+list.length;
  const sb=document.getElementById('solbtn'), sx=document.getElementById('solbox');
  sx.classList.remove('open'); sb.innerHTML='해설 보기 &#9662;'; sx.innerHTML='';
  sx._src = (d.sol_p&&d.sol_p.length)?d.sol_p:null;
  if(sx._src){sb.disabled=false;sb.style.opacity=1;}
  else{sb.disabled=true;sb.style.opacity=.5;sb.textContent='수록 해설 없음';}
  document.querySelector('.qscroll').scrollTop=0;
}
function toggleSol(){
  const x=document.getElementById('solbox'),b=document.getElementById('solbtn');
  const o=x.classList.toggle('open');
  if(o&&x._src&&!x.innerHTML){x.innerHTML=paras(x._src);kt(x);}
  b.innerHTML=o?'해설 접기 &#9652;':'해설 보기 &#9662;';
}
function go(d){cur=(cur+d+list.length)%list.length;render();}
function goRandom(){if(list.length<2)return;let n;do{n=Math.floor(Math.random()*list.length);}while(n===cur);cur=n;render();}
function goToday(){cur=todayIdx();render();}
function setFilter(g,el){FILTER=g;rebuild();cur=todayIdx();
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));el.classList.add('on');render();}
document.addEventListener('contextmenu',e=>{e.preventDefault();goRandom();});
function init(){
  const w=document.getElementById('chips');
  ['전체','공통수학','대수','미적분','확통'].forEach((g,i)=>{
    const b=document.createElement('button');b.className='chip'+(i?'':' on');
    const n=g==='전체'?NONJE.length:NONJE.filter(d=>d.grp===g).length;
    b.textContent=g+' '+n;b.onclick=()=>setFilter(g,b);w.appendChild(b);});
  const now=new Date();
  document.getElementById('dateline').textContent=now.getFullYear()+'. '+(now.getMonth()+1)+'. '+now.getDate()+' · 우클릭=임의 논제';
  rebuild();cur=todayIdx();render();
}
(function waitKatex(t){
  if(window.renderMathInElement){init();return;}
  if(t>200){init();return;}
  setTimeout(()=>waitKatex(t+1),25);
})(0);
</script></body></html
