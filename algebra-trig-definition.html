<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>호도법과 삼각함수의 정의 · 개념 + 예제</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<script>
window.MathJax = {

<style>
  :root{
    --paper:#FAF7F0; --ink:#23262e; --muted:#6f7480;
    --navy:#22356f; --navy2:#33489a; --blue:#2f5fb0; --blue-soft:#eef5fd; --blue-line:#cfe2f7;
    --approach-bg:#e9f1fc; --approach-ink:#1f56a6;
    --solve-bg:#f3e9fb; --solve-ink:#7a3aa0;
    --alt:#9aa0ad;
    --orange:#e08327; --orange-bg:#fff8ef; --orange-line:#f1d8b4;
    --card:#ffffff; --hair:#e7e2d6;
    --geo:#197a6b; --geo-bg:#e6f4f0; --geo-line:#bfe4db;
    /* 개념 본문용 (예제 톤에 맞춤) */
    --arith:#22356f; --arith-tint:#eef5fd; --arith-edge:#cfe2f7;
    --geom:#197a6b; --geom-tint:#e6f4f0; --geom-edge:#bfe4db;
    --amber:#B7791F; --amber-tint:#FBF3E2;
  }
  *{box-sizing:border-box}
  html,body{height:100%;}
  body{
    margin:0; background:var(--paper); color:var(--ink);
    font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',system-ui,sans-serif;
    font-size:16px; line-height:1.7; -webkit-font-smoothing:antialiased; overflow:hidden;
  }
  .app{display:flex; flex-direction:column; height:100dvh; max-width:780px; margin:0 auto; background:var(--paper);}

  /* ── 상단바 ── */
  .topbar{flex:none; padding:11px 16px 10px; border-bottom:1px solid var(--hair); background:var(--paper); position:relative; z-index:5;}
  .top-row{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:9px;}
  .ttl .eyebrow{font-size:.72rem; font-weight:700; color:var(--blue); letter-spacing:.03em;}
  .ttl h1{margin:.05em 0 0; font-size:1.08rem; font-weight:800; letter-spacing:-.02em;}
  /* 모드 탭 */
  .mode-tabs{display:inline-flex; background:#eee9dc; border-radius:11px; padding:3px; gap:2px; flex:none;}
  .mode-tab{
    border:none; background:transparent; color:var(--muted); font-family:inherit;
    font-weight:800; font-size:.86rem; padding:7px 16px; border-radius:9px; cursor:pointer; transition:.12s;
  }
  .mode-tab.active{background:#fff; color:var(--navy); box-shadow:0 1px 3px rgba(0,0,0,.12);}

  .grid-nav{display:flex; flex-direction:column; gap:7px;}
  .gn-row{display:grid; grid-template-columns:54px 1fr; align-items:center; gap:9px;}
  .gn-label{font-size:.7rem; font-weight:800; text-align:center; padding:4px 0; border-radius:7px;}
  .gn-label.ar{background:var(--blue-soft); color:var(--navy);}
  .gn-label.ge{background:var(--geo-bg); color:var(--geo);}
  .gn-nums{display:flex; gap:5px; flex-wrap:wrap;}
  .gn-num{
    width:30px; height:30px; border-radius:50%; border:1.5px solid var(--hair);
    background:#fff; color:var(--ink); font-weight:800; font-size:.8rem;
    font-variant-numeric:tabular-nums; cursor:pointer; display:grid; place-items:center;
    transition:.12s; padding:0; line-height:1;
  }
  .gn-num:hover{border-color:var(--blue);}
  .gn-num.ar.active{background:var(--navy); color:#fff; border-color:var(--navy); box-shadow:0 2px 6px rgba(34,53,111,.3);}
  .gn-num.ge.active{background:var(--geo); color:#fff; border-color:var(--geo); box-shadow:0 2px 6px rgba(25,122,107,.3);}

  /* ── 뷰어 ── */
  .viewer{flex:1 1 auto; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:16px;}
  .card{background:var(--card); border:1px solid var(--hair); border-radius:18px; padding:20px 20px 18px; margin:0;
    box-shadow:0 1px 2px rgba(40,40,60,.04), 0 8px 24px rgba(40,40,60,.04);}
  .card-head{display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:14px;}
  .badge{display:inline-flex; align-items:center; gap:9px;
    background:linear-gradient(135deg,var(--navy),var(--navy2)); color:#fff;
    padding:6px 8px 6px 13px; border-radius:999px; font-weight:800; font-size:.8rem;
    box-shadow:0 3px 8px rgba(34,53,111,.22);}
  .badge.geo{background:linear-gradient(135deg,#15695c,#1f8f7d);}
  .badge .num{background:#fff; color:var(--navy); width:24px; height:24px; border-radius:50%;
    display:grid; place-items:center; font-size:.88rem; font-variant-numeric:tabular-nums;}
  .badge.geo .num{color:#15695c;}
  .topic-tag{font-size:.72rem; font-weight:800; padding:3px 9px; border-radius:6px; background:var(--blue-soft); color:var(--blue);}
  .topic-tag.geo{background:var(--geo-bg); color:var(--geo);}
  .ex-title{font-size:1.04rem; font-weight:800; color:var(--blue); flex:1 1 100%; line-height:1.35;}
  .ex-title.geo{color:var(--geo);}

  /* 예제 문제 */
  .problem{background:var(--blue-soft); border:1px solid var(--blue-line); border-radius:14px; padding:15px 17px;}
  .problem.geo{background:var(--geo-bg); border-color:var(--geo-line);}
  .problem .intro{font-weight:600;}
  ol.parts{margin:.5em 0 0; padding-left:0; list-style:none; counter-reset:p;}
  ol.parts li{counter-increment:p; padding-left:1.9em; position:relative; margin:.4em 0;}
  ol.parts li::before{content:"(" counter(p) ")"; position:absolute; left:0; font-weight:700; color:var(--blue); font-variant-numeric:tabular-nums;}
  .problem.geo ol.parts li::before{color:var(--geo);}

  /* 해설 토글 */
  .sol-bar{display:flex; align-items:center; gap:12px; margin:18px 2px 4px;}
  .sol-bar .lbl{font-weight:800; font-size:.9rem; color:var(--muted);}
  .switch{position:relative; display:inline-block; width:50px; height:28px; flex:none;}
  .switch input{opacity:0; width:0; height:0;}
  .slider{position:absolute; inset:0; cursor:pointer; background:#cfcabb; border-radius:999px; transition:.2s;}
  .slider::before{content:""; position:absolute; height:22px; width:22px; left:3px; top:3px; background:#fff; border-radius:50%; transition:.2s; box-shadow:0 1px 3px rgba(0,0,0,.25);}
  .switch input:checked + .slider{background:var(--navy);}
  .card.geo .switch input:checked + .slider{background:var(--geo);}
  .switch input:checked + .slider::before{transform:translateX(22px);}
  .sol-state{font-size:.82rem; color:var(--muted); font-weight:700;}
  .solution{display:none; margin-top:6px;}
  .solution.open{display:block;}

  .block{margin-top:18px;}
  .label{display:inline-block; font-weight:800; font-size:.8rem; padding:4px 12px; border-radius:8px; margin-bottom:8px;}
  .label.approach{background:var(--approach-bg); color:var(--approach-ink);}
  .label.solve{background:var(--solve-bg); color:var(--solve-ink);}
  .label.alt{background:#fff; color:var(--alt); border:1px solid #e2e0da; font-size:.74rem; padding:3px 10px;}
  .lines{padding-left:4px;}
  .lines .line{margin:.18em 0;}
  .lines .line.eq{padding-left:1.1em; margin:.28em 0;}
  .note{color:var(--muted); font-size:.9em;}
  .answer{display:inline-flex; align-items:center; gap:10px; margin-top:18px; border:1.5px solid var(--navy); border-radius:10px; padding:6px 14px 6px 6px; font-weight:700;}
  .answer .k{background:var(--navy); color:#fff; padding:3px 10px; border-radius:6px; font-size:.8rem;}
  .card.geo .answer{border-color:var(--geo);} .card.geo .answer .k{background:var(--geo);}
  .bible{margin-top:20px; background:var(--orange-bg); border:1px solid var(--orange-line); border-radius:14px; padding:16px 18px; position:relative;}
  .bible .tag{position:absolute; top:-12px; left:16px; background:var(--orange); color:#fff; font-weight:800; font-size:.72rem; padding:3px 11px; border-radius:7px;}
  .bible .body{margin-top:6px; font-size:.93rem; color:#5a4a36;}

  /* ── 개념 본문 (concept-view) ── */
  .cv .concept-card{border-radius:14px; padding:10px 20px; margin-bottom:18px;}
  .cv.ar .concept-card{background:var(--arith-tint); border:1px solid var(--arith-edge);}
  .cv.ge .concept-card{background:var(--geom-tint); border:1px solid var(--geom-edge);}
  .cv .def-row{display:grid; grid-template-columns:130px 1fr; gap:14px; padding:13px 0; align-items:start;}
  .cv .def-row+.def-row{border-top:1px dashed var(--hair);}
  .cv .def-label{font-weight:700; font-size:14px;}
  .cv.ar .def-label{color:var(--arith);}
  .cv.ge .def-label{color:var(--geom);}
  .cv .def-body{font-size:15px;}
  .cv .concept-body{padding-left:2px;}
  .cv .prose{margin:14px 0;}
  .cv .formula{position:relative; margin:20px 0; padding:20px 20px 14px; border-radius:12px; background:var(--card); border:1px solid var(--hair);}
  .cv.ar .formula{border-left:4px solid var(--arith);}
  .cv.ge .formula{border-left:4px solid var(--geom);}
  .cv .formula-tag{position:absolute; top:-11px; left:18px; font-size:11.5px; font-weight:700; padding:3px 11px; border-radius:999px; color:#fff;}
  .cv.ar .formula-tag{background:var(--arith);}
  .cv.ge .formula-tag{background:var(--geom);}
  .cv .formula-math{overflow-x:auto;}
  .cv .note{margin:16px 0; padding:13px 18px; border-radius:10px; background:var(--amber-tint); border-left:3px solid var(--amber); font-size:14px; color:#5a4517;}
  .cv .note b{color:#3d2e0d;}
  .cv .example{margin:18px 0; padding:18px 20px 16px; border-radius:12px; background:var(--card); border:1px dashed var(--hair);}
  .cv .example-label{display:inline-block; font-weight:700; font-size:12.5px; letter-spacing:.08em; padding:3px 12px; border-radius:6px; margin-bottom:8px; color:var(--ink); background:#F0ECE0;}
  .cv .example-list{margin:6px 0 0; padding-left:1.4em;}
  .cv .example-list li{margin:9px 0; font-size:14.5px;}
  .cv .derive{margin:18px 0; padding:18px 20px; border-radius:12px; background:#FAF9F4; border:1px solid var(--hair);}
  .cv .derive-title{font-weight:700; font-size:14px; color:var(--muted); margin-bottom:10px;}
  .cv .derive-line{padding:3px 0; overflow-x:auto;}
  .cv .derive-rule{border:none; border-top:1.5px solid var(--ink); margin:6px 0;}
  .cv .tablewrap{overflow-x:auto; margin:18px 0;}
  .cv table.fin{border-collapse:collapse; width:100%; font-size:14px; background:var(--card);}
  .cv table.fin th, .cv table.fin td{border:1px solid var(--hair); padding:8px 10px; text-align:center;}
  .cv.ar table.fin thead th{background:var(--arith-tint); color:var(--arith); font-weight:700;}
  .cv.ge table.fin thead th{background:var(--geom-tint); color:var(--geom); font-weight:700;}
  .cv table.fin td:first-child, .cv table.fin th:first-child{font-weight:600; background:#FAFAF6;}
  mjx-container{overflow-x:auto; overflow-y:visible; max-width:100%;}
  /* 개념 정의칸 안의 display 수식이 윗줄/카드 경계에 가려지지 않도록 여백 확보 */
  .cv .def-body mjx-container[display="true"]{margin:.45em 0 .25em;}

  /* ── 페이저 ── */
  .pager{flex:none; display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:10px 16px calc(10px + env(safe-area-inset-bottom)); border-top:1px solid var(--hair); background:var(--paper);}
  .pager button{border:1.5px solid var(--navy); background:#fff; color:var(--navy); padding:9px 18px; border-radius:11px;
    font-size:.92rem; font-weight:800; cursor:pointer; font-family:inherit; transition:.12s; flex:1; max-width:160px;}
  .pager button:hover:not(:disabled){background:var(--navy); color:#fff;}
  .pager button:disabled{opacity:.32; cursor:default; border-color:var(--hair); color:var(--muted);}
  .pager .counter{font-weight:800; font-variant-numeric:tabular-nums; color:var(--muted); font-size:.9rem; white-space:nowrap;}

  @media (max-width:430px){
    .gn-num{width:28px; height:28px; font-size:.76rem;}
    .gn-row{grid-template-columns:48px 1fr; gap:7px;}
    .ttl h1{font-size:.98rem;}
    .mode-tab{padding:6px 13px; font-size:.82rem;}
    .viewer{padding:13px;}
    .card{padding:17px 15px 16px;}
    .pager button{padding:9px 10px;}
    .cv .def-row{grid-template-columns:1fr; gap:4px;}
  }
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="top-row">
      <div class="ttl">
        <div class="eyebrow">Ⅱ. 삼각함수 · 05단원</div>
        <h1>호도법과 삼각함수의 정의</h1>
      </div>
      <div class="mode-tabs" id="modeTabs">
        <button class="mode-tab active" data-mode="concept">개념</button>
        <button class="mode-tab" data-mode="example">예제</button>
      </div>
    </div>
    <div class="grid-nav" id="gridNav"></div>
  </header>
  <main class="viewer" id="viewer"></main>
  <nav class="pager">
    <button id="prevBtn">◀ 이전</button>
    <span class="counter" id="counter"></span>
    <button id="nextBtn">다음 ▶</button>
  </nav>
</div>

<script id="concepts" type="application/json">{"concepts": [{"topic": "호도법", "no": 1, "title": "일반각과 동경", "html": "<div class=\"concept-card\"><div class=\"def-row\"><div class=\"def-label\">시초선과 동경</div><div class=\"def-body\">평면 위의 한 점 \\(O\\)를 중심으로 반직선 \\(OP\\)가 회전할 때, 처음 위치의 반직선 \\(OX\\)를 <b>시초선</b>, 회전한 반직선 \\(OP\\)를 <b>동경</b>이라 한다.</div></div><div class=\"def-row\"><div class=\"def-label\">양의 각·음의 각</div><div class=\"def-body\">시초선 \\(OX\\)에서 동경 \\(OP\\)까지 시계 반대 방향으로 잰 각을 <b>양의 각</b>, 시계 방향으로 잰 각을 <b>음의 각</b>으로 정한다.</div></div></div>\n<div class=\"concept-body\"><p class=\"prose\">한 점 \\(O\\)를 중심으로 회전하는 반직선의 처음 위치 \\(OX\\)를 <b>시초선</b>, 나중 위치 \\(OP\\)를 <b>동경</b>이라 한다. 동경 \\(OP\\)가 나타내는 각의 크기는 시초선에서 동경까지 회전한 양으로 정한다.</p><figure style=\"margin:14px 0 4px;text-align:center;\"><img src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAA0AAAACECAIAAAA2kNwqAACB10lEQVR4nO2deZxN9f/H32e/28ydnbGMPUvJkiUVQqJCJEshRYssRSTfiIpCm+wkbSotKqUslYQkSyiyln2Yfe569nM+vz/e5nQbKfphxvg8Hx7XmXvPvfecc885n/fnvbzeDCEE/o3ffvtt27ZtoVAoFAq5XC5JkhITEzMzMwHgyiuvTE1NLVeuXOXKlQEgGo16vd5//UAKhUKhXFYUFhb++uuvO3fujEajHo9HkiSGYQBA13VJktLT0+vUqVO1alWO40p6S8+ZUCj0xx9/bNy48aeffjJNs0GDBldddVWrVq3i4uIAQFVVl8sFALqucxx3Ke4gpXTCnI0Bp+v6ypUrf/rpp5UrV+bl5dWrV+/hhx+uW7cuIWTLli2LFi0CgEcffbRt27YAgGcqhUKhUCix/P7776tXr/7yyy+3bNmSkJDQo0eP7t278zwfDodXrFixcuXKK6+88sknn6xVq5aiKG63u6S396zIycmZMmXKnj17+vbt26dPHwDYsWPHmjVrNmzYMGLEiOuvvx4ALMsihBBCBEEo6e2llB3OyoADAEKIYRi9evXasmXLm2++eeONN/I8r6qq2+3Wdf2+++7bvn37o48++tBDD13oLaZQKBTKpYhlWQCwevXqe+65p02bNu+++y7DMCzLAkAwGNy9e/fdd99dpUqVFStWMAxTCn0BhBCGYUzTBACe53VdLyws7NevH8/zH3zwQXx8fOyaS5cuHTVq1IcfftikSRMACAaDfr//EjJMKf8M/pToXrVtm2VZwzAMw/B4PLIsezweXC0cDq9atWrfvn2JiYmhUCgjIyMrK6tGjRq33347AOzfv/+7774LhUIJCQmyLDMMc99998WeSP8MezYrEUJs2+Y4ThAEt9sdFxcnCALDMHgiCoIwduzY7OzsF198MRwOR6PR/3Q0KBQKhVKWwQCi1+t1u92iKHIcx7IsDhl+v79FixatW7feu3fvjBkzSqH1BgC2bRNCeJ5H600UxfHjxx87duz555+Pj4+PRqOEEDTvdF2/+eab27RpM2rUqNzcXADw+/05OTnUeiszuN1u0zRdLhd6wWRZ1jQN7Tae5wHAtm1crXbt2i1bttywYcP8+fMfeeSRxo0bV6hQIR : "일반각", "html": "<div class=\"concept-card\"><div class=\"def-row\"><div class=\"def-label\">일반각</div><div class=\"def-body\">시초선 \\(OX\\)와 동경 \\(OP\\)가 나타내는 한 각의 크기를 \\(\\alpha°\\)라 하면, 동경 \\(OP\\)가 나타내는 각의 크기는 $$360°\\times n+\\alpha° \\quad(n\\text{은 정수})$$ 꼴로 나타낼 수 있다. 이것을 동경 \\(OP\\)가 나타내는 <b>일반각</b>이라 한다.</div></div></div>\n<div class=\"concept-body\"><p class=\"prose\">동경 \\(OP\\)는 한 바퀴(\\(360°\\))를 더 돌아도 같은 위치에 온다. 따라서 동경 \\(OP\\)가 나타내는 각이 \\(\\alpha°\\)이면, 같은 동경을 나타내는 각은 \\(\\alpha°\\)에 \\(360°\\)의 정수배를 더한 것이다.</p><div class=\"derive\"><div class=\"derive-title\">같은 동경을 나타내는 각 (예: \\(\\alpha°=45°\\))</div><div class=\"derive-line\">\\(\\displaystyle 405°=360°\\times 1+45°\\)</div><div class=\"derive-line\">\\(\\displaystyle 765°=360°\\times 2+45°\\)</div><div class=\"derive-line\">\\(\\displaystyle -315°=360°\\times(-1)+45°\\)</div></div><div class=\"formula\"><span class=\"formula-tag\">일반각</span><div class=\"formula-math\">\\[360°\\times n+\\alpha° \\quad(n\\text{은 정수},\\ \\ 0°\\le \\alpha°<360°)\\]</div></div><div class=\"note\">보통 \\(\\alpha°\\)는 \\(0°\\le \\alpha°<360°\\)인 것을 택한다. 일반각으로 나타내면 한 동경이 나타내는 무수히 많은 각을 한꺼번에 표현할 수 있다.</div><div class=\"example\"><span class=\"example-label\">보기</span><ol class=\"example-list\"><li>\\(480°=360°\\times 1+120°\\)이므로 \\(480°\\)를 나타내는 동경의 일반각은 \\(360°\\times n+120°\\) (\\(n\\)은 정수)이다.</li><li>\\(-650°=360°\\times(-2)+70°\\)이므로 일반각은 \\(360°\\times n+70°\\) (\\(n\\)은 정수)이다.</li></ol></div></div>"}, {"topic": "호도법", "no": 3, "title": "사분면의 각", "html": "<div class=\"concept-card\"><div class=\"def-row\"><div class=\"def-label\">사분면의 각</div><div class=\"def-body\">좌표평면에서 시초선을 \\(x\\)축의 양의 부분으로 잡을 때, 동경 \\(OP\\)가 제1·2·3·4 사분면에 있으면 그 각을 각각 <b>제1·2·3·4 사분면의 각</b>이라 한다.</div></div></div>\n<div class=\"concept-body\"><p class=\"prose\">좌표평면에서 원점 \\(O\\)를 중심으로 하고 시초선을 \\(x\\)축의 양의 부분으로 잡으면, 동경 \\(OP\\)가 어느 사분면에 있는지에 따라 각을 분류할 수 있다.</p><div class=\"note\">동경이 좌표축 위(\\(0°,\\ 90°,\\ 180°,\\ 270°,\\ \\cdots\\))에 있을 때는 어느 사분면에도 속하지 않는다.</div><div class=\"tablewrap\"><table class=\"fin\"><thead><tr><th>동경의 위치</th><th>각 \\(\\theta\\)의 범위 (\\(n\\)은 정수)</th></tr></thead><tbody><tr><td>제1사분면</td><td>\\(360°\\times n+0°<\\theta<360°\\times n+90°\\)</td></tr><tr><td>제2사분면</td><td>\\(360°\\times n+90°<\\theta<360°\\times n+180°\\)</td></tr><tr><td>제3사분면</td><td>\\(360°\\times n+180°<\\theta<360°\\times n+270°\\)</td></tr><tr><td>제4사분면</td><td>\\(360°\\times n+270°<\\theta<360°\\times n+360°\\)</td></tr></tbody></table></div><div class=\"example\"><span class=\"example-label\">보기</span><ol class=\"example-list\"><li>\\(580°=360°\\times 1+220°\\)이고 \\(220°\\)는 제3사분면의 각이므로 \\(580°\\)는 제3사분면의 각이다.</li><li>\\(875°=360°\\times 2+155°\\)이고 \\(155°\\)는 제2사분면의 각이므로 \\(875°\\)는 제2사분면의 각이다.</li><li>\\(-390°=360°\\times(-2)+330°\\)이고 \\(330°\\)는 제4사분면의 각이므로 \\(-390°\\)는 제4사분면의 각이다.</li></ol></div></div>"}, {"topic": "호도법", "no": 4, "title": "두 동경의 위치 관계", "html": "<div class=\"concept-card\"><div class=\"def-row\"><div class=\"def-label\">두 동경의 위치 관계</div><div class=\"def-body\">두 각 \\(\\alpha,\\ \\beta\\)를 나타내는 동경에 대하여 (\\(n\\)은 정수)<br>① 일치: \\(\\alpha-\\beta=360°\\times n\\)<br>② 일직선(반대 방향): \\(\\alpha-\\beta=360°\\times n+180°\\)<br>③ \\(x\\)축 대칭: \\(\\alpha+\\beta=360°\\times n\\)<br>④ \\(y\\)축 대칭: \\(\\alpha+\\beta=360°\\times n+180°\\)<br>⑤ 직선 \\(y=x\\)에 대칭: \\(\\alpha+\\beta=360°\\times n+90°\\)</div></div></div>\n<div class=\"concept-body\"><p class=\"prose\">두 각 \\(\\alpha,\\ \\beta\\)를 \\(\\alpha=360°\\times n_1+\\alpha_1,\\ \\beta=360°\\times n_2+\\beta_1\\) (\\(0°\\le \\alpha_1,\\ \\beta_1<360°\\))로 나타내면, 두 동경의 위치 관계는 \\(\\alpha_1\\)과 \\(\\beta_1\\) 사이의 관계로 정해진다.</p><div class=\"note\"><b>두 동경이 일치</b>하면 \\(\\alpha_1=\\beta_1\\)이므로 \\(\\alpha-\\beta=360°\\times(n_1-n_2)=360°\\times n\\) 꼴이다. 나머지 경우도 \\(\\alpha_1,\\ \\beta_1\\)의 합 또는 차를 따져 위 식을 얻는다.</p></div><div class=\"example\"><span class=\"example-label\">보기</span><ol class=\"example-list\"><li>두 각 \\(\\theta,\\ 6\\theta\\)의 동경이 일치하면 \\(6\\theta-\\theta=360°\\times n\\), 즉 \\(5\\theta=360°\\times n\\)이다.</li><li>두 각 \\(\\theta,\\ 5\\theta\\)의 동경이 \\(y\\)축에 대칭이면 \\(\\theta+5\\theta=360°\\times n+180°\\), 즉 \\(6\\theta=360°\\times n+180°\\)이다.</li></ol></div></div>"}, {"topic": "호도법", "no": 5, "title": "호도법", "html": "<div class=\"concept-card\"><div class=\"def-row\"><div class=\"def-label\">1 라디안</div><div class=\"def-body\">반지름의 길이가 \\(r\\)인 원에서, 길이가 \\(r\\)인 호에 대한 중심각의 크기를 <b>1 라디안</b>(radian)이라 하고, 이것을 단위로 하여 각의 크기를 나타내는 방법을 <b>호도법</b>이라 한다.</div></div><div class=\"def-row\"><div class=\"def-label\">도와 라디안</div><div class=\"def-body\">$$1\\text{ 라디안}=\\dfrac{180°}{\\pi},\\qquad 1°=\\dfrac{\\pi}{180}\\text{ 라디안}$$</div></div></div>\n<div class=\"concept-body\"><p class=\"prose\">반지름의 길이가 \\(r\\)인 원에서 길이가 \\(r\\)인 호에 대한 중심각의 크기는 반지름의 길이에 관계없이 항상 일정하다. 이 일정한 각을 <b>1 라디안</b>이라 한다.</p><figure style=\"margin:14px 0 4px;text-align:center;\"><img src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAANoAAADZCAIAAADJ67kiAABXG0lEQVR4nO29eZxU1Zk3/pxz7l5Ld1dv7PsiyCqLuIFLookxMVFjHE1mktHJOzExyZhMYmLen79s82ay/GayTQw6E5O4ETdwQVFEUQRFESUkQZQdhN6qa73rOef5/XGqL0UDvqDd0Eh9P/UpqotaTt37vc959ocgItRQw8AAPd4LqKGG/ajRsYYBhBodaxhAqNGxhgGEGh37AEKI472E9wlIzbLuKwghpJSkBwBAae1qPzpox3sB7xNIKRUXGWOKizW8C9SkYx8gForxM4iIiDXpeLSoScc+QDUXhRCcc/WkYRjHdV0nHmrSsQ8QS0clFHtJyhqOHLXdpG8ghBBCEEIopYQQzrnrusd7USceanTsA1BKNU2LNUXP87Zv375+/frju6oTETU69g08z4vVHsbYJZdc0t3dfXyXdCKiZsr0AaIosm1bPQCApUuXzp0795JLLjne6zrxUDNl+gb5fN4wDNu2gyAYP378qlWrMplMMpk83us6wVCTjn0Az/Pq6uoQsVwuf/Ob37zhhhsGDx6s6/rxXteJhxod+wCapin/zu7du5ctW7Zu3TpKqe/7lmUd76WdYKiZMn2AKIqUc+f666//1a9+lU6nGWO1kMy7QO2Q9QEcx/E8b8WKFeVyOZ1Ol8tlAKiFZN4FaqbMkeJwh0mFX9rb2z/2sY/dddc9zc3N55577qxZsz7zmc/Mn39277cRCQA1KXA41Oh4SOwnDR74VBhJQ6cA4HohADi2QQFQyh//+Mc7d+7++X/+UtdIseBdcsnHNm/eXF+fZoRcfPGHzztvwfQZU1tbm4WIDNsGQgGolFJt6CrMbZrmsf+dAw21y/SIoLgoEQilAJAvuo5tOLZRKvsAsG/fvttvv/0HP/iBrhMegaYZDzzwwIQJE0QoXNd96IEHd+3cmXQSTDcM2/bL5e5slnOuuOi6LmPMNM1aUBFqdDwMaK8jo/7WCBCQFMAy9corBEeEz3/+8//nh/+WTiZQgqaD7TDLMv7t3 {\\pi}{180}\\)　／　호도법 → 육십분법: \\(\\times \\dfrac{180°}{\\pi}\\)</div></div><div class=\"def-row\"><div class=\"def-label\">호도법의 일반각</div><div class=\"def-body\">한 동경이 나타내는 각이 \\(\\theta\\)이면, 그 일반각은 $$2n\\pi+\\theta \\quad(n\\text{은 정수},\\ 0\\le \\theta<2\\pi)$$</div></div></div>\n<div class=\"concept-body\"><div class=\"tablewrap\"><table class=\"fin\"><thead><tr><th>육십분법</th><th>\\(0°\\)</th><th>\\(30°\\)</th><th>\\(45°\\)</th><th>\\(60°\\)</th><th>\\(90°\\)</th><th>\\(180°\\)</th><th>\\(270°\\)</th><th>\\(360°\\)</th></tr></thead><tbody><tr><td>호도법</td><td>\\(0\\)</td><td>\\(\\dfrac{\\pi}{6}\\)</td><td>\\(\\dfrac{\\pi}{4}\\)</td><td>\\(\\dfrac{\\pi}{3}\\)</td><td>\\(\\dfrac{\\pi}{2}\\)</td><td>\\(\\pi\\)</td><td>\\(\\dfrac{3}{2}\\pi\\)</td><td>\\(2\\pi\\)</td></tr></tbody></table></div><p class=\"prose\">\\(360°=2\\pi\\)이므로 호도법에서 한 동경이 나타내는 일반각은 \\(2n\\pi+\\theta\\) (\\(n\\)은 정수)로 나타낸다.</p><div class=\"example\"><span class=\"example-label\">보기</span><ol class=\"example-list\"><li>\\(120°=120\\times\\dfrac{\\pi}{180}=\\dfrac{2}{3}\\pi\\)이다.</li><li>\\(-\\dfrac{11}{6}\\pi=-\\dfrac{11}{6}\\pi\\times\\dfrac{180°}{\\pi}=-330°\\)이다.</li><li>\\(300°=\\dfrac{5}{3}\\pi\\)이므로 일반각은 \\(2n\\pi+\\dfrac{5}{3}\\pi\\) (\\(n\\)은 정수)이다.</li><li>\\(\\dfrac{11}{2}\\pi=2\\pi\\times 2+\\dfrac{3}{2}\\pi\\)이므로 일반각은 \\(2n\\pi+\\dfrac{3}{2}\\pi\\) (\\(n\\)은 정수)이다.</li></ol></div></div>"}, {"topic": "호도법", "no": 7, "title": "부채꼴의 호의 길이와 넓이", "html": "<div class=\"concept-card\"><div class=\"def-row\"><div class=\"def-label\">호의 길이</div><div class=\"def-body\">반지름의 길이가 \\(r\\), 중심각의 크기가 \\(\\theta\\)(라디안)인 부채꼴의 호의 길이 \\(l\\)은 $$l=r\\theta$$</div></div><div class=\"def-row\"><div class=\"def-label\">넓이</div><div class=\"def-body\">넓이 \\(S\\)는 $$S=\\dfrac{1}{2}r^2\\theta=\\dfrac{1}{2}rl$$</div></div></div>\n<div class=\"concept-body\"><p class=\"prose\">반지름의 길이가 \\(r\\), 중심각의 크기가 \\(\\theta\\)(라디안)인 부채꼴에서 호의 길이 \\(l\\)과 넓이 \\(S\\)는 중심각에 정비례한다.</p><figure style=\"margin:14px 0 4px;text-align:ce 보기</span><ol class=\"example-list\"><li>반지름 \\(2\\), 중심각 \\(\\dfrac{\\pi}{3}\\)인 부채꼴: \\(l=2\\times\\dfrac{\\pi}{3}=\\dfrac{2}{3}\\pi,\\ \\ S=\\dfrac{1}{2}\\times 2^2\\times\\dfrac{\\pi}{3}=\\dfrac{2}{3}\\pi\\)</li></ol></div></div>"}, {"topic": "삼각함수의 정의", "no": 1, "title": "삼각함수의 정의", "html": "<div class=\"concept-card\"><div class=\"def-row\"><div class=\"def-label\">삼각함수</div><div class=\"def-body\">좌표평면에서 중심이 원점 \\(O\\), 반지름이 \\(r\\)인 원 위의 점 \\(\\mathrm P(x,\\ y)\\)에 대하여 동경 \\(OP\\)가 나타내는 각을 \\(\\theta\\)라 하면 $$\\sin\\theta=\\dfrac{y}{r},\\quad \\cos\\theta=\\dfrac{x}{r},\\quad \\tan\\theta=\\dfrac{y}{x}\\ (x\\ne 0)$$ 를 각각 \\(\\theta\\)의 <b>사인, 코사인, 탄젠트</b>라 한다.</div></div></div>\n<div class=\"concept-body\"><p class=\"prose\">각 \\(\\theta\\)를 나타내는 동경 위에 원점이 아닌 한 점 \\(\\mathrm P(x,\\ y)\\)를 잡고 \\(\\overline{OP}=r=\\sqrt{x^2+y^2}\\)라 하면, 비 \\(\\dfrac{y}{r},\\ \\dfrac{x}{r},\\ \\dfrac{y}{x}\\)는 점 \\(\\mathrm P\\)를 어디에 잡아도 \\(\\theta\\)에 의해서만 정해진다.</p><figure style=\"margin:14px 0 4px;text-align:center;\"><img src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAQ0AAAD/CAIAAABkXRT5AAB6w0lEQVR4nO19d5hU5fX/uX162d5ZOiwqSC+CICAooKJgwd5iLFHUhERj9Gs0sSVGsf2UKKLBRkRBjCiICNKb9CJlYfvu7PSZ2+/9/XHY15GywLqd+Tw8PLOzd+/cufc97+mfA2YSrQyGYTz44IM7d+6UJOn8889fvXq1oiimae7bt++8885bvHhx4sHxeDwUCg0bNgx/FEWxBa74LAALSbQahEIhmqadTuejjz5qs9k+++wzXdeHDBmiaRoAzJ07NxqNjho1SpZlQRDwT1iW3bVr1549e1RV5TiOoqgW/QbtFnRLX0ASRxGNRh0Oh9PplCQpLS3NZrO9+OKLjzzySDQaVRQFADZt2nTLLbfwPK/rOv6Jpmkcxy1evJhhmAMHDgAAz/Mt+R3aL5Jy0lrgcDgoipJlmWVZVVVXrlwpiuKAAQPsdrvNZvv+++9Xrlx57bXXSpJks9kkSQIAFJhly5bZ7fY9e/aEQqGkPmkiJOWkFQENKpqmaZp+9913x44dm5aWhsLw+uuvFxUVde3a1WKxAADaXYIgRKNR1CT//e9/3W43ap5EEAu72b9Nu0JSTloRrFarruu6rsuy/OWXX3bp0sXtdjMMM3fu3LVr1z7wwAOiKCYebxjGmjVrKIoSBGH9+vXxeDxpdzURknLSiiBJEsMwmqaJopiRkREMBgFg9erVGzZskGV50qRJVqsVNYZhGIZh0DT93HPPeb3en376SVXVZcuWEdeFIGmJNQqSctJaEI/HWZYFAKvVmpqa+sILL/j9/jvuuEPTtCNHjkybNg1XPE3TpmkyDEPTdFVV1e7duwOBwIABA+Lx+Ntvv33CM1MUlZSWXwkqabm2KkiSpKqq0+kk72zbtu2GG274+OOP8/LyrFYry7KSJFks r><td>\\(\\cos\\theta\\)</td><td>\\(\\dfrac{\\sqrt3}{2}\\)</td><td>\\(\\dfrac{\\sqrt2}{2}\\)</td><td>\\(\\dfrac{1}{2}\\)</td></tr><tr><td>\\(\\tan\\theta\\)</td><td>\\(\\dfrac{\\sqrt3}{3}\\)</td><td>\\(1\\)</td><td>\\(\\sqrt3\\)</td></tr></tbody></table></div><div class=\"example\"><span class=\"example-label\">보기</span><ol class=\"example-list\"><li>점 \\(\\mathrm P(-4,\\ -3)\\)에 대하여 \\(\\overline{OP}=\\sqrt{(-4)^2+(-3)^2}=5\\)이므로 \\(\\sin\\theta=-\\dfrac{3}{5},\\ \\cos\\theta=-\\dfrac{4}{5},\\ \\tan\\theta=\\dfrac{3}{4}\\)이다.</li><li>\\(\\theta=-\\dfrac{\\pi}{3}\\)이면 단위원 위의 점은 \\(\\left(\\dfrac{1}{2},\\ -\\dfrac{\\sqrt3}{2}\\right)\\)이므로 \\(\\sin\\theta=-\\dfrac{\\sqrt3}{2},\\ \\cos\\theta=\\dfrac{1}{2},\\ \\tan\\theta=-\\sqrt3\\)이다.</li></ol></div></div>"}, {"topic": "삼각함수의 정의", "no": 2, "title": "삼각함수의 값의 부호", "html": "<div class=\"concept-card\"><div class=\"def-row\"><div class=\"def-label\">사분면별 부호</div><div class=\"def-body\">각 \\(\\theta\\)의 동경이 있는 사분면에 따라 \\(\\sin\\theta,\\ \\cos\\theta,\\ \\tan\\theta\\)의 부호가 정해진다.<br>제1사분면: 모두 \\(+\\)　／　제2사분면: \\(\\sin\\theta\\)만 \\(+\\)<br>제3사분면: \\(\\tan\\theta\\)만 \\(+\\)　／　제4사분면: \\(\\cos\\theta\\)만 \\(+\\)</div></div></div>\n<div class=\"concept-body\"><p class=\"prose\">동경 \\(OP\\) 위의 점 \\(\\mathrm P(x,\\ y)\\)에 대하여 \\(r=\\overline{OP}>0\\)이므로 \\(\\sin\\theta=\\dfrac{y}{r}\\)의 부호는 \\(y\\)의 부호, \\(\\cos\\theta=\\dfrac{x}{r}\\)의 부호는 \\(x\\)의 부호와 같다. \\(\\tan\\theta=\\dfrac{y}{x}\\)의 부호는 \\(x,\\ y\\)의 부호가 같으면 \\(+\\), 다르면 \\(-\\)이다.</p><figure style=\"margin:14px 0 4px;text-align:center;\"><img src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAANgAAADsCAIAAACZqf8BAABr00lEQVR4nO2deZxcVZn3n7Pcvfaq7urupLMHkhBC2JFdEXVQBAQZdxFHRJ1xe2fRcdRxGcdlVNTRURHXUXF03BiUTQERkkA2CCQs2Xvfar372d4/bnens0GChFS0vp/7OalUVd+6dep3z3nOOc95HqSUgjZtjjb0aF/As0EBAMiZzyAABXjmMzNfxlPv2e8ke96293sktHk68DO/5TChcMw1iAgkSDWllUQ6eEo7AqRSiitJsQEACgABIAAWxbahIwDPCwzDIBQzKQCTSDENaUwJAxGlFDBh6BRAAoij9PVaHwwAoA6sRcElQgoTIkRMKAUAJSXCz9zeUTjWumYFEiOhQAJgBICmLp+A yle \\tan\\theta=\\dfrac{y}{x}=\\dfrac{\\sin\\theta}{\\cos\\theta}\\quad(\\cos\\theta\\ne 0)\\)</div><div class=\"derive-line\">\\(\\displaystyle \\text{점 }\\mathrm P(x,\\ y)\\text{는 단위원 }x^2+y^2=1\\text{ 위의 점이므로}\\)</div><div class=\"derive-line\">\\(\\displaystyle \\cos^2\\theta+\\sin^2\\theta=x^2+y^2=1\\)</div></div><div class=\"formula\"><span class=\"formula-tag\">삼각함수 사이의 관계</span><div class=\"formula-math\">\\[\\tan\\theta=\\dfrac{\\sin\\theta}{\\cos\\theta},\\qquad \\sin^2\\theta+\\cos^2\\theta=1\\]</div></div><div class=\"note\">\\(\\sin^2\\theta\\)는 \\((\\sin\\theta)^2\\)을 뜻한다. 이 관계식을 변형하면 \\(\\sin^2\\theta=1-\\cos^2\\theta,\\ \\cos^2\\theta=1-\\sin^2\\theta\\)와 같이 한 삼각함수의 값에서 다른 삼각함수의 값을 구할 수 있다.</div><div class=\"example\"><span class=\"example-label\">보기</span><ol class=\"example-list\"><li>\\(\\sin\\theta=-\\dfrac{2}{3}\\)이고 \\(\\theta\\)가 제4사분면의 각이면 \\(\\cos^2\\theta=1-\\dfrac{4}{9}=\\dfrac{5}{9}\\)에서 \\(\\cos\\theta=\\dfrac{\\sqrt5}{3}\\ (\\cos\\theta>0)\\)이고, \\(\\tan\\theta=\\dfrac{\\sin\\theta}{\\cos\\theta}=-\\dfrac{2\\sqrt5}{5}\\)이다.</li></ol></div></div>"}]}</script>

eta,\\ \\cos\\theta,\\ \\tan\\theta\\)의 부호가 정해지므로 각 식의 부호를 차근차근 판정한다."}, {"no": 3, "topic": "삼각함수의 정의", "title": "삼각함수 사이의 관계 ─ 식의 변형", "problem_intro": "다음 식을 간단히 하시오.", "problem_parts": ["\\((1-\\sin^2\\theta)(1+\\tan^2\\theta)\\)", "\\(\\dfrac{1+\\cos\\theta}{\\sin\\theta}+\\dfrac{\\sin\\theta}{1+\\cos\\theta}\\)"], "approach": ["\\(\\tan\\theta=\\dfrac{\\sin\\theta}{\\cos\\theta}\\), \\(\\sin^2\\theta+\\cos^2\\theta=1\\)을 이용하여 한 종류의 삼각함수로 정리한다."], "solution": ["⑴ \\(1-\\sin^2\\theta=\\cos^2\\theta\\), \\(\\tan\\theta=\\dfrac{\\sin\\theta}{\\cos\\theta}\\)이므로", "\\(\\displaystyle (1-\\sin^2\\theta)(1+\\tan^2\\theta)=\\cos^2\\theta\\times\\left(1+\\frac{\\sin^2\\theta}{\\cos^2\\theta}\\right)\\)", "\\(\\displaystyle =\\cos^2\\theta+\\sin^2\\theta=1\\)", "⑵ 통분하면", "\\(\\displaystyle \\frac{1+\\cos\\theta}{\\sin\\theta}+\\frac{\\sin\\theta}{1+\\cos\\theta}=\\frac{(1+\\cos\\theta)^2+\\sin^2\\theta}{\\sin\\theta(1+\\cos\\theta)}\\)", "\\(\\displaystyle =\\frac{1+2\\cos\\theta+\\cos^2\\theta+\\sin^2\\theta}{\\sin\\theta(1+\\cos\\theta)}=\\frac{2+2\\cos\\theta}{\\sin\\theta(1+\\cos\\theta)}\\)", "\\(\\displaystyle =\\frac{2(1+\\cos\\theta)}{\\sin\\theta(1+\\cos\\theta)}=\\frac{2}{\\sin\\theta}\\)"], "alt_solution": [], "answer": "⑴ \\(1\\)　⑵ \\(\\dfrac{2}{\\sin\\theta}\\)", "bible": "삼각함수가 섞인 식은 ① \\(\\tan\\)을 \\(\\dfrac{\\sin}{\\cos}\\)으로 바꾸고, ② \\(\\sin^2\\theta+\\cos^2\\theta=1\\)로 차수를 낮추거나 \\(1\\)로 묶는 것이 기본이다. 분수식은 통분 후 \\(\\sin^2\\theta+\\cos^2\\theta=1\\)을 적용한다."}, {"no": 4, "topic": "삼각함수의 정의", "title": "삼각함수 사이의 관계 ─ 값 구하기", "problem_intro": "다음 물음에 답하시오.", "problem_parts": ["\\(\\sin\\theta=\\dfrac{3}{5}\\)이고 \\(\\dfrac{\\pi}{2}<\\theta<\\pi\\)일 때, \\(\\dfrac{1}{\\cos\\theta}+\\tan\\theta\\)의 값을 구하시오.", "\\(\\theta\\)가 제3사분면의 각이고 \\(\\sin\\theta-\\cos\\theta=\\dfrac{1}{3}\\)일 때, \\(\\sin^2\\theta-\\cos^2\\theta\\)의 값을 구하시오."], "approach": ["⑴ \\(\\sin^2\\theta+\\cos^2\\theta=1\\)로 \\(\\cos\\theta\\)를 구하고, 사분면으로 부호를 정한다.", "⑵ \\(\\sin\\theta-\\cos\\theta=k\\)이면 <script>

const isGeo = x => x.topic === '삼각함수의 정의';

function lineEl(text){

  const isEq = t.startsWith('\\(') || t.startsWith('\\[');
  div.className = 'line' + (isEq ? ' eq' : '');
  div.innerHTML = esc(text).replace(/(（[^）]*）|\([^()]*이용[^()]*\))\s*$/u, '<span class="note">$1</span>');
  return div;
}
function blockEl(labelText, labelClass, lines){

  const lab = document.createElement('span'); lab.className = 'label ' + labelClass; lab.textContent = labelText;

  const box = document.createElement('div'); box.className = 'lines';
  lines.forEach(l => box.appendChild(lineEl(l)));
  wrap.appendChild(box);
  return wrap;
}

/* ── 번호 그리드 ── */
const gridNav = document.getElementById('gridNav');
function buildGrid(){
  gridNav.innerHTML = '';
  const data = list();
  [['호도법','호도법','ar'],['삼각함수의 정의','삼각함수의 정의','ge']].forEach(([label,topic,cls])=>{
    const row = document.createElement('div'); row.className = 'gn-row';
    const lab = document.createElement('div'); lab.className = 'gn-label ' + cls; lab.textContent = label;
    const nums = document.createElement('div'); nums.className = 'gn-nums';
    data.forEach((x,i)=>{
      if(x.topic !== topic) return;
      const b = document.createElement('button');
      b.className = 'gn-num ' + cls;
      b.textContent = x.no;
      b.dataset.idx = i;
      b.addEventListener('click', ()=> goTo(i));
      nums.appendChild(b);
    });
    row.appendChild(lab); row.appendChild(nums);
    gridNav.appendChild(row);
  });
  updateGrid();
}
function updateGrid(){
  document.querySelectorAll('.gn-num').forEach(b=>{
    b.classList.toggle('active', Number(b.dataset.idx) === idx[mode]);
  });
}

/* ── 렌더 ── */
const viewer = document.getElementById('viewer');
function render(){
  const data = list();
  const cur = idx[mode];
  const x = data[cur];
  const geo = isGeo(x);
  viewer.innerHTML = '';

  if(mode === 'concept'){
    const card = document.createElement('section');
    card.className = 'card cv ' + (geo ? 'ge geo' : 'ar');
    const head = document.createElement('div'); head.className = 'card-head';
    head.innerHTML =
      `<span class="badge${geo?' geo':''}">개념 <span class="num">${String(x.no).padStart(2,'0')}</span></span>`+
      `<span class="topic-tag${geo?' geo':''}">${x.topic}</span>`+
      `<span class="ex-title${geo?' geo':''}">${x.title}</span>`;
    card.appendChild(head);
    const body = document.createElement('div');
    body.innerHTML = x.html;   // 개념 본문은 완성된 HTML 그대로
    card.appendChild(body);
    viewer.appendChild(card);
  } else {
    const card = document.createElement('section');
    card.className = 'card' + (geo ? ' geo':'');
    const head = document.createElement('div'); head.className = 'card-head';
    head.innerHTML =
      `<span class="badge${geo?' geo':''}">대표 예제 <span class="num">${String(x.no).padStart(2,'0')}</span></span>`+
      `<span class="topic-tag${geo?' geo':''}">${x.topic}</span>`+
      `<span class="ex-title${geo?' geo':''}">${esc(x.title)}</span>`;
    card.appendChild(head);

    const prob = document.createElement('div'); prob.className = 'problem' + (geo?' geo':'');
    prob.appendChild(Object.assign(document.createElement('div'),{className:'intro',innerHTML:esc(x.problem_intro)}));
    if(x.problem_parts && x.problem_parts.length){
      const ol = document.createElement('ol'); ol.className='parts';
      x.problem_parts.forEach(p=>{ const li=document.createElement('li'); li.innerHTML=esc(p); ol.appendChild(li); });
      prob.appendChild(ol);
    }
    card.appendChild(prob);

    const bar = document.createElement('div'); bar.className = 'sol-bar';
    bar.innerHTML =
      `<span class="lbl">풀이·해설</span>`+
      `<label class="switch"><input type="checkbox" id="solSwitch"${showSol?' checked':''}><span class="slider"></span></label>`+
      `<span class="sol-state" id="solState">${showSol?'펼침':'접힘'}</span>`;
    card.appendChild(bar);

    const sol = document.createElement('div'); sol.className = 'solution' + (showSol?' open':'');
    if(x.approach && x.approach.length) sol.appendChild(blockEl('바로 접근','approach',x.approach));
    if(x.solution && x.solution.length) sol.appendChild(blockEl('바른 풀이','solve',x.solution));
    if(x.alt_solution && x.alt_solution.length) sol.appendChild(blockEl('다른 풀이','alt',x.alt_solution));
    const ans = document.createElement('div'); ans.className='answer';
    ans.innerHTML = `<span class="k">정답</span><span>${esc(x.answer)}</span>`;
    sol.appendChild(ans);
    if(x.bible){
      const b = document.createElement('div'); b.className='bible';
      b.innerHTML = `<span class="tag">Bible Says</span><div class="body">${esc(x.bible)}</div>`;
      sol.appendChild(b);
    }
    card.appendChild(sol);
    viewer.appendChild(card);

    const sw = document.getElementById('solSwitch');
    sw.addEventListener('change', ()=>{
      showSol = sw.checked;
      sol.classList.toggle('open', showSol);
      document.getElementById('solState').textContent = showSol ? '펼침' : '접힘';
    });
  }

  updateGrid();
  document.getElementById('counter').textContent = `${cur+1} / ${data.length}`;
  document.getElementById('prevBtn').disabled = cur === 0;
  document.getElementById('nextBtn').disabled = cur === data.length - 1;
  viewer.scrollTop = 0;
  typesetNode(viewer);
}

function goTo(i){
  const data = list();
  idx[mode] = Math.max(0, Math.min(data.length-1, i));
  render();
}
function setMode(m){
  if(m === mode) return;
  mode = m;
  document.querySelectorAll('.mode-tab').forEach(b=> b.classList.toggle('active', b.dataset.mode===m));
  buildGrid();
  render();
}

/* ── MathJax typeset (해당 노드만) ── */
function typesetNode(node){
  if(window.MathJax && window.MathJax.typesetPromise){
    window.MathJax.typesetClear && window.MathJax.typesetClear([node]);
    window.MathJax.typesetPromise([node]).catch(e=>console.error('MathJax:', e));
  } else {
    setTimeout(()=>typesetNode(node), 50);
  }
}

/* ── 컨트롤 ── */
document.getElementById('modeTabs').addEventListener('click', e=>{
  const b = e.target.closest('.mode-tab'); if(b) setMode(b.dataset.mode);
});
document.getElementById('prevBtn').addEventListener('click', ()=> goTo(idx[mode]-1));
document.getElementById('nextBtn').addEventListener('click', ()=> goTo(idx[mode]+1));
document.addEventListener('keydown', ev=>{
  if(ev.key === 'ArrowLeft') goTo(idx[mode]-1);
  else if(ev.key === 'ArrowRight') goTo(idx[mode]+1);
});
let tx=null, ty=null;
viewer.addEventListener('touchstart', e=>{ const t=e.changedTouches[0]; tx=t.clientX; ty=t.clientY; }, {passive:true});
viewer.addEventListener('touchend', e=>{
  if(tx===null) return;
  const t=e.changedTouches[0];
  const dx=t.clientX-tx, dy=t.clientY-ty;
  if(Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)*1.5){
    if(dx < 0) goTo(idx[mode]+1); else goTo(idx[mode]-1);
  }
  tx=ty=null;
}, {passive:true});

buildGrid();
render();
</script>
</body>
</html>
