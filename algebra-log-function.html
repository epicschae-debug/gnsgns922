<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>로그함수의 뜻과 그래프 · 개념 + 예제</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<script>
window.MathJax = {

<style>
  :root{
    --paper:#FAF7F0; --ink:#23262e; --muted:#6f7480;
    --navy:#22356f; --navy2:#33489a; --blue:#2f5fb0; --blue-soft:#eef5fd; --blue-line:#cfe2f7;
    --approach-bg:#e9f1fc; --approach-ink:#1f56a6;
    --solve-bg:#f3e9fb; --solve-ink:#7a3aa0;
    --alt:#9aa0ad;
    --orange:#e08327; --orange-bg:#fff8ef; --orange-line:#f1d8b4;
    --card:#ffffff; --hair:#e7e2d6;
    --geo:#197a6b; --geo-bg:#e6f4f0; --geo-line:#bfe4db;
    /* 개념 본문용 (예제 톤에 맞춤) */
    --arith:#22356f; --arith-tint:#eef5fd; --arith-edge:#cfe2f7;
    --geom:#197a6b; --geom-tint:#e6f4f0; --geom-edge:#bfe4db;
    --amber:#B7791F; --amber-tint:#FBF3E2;
  }
  *{box-sizing:border-box}
  html,body{height:100%;}
  body{
    margin:0; background:var(--paper); color:var(--ink);
    font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',system-ui,sans-serif;
    font-size:16px; line-height:1.7; -webkit-font-smoothing:antialiased; overflow:hidden;
  }
  .app{display:flex; flex-direction:column; height:100dvh; max-width:780px; margin:0 auto; background:var(--paper);}

  /* ── 상단바 ── */
  .topbar{flex:none; padding:11px 16px 10px; border-bottom:1px solid var(--hair); background:var(--paper); position:relative; z-index:5;}
  .top-row{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:9px;}
  .ttl .eyebrow{font-size:.72rem; font-weight:700; color:var(--blue); letter-spacing:.03em;}
  .ttl h1{margin:.05em 0 0; font-size:1.08rem; font-weight:800; letter-spacing:-.02em;}
  /* 모드 탭 */
  .mode-tabs{display:inline-flex; background:#eee9dc; border-radius:11px; padding:3px; gap:2px; flex:none;}
  .mode-tab{
    border:none; background:transparent; color:var(--muted); font-family:inherit;
    font-weight:800; font-size:.86rem; padding:7px 16px; border-radius:9px; cursor:pointer; transition:.12s;
  }
  .mode-tab.active{background:#fff; color:var(--navy); box-shadow:0 1px 3px rgba(0,0,0,.12);}

  .grid-nav{display:flex; flex-direction:column; gap:7px;}
  .gn-row{display:grid; grid-template-columns:54px 1fr; align-items:center; gap:9px;}
  .gn-label{font-size:.7rem; font-weight:800; text-align:center; padding:4px 0; border-radius:7px;}
  .gn-label.ar{background:var(--blue-soft); color:var(--navy);}
  .gn-label.ge{background:var(--geo-bg); color:var(--geo);}
  .gn-nums{display:flex; gap:5px; flex-wrap:wrap;}
  .gn-num{
    width:30px; height:30px; border-radius:50%; border:1.5px solid var(--hair);
    background:#fff; color:var(--ink); font-weight:800; font-size:.8rem;
    font-variant-numeric:tabular-nums; cursor:pointer; display:grid; place-items:center;
    transition:.12s; padding:0; line-height:1;
  }
  .gn-num:hover{border-color:var(--blue);}
  .gn-num.ar.active{background:var(--navy); color:#fff; border-color:var(--navy); box-shadow:0 2px 6px rgba(34,53,111,.3);}
  .gn-num.ge.active{background:var(--geo); color:#fff; border-color:var(--geo); box-shadow:0 2px 6px rgba(25,122,107,.3);}

  /* ── 뷰어 ── */
  .viewer{flex:1 1 auto; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:16px;}
  .card{background:var(--card); border:1px solid var(--hair); border-radius:18px; padding:20px 20px 18px; margin:0;
    box-shadow:0 1px 2px rgba(40,40,60,.04), 0 8px 24px rgba(40,40,60,.04);}
  .card-head{display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:14px;}
  .badge{display:inline-flex; align-items:center; gap:9px;
    background:linear-gradient(135deg,var(--navy),var(--navy2)); color:#fff;
    padding:6px 8px 6px 13px; border-radius:999px; font-weight:800; font-size:.8rem;
    box-shadow:0 3px 8px rgba(34,53,111,.22);}
  .badge.geo{background:linear-gradient(135deg,#15695c,#1f8f7d);}
  .badge .num{background:#fff; color:var(--navy); width:24px; height:24px; border-radius:50%;
    display:grid; place-items:center; font-size:.88rem; font-variant-numeric:tabular-nums;}
  .badge.geo .num{color:#15695c;}
  .topic-tag{font-size:.72rem; font-weight:800; padding:3px 9px; border-radius:6px; background:var(--blue-soft); color:var(--blue);}
  .topic-tag.geo{background:var(--geo-bg); color:var(--geo);}
  .ex-title{font-size:1.04rem; font-weight:800; color:var(--blue); flex:1 1 100%; line-height:1.35;}
  .ex-title.geo{color:var(--geo);}

  /* 예제 문제 */
  .problem{background:var(--blue-soft); border:1px solid var(--blue-line); border-radius:14px; padding:15px 17px;}
  .problem.geo{background:var(--geo-bg); border-color:var(--geo-line);}
  .problem .intro{font-weight:600;}
  ol.parts{margin:.5em 0 0; padding-left:0; list-style:none; counter-reset:p;}
  ol.parts li{counter-increment:p; padding-left:1.9em; position:relative; margin:.4em 0;}
  ol.parts li::before{content:"(" counter(p) ")"; position:absolute; left:0; font-weight:700; color:var(--blue); font-variant-numeric:tabular-nums;}
  .problem.geo ol.parts li::before{color:var(--geo);}

  /* 해설 토글 */
  .sol-bar{display:flex; align-items:center; gap:12px; margin:18px 2px 4px;}
  .sol-bar .lbl{font-weight:800; font-size:.9rem; color:var(--muted);}
  .switch{position:relative; display:inline-block; width:50px; height:28px; flex:none;}
  .switch input{opacity:0; width:0; height:0;}
  .slider{position:absolute; inset:0; cursor:pointer; background:#cfcabb; border-radius:999px; transition:.2s;}
  .slider::before{content:""; position:absolute; height:22px; width:22px; left:3px; top:3px; background:#fff; border-radius:50%; transition:.2s; box-shadow:0 1px 3px rgba(0,0,0,.25);}
  .switch input:checked + .slider{background:var(--navy);}
  .card.geo .switch input:checked + .slider{background:var(--geo);}
  .switch input:checked + .slider::before{transform:translateX(22px);}
  .sol-state{font-size:.82rem; color:var(--muted); font-weight:700;}
  .solution{display:none; margin-top:6px;}
  .solution.open{display:block;}

  .block{margin-top:18px;}
  .label{display:inline-block; font-weight:800; font-size:.8rem; padding:4px 12px; border-radius:8px; margin-bottom:8px;}
  .label.approach{background:var(--approach-bg); color:var(--approach-ink);}
  .label.solve{background:var(--solve-bg); color:var(--solve-ink);}
  .label.alt{background:#fff; color:var(--alt); border:1px solid #e2e0da; font-size:.74rem; padding:3px 10px;}
  .lines{padding-left:4px;}
  .lines .line{margin:.18em 0;}
  .lines .line.eq{padding-left:1.1em; margin:.28em 0;}
  .note{color:var(--muted); font-size:.9em;}
  .answer{display:inline-flex; align-items:center; gap:10px; margin-top:18px; border:1.5px solid var(--navy); border-radius:10px; padding:6px 14px 6px 6px; font-weight:700;}
  .answer .k{background:var(--navy); color:#fff; padding:3px 10px; border-radius:6px; font-size:.8rem;}
  .card.geo .answer{border-color:var(--geo);} .card.geo .answer .k{background:var(--geo);}
  .bible{margin-top:20px; background:var(--orange-bg); border:1px solid var(--orange-line); border-radius:14px; padding:16px 18px; position:relative;}
  .bible .tag{position:absolute; top:-12px; left:16px; background:var(--orange); color:#fff; font-weight:800; font-size:.72rem; padding:3px 11px; border-radius:7px;}
  .bible .body{margin-top:6px; font-size:.93rem; color:#5a4a36;}

  /* ── 개념 본문 (concept-view) ── */
  .cv .concept-card{border-radius:14px; padding:10px 20px; margin-bottom:18px;}
  .cv.ar .concept-card{background:var(--arith-tint); border:1px solid var(--arith-edge);}
  .cv.ge .concept-card{background:var(--geom-tint); border:1px solid var(--geom-edge);}
  .cv .def-row{display:grid; grid-template-columns:130px 1fr; gap:14px; padding:13px 0; align-items:start;}
  .cv .def-row+.def-row{border-top:1px dashed var(--hair);}
  .cv .def-label{font-weight:700; font-size:14px;}
  .cv.ar .def-label{color:var(--arith);}
  .cv.ge .def-label{color:var(--geom);}
  .cv .def-body{font-size:15px;}
  .cv .concept-body{padding-left:2px;}
  .cv .prose{margin:14px 0;}
  .cv .formula{position:relative; margin:20px 0; padding:20px 20px 14px; border-radius:12px; background:var(--card); border:1px solid var(--hair);}
  .cv.ar .formula{border-left:4px solid var(--arith);}
  .cv.ge .formula{border-left:4px solid var(--geom);}
  .cv .formula-tag{position:absolute; top:-11px; left:18px; font-size:11.5px; font-weight:700; padding:3px 11px; border-radius:999px; color:#fff;}
  .cv.ar .formula-tag{background:var(--arith);}
  .cv.ge .formula-tag{background:var(--geom);}
  .cv .formula-math{overflow-x:auto;}
  .cv .note{margin:16px 0; padding:13px 18px; border-radius:10px; background:var(--amber-tint); border-left:3px solid var(--amber); font-size:14px; color:#5a4517;}
  .cv .note b{color:#3d2e0d;}
  .cv .example{margin:18px 0; padding:18px 20px 16px; border-radius:12px; background:var(--card); border:1px dashed var(--hair);}
  .cv .example-label{display:inline-block; font-weight:700; font-size:12.5px; letter-spacing:.08em; padding:3px 12px; border-radius:6px; margin-bottom:8px; color:var(--ink); background:#F0ECE0;}
  .cv .example-list{margin:6px 0 0; padding-left:1.4em;}
  .cv .example-list li{margin:9px 0; font-size:14.5px;}
  .cv .derive{margin:18px 0; padding:18px 20px; border-radius:12px; background:#FAF9F4; border:1px solid var(--hair);}
  .cv .derive-title{font-weight:700; font-size:14px; color:var(--muted); margin-bottom:10px;}
  .cv .derive-line{padding:3px 0; overflow-x:auto;}
  .cv .derive-rule{border:none; border-top:1.5px solid var(--ink); margin:6px 0;}
  .cv .tablewrap{overflow-x:auto; margin:18px 0;}
  .cv table.fin{border-collapse:collapse; width:100%; font-size:14px; background:var(--card);}
  .cv table.fin th, .cv table.fin td{border:1px solid var(--hair); padding:8px 10px; text-align:center;}
  .cv.ar table.fin thead th{background:var(--arith-tint); color:var(--arith); font-weight:700;}
  .cv.ge table.fin thead th{background:var(--geom-tint); color:var(--geom); font-weight:700;}
  .cv table.fin td:first-child, .cv table.fin th:first-child{font-weight:600; background:#FAFAF6;}
  mjx-container{overflow-x:auto; overflow-y:visible; max-width:100%;}
  /* 개념 정의칸 안의 display 수식이 윗줄/카드 경계에 가려지지 않도록 여백 확보 */
  .cv .def-body mjx-container[display="true"]{margin:.45em 0 .25em;}

  /* ── 페이저 ── */
  .pager{flex:none; display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:10px 16px calc(10px + env(safe-area-inset-bottom)); border-top:1px solid var(--hair); background:var(--paper);}
  .pager button{border:1.5px solid var(--navy); background:#fff; color:var(--navy); padding:9px 18px; border-radius:11px;
    font-size:.92rem; font-weight:800; cursor:pointer; font-family:inherit; transition:.12s; flex:1; max-width:160px;}
  .pager button:hover:not(:disabled){background:var(--navy); color:#fff;}
  .pager button:disabled{opacity:.32; cursor:default; border-color:var(--hair); color:var(--muted);}
  .pager .counter{font-weight:800; font-variant-numeric:tabular-nums; color:var(--muted); font-size:.9rem; white-space:nowrap;}

  @media (max-width:430px){
    .gn-num{width:28px; height:28px; font-size:.76rem;}
    .gn-row{grid-template-columns:48px 1fr; gap:7px;}
    .ttl h1{font-size:.98rem;}
    .mode-tab{padding:6px 13px; font-size:.82rem;}
    .viewer{padding:13px;}
    .card{padding:17px 15px 16px;}
    .pager button{padding:9px 10px;}
    .cv .def-row{grid-template-columns:1fr; gap:4px;}
  }

  /* 뒤로가기 */
  .topbar .backbtn{flex:none;width:30px;height:30px;display:grid;place-items:center;border-radius:9px;background:#eee9dc;color:var(--ink);text-decoration:none;font-size:18px;line-height:1;}
  .topbar .backbtn:active{background:#e0dac9;}
  .top-row .ttl{flex:1 1 auto;min-width:0;}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="top-row">
      <a class="backbtn" href="sub-algebra.html" aria-label="뒤로">&#8592;</a>
      <div class="ttl">
        <div class="eyebrow">Ⅰ. 지수함수와 로그함수 · 03단원</div>
        <h1>로그함수의 뜻과 그래프</h1>
      </div>
      <div class="mode-tabs" id="modeTabs">
        <button class="mode-tab active" data-mode="concept">개념</button>
        <button class="mode-tab" data-mode="example">예제</button>
      </div>
    </div>
    <div class="grid-nav" id="gridNav"></div>
  </header>
  <main class="viewer" id="viewer"></main>
  <nav class="pager">
    <button id="prevBtn">◀ 이전</button>
    <span class="counter" id="counter"></span>
    <button id="nextBtn">다음 ▶</button>
  </nav>

top:4px;\">y=aˣ와 y=logₐx는 직선 y=x에 대하여 대칭 (왼쪽 a&gt;1, 오른쪽 0&lt;a&lt;1)</figcaption></figure><div class=\"example\"><span class=\"example-label\">보기</span><ol class=\"example-list\"><li>\\(y=2^{x}\\)의 역함수는 \\(y=\\log_{2}x\\), \\(\\;y=\\left(\\dfrac12\\right)^{x}\\)의 역함수는 \\(y=\\log_{\\frac12}x\\)이다.</li><li>\\(f(x)=\\log_{3}x\\)이면 \\(f(1)=0,\\ f(3)=1,\\ f\\!\\left(\\dfrac13\\right)=-1\\)이다.</li></ol></div></div>"}, {"topic": "로그함수의 그래프", "no": 2, "title": "로그함수 \\(y=\\log_{a}x\\)의 그래프와 성질", "html": "<div class=\"concept-card\"><div class=\"def-row\"><div class=\"def-label\">그래프의 성질</div><div class=\"def-body\">로그함수 \\(y=\\log_{a}x\\ (a&gt;0,\\ a\\neq1)\\)는 다음 성질을 가진다.<br>① 정의역은 \\(\\{x\\,|\\,x&gt;0\\}\\), 치역은 실수 전체이다.<br>② 그래프는 점 \\((1,\\,0)\\)과 \\((a,\\,1)\\)을 지난다.<br>③ \\(a&gt;1\\)이면 증가, \\(0&lt;a&lt;1\\)이면 감소한다.<br>④ \\(y\\)축(직선 \\(x=0\\))을 점근선으로 한다.</div></div></div><div class=\"concept-body\"><p class=\"prose\">\\(y=\\log_{a}x\\)는 \\(y=a^{x}\\)의 역함수이므로, 그래프는 직선 \\(y=x\\)에 대하여 \\(y=a^{x}\\)와 대칭이다. 밑 \\(a\\)의 크기에 따라 증가·감소가 갈린다.</p><div class=\"derive\"><div class=\"derive-title\">밑에 따른 그래프</div><div class=\"derive-line\">\\(a&gt;1\\)일 때 : 오른쪽 위로 <b>증가</b>, 점 \\((1,0)\\)·\\((a,1)\\)을 지난다.</div><div class=\"derive-line\">\\(0&lt;a&lt;1\\)일 때 : 오른쪽 아래로 <b>감소</b>한다.</div></div><div class=\"note\">\\(y=\\log_{a}x\\)와 \\(y=\\log_{\\frac1a}x\\)의 그래프는 \\(x\\)축에 대하여 서로 대칭이다. (\\(\\log_{\\frac1a}x=-\\log_{a}x\\))</div><div class=\"example\"><span class=\"example-label\">보기</span><ol class=\"example-list\"><li>밑이 \\(1\\)보다 클 때, 밑이 클수록 \\(x&gt;1\\)에서 그래프는 \\(x\\)축에 더 가까워진다. 즉 \\(x&gt;1\\)에서 \\(\\log_{2}x&gt;\\log_{3}x&gt;\\log_{4}x\\).</li><li>\\(y=\\log_{a}x^{2}=2\\log_{a}|x|\\)의 정의역은 \\(\\{x\\,|\\,x\\neq0\\}\\)이지만, \\(y=2\\log_{a}x\\)의 정의역은 \\(\\{x\\,|\\,x&gt;0\\}\\)으로 서로 다르다.</li></ol></div></div>"}, {"topic": "로그함수의 그래프", "no": 3, "title": "로그함수의 평행이동과 대칭이동", "html": "<div class=\"concept-card\"><div class=\"def-row\"><div class=\"def-label\">평행·대칭이동</div><div class=\"def-body\">\\(y=\\log_{a}x\\)를<br>① \\(x\\)축으로 \\(m\\), \\(y\\)축으로 \\(n\\)만큼 평행이동 \\(\\Rightarrow\\ y=\\log_{a}(x-m)+n\\)<br>② \\(x\\)축에 대하여 대칭이동 \\(\\Rightarrow\\ y=-\\log_{a}x\\)<br>③ \\(y\\)축에 대하여 대칭이동 \\(\\Rightarrow\\ y=\\log_{a}(-x)\\)<br>④ 원점에 대하여 대칭이동 \\(\\Rightarrow\\ y=-\\log_{a}(-x)\\)</div></div></div><div class=\"concept-body\"><p class=\"prose\">평행이동은 식의 \\(x\\)에 \\(x-m\\)을, \\(y\\)에 \\(y-n\\)을 대입하여 얻는다.</p><div class=\"derive\"><div class=\"derive-title\">평행이동의 유도</div><div class=\"derive-line\">\\(y-n=\\log_{a}(x-m)\\)</div><div class=\"derive-line\">\\(\\iff y=\\log_{a}(x-m)+n\\)</div></div><div class=\"formula\"><span class=\"formula-tag\">평행이동 결과</span><div class=\"formula-math\">\\[y=\\log_{a}(x-m)+n\\]</div></div><p class=\"prose\">이때 점 \\((1,0)\\)은 \\((1+m,\\,n)\\)으로 옮겨지고, 점근선 \\(x=0\\)은 \\(x=m\\)으로, 정의역 \\(\\{x\\,|\\,x&gt;0\\}\\)은 \\(\\{x\\,|\\,x&gt;m\\}\\)으로 바뀐다.</p><figure style=\"margin:14px 0 4px;text-align:center;\"><img src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAbgAAAEQCAMAAAD1W5ECAAABgFBMVEXem5ykY22Vm6decJPjaWlrhafe4+gZIisiNU84idBYWV5gnNyYr8o7U3MpWZNGQT6IYoS/xs/HPT3iQDz+/v7X1taKiIjo5+cBAAFaV1jIx8e4treopqZnZWXbR0aYlpZ4dneRj5AoJCVJRUY5NTb56OgZFhfeVFPhZmVgXV7oiIf0yMj319fleXjG1uq1y+TxuLeQjo7j6/STs9ghHB1xbW3b5fLup6frl5eivd3ZPTyHqtTAvr+Afn7hW1pAPT1iXmBnlMignZ4RDA1QTU5XicKlwN/s8vgybrUxLS6pw+HaQD4jHyCwrq7Qzs51nMwyLjCwr7ChnaG90Oh5oM6BfoA1cbhybnBSTlDQz9BEe7x7otDAvsDdUE7R3ewSDxBLgL7hTUvh397j4d/wrq6WaIaoU1Lg3+BgjsXHWmPeY2PW0czmgH/wsK/20M/58O5CP0BIg8OGNTWEWVmIdpqDpc6PsNeYepi2VWTBV1jHZ2bL3PDaq6vY4OvkOjXgYF+l4kIhAAAXRUlEQVR42u2d52PbONLGk+27d28HCKERCElVS+6yHTvudrx24vS6ve/tXu/97l9/AZKiSEm0ZdmRGWvmg7ooiT8N8AwwA1xDZzXsYYSD9eiO3PWHeY/vxS9n0bXSfoWnnicaoxGsc7hJtGtnB+cr7BzeCm8zz6sMc8qD3YjPXvIIuwhwwgFwZyGnuKKx55S8RT3EW5x2eLXTfS1bzAfH7FO3FDGXXGQP9NI+RUT8akwJgBsamz1pe9H5JEHF2/XO0LSpXHAvu3e44zNk/hvKEBJBxqmY4zFEFKUdT2YAbuiTb7xGx56z49HSejA39Ht9kQMOOV3X4WJeY+YgoRHniMo0N4U2GZkjnwSk74AA7hTjUqnO6RJ4roSxOv1NmuaBY1TW61s0oFv1ep2a58kj0wJiA5Iqc2R8mOJLhPFxIljncInnA7ihj .</li><li>\\(\\dfrac12\\log_{\\frac13}16=\\log_{\\frac13}4,\\ 2\\log_{\\frac13}\\sqrt{10}=\\log_{\\frac13}10\\)이고 밑이 \\(0&lt;\\tfrac13&lt;1\\), \\(4&lt;10\\)이므로 \\(\\dfrac12\\log_{\\frac13}16&gt;2\\log_{\\frac13}\\sqrt{10}\\).</li></ol></div></div>"}, {"topic": "로그함수의 최대·최소", "no": 1, "title": "로그함수의 최대·최소", "html": "<div class=\"concept-card\"><div class=\"def-row\"><div class=\"def-label\">최대·최소</div><div class=\"def-body\">닫힌구간 \\(\\{x\\,|\\,m\\le x\\le n\\}\\)에서 \\(f(x)=\\log_{a}x\\)는<br>① \\(a&gt;1\\)이면 \\(x=m\\)에서 최솟값 \\(f(m)\\), \\(x=n\\)에서 최댓값 \\(f(n)\\)<br>② \\(0&lt;a&lt;1\\)이면 \\(x=m\\)에서 최댓값 \\(f(m)\\), \\(x=n\\)에서 최솟값 \\(f(n)\\)</div></div></div><div class=\"concept-body\"><p class=\"prose\">로그함수는 정해진 구간에서 단조증가 또는 단조감소이므로, 최댓값과 최솟값은 항상 <b>구간의 양 끝</b>에서 나타난다. 따라서 양 끝 \\(x=m,\\ x=n\\)의 함숫값만 비교하면 된다.</p><div class=\"derive\"><div class=\"derive-title\">증감에 따른 양 끝값</div><div class=\"derive-line\">\\(a&gt;1\\) (증가) : 최솟값 \\(f(m)\\), 최댓값 \\(f(n)\\)</div><div class=\"derive-line\">\\(0&lt;a&lt;1\\) (감소) : 최댓값 \\(f(m)\\), 최솟값 \\(f(n)\\)</div></div><div class=\"example\"><span class=\"example-label\">보기</span><ol class=\"example-list\"><li>\\(4\\le x\\le16\\)에서 \\(y=\\log_{4}x\\)는 밑 \\(4&gt;1\\)이므로 최댓값 \\(\\log_{4}16=2\\), 최솟값 \\(\\log_{4}4=1\\).</li><li>\\(\\dfrac15\\le x\\le125\\)에서 \\(y=\\log_{\\frac15}x\\)는 밑이 \\(0&lt;\\tfrac15&lt;1\\)이므로 최댓값 \\(\\log_{\\frac15}\\dfrac15=1\\), 최솟값 \\(\\log_{\\frac15}125=-3\\).</li></ol></div></div>"}, {"topic": "로그함수의 최대·최소", "no": 2, "title": "합성·치환 꼴의 최대·최소", "html": "<div class=\"concept-card\"><div class=\"def-row\"><div class=\"def-label\">합성함수 꼴</div><div class=\"def-body\">\\(y=\\log_{a}f(x)\\) 꼴은 진수 \\(f(x)\\)의 값의 범위를 먼저 구한 뒤, 밑 \\(a\\)에 따른 증감을 이용해 최대·최소를 정한다. (단, 항상 \\(f(x)&gt;0\\))</div></div></div><div class=\"concept-body\"><p class=\"prose\">로그가 여러 번 나오거나 \\((\\log_{a}x)^{2}\\) 꼴이면 \\(\\log_{a}x=t\\)로 <b>치환</b>하여 \\(t\\)에 대한 이차함수로 바꾼다. 이때 \\(x\\)의 범위로부터 \\(t\\)의 범위를 정확히 구해야 한다.</p><div class=\"derive\"><div class=\"derive-title\">치환의 흐름</div><div class=\"derive-line\">\\(\\log_{a}x=t\\)로 놓는다.</div><div class=\"derive-line\">\\(m\\le x\\le n\\Rightarrow t\\)의 범위를 구한다.</div><div class=\"derive-line\">\\(t\\)에 대한 이차함수의 최대·최소를 구한다.</div></div><div class=\"formula\"><span class=\"formula-tag\">산술·기하 평균</span><div class=\"formula-math\">\\[A&gt;0,\\ B&gt;0 \\Rightarrow A+B\\ge 2\\sqrt{AB}\\ \\ (\\text{등호는 } A=B)\\]</div></div><div class=\"note\">두 양수의 합의 최솟값을 구할 때는 산술·기하평균의 관계를 이용하면 편리하다.</div><div class=\"example\"><span class=\"example-label\">보기</span><ol class=\"example-list\"><li>\\(y=(\\log_{2}x)^{2}+4\\log_{2}x-3\\)에서 \\(\\log_{2}x=t\\)로 놓으면 \\(y=t^{2}+4t-3=(t+2)^{2}-7\\).</li><li>\\(x&gt;0\\)에서 \\(3x+\\dfrac3x\\ge2\\sqrt{3x\\cdot\\dfrac3x}=6\\) (등호는 \\(x=1\\)).</li></ol></div></div>"}]}</script>
<script id="examples" type="application/json">{"examples": [{"no": 1, "topic": "로그함수의 그래프", "title": "로그함수의 성질 — 참·거짓 판별", "problem_intro": "함수 \\(f(x)=-\\log_{4}x\\)에 대하여 <보기>에서 옳은 것만을 있는 대로 고르시오.", "problem_parts": ["ㄱ. \\(0<x_{1}<x_{2}\\)이면 \\(f(x_{1})>f(x_{2})\\)이다.", "ㄴ. \\(f(1)+f(3)<2f(2)\\)이다.", "ㄷ. \\(y=\\dfrac14\\log_{2}x^{2}\\)의 그래프는 \\(x>0\\)에서 \\(y=f(x)\\)의 그래프와 \\(x\\)축에 대하여 대칭이다."], "approach": ["\\(f(x)=-\\log_{4}x=\\log_{\\frac14}x\\)이므로 밑이 \\(0<\\tfrac14<1\\)인 감소함수임을 먼저 파악한다.", "ㄴ은 그래프의 볼록성(현과 곡선의 위치)으로, ㄷ은 식을 정리해 정의역과 함께 비교한다."], "solution": ["ㄱ. \\(f(x)=\\log_{\\frac14}x\\)는 밑이 \\(0<\\tfrac14<1\\)이므로 감소함수이다.", "따라서 \\(0<x_{1}<x_{2}\\)이면 \\(f(x_{1})>f(x_{2})\\). (참)", "ㄴ. \\(y=f(x)\\)의 그래프는 아래로 볼록하므로 두 점 \\((1,f(1)),(3,f(3))\\)을 잇는 현의 중점이 곡선보다 위에 있다.", "즉 \\(\\dfrac{f(1)+f(3)}{2}>f(2)\\)이므로 \\(f(1)+f(3)>2f(2)\\). (거짓)", "ㄷ. \\(\\dfrac14\\log_{2}x^{2}=\\dfrac14\\cdot2\\log_{2}|x|=\\dfrac12\\log_{2}|x|=\\log_{4}|x|\\)", "이므로 \\(x>0\\)에서는 \\(y=\\log_{4}x\\)이다. 한편 \\(f(x)=-\\log_{4}x\\)이므로 두 그래프는 \\(x>0\\)에서 \\(x\\)축에 대하여 대칭이다. (참)"], "alt_solution": [], "answer": "ㄱ, ㄷ", "bible": "\\(-\\log_{a}x=\\log_{\\frac1a}x=\\log_{a}\\dfrac1x\\). 밑이 \\(0<a<1\\)이면 로그함수는 감소하고, 그래프는 아래로 볼록하다."}, {"no": 2, "topic": "로그함수의 그래프", "title": "평행이동과 점근선으로 상수 구하기", "problem_intro": "다음 물음에 답하시오.", "problem_parts": ["함수 \\(y=\\log_{3}(x+a)+b\\)의 그래프의 점근선이 직선 \\(x=4\\)이고 \\(f(7)=8\\)일 때, 상수 \\(a,\\ b\\)에 대하여 \\(a+b\\)의 값을 구하시오.", "\\(y=\\log_{2}(8x-24)+3\\)의 그래프는 \\(y=\\log_{2}x\\)의 그래프를 \\(x\\)축으로 \\(a\\), \\(y\\)축으로 \\(b\\)만큼 평행이동한 것이다. \\(a,\\ b\\)의 값을 구하시오."], "approach": ["⑴ 점근선이 \\(x=4\\)이면 \\(x+a=0\\)이 \\(x=4\\)에서 성립하므로 \\(a\\)를 정한다.", "⑵ 식을 \\(\\log_{2}(x-m)+n\\) 꼴로 변형하면 \\(m,\\ n\\)이 곧 평행이동량이다."], "solution": ["⑴ 점근선이 \\(x=4\\)이므로 \\(a=-4\\).", "\\(f(x)=\\log_{3}(x-4)+b\\)에서 \\(f(7)=\\log_{3}3+b=1+b=8\\)이므로 \\(b=7\\).", "\\(\\therefore a+b=(-4)+7=3\\)", "⑵ \\(y=\\log_{2}(8x-24)+3=\\log_{2}8(x-3)+3\\)", "\\(=\\log_{2}8+\\log_{2}(x-3)+3=\\log_{2}(x-3)+6\\)", "따라서 \\(y=\\log_{2}x\\)를 \\(x\\)축으로 \\(3\\), \\(y\\)축으로 \\(6\\)만큼 평행이동한 것이므로 \\(a=3,\\ b=6\\)."], "alt_solution": [], "answer": "⑴ \\(3\\)　⑵ \\(a=3,\\ b=6\\)", "bible": "\\(y=\\log_{a}(px+q)\\)는 \\(\\log_{a}p(x+\\tfrac{q}{p})\\)로 묶어 \\(\\log_{a}p\\)를 분리하면 평행이동 꼴 \\(\\log_{a}(x-m)+n\\)으로 정리된다."}, {"no": 3, "topic": "로그함수의 그래프", "title": "절댓값 기호를 포함한 그래프", "problem_intro": "함수 \\(f(x)=\\log_{3}x\\)에 대하여 다음 그래프를 그리고 점근선을 구하시오.", "problem_parts": ["\\(y=|f(x-2)+1|\\)", "\\(y=f(|x+1|)\\)"], "approach": ["\\(y=|g(x)|\\) : \\(y=g(x)\\)를 그린 뒤 \\(x\\)축 아래 부분만 위로 접어 올린다.", "\\(y=g(|x|)\\) : \\(x\\ge0\\) 부분을 그린 뒤 \\(y\\)축에 대하여 대칭이 되도록 왼쪽에 복사한다."], "solution": ["⑴ 먼저 \\(y=f(x-2)+1=\\log_{3}(x-2)+1\\)은 \\(y=\\log_{3}x\\)를 \\(x\\)축으로 \\(2\\), \\(y\\)축으로 \\(1\\)만큼 평행이동한 것이다. (점근선 \\(x=2\\))", "여기서 \\(y<0\\)인 부분을 \\(x\\)축에 대하여 위로 접어 올리면 \\(y=|f(x-2)+1|\\)의 그래프가 된다. 점근선은 \\(x=2\\).", "⑵ \\(y=f(x+1)=\\log_{3}(x+1)\\)은 \\(y=\\log_{3}x\\)를 \\(x\\)축으로 \\(-1\\)만큼 평행이동한 것이다.", "이 그래프의 \\(x\\ge-1\\)인 부분을 직선 \\(x=-1\\)에 대하여 대칭이 되도록 왼쪽에 복사하면 \\(y=f(|x+1|)\\)의 그래프가 된다. 정의역은 \\(x\\neq-1\\)."], "alt_solution": [], "answer": "⑴ 점근선 \\(x=2\\)　⑵ 직선 \\(x=-1\\)에 대하여 대칭인 그래프", "bible": "그래프 변형 순서는 ‘평행이동 → 절댓값(접기/대칭)’ 순으로 처리한다. \\(y=|f(x)|\\)는 \\(x\\)축 아래를 접고, \\(y=f(|x|)\\)는 \\(y\\)축 기준으로 복사한다."}, {"no": 4, "topic": "로그함수의 그래프", "title": "두 로그곡선이 둘러싼 부분의 넓이", "problem_intro": "두 곡선 \\(y=\\log_{2}x\\), \\(y=2\\log_{4}x-3\\)과 두 직선 \\(x=4\\), \\(x=10\\)으로 둘러싸인 부분의 넓이를 구하시오.", "problem_parts": [], "approach": ["\\(2\\log_{4}x\\)를 밑이 \\(2\\)인 로그로 바꾸어 두 곡선의 관계를 살핀다.", "두 곡선이 평행이동 관계이면 둘러싸인 부분이 평행사변형이 됨을 이용한다."], "solution": ["\\(2\\log_{4}x-3=2\\cdot\\dfrac{\\log_{2}x}{\\log_{2}4}-3=2\\cdot\\dfrac{\\log_{2}x}{2}-3=\\log_{2}x-3\\)", "즉 \\(y=2\\log_{4}x-3\\)은 \\(y=\\log_{2}x\\)를 \\(y\\)축으로 \\(-3\\)만큼 평행이동한 곡선이다.", "두 곡선은 \\(y\\)축 방향으로 \\(3\\)만큼 떨어진 합동인 곡선이므로, 두 직선 \\(x=4,\\ x=10\\) 사이의 부분은 평행사변형이다.", "밑변(가로) \\(=10-4=6\\), 높이(세로 거리) \\(=3\\)", "\\(\\therefore\\) 넓이 \\(=6\\times3=18\\)"], "alt_solution": [], "answer": "\\(18\\)", "bible": "\\(y=f(x)\\)와 \\(y=f(x)+k\\)처럼 평행이동 관계인 두 곡선과 두 수직선으로 둘러싸인 부분은 평행사변형이며, 넓이는 (가로)\\(\\times|k|\\)이다."}, {"no": 5, "topic": "로그함수의 그래프", "title": "로그함수의 역함수", "problem_intro": "함수 \\(y=\\log_{5}(x+a)-2\\)의 역함수가 \\(y=5^{x+b}-7\\)일 때, 상수 \\(a,\\ b\\)의 값을 구하시오.", "problem_parts": [], "approach": ["\\(y=\\log_{5}(x+a)-2\\)를 \\(x\\)에 대하여 풀고 \\(x,\\ y\\)를 바꾸어 역함수를 구한다.", "구한 역함수를 \\(y=5^{x+b}-7\\)과 계수 비교한다."], "solution": ["\\(y=\\log_{5}(x+a)-2\\)에서 \\(\\log_{5}(x+a)=y+2\\)", "\\(x+a=5^{\\,y+2}\\)이므로 \\(x=5^{\\,y+2}-a\\)", "\\(x\\)와 \\(y\\)를 서로 바꾸면 역함수는 \\(y=5^{\\,x+2}-a\\)", "이것이 \\(y=5^{x+b}-7\\)과 같으므로 \\(b=2,\\ -a=-7\\)", "\\(\\therefore a=7,\\ b=2\\)"], "alt_solution": [], "answer": "\\(a=7,\\ b=2\\)", "bible": "\\(f(x)=\\log_{a}(x-p)+q\\)와 그 역함수 \\(f^{-1}(x)=a^{\\,x-q}+p\\)의 그래프는 직선 \\(y=x\\)에 대하여 대칭이다."}, {"no": 6, "topic": "로그함수의 그래프", "title": "로그의 대소 비교", "problem_intro": "다음 세 수의 대소를 비교하시오.", "problem_parts": ["\\(\\log_{3}2,\\quad \\log_{\\frac13}\\dfrac25,\\quad \\log_{\\sqrt3}\\sqrt5\\)", "\\(\\log_{\\frac1{25}}15,\\quad \\log_{\\frac15}\\sqrt{11},\\quad \\log_{\\frac15}\\dfrac13\\)"], "approach": ["밑을 통일한 뒤 진수의 크기와 밑의 범위(증가·감소)로 대소를 정한다."], "solution": ["⑴ \\(\\log_{\\frac13}\\dfrac25=\\log_{3}\\dfrac52,\\quad \\log_{\\sqrt3}\\sqrt5=\\log_{3}5\\)", "밑이 \\(3>1\\)이고 \\(2<\\dfrac52<5\\)이므로", "\\(\\log_{3}2<\\log_{3}\\dfrac52<\\log_{3}5\\)", "\\(\\therefore \\log_{3}2<\\log_{\\frac13}\\dfrac25<\\log_{\\sqrt3}\\sqrt5\\)", "⑵ \\(\\log_{\\frac1{25}}15=\\dfrac12\\log_{\\frac15}15=\\log_{\\frac15}\\sqrt{15}\\)", "밑이 \\(0<\\dfrac15<1\\)이고 \\(\\dfrac13<\\sqrt{11}<\\sqrt{15}\\)이므로 (감소)", "\\(\\log_{\\frac15}\\sqrt{15}<\\log_{\\frac15}\\sqrt{11}<\\log_{\\frac15}\\dfrac13\\)", "\\(\\therefore \\log_{\\frac1{25}}15<\\log_{\\frac15}\\sqrt{11}<\\log_{\\frac15}\\dfrac13\\)"], "alt_solution": [], "answer": "⑴ \\(\\log_{3}2<\\log_{\\frac13}\\dfrac25<\\log_{\\sqrt3}\\sqrt5\\)　⑵ \\(\\log_{\\frac1{25}}15<\\log_{\\frac15}\\sqrt{11}<\\log_{\\frac15}\\dfrac13\\)", "bible": "\\(k\\log_{a}M=\\log_{a}M^{k}\\), \\(\\log_{a^{k}}M=\\dfrac1k\\log_{a}M\\)로 밑과 진수를 정리한 뒤, 밑이 \\(1\\)보다 큰지 작은지에 따라 대소를 판정한다."}, {"no": 1, "topic": "로그함수의 최대·최소", "title": "로그함수의 최대·최소", "problem_intro": "다음 함수의 최댓값과 최솟값을 구하시오.", "problem_parts": ["\\(y=\\log_{2}(x+4)-3\\quad(-2\\le x\\le4)\\)", "\\(y=\\log_{\\frac13}(6x-15)\\quad(4\\le x\\le7)\\)"], "approach": ["밑이 \\(1\\)보다 크면 증가, 작으면 감소하므로 구간의 양 끝에서 최대·최소가 나온다.", "진수가 일차식이면 \\(x\\)의 양 끝값을 바로 대입한다."], "solution": ["⑴ 밑이 \\(2>1\\)이므로 증가함수이다.", "\\(x=4\\)일 때 최댓값 \\(\\log_{2}8-3=3-3=0\\)", "\\(x=-2\\)일 때 최솟값 \\(\\log_{2}2-3=1-3=-2\\)", "⑵ 밑이 \\(0<\\dfrac13<1\\)이므로 감소함수이다.", "\\(x=4\\)일 때 최댓값 \\(\\log_{\\frac13}9=-2\\)", "\\(x=7\\)일 때 최솟값 \\(\\log_{\\frac13}27=-3\\)"], "alt_solution": [], "answer": "⑴ 최댓값 \\(0\\), 최솟값 \\(-2\\)　⑵ 최댓값 \\(-2\\), 최솟값 \\(-3\\)", "bible": "닫힌구간에서 단조함수의 최대·최소는 항상 구간의 양 끝점에서 생긴다. 진수가 일차식이면 양 끝 \\(x\\)값을 바로 대입하면 된다."}, {"no": 2, "topic": "로그함수의 최대·최소", "title": "진수가 이차식인 합성함수의 최대", "problem_intro": "다음 물음에 답하시오.", "problem_parts": ["\\(y=\\log_{2}(-x^{2}+6x-8)\\)의 최댓값을 구하시오.", "\\(\\{x\\,|\\,1\\le x\\le6\\}\\)에서 \\(y=\\log_{3}(-x^{2}+6x+3)\\)의 최댓값이 \\(1+\\log_{3}k\\)일 때, \\(3^{k}\\)의 값을 구하시오."], "approach": ["진수 \\(f(x)\\)의 최대·최소(꼭짓점·구간 끝)를 먼저 구한 뒤 밑의 증감을 적용한다.", "⑴은 진수가 양수인 \\(x\\)의 범위에서, ⑵는 주어진 구간에서 \\(f(x)\\)의 범위를 구한다."], "solution": ["⑴ 진수 조건 \\(-x^{2}+6x-8>0\\Rightarrow x^{2}-6x+8<0\\Rightarrow(x-2)(x-4)<0\\Rightarrow 2<x<4\\)", "\\(f(x)=-x^{2}+6x-8=-(x-3)^{2}+1\\)은 \\(x=3\\)에서 최댓값 \\(1\\).", "밑이 \\(2>1\\)이므로 \\(x=3\\)에서 \\(y\\)의 최댓값 \\(\\log_{2}1=0\\).", "⑵ \\(f(x)=-x^{2}+6x+3=-(x-3)^{2}+12\\)에서 \\(1\\le x\\le6\\)이면", "\\(f(1)=8,\\ f(3)=12,\\ f(6)=3\\)이므로 \\(3\\le f(x)\\le12\\).", "밑이 \\(3>1\\)이므로 \\(x=3\\)에서 최댓값 \\(\\log_{3}12=\\log_{3}(4\\times3)=1+\\log_{3}4\\).", "따라서 \\(k=4\\)이므로 \\(3^{k}=3^{4}=81\\). (한편 \\(3^{\\log_{3}4}=4\\))"], "alt_solution": [], "answer": "⑴ \\(0\\)　⑵ \\(81\\) (단, \\(k=4\\))", "bible": "\\(y=\\log_{a}f(x)\\)는 ‘진수 \\(f(x)\\)의 범위 → 밑의 증감’ 순으로 최대·최소를 정한다. 진수는 항상 \\(f(x)>0\\)이어야 한다."}, {"no": 3, "topic": "로그함수의 최대·최소", "title": "\\(\\log_{a}x=t\\) 치환에 의한 최대·최소", "problem_intro": "다음 함수의 최댓값과 최솟값을 구하시오.", "problem_parts": ["\\(y=(\\log_{2}x)^{2}+\\log_{2}x^{4}-3\\quad\\left(\\dfrac18\\le x\\le8\\right)\\)", "\\(y=\\log_{\\frac12}4x\\times\\log_{\\frac12}\\dfrac{x}{16}\\quad\\left(\\dfrac12\\le x\\le16\\right)\\)"], "approach": ["\\(\\log_{a}x=t\\)로 치환하여 \\(t\\)에 대한 이차함수로 바꾼다.", "\\(x\\)의 범위로부터 \\(t\\)의 범위를 정확히 구한 뒤 이차함수의 최대·최소를 구한다."], "solution": ["⑴ \\(y=(\\log_{2}x)^{2}+4\\log_{2}x-3\\). \\(\\log_{2}x=t\\)로 놓으면 \\(y=t^{2}+4t-3=(t+2)^{2}-7\\).", "\\(\\dfrac18\\le x\\le8\\Rightarrow -3\\le t\\le3\\)", "\\(t=3\\)일 때 최댓값 \\((3+2)^{2}-7=18\\), \\(t=-2\\)일 때 최솟값 \\(-7\\).", "⑵ \\(\\log_{\\frac12}4x=\\log_{\\frac12}x-2,\\ \\log_{\\frac12}\\dfrac{x}{16}=\\log_{\\frac12}x+4\\)", "\\(\\log_{\\frac12}x=t\\)로 놓으면 \\(y=(t-2)(t+4)=t^{2}+2t-8=(t+1)^{2}-9\\).", "\\(\\dfrac12\\le x\\le16\\Rightarrow -4\\le t\\le1\\)", "\\(t=-4\\)일 때 최댓값 \\((-4+1)^{2}-9=0\\), \\(t=-1\\)일 때 최솟값 \\(-9\\)."], "alt_solution": [], "answer": "⑴ 최댓값 \\(18\\), 최솟값 \\(-7\\)　⑵ 최댓값 \\(0\\), 최솟값 \\(-9\\)", "bible": "치환 후에는 반드시 \\(t\\)의 범위를 다시 구해야 한다. 이차함수의 최대·최소는 꼭짓점이 범위 안에 있는지로 판단한다."}, {"no": 4, "topic": "로그함수의 최대·최소", "title": "산술·기하평균을 이용한 최소", "problem_intro": "다음 함수의 최솟값을 구하시오.", "problem_parts": ["\\(x>0\\)에서 \\(y=\\log_{2}(x+3)+\\log_{2}\\left(\\dfrac1x+3\\right)\\)", "\\(x>1\\)에서 \\(y=\\log_{5}25x+\\log_{x}625\\)"], "approach": ["로그의 합을 하나의 로그(곱)로 모으거나 같은 꼴로 정리한다.", "두 양수의 합이 나오면 산술·기하평균의 관계 \\(A+B\\ge2\\sqrt{AB}\\)를 이용한다."], "solution": ["⑴ \\(y=\\log_{2}(x+3)\\left(\\dfrac1x+3\\right)=\\log_{2}\\left(3x+\\dfrac3x+10\\right)\\)", "\\(x>0\\)에서 \\(3x+\\dfrac3x\\ge2\\sqrt{3x\\cdot\\dfrac3x}=6\\) (등호는 \\(3x=\\dfrac3x\\), 즉 \\(x=1\\))", "진수 \\(\\ge16\\)이고 밑이 \\(2>1\\)이므로 \\(y\\ge\\log_{2}16=4\\). 최솟값 \\(4\\).", "⑵ \\(y=(\\log_{5}5^{2}+\\log_{5}x)+\\log_{x}5^{4}=\\log_{5}x+\\dfrac{4}{\\log_{5}x}+2\\)", "\\(x>1\\)이면 \\(\\log_{5}x>0\\)이므로 \\(\\log_{5}x+\\dfrac{4}{\\log_{5}x}\\ge2\\sqrt{4}=4\\) (등호는 \\(\\log_{5}x=2\\), 즉 \\(x=25\\))", "\\(\\therefore y\\ge4+2=6\\). 최솟값 \\(6\\)."], "alt_solution": [], "answer": "⑴ \\(4\\)　⑵ \\(6\\)", "bible": "\\(A>0,\\ B>0\\)이면 \\(A+B\\ge2\\sqrt{AB}\\) (등호는 \\(A=B\\)). 밑변환 \\(\\log_{x}625=\\dfrac{4}{\\log_{5}x}\\)처럼 같은 변수로 통일하면 적용하기 쉽다."}]}</script>
<script>
const CONCEPTS = JSON.parse(document.getElementById('concepts').textContent).concepts;
const EXAMPLES = JSON.parse(document.getElementById('examples').textContent).examples;
const isGeo = x => x.topic === '로그함수의 최대·최소';
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

let mode = 'concept';          // 'concept' | 'example'
let idx = { concept:0, example:0 };  // 모드별 현재 위치 기억
let showSol = false;           // 예제 해설 펼침 여부

function list(){ return mode === 'concept' ? CONCEPTS : EXAMPLES; }

/* ── 라인/블록 (예제 해설용) ── */
function lineEl(text){
  const t = text.trim();
  const div = document.createElement('div');
  const isEq = t.startsWith('\\(') || t.startsWith('\\[');
  div.className = 'line' + (isEq ? ' eq' : '');
  div.innerHTML = esc(text).replace(/(（[^）]*）|\([^()]*이용[^()]*\))\s*$/u, '<span class="note">$1</span>');
  return div;
}
function blockEl(labelText, labelClass, lines){
  const wrap = document.createElement('div'); wrap.className = 'block';
  const lab = document.createElement('span'); lab.className = 'label ' + labelClass; lab.textContent = labelText;
  wrap.appendChild(lab);
  const box = document.createElement('div'); box.className = 'lines';
  lines.forEach(l => box.appendChild(lineEl(l)));
  wrap.appendChild(box);
  return wrap;
}

/* ── 번호 그리드 ── */
const gridNav = document.getElementById('gridNav');
function buildGrid(){
  gridNav.innerHTML = '';
  const data = list();
  [['그래프·성질','로그함수의 그래프','ar'],['최대·최소','로그함수의 최대·최소','ge']].forEach(([label,topic,cls])=>{
    const row = document.createElement('div'); row.className = 'gn-row';
    const lab = document.createElement('div'); lab.className = 'gn-label ' + cls; lab.textContent = label;
    const nums = document.createElement('div'); nums.className = 'gn-nums';
    data.forEach((x,i)=>{
      if(x.topic !== topic) return;
      const b = document.createElement('button');
      b.className = 'gn-num ' + cls;
      b.textContent = x.no;
      b.dataset.idx = i;
      b.addEventListener('click', ()=> goTo(i));
      nums.appendChild(b);
    });
    row.appendChild(lab); row.appendChild(nums);
    gridNav.appendChild(row);
  });
  updateGrid();
}
function updateGrid(){
  document.querySelectorAll('.gn-num').forEach(b=>{
    b.classList.toggle('active', Number(b.dataset.idx) === idx[mode]);
  });
}

/* ── 렌더 ── */
const viewer = document.getElementById('viewer');
function render(){
  const data = list();
  const cur = idx[mode];
  const x = data[cur];
  const geo = isGeo(x);
  viewer.innerHTML = '';

  if(mode === 'concept'){
    const card = document.createElement('section');
    card.className = 'card cv ' + (geo ? 'ge geo' : 'ar');
    const head = document.createElement('div'); head.className = 'card-head';
    head.innerHTML =
      `<span class="badge${geo?' geo':''}">개념 <span class="num">${String(x.no).padStart(2,'0')}</span></span>`+
      `<span class="topic-tag${geo?' geo':''}">${x.topic}</span>`+
      `<span class="ex-title${geo?' geo':''}">${x.title}</span>`;
    card.appendChild(head);
    const body = document.createElement('div');
    body.innerHTML = x.html;   // 개념 본문은 완성된 HTML 그대로
    card.appendChild(body);
    viewer.appendChild(card);
  } else {
    const card = document.createElement('section');
    card.className = 'card' + (geo ? ' geo':'');
    const head = document.createElement('div'); head.className = 'card-head';
    head.innerHTML =
      `<span class="badge${geo?' geo':''}">대표 예제 <span class="num">${String(x.no).padStart(2,'0')}</span></span>`+
      `<span class="topic-tag${geo?' geo':''}">${x.topic}</span>`+
      `<span class="ex-title${geo?' geo':''}">${esc(x.title)}</span>`;
    card.appendChild(head);

    const prob = document.createElement('div'); prob.className = 'problem' + (geo?' geo':'');
    prob.appendChild(Object.assign(document.createElement('div'),{className:'intro',innerHTML:esc(x.problem_intro)}));
    if(x.problem_parts && x.problem_parts.length){
      const ol = document.createElement('ol'); ol.className='parts';
      x.problem_parts.forEach(p=>{ const li=document.createElement('li'); li.innerHTML=esc(p); ol.appendChild(li); });
      prob.appendChild(ol);
    }
    card.appendChild(prob);

    const bar = document.createElement('div'); bar.className = 'sol-bar';
    bar.innerHTML =
      `<span class="lbl">풀이·해설</span>`+
      `<label class="switch"><input type="checkbox" id="solSwitch"${showSol?' checked':''}><span class="slider"></span></label>`+
      `<span class="sol-state" id="solState">${showSol?'펼침':'접힘'}</span>`;
    card.appendChild(bar);

    const sol = document.createElement('div'); sol.className = 'solution' + (showSol?' open':'');
    if(x.approach && x.approach.length) sol.appendChild(blockEl('바로 접근','approach',x.approach));
    if(x.solution && x.solution.length) sol.appendChild(blockEl('바른 풀이','solve',x.solution));
    if(x.alt_solution && x.alt_solution.length) sol.appendChild(blockEl('다른 풀이','alt',x.alt_solution));
    const ans = document.createElement('div'); ans.className='answer';
    ans.innerHTML = `<span class="k">정답</span><span>${esc(x.answer)}</span>`;
    sol.appendChild(ans);
    if(x.bible){
      const b = document.createElement('div'); b.className='bible';
      b.innerHTML = `<span class="tag">Bible Says</span><div class="body">${esc(x.bible).replace(/\n/g,'<br>')}</div>`;
      sol.appendChild(b);
    }
    card.appendChild(sol);
    viewer.appendChild(card);

    const sw = document.getElementById('solSwitch');
    sw.addEventListener('change', ()=>{
      showSol = sw.checked;
      sol.classList.toggle('open', showSol);
      document.getElementById('solState').textContent = showSol ? '펼침' : '접힘';
      if(showSol) requestAnimationFrame(()=>fitMath(sol));
    });
  }

  updateGrid();
  document.getElementById('counter').textContent = `${cur+1} / ${data.length}`;
  document.getElementById('prevBtn').disabled = cur === 0;
  document.getElementById('nextBtn').disabled = cur === data.length - 1;
  viewer.scrollTop = 0;
  typesetNode(viewer);
}

function goTo(i){
  const data = list();
  idx[mode] = Math.max(0, Math.min(data.length-1, i));
  render();
}
function setMode(m){
  if(m === mode) return;
  mode = m;
  document.querySelectorAll('.mode-tab').forEach(b=> b.classList.toggle('active', b.dataset.mode===m));
  buildGrid();
  render();
}

/* ── 긴 수식 자동 축소(드래그 제거) ── */
function fitMath(scope){
  const root = scope || viewer;
  const conts = root.querySelectorAll('mjx-container');
  // 1) 이전 축소 초기화
  conts.forEach(c=>{ c.style.fontSize = ''; });
  // 2) 넘치는 것만 줄여서 박스 안에 맞춤
  conts.forEach(c=>{
    const parent = c.parentElement;
    if(!parent) return;
    const cs = getComputedStyle(parent);
    const padL = parseFloat(cs.paddingLeft) || 0;
    const padR = parseFloat(cs.paddingRight) || 0;
    const avail = parent.clientWidth - padL - padR - 4;   // content-box - 여유
    if(avail <= 1) return;                 // 접혀있거나 레이아웃 전 → 건너뜀
    const w = c.getBoundingClientRect().width;
    if(w > avail){
      let s = avail / w;
      if(s < 0.5) s = 0.5;                  // 너무 작아지지 않도록 하한
      const base = parseFloat(getComputedStyle(c).fontSize) || 16;
      c.style.fontSize = (base * s) + 'px';
    }
  });
}

/* ── MathJax typeset (해당 노드만) ── */
function typesetNode(node){
  if(window.MathJax && window.MathJax.typesetPromise){
    window.MathJax.typesetClear && window.MathJax.typesetClear([node]);
    window.MathJax.typesetPromise([node])
      .then(()=>{ requestAnimationFrame(()=>fitMath(node)); })
      .catch(e=>console.error('MathJax:', e));
  } else {
    setTimeout(()=>typesetNode(node), 50);
  }
}

/* ── 컨트롤 ── */
document.getElementById('modeTabs').addEventListener('click', e=>{
  const b = e.target.closest('.mode-tab'); if(b) setMode(b.dataset.mode);
});
document.getElementById('prevBtn').addEventListener('click', ()=> goTo(idx[mode]-1));
document.getElementById('nextBtn').addEventListener('click', ()=> goTo(idx[mode]+1));
document.addEventListener('keydown', ev=>{
  if(ev.key === 'ArrowLeft') goTo(idx[mode]-1);
  else if(ev.key === 'ArrowRight') goTo(idx[mode]+1);
});
let tx=null, ty=null;
viewer.addEventListener('touchstart', e=>{ const t=e.changedTouches[0]; tx=t.clientX; ty=t.clientY; }, {passive:true});
viewer.addEventListener('touchend', e=>{
  if(tx===null) return;
  const t=e.changedTouches[0];
  const dx=t.clientX-tx, dy=t.clientY-ty;
  if(Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)*1.5){
    if(dx < 0) goTo(idx[mode]+1); else goTo(idx[mode]-1);
  }
  tx=ty=null;
}, {passive:true});

let _rz=null;
window.addEventListener('resize', ()=>{
  clearTimeout(_rz);
  _rz=setTimeout(()=>fitMath(viewer), 150);
});

buildGrid();
render();
</script>
</body>
</html>
