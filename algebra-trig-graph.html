<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>삼각함수의 그래프 · 개념 + 예제</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<script>
window.MathJax = {
  tex: { inlineMath: [['\\(', '\\)']], displayMath: [['$$','$$'],['\\[','\\]']] },
  svg: { fontCache: 'global' },
  startup: { typeset: false }
};
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.min.js" id="MathJax-script" async></script>
<style>
  :root{
    --paper:#FAF7F0; --ink:#23262e; --muted:#6f7480;
    --navy:#22356f; --navy2:#33489a; --blue:#2f5fb0; --blue-soft:#eef5fd; --blue-line:#cfe2f7;
    --approach-bg:#e9f1fc; --approach-ink:#1f56a6;
    --solve-bg:#f3e9fb; --solve-ink:#7a3aa0;
    --alt:#9aa0ad;
    --orange:#e08327; --orange-bg:#fff8ef; --orange-line:#f1d8b4;
    --card:#ffffff; --hair:#e7e2d6;
    --geo:#197a6b; --geo-bg:#e6f4f0; --geo-line:#bfe4db;
    /* 개념 본문용 (예제 톤에 맞춤) */
    --arith:#22356f; --arith-tint:#eef5fd; --arith-edge:#cfe2f7;
    --geom:#197a6b; --geom-tint:#e6f4f0; --geom-edge:#bfe4db;
    --amber:#B7791F; --amber-tint:#FBF3E2;
  }
  *{box-sizing:border-box}
  html,body{height:100%;}
  body{
    margin:0; background:var(--paper); color:var(--ink);
    font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',system-ui,sans-serif;
    font-size:16px; line-height:1.7; -webkit-font-smoothing:antialiased; overflow:hidden;
  }
  .app{display:flex; flex-direction:column; height:100dvh; max-width:780px; margin:0 auto; background:var(--paper);}

  /* ── 상단바 ── */
  .topbar{flex:none; padding:11px 16px 10px; border-bottom:1px solid var(--hair); background:var(--paper); position:relative; z-index:5;}
  .top-row{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:9px;}
  .ttl .eyebrow{font-size:.72rem; font-weight:700; color:var(--blue); letter-spacing:.03em;}
  .ttl h1{margin:.05em 0 0; font-size:1.08rem; font-weight:800; letter-spacing:-.02em;}
  /* 모드 탭 */
  .mode-tabs{display:inline-flex; background:#eee9dc; border-radius:11px; padding:3px; gap:2px; flex:none;}
  .mode-tab{
    border:none; background:transparent; color:var(--muted); font-family:inherit;
    font-weight:800; font-size:.86rem; padding:7px 16px; border-radius:9px; cursor:pointer; transition:.12s;
  }
  .mode-tab.active{background:#fff; color:var(--navy); box-shadow:0 1px 3px rgba(0,0,0,.12);}

  .grid-nav{display:flex; flex-direction:column; gap:7px;}
  .gn-row{display:grid; grid-template-columns:54px 1fr; align-items:center; gap:9px;}
  .gn-label{font-size:.7rem; font-weight:800; text-align:center; padding:4px 0; border-radius:7px;}
  .gn-label.ar{background:var(--blue-soft); color:var(--navy);}
  .gn-label.ge{background:var(--geo-bg); color:var(--geo);}
  .gn-nums{display:flex; gap:5px; flex-wrap:wrap;}
  .gn-num{
    width:30px; height:30px; border-radius:50%; border:1.5px solid var(--hair);
    background:#fff; color:var(--ink); font-weight:800; font-size:.8rem;
    font-variant-numeric:tabular-nums; cursor:pointer; display:grid; place-items:center;
    transition:.12s; padding:0; line-height:1;
  }
  .gn-num:hover{border-color:var(--blue);}
  .gn-num.ar.active{background:var(--navy); color:#fff; border-color:var(--navy); box-shadow:0 2px 6px rgba(34,53,111,.3);}
  .gn-num.ge.active{background:var(--geo); color:#fff; border-color:var(--geo); box-shadow:0 2px 6px rgba(25,122,107,.3);}

  /* ── 뷰어 ── */
  .viewer{flex:1 1 auto; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:16px;}
  .card{background:var(--card); border:1px solid var(--hair); border-radius:18px; padding:20px 20px 18px; margin:0;
    box-shadow:0 1px 2px rgba(40,40,60,.04), 0 8px 24px rgba(40,40,60,.04);}
  .card-head{display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:14px;}
  .badge{display:inline-flex; align-items:center; gap:9px;
    background:linear-gradient(135deg,var(--navy),var(--navy2)); color:#fff;
    padding:6px 8px 6px 13px; border-radius:999px; font-weight:800; font-size:.8rem;
    box-shadow:0 3px 8px rgba(34,53,111,.22);}
  .badge.geo{background:linear-gradient(135deg,#15695c,#1f8f7d);}
  .badge .num{background:#fff; color:var(--navy); width:24px; height:24px; border-radius:50%;
    display:grid; place-items:center; font-size:.88rem; font-variant-numeric:tabular-nums;}
  .badge.geo .num{color:#15695c;}
  .topic-tag{font-size:.72rem; font-weight:800; padding:3px 9px; border-radius:6px; background:var(--blue-soft); color:var(--blue);}
  .topic-tag.geo{background:var(--geo-bg); color:var(--geo);}
  .ex-title{font-size:1.04rem; font-weight:800; color:var(--blue); flex:1 1 100%; line-height:1.35;}
  .ex-title.geo{color:var(--geo);}

  /* 예제 문제 */
  .problem{background:var(--blue-soft); border:1px solid var(--blue-line); border-radius:14px; padding:15px 17px;}
  .problem.geo{background:var(--geo-bg); border-color:var(--geo-line);}
  .problem .intro{font-weight:600;}
  ol.parts{margin:.5em 0 0; padding-left:0; list-style:none; counter-reset:p;}
  ol.parts li{counter-increment:p; padding-left:1.9em; position:relative; margin:.4em 0;}
  ol.parts li::before{content:"(" counter(p) ")"; position:absolute; left:0; font-weight:700; color:var(--blue); font-variant-numeric:tabular-nums;}
  .problem.geo ol.parts li::before{color:var(--geo);}

  /* 해설 토글 */
  .sol-bar{display:flex; align-items:center; gap:12px; margin:18px 2px 4px;}
  .sol-bar .lbl{font-weight:800; font-size:.9rem; color:var(--muted);}
  .switch{position:relative; display:inline-block; width:50px; height:28px; flex:none;}
  .switch input{opacity:0; width:0; height:0;}
  .slider{position:absolute; inset:0; cursor:pointer; background:#cfcabb; border-radius:999px; transition:.2s;}
  .slider::before{content:""; position:absolute; height:22px; width:22px; left:3px; top:3px; background:#fff; border-radius:50%; transition:.2s; box-shadow:0 1px 3px rgba(0,0,0,.25);}
  .switch input:checked + .slider{background:var(--navy);}
  .card.geo .switch input:checked + .slider{background:var(--geo);}
  .switch input:checked + .slider::before{transform:translateX(22px);}
  .sol-state{font-size:.82rem; color:var(--muted); font-weight:700;}
  .solution{display:none; margin-top:6px;}
  .solution.open{display:block;}

  .block{margin-top:18px;}
  .label{display:inline-block; font-weight:800; font-size:.8rem; padding:4px 12px; border-radius:8px; margin-bottom:8px;}
  .label.approach{background:var(--approach-bg); color:var(--approach-ink);}
  .label.solve{background:var(--solve-bg); color:var(--solve-ink);}
  .label.alt{background:#fff; color:var(--alt); border:1px solid #e2e0da; font-size:.74rem; padding:3px 10px;}
  .lines{padding-left:4px;}
  .lines .line{margin:.18em 0;}
  .lines .line.eq{padding-left:1.1em; margin:.28em 0;}
  .note{color:var(--muted); font-size:.9em;}
  .answer{display:inline-flex; align-items:center; gap:10px; margin-top:18px; border:1.5px solid var(--navy); border-radius:10px; padding:6px 14px 6px 6px; font-weight:700;}
  .answer .k{background:var(--navy); color:#fff; padding:3px 10px; border-radius:6px; font-size:.8rem;}
  .card.geo .answer{border-color:var(--geo);} .card.geo .answer .k{background:var(--geo);}
  .bible{margin-top:20px; background:var(--orange-bg); border:1px solid var(--orange-line); border-radius:14px; padding:16px 18px; position:relative;}
  .bible .tag{position:absolute; top:-12px; left:16px; background:var(--orange); color:#fff; font-weight:800; font-size:.72rem; padding:3px 11px; border-radius:7px;}
  .bible .body{margin-top:6px; font-size:.93rem; color:#5a4a36;}

  /* ── 개념 본문 (concept-view) ── */
  .cv .concept-card{border-radius:14px; padding:10px 20px; margin-bottom:18px;}
  .cv.ar .concept-card{background:var(--arith-tint); border:1px solid var(--arith-edge);}
  .cv.ge .concept-card{background:var(--geom-tint); border:1px solid var(--geom-edge);}
  .cv .def-row{display:grid; grid-template-columns:130px 1fr; gap:14px; padding:13px 0; align-items:start;}
  .cv .def-row+.def-row{border-top:1px dashed var(--hair);}
  .cv .def-label{font-weight:700; font-size:14px;}
  .cv.ar .def-label{color:var(--arith);}
  .cv.ge .def-label{color:var(--geom);}
  .cv .def-body{font-size:15px;}
  .cv .concept-body{padding-left:2px;}
  .cv .prose{margin:14px 0;}
  .cv .formula{position:relative; margin:20px 0; padding:20px 20px 14px; border-radius:12px; background:var(--card); border:1px solid var(--hair);}
  .cv.ar .formula{border-left:4px solid var(--arith);}
  .cv.ge .formula{border-left:4px solid var(--geom);}
  .cv .formula-tag{position:absolute; top:-11px; left:18px; font-size:11.5px; font-weight:700; padding:3px 11px; border-radius:999px; color:#fff;}
  .cv.ar .formula-tag{background:var(--arith);}
  .cv.ge .formula-tag{background:var(--geom);}
  .cv .formula-math{overflow-x:auto;}
  .cv .note{margin:16px 0; padding:13px 18px; border-radius:10px; background:var(--amber-tint); border-left:3px solid var(--amber); font-size:14px; color:#5a4517;}
  .cv .note b{color:#3d2e0d;}
  .cv .example{margin:18px 0; padding:18px 20px 16px; border-radius:12px; background:var(--card); border:1px dashed var(--hair);}
  .cv .example-label{display:inline-block; font-weight:700; font-size:12.5px; letter-spacing:.08em; padding:3px 12px; border-radius:6px; margin-bottom:8px; color:var(--ink); background:#F0ECE0;}
  .cv .example-list{margin:6px 0 0; padding-left:1.4em;}
  .cv .example-list li{margin:9px 0; font-size:14.5px;}
  .cv .derive{margin:18px 0; padding:18px 20px; border-radius:12px; background:#FAF9F4; border:1px solid var(--hair);}
  .cv .derive-title{font-weight:700; font-size:14px; color:var(--muted); margin-bottom:10px;}
  .cv .derive-line{padding:3px 0; overflow-x:auto;}
  .cv .derive-rule{border:none; border-top:1.5px solid var(--ink); margin:6px 0;}
  .cv .tablewrap{overflow-x:auto; margin:18px 0;}
  .cv table.fin{border-collapse:collapse; width:100%; font-size:14px; background:var(--card);}
  .cv table.fin th, .cv table.fin td{border:1px solid var(--hair); padding:8px 10px; text-align:center;}
  .cv.ar table.fin thead th{background:var(--arith-tint); color:var(--arith); font-weight:700;}
  .cv.ge table.fin thead th{background:var(--geom-tint); color:var(--geom); font-weight:700;}
  .cv table.fin td:first-child, .cv table.fin th:first-child{font-weight:600; background:#FAFAF6;}
  mjx-container{overflow-x:auto; overflow-y:visible; max-width:100%;}
  /* 개념 정의칸 안의 display 수식이 윗줄/카드 경계에 가려지지 않도록 여백 확보 */
  .cv .def-body mjx-container[display="true"]{margin:.45em 0 .25em;}

  /* ── 페이저 ── */
  .pager{flex:none; display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:10px 16px calc(10px + env(safe-area-inset-bottom)); border-top:1px solid var(--hair); background:var(--paper);}
  .pager button{border:1.5px solid var(--navy); background:#fff; color:var(--navy); padding:9px 18px; border-radius:11px;
    font-size:.92rem; font-weight:800; cursor:pointer; font-family:inherit; transition:.12s; flex:1; max-width:160px;}
  .pager button:hover:not(:disabled){background:var(--navy); color:#fff;}
  .pager button:disabled{opacity:.32; cursor:default; border-color:var(--hair); color:var(--muted);}
  .pager .counter{font-weight:800; font-variant-numeric:tabular-nums; color:var(--muted); font-size:.9rem; white-space:nowrap;}

  @media (max-width:430px){
    .gn-num{width:28px; height:28px; font-size:.76rem;}
    .gn-row{grid-template-columns:48px 1fr; gap:7px;}
    .ttl h1{font-size:.98rem;}
    .mode-tab{padding:6px 13px; font-size:.82rem;}
    .viewer{padding:13px;}
    .card{padding:17px 15px 16px;}
    .pager button{padding:9px 10px;}
    .cv .def-row{grid-template-columns:1fr; gap:4px;}
  }

  :root{ --pp:#6d28d9; --pp-bg:#f1ebfb; --pp-line:#ddd0f3; }
  /* 보라(방정식·부등식) 계열 */
  .gn-label.pp{background:var(--pp-bg); color:var(--pp);}
  .gn-num.pp.active{background:var(--pp); color:#fff; border-color:var(--pp); box-shadow:0 2px 6px rgba(109,40,217,.3);}
  .badge.pp{background:linear-gradient(135deg,#5b21b6,#7c3aed);}
  .badge.pp .num{color:#5b21b6;}
  .topic-tag.pp{background:var(--pp-bg); color:var(--pp);}
  .ex-title.pp{color:var(--pp);}
  .problem.pp{background:var(--pp-bg); border-color:var(--pp-line);}
  .problem.pp ol.parts li::before{color:var(--pp);}
  .card.pp .switch input:checked + .slider{background:var(--pp);}
  .card.pp .answer{border-color:var(--pp);} .card.pp .answer .k{background:var(--pp);}
  .cv.pp .concept-card{background:var(--pp-bg); border:1px solid var(--pp-line);}
  .cv.pp .def-label{color:var(--pp);}
  .cv.pp .formula{border-left:4px solid var(--pp);}
  .cv.pp .formula-tag{background:var(--pp);}
  .cv.pp table.fin thead th{background:var(--pp-bg); color:var(--pp); font-weight:700;}
  /* 긴 수식 넘침 방지 */
  .derive-line{overflow-x:visible;}
  .line.eq{overflow-x:visible;}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="top-row">
      <div class="ttl">
        <div class="eyebrow">Ⅱ. 삼각함수 · 06단원</div>
        <h1>삼각함수의 그래프</h1>
      </div>
      <div class="mode-tabs" id="modeTabs">
        <button class="mode-tab active" data-mode="concept">개념</button>
        <button class="mode-tab" data-mode="example">예제</button>
      </div>
    </div>
    <div class="grid-nav" id="gridNav"></div>
  </header>
  <main class="viewer" id="viewer"></main>
  <nav class="pager">
    <button id="prevBtn">◀ 이전</button>
    <span class="counter" id="counter"></span>
    <button id="nextBtn">다음 ▶</button>
  </nav>
</div>

<script id="concepts" type="application/json">{"concepts": [{"topic": "삼각함수의 그래프", "no": 1, "title": "주기함수", "html": "<div class=\"concept-card\"><div class=\"def-row\"><div class=\"def-label\">주기함수</div><div class=\"def-body\">상수함수가 아닌 함수 \\(f(x)\\)의 정의역에 속하는 모든 \\(x\\)에 대하여 $$f(x+p)=f(x)$$ 를 만족시키는 \\(0\\)이 아닌 상수 \\(p\\)가 존재할 때, 함수 \\(f(x)\\)를 <b>주기함수</b>라 하고 그러한 상수 \\(p\\) 중 최소인 양수를 그 함수의 <b>주기</b>라 한다.</div></div></div>\n<div class=\"concept-body\"><p class=\"prose\">삼각함수의 그래프는 일정한 간격마다 같은 모양이 되풀이된다. 이처럼 함숫값이 규칙적으로 반복되는 함수를 주기함수라 한다.</p><div class=\"derive\"><div class=\"derive-title\">주기가 \\(p\\)인 주기함수의 성질 (\\(n\\)은 자연수)</div><div class=\"derive-line\">\\(f(x)=f(x+p)=\\cdots=f(x+np)\\)</div><div class=\"derive-line\">\\(\\displaystyle \\text{거꾸로 양수 } a\\text{에 대하여 } f(x+a)=f(x)\\text{가 성립하면 주기는 } a,\\ \\tfrac{a}{2},\\ \\tfrac{a}{3},\\ \\cdots \\text{ 중 하나}\\)</div></div><div class=\"note\"><b>주기 판정:</b> \\(f(x+p)=f(x)\\) 꼴로 정리되는 가장 작은 양수 \\(p\\)가 주기이다. \\(y=\\sin x,\\ y=\\cos x\\)의 주기는 \\(2\\pi\\), \\(y=\\tan x\\)의 주기는 \\(\\pi\\)이다.</div><div class=\"example\"><span class=\"example-label\">보기</span><ol class=\"example-list\"><li>주기가 \\(3\\)이고 \\(f(1)=-1\\)이면 \\(f(10)=f(7)=f(4)=f(1)=-1\\)이다.</li><li>모든 실수 \\(x\\)에 대하여 \\(f(x-2)=f(x+2)\\)이면 \\(x-2=t\\)로 놓아 \\(f(t)=f(t+4)\\), 즉 주기가 \\(4\\)이다. \\(f(0)=5\\)이면 \\(f(100)=f(96)=\\cdots=f(0)=5\\)이다.</li></ol></div></div>"}, {"topic": "삼각함수의 그래프", "no": 2, "title": "함수 y=sin x의 그래프와 성질", "html": "<div class=\"concept-card\"><div class=\"def-row\"><div class=\"def-label\">정의역·치역</div><div class=\"def-body\">정의역은 실수 전체의 집합, 치역은 \\(\\{y\\,|\\,-1\\le y\\le 1\\}\\)이다.</div></div><div class=\"def-row\"><div class=\"def-label\">대칭성·주기</div><div class=\"def-body\">그래프는 원점에 대하여 대칭이다. 즉 \\(\\sin(-x)=-\\sin x\\). 주기가 \\(2\\pi\\)인 주기함수이다. 즉 \\(\\sin(x+2n\\pi)=\\sin x\\) (\\(n\\)은 정수).</div></div></div>\n<div class=\"concept-body\"><figure style=\"margin:14px 0 4px;text-align:center;\"><img src=\"data:image/png;base64,iVBORw0KGgoAAAAN  동경과 단위원의 교점을 \\(\\mathrm P(a,\\ b)\\)라 하면 \\(\\sin\\theta=b\\)이므로, \\(\\theta\\)가 변할 때 \\(\\sin\\theta\\)의 값은 점 \\(\\mathrm P\\)의 \\(y\\)좌표의 변화와 같다. 이를 이용하면 사인함수의 그래프를 그릴 수 있다.</p><div class=\"formula\"><span class=\"formula-tag\">y=sin x</span><div class=\"formula-math\">\\[\\text{정의역: 실수 전체},\\quad \\text{치역: } [-1,\\ 1],\\quad \\text{주기: } 2\\pi,\\quad \\text{원점 대칭}\\]</div></div><div class=\"example\"><span class=\"example-label\">보기</span><ol class=\"example-list\"><li>\\(\\sin\\!\\left(-\\dfrac{\\pi}{6}\\right)=-\\sin\\dfrac{\\pi}{6}=-\\dfrac{1}{2}\\)</li><li>\\(\\sin\\dfrac{13}{6}\\pi=\\sin\\!\\left(2\\pi+\\dfrac{\\pi}{6}\\right)=\\sin\\dfrac{\\pi}{6}=\\dfrac{1}{2}\\)</li></ol></div></div>"}, {"topic": "삼각함수의 그래프", "no": 3, "title": "함수 y=cos x의 그래프와 성질", "html": "<div class=\"concept-card\"><div class=\"def-row\"><div class=\"def-label\">정의역·치역</div><div class=\"def-body\">정의역은 실수 전체의 집합, 치역은 \\(\\{y\\,|\\,-1\\le y\\le 1\\}\\)이다.</div></div><div class=\"def-row\"><div class=\"def-label\">대칭성·주기</div><div class=\"def-body\">그래프는 \\(y\\)축에 대하여 대칭이다. 즉 \\(\\cos(-x)=\\cos x\\). 주기가 \\(2\\pi\\)인 주기함수이다. 즉 \\(\\cos(x+2n\\pi)=\\cos x\\) (\\(n\\)은 정수).</div></div></div>\n<div class=\"concept-body\"><figure style=\"margin:14px 0 4px;text-align:center;\"><img src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAg8AAACNCAMAAAAHHGlqAAAAwFBMVEX+/v5lYmMjHyB0cnPY19i2tLXo6OiLiYo6NjenpaaZl5fJyMgoJCVZVldIRUaAfn4xLS5wbW5APT5RTU6Qjo5gXV6gnp/Qz89iX2CRj5DAv7/g3+BST1Chn6Cwrq8zLzByb3AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAADKdsVpAAANGUlEQVR42u2diZarKBCGZQdxSdJ999ne/ylH0KytEaGIGKlz5namk46CH39VQYlFsY7pihcFw7T/P3l+kW2nhurun7oZ/g9jlbtkz8arDgCNy0EsMG5yn+ybB1Ho2vgMYzXGmOdO2bPp41ERNMDR4XCWimw71gjdvygNDzJ3yH6tNOEjGuShyy6M6dwtu7WmQ6Gsz65Dsi58qOvcLbs1SoS4ZJja5Jv2R7Zs1gwP2bJlHrJlHrJlHrJlHrJlHrJlHl5vfKw8QHe/3PAqkBb/Zh7GrnU/b2sLAlh5b/0nVIOaCtlLX9YEIdr/Uoj6A12/pSHd26fTRqZ1FKornHkYwaHWpjiIV+biM3Vv9hOk4WZJ2BaQmOuvD ldfTosR5ONgsm2JhysRLePTPHDWokzDLni4jvxOJUYncam6vJ89xR54uEQGVgGUppxzuyMw1ermjSwNu+GhM3298iMm2Ptfif8B6LJYVsfTJa8AAAAASUVORK5CYII=\" alt=\"함수 y=cos x의 그래프 (주기 2π, y축 대칭)\" style=\"display:block;width:100%;max-width:460px;height:auto;margin:0 auto;\"/><figcaption style=\"font-size:.72rem;color:#8a8f9a;margin-top:4px;\">함수 y=cos x의 그래프 (주기 2π, y축 대칭)</figcaption></figure><p class=\"prose\">교점 \\(\\mathrm P(a,\\ b)\\)에 대하여 \\(\\cos\\theta=a\\)이므로 \\(\\cos\\theta\\)의 값은 점 \\(\\mathrm P\\)의 \\(x\\)좌표로 정해진다. 또한 코사인함수 \\(y=\\cos x\\)의 그래프는 사인함수 \\(y=\\sin x\\)의 그래프를 \\(x\\)축의 방향으로 \\(-\\dfrac{\\pi}{2}\\)만큼 평행이동한 것과 같다.</p><div class=\"formula\"><span class=\"formula-tag\">y=cos x</span><div class=\"formula-math\">\\[\\text{정의역: 실수 전체},\\quad \\text{치역: } [-1,\\ 1],\\quad \\text{주기: } 2\\pi,\\quad y\\text{축 대칭}\\]</div></div><div class=\"note\">\\(\\cos x=\\sin\\!\\left(x+\\dfrac{\\pi}{2}\\right)\\)이므로 사인·코사인 그래프는 모양이 같고 \\(\\dfrac{\\pi}{2}\\)만큼 어긋나 있을 뿐이다.</div><div class=\"example\"><span class=\"example-label\">보기</span><ol class=\"example-list\"><li>\\(\\cos\\!\\left(-\\dfrac{\\pi}{4}\\right)=\\cos\\dfrac{\\pi}{4}=\\dfrac{\\sqrt2}{2}\\)</li><li>\\(\\cos\\dfrac{9}{4}\\pi=\\cos\\!\\left(2\\pi+\\dfrac{\\pi}{4}\\right)=\\cos\\dfrac{\\pi}{4}=\\dfrac{\\sqrt2}{2}\\)</li></ol></div></div>"}, {"topic": "삼각함수의 그래프", "no": 4, "title": "함수 y=tan x의 그래프와 성질", "html": "<div class=\"concept-card\"><div class=\"def-row\"><div class=\"def-label\">정의역·치역</div><div class=\"def-body\">정의역은 \\(n\\pi+\\dfrac{\\pi}{2}\\) (\\(n\\)은 정수)를 제외한 실수 전체의 집합, 치역은 실수 전체의 집합이다.</div></div><div class=\"def-row\"><div class=\"def-label\">대칭성·주기·점근선</div><div class=\"def-body\">그래프는 원점에 대하여 대칭이다. 즉 \\(\\tan(-x)=-\\tan x\\). 주기가 \\(\\pi\\)인 주기함수이다. 즉 \\(\\tan(x+n\\pi)=\\tan x\\). 점근선은 직선 \\(x=n\\pi+\\dfrac{\\pi}{2}\\) (\\(n\\)은 정수)이다.</div></div></div>\n<div class=\"concept-body\"><figure style=\"margin:14px 0 4px;text-align:center;\"><img src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAQ4AAADVCAMAAACR4e7 (-1\\)</td><td>\\(2\\pi\\)</td></tr><tr><td>\\(y=|\\sin x|\\)</td><td>\\([0,\\ 1]\\)</td><td>\\(1\\)</td><td>\\(0\\)</td><td>\\(\\pi\\)</td></tr><tr><td>\\(y=|\\tan x|\\)</td><td>\\([0,\\ \\infty)\\)</td><td>없다</td><td>\\(0\\)</td><td>\\(\\pi\\)</td></tr></tbody></table></div><div class=\"note\">\\(y=\\cos x\\)는 원래 \\(y\\)축 대칭이므로 \\(\\cos|x|=\\cos x\\)로 그래프가 그대로이다. \\(y=|\\sin x|,\\ y=|\\cos x|\\)는 음수 부분이 위로 접히면서 <b>주기가 \\(\\pi\\)로 절반</b>이 된다.</div><div class=\"example\"><span class=\"example-label\">보기</span><ol class=\"example-list\"><li>\\(y=\\sin|2x|\\): 최댓값 \\(1\\), 최솟값 \\(-1\\)</li><li>\\(y=2|\\sin x|\\): 최댓값 \\(2\\), 최솟값 \\(0\\)</li></ol></div></div>"}, {"topic": "여러 가지 각의 삼각함수", "no": 1, "title": "2nπ+x, −x의 삼각함수", "html": "<div class=\"concept-card\"><div class=\"def-row\"><div class=\"def-label\">\\(2n\\pi+x\\)</div><div class=\"def-body\">\\(\\sin(2n\\pi+x)=\\sin x,\\quad \\cos(2n\\pi+x)=\\cos x,\\quad \\tan(2n\\pi+x)=\\tan x\\) (\\(n\\)은 정수)</div></div><div class=\"def-row\"><div class=\"def-label\">\\(-x\\)</div><div class=\"def-body\">\\(\\sin(-x)=-\\sin x,\\quad \\cos(-x)=\\cos x,\\quad \\tan(-x)=-\\tan x\\)</div></div></div>\n<div class=\"concept-body\"><p class=\"prose\">사인·코사인의 주기는 \\(2\\pi\\), 탄젠트의 주기는 \\(\\pi\\)이므로 \\(2n\\pi\\)를 더해도 값이 변하지 않는다. 또한 \\(y=\\sin x,\\ y=\\tan x\\)는 원점 대칭, \\(y=\\cos x\\)는 \\(y\\)축 대칭이므로 \\(-x\\)의 삼각함수가 위와 같이 정해진다.</p><div class=\"formula\"><span class=\"formula-tag\">핵심</span><div class=\"formula-math\">\\[\\sin(-x)=-\\sin x,\\qquad \\cos(-x)=\\cos x,\\qquad \\tan(-x)=-\\tan x\\]</div></div><div class=\"note\"><b>부호만 외우면 된다.</b> 각의 크기 \\(x\\)는 그대로 두고, \\(\\sin\\)과 \\(\\tan\\)은 부호가 바뀌고 \\(\\cos\\)은 그대로이다.</div><div class=\"example\"><span class=\"example-label\">보기</span><ol class=\"example-list\"><li>\\(\\sin\\dfrac{9}{4}\\pi=\\sin\\!\\left(2\\pi+\\dfrac{\\pi}{4}\\right)=\\sin\\dfrac{\\pi}{4}=\\dfrac{\\sqrt2}{2}\\)</li><li>\\(\\cos\\!\\left(-\\dfrac{11}{6}\\pi\\right)=\\cos\\dfrac{11}{6}\\pi=\\cos\\!\\left(2\\pi-\\dfrac{\\pi}{6}\\right)=\\cos\\dfrac{\\pi}{6}=\\dfrac{\\sqrt3}{2}\\)</li></ol></div></div>"}, {"topic": "여러 가지 각의 삼각함수", "no": 2, "title": "π±x의 삼각함수", "html": "<div class=\"concept-card\"><div class=\"def-row\"><div class=\"def-label\">\\(\\pi+x\\)</div><div class=\"def-body\">\\(\\sin(\\pi+x)=-\\sin x,\\quad \\cos(\\pi+x)=-\\cos x,\\quad \\tan(\\pi+x)=\\tan x\\)</div></div><div class=\"def-row\"><div class=\"def-label\">\\(\\pi-x\\)</div><div class=\"def-body\">\\(\\sin(\\pi-x)=\\sin x,\\quad \\cos(\\pi-x)=-\\cos x,\\quad \\tan(\\pi-x)=-\\tan x\\)</div></div></div>\n<div class=\"concept-body\"><p class=\"prose\">\\(y=\\sin x\\)의 그래프를 \\(x\\)축의 방향으로 \\(-\\pi\\)만큼 평행이동하면 \\(y=-\\sin x\\)의 그래프와 일치하므로 \\(\\sin(\\pi+x)=-\\sin x\\)이다. 코사인·탄젠트도 그래프의 평행이동(또는 단위원의 대칭)으로 확인할 수 있다.</p><div class=\"derive\"><div class=\"derive-title\">각의 종류는 그대로, 부호만 결정</div><div class=\"derive-line\">\\(\\sin(\\pi\\pm x):\\ \\text{부호 결정 후 } \\sin\\)</div><div class=\"derive-line\">\\(\\cos(\\pi\\pm x):\\ \\text{부호 결정 후 } \\cos\\)</div><div class=\"derive-line\">\\(\\tan(\\pi\\pm x):\\ \\text{부호 결정 후 } \\tan\\)</div></div><div class=\"note\">\\(\\pi\\pm x\\)는 \\(\\dfrac{\\pi}{2}\\)의 <b>짝수배</b>(\\(=\\pi\\))이므로 함수의 종류가 바뀌지 않는다. \\(x\\)를 예각으로 보고 \\(\\pi+x\\)는 제3사분면, \\(\\pi-x\\)는 제2사분면임을 이용해 부호를 정한다.</div><div class=\"example\"><span class=\"example-label\">보기</span><ol class=\"example-list\"><li>\\(\\sin\\dfrac{7}{6}\\pi=\\sin\\!\\left(\\pi+\\dfrac{\\pi}{6}\\right)=-\\sin\\dfrac{\\pi}{6}=-\\dfrac{1}{2}\\)</li><li>\\(\\tan\\dfrac{5}{6}\\pi=\\tan\\!\\left(\\pi-\\dfrac{\\pi}{6}\\right)=-\\tan\\dfrac{\\pi}{6}=-\\dfrac{\\sqrt3}{3}\\)</li></ol></div></div>"}, {"topic": "여러 가지 각의 삼각함수", "no": 3, "title": "π/2±x의 삼각함수", "html": "<div class=\"concept-card\"><div class=\"def-row\"><div class=\"def-label\">\\(\\dfrac{\\pi}{2}+x\\)</div><div class=\"def-body\">\\(\\sin\\!\\left(\\dfrac{\\pi}{2}+x\\right)=\\cos x,\\quad \\cos\\!\\left(\\dfrac{\\pi}{2}+x\\right)=-\\sin x,\\quad \\tan\\!\\left(\\dfrac{\\pi}{2}+x\\right)=-\\dfrac{1}{\\tan x}\\)</div></div><div class=\"def-row\"><div class=\"def-label\">\\(\\dfrac{\\pi}{2}-x\\)</div><div class=\"def-body\">\\(\\sin\\!\\left(\\dfrac{\\pi}{2}-x\\right)=\\cos x,\\quad \\cos\\!\\left(\\dfrac{\\pi}{2}-x\\right)=\\sin x,\\quad \\tan\\!\\left(\\dfrac{\\pi}{2}-x\\right)=\\dfrac{1}{\\tan x}\\)</div></div></div>\n<div class=\"concept-body\"><figure style=\"margin:14px 0 4px;text-align:center;\"><img src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAboAAADOCAMAAAB/7TfUAAAAwFBMVEXZ2+KfYWbQpqiilJfOUlSRq9FfUVKadoixxuFRcqJWKywrMTw0Rl5xm8yUOztRP0HGt8j+/v75trgjHyBlYmPcTk1ShcG3tbY7NDV1c3TZ2Nnp6OiKiIimpaX75+fIx8eamJj41dbgX14oJCXsqKj1xcVYVVbmfXxIRUbpjIsyKyyBfn7jbm1DOjtUSElmV1ikenx2WltyaWrIlJX6vsDsmpqIZmiQjY24iIrdo6WbdHburrCgnp9iX2A0LzBikMeL7si6AAAU9klEQVR42u2daWOqutaAqe0ezrnDeyG0QMIoiKhVO+wOezz//1+9JICgEkggIljWhw62AitP1pTERJK5BZS96CmV4smjiBZJDLpZObGfAZHnnyO7vqIrt7kfPkjEDxTFHtu6j+jsUnLf/cfH9dXV8ur1Hf86susjunJvOXlXfjwoz4/Z72Nj9w/djJqdbH4qr9fZL7OxtfuGzqaSwxa3Dna/ji6zb+i+0Y1uokzW+a+j2fUMHd3oHjZxlvlYeGE0u36ho0a6Z/9KUbZFdKPZ9QsdjVywxOXc1n/6kr82tnef0FH95bv/gCuE9Z/n0WP2E91M4ZDRY/YJncIlY4OP6EYZ0Y3oRnSDQxcnmA/6vjwr73qJbMYUs3foeKQxOscZWQ3TYSLfH1kNNNY9GSOrMU0Z0TGgCx63m//78tHQwbI2dWDs9c+FzjH/lKGrGAh73gR4/uBzizV9J9C4lTihi79FZvzFcvdES/7DjFTdN0l8NlRjS36Srcg0w426i9xqFPt/d712ukBnqaEPytBVpJhLMuHzCN5pCaYVYX2ddfwV7reDi/Y11gyd9B5dQ4YPIlhoy8iSZUPfdAJYU12cLmkAt7m1Lwm6TcwE6cDFX11CMn4w6OOnM3yUkUOyqq0MOVQ7cphPpejoHvM78MmSPvBK8Zemq+JnN5bYyxw0BNYy11gLAUZn6uBNdZDmRztyhozWMLSQb3VADqmyuY2/qxHtP0gPkzU95hgm/6THKlrrVN/0oWO1LD3+8/qtI3RGOTq6x3wkVvcKfpRPHGhvMnE/Oi15LGrsJ20CSD81QWZ2GmkuQ4b6pBuPiaHIvkutYXa6QHAtZ89qpR2r4BlWQOswTaGgqyvK9WVQ7i9RYlYOgDR0BY31FJ0m7xxWJpHfXTTUluS5aDe0wA6qm7IhL+lAN6y9N0Vr+fzoambsrvx36mzdKsSXjehdPNeYjg6BDku+EN8rSkKUuS/XxMS0Q7PSgIkzFh0AvxDZIDD7gK7S7N79a/oomH+NfYyb5K/7ApMcbacxHZ0Fuhsjg/heTgZlXxyC7jq3usRlXKeGCN0NyNm5Ah5aALrK+mD5TK8MSLZmJt4HHTRE5l0yjenowg6HyFb4KUKdnofndDK7WsXxIDVFI3lS3CsjkP10XnQVSeY6J/ft6G3REzY6eoJc1LgcHcIXwF4XdRPuDB3J5pLu69DST57M3BHW48czknc4fm  x : π/2 차이\" style=\"display:block;width:100%;max-width:450px;height:auto;margin:0 auto;\"/><figcaption style=\"font-size:.72rem;color:#8a8f9a;margin-top:4px;\">y=sin x를 −π/2만큼 옮기면 y=cos x : π/2 차이</figcaption></figure><p class=\"prose\">\\(y=\\sin x\\)의 그래프를 \\(x\\)축의 방향으로 \\(-\\dfrac{\\pi}{2}\\)만큼 평행이동하면 \\(y=\\cos x\\)의 그래프와 일치하므로 \\(\\sin\\!\\left(\\dfrac{\\pi}{2}+x\\right)=\\cos x\\)이다.</p><div class=\"formula\"><span class=\"formula-tag\">핵심</span><div class=\"formula-math\">\\[\\dfrac{\\pi}{2}\\pm x:\\ \\ \\sin\\leftrightarrow\\cos,\\quad \\tan\\to\\dfrac{1}{\\tan}\\ (\\text{함수의 종류가 바뀐다})\\]</div></div><div class=\"note\">\\(\\dfrac{\\pi}{2}\\pm x\\)는 \\(\\dfrac{\\pi}{2}\\)의 <b>홀수배</b>이므로 \\(\\sin\\)은 \\(\\cos\\)으로, \\(\\cos\\)은 \\(\\sin\\)으로, \\(\\tan\\)은 \\(\\dfrac{1}{\\tan}\\)으로 바뀐다. 부호는 사분면으로 정한다.</div><div class=\"example\"><span class=\"example-label\">보기</span><ol class=\"example-list\"><li>\\(\\sin\\!\\left(\\dfrac{\\pi}{2}+\\dfrac{\\pi}{3}\\right)=\\cos\\dfrac{\\pi}{3}=\\dfrac{1}{2}\\)</li><li>\\(\\cos\\!\\left(\\dfrac{\\pi}{2}-\\dfrac{\\pi}{3}\\right)=\\sin\\dfrac{\\pi}{3}=\\dfrac{\\sqrt3}{2}\\)</li></ol></div></div>"}, {"topic": "여러 가지 각의 삼각함수", "no": 4, "title": "삼각함수의 각의 변환 방법", "html": "<div class=\"concept-card\"><div class=\"def-row\"><div class=\"def-label\">3단계 방법</div><div class=\"def-body\">일반각의 삼각함수는 ① 각을 \\(\\dfrac{\\pi}{2}\\times n+\\theta\\) 꼴로 고치고, ② 함수의 종류를 정한 뒤, ③ 부호를 붙여서 예각의 삼각함수로 바꾼다.</div></div></div>\n<div class=\"concept-body\"><div class=\"derive\"><div class=\"derive-title\">변환 규칙</div><div class=\"derive-line\">➊ <b>각 변형</b>: 주어진 각을 \\(\\dfrac{\\pi}{2}\\times n+\\theta\\) (\\(n\\)은 정수) 꼴로 고친다.</div><div class=\"derive-line\">➋ <b>함수 결정</b>: \\(n\\)이 홀수면 \\(\\sin\\!\\to\\!\\cos,\\ \\cos\\!\\to\\!\\sin,\\ \\tan\\!\\to\\!\\dfrac{1}{\\tan}\\) (바꾼다). \\(n\\)이 짝수면 그대로 둔다.</div><div class=\"derive-line\">➌ <b>부호 결정</b>: \\(\\theta\\)를 예각으로 보고 \\(\\dfrac{\\pi}{2}\\times n+\\theta\\)의 동경이 있는 사분면에서 처음 함수의 부호를 붙인다.</div></div><div class=\"note\"><b>한 줄 요약:</b> \\(\\dfrac{\\pi}{2}\\)의 <b>홀수배</b>면 함수를 바꾸고, <b>짝수배</b>면 그대로. 부호는 사분면으로!</div><div class=\"example\"><span class=\"example-label\">보기</span><ol class=\"example-list\"><li>\\(\\sin\\dfrac{7}{6}\\pi=\\sin\\!\\left(\\dfrac{\\pi}{2}\\times 2+\\dfrac{\\pi}{6}\\right)\\): \\(n=2\\)(짝수)→\\(\\sin\\) 유지, 제3사분면에서 \\(\\sin&lt;0\\) → \\(-\\sin\\dfrac{\\pi}{6}=-\\dfrac{1}{2}\\)</li><li>\\(\\cos\\dfrac{7}{4}\\pi=\\cos\\!\\left(\\dfrac{\\pi}{2}\\times 3+\\dfrac{\\pi}{4}\\right)\\): \\(n=3\\)(홀수)→\\(\\cos\\to\\sin\\), 제4사분면에서 \\(\\cos>0\\) → \\(\\sin\\dfrac{\\pi}{4}=\\dfrac{\\sqrt2}{2}\\)</li></ol></div></div>"}, {"topic": "삼각방정식과 삼각부등식", "no": 1, "title": "삼각방정식의 풀이", "html": "<div class=\"concept-card\"><div class=\"def-row\"><div class=\"def-label\">삼각방정식</div><div class=\"def-body\">\\(\\sin x=1,\\ 2\\cos x-1=0\\)과 같이 각의 크기가 미지수인 삼각함수를 포함하는 방정식을 <b>삼각방정식</b>이라 한다.</div></div><div class=\"def-row\"><div class=\"def-label\">기본 꼴의 풀이</div><div class=\"def-body\">\\(\\sin x=k\\) (또는 \\(\\cos x=k,\\ \\tan x=k\\)) 꼴은 함수 \\(y=\\sin x\\) (또는 \\(y=\\cos x,\\ y=\\tan x\\))의 그래프와 직선 \\(y=k\\)의 <b>교점의 \\(x\\)좌표</b>로 구한다.</div></div></div>\n<div class=\"concept-body\"><figure style=\"margin:14px 0 4px;text-align:center;\"><img src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAXsAAADhCAMAAAAeauWoAAAAwFBMVEX+/v4jHyBlYmM7Nzi4trfo6OiIhoempaXX1tZ1c3SYl5fIx8haV1gpJSZJRUbdTk2Afn5APT5wbW4wLC3Qzs6QjY2wrq9iX2BgXV6Rj5Cgnp9QTU4zLzByb3D34uJST1DAv7+MOTmhn6Dtp6bg3+Dxt7fzxMNkLy90X2CBf4CzVFSxr7DHUVDjbm3pjIt+NjaXWVmgWFjHgIDgX1731tYAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA2M5tFAAAQKUlEQVR42u2daYOjKBOABQE5lMnRvdOzPTt737vv/f9/26ugiSYeCKgkUh+6OxdtHqGqoIoiSaJEiRIlSpQoUaJEibILwRBWv2CuH9JIZD30uQAlb1xwjR5FJKsJxOJc/soKrB5mp4hkvX6fQFb+yqF+eAIRyYrwC5EkPxW1rgEARySryassf5C0vhEARIW/nqSVkS0O+gECgEckawmqvBwCatdSAhAV/orsUZId5UXlRKWzomSQifQH/Tev2MvIZM2+f04aL6eS6OmsI0xU5jZr9E9Wqpw0WtuVnPsSNCRN/8dJZWoj+5XUDSNEtB5HN2c7iewj+8g+SmQf2UeJ7CP7KJF9ZB/lIdjjvjQUUeVKRPZOXFvJPoh3Rb8jk1AWUGHmOYOQ6icJyd/htRX tan x=\\sqrt3\\) → \\(x=\\dfrac{\\pi}{3}\\) 또는 \\(x=\\dfrac{4}{3}\\pi\\)</li></ol></div></div>"}, {"topic": "삼각방정식과 삼각부등식", "no": 2, "title": "삼각부등식의 풀이", "html": "<div class=\"concept-card\"><div class=\"def-row\"><div class=\"def-label\">삼각부등식</div><div class=\"def-body\">\\(\\sin x>\\dfrac{1}{2},\\ \\tan x\\le\\sqrt3\\)과 같이 각의 크기가 미지수인 삼각함수를 포함하는 부등식을 <b>삼각부등식</b>이라 한다.</div></div><div class=\"def-row\"><div class=\"def-label\">기본 꼴의 풀이</div><div class=\"def-body\">\\(\\sin x>k\\)의 해는 그래프가 직선 \\(y=k\\)보다 <b>위쪽</b>에 있는 \\(x\\)의 범위, \\(\\sin x&lt;k\\)의 해는 <b>아래쪽</b>에 있는 \\(x\\)의 범위이다.</div></div></div>\n<div class=\"concept-body\"><figure style=\"margin:14px 0 4px;text-align:center;\"><img src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAXgAAADGCAIAAABXSAxAAAAoTklEQVR4nO2dfVwTV9bH77rL09oHK+A2aH0BVIhbXYu2mtJaQWwJbldAqFvQtYAQULdVpAKpPiraj10B5c1t5UVEaoVYKyI+KqElKvVZnFgl7GrtgAr4UuFuBVR8K1s+zx+3nZ0mAQKZmUzC+X74Y+ZmMvcSmF/uPefcc37V3d2NAAAA+GSIpQcAAIDtA0IDAADvgNAAAMA7IDQAAPAOCA0AALwDQgMAAO+A0AAAwDu8CA3GODZaERutYDfGRisWh4bx0R0AACKHe6HBGK9euSpKEa2pqqJpmmn8qrraZ84cw+u1FMX5GAAAEBXcC836tesysrMQQk8PGyaVSkmj5ssqhFDggiC9izHGdbo6zscAAICo4F5oPvhwi0QiKcjf9bq/P9N4pLz81dmzJRKJ3sW62tqTJ05wPgYAAEQF90IjkUjIQik4JJi0XGu+Vnv+fMjCNw0vrjh2HJZOAGDz8GIMVhUXu7m5zZTJyOl+lcpphJOfXG54pVZLIYQwxnwMAwAAkcCL0Hy2f39QcDBzWlhQYFRlMMatLa0IIV1tLR/DAABAJHAvNJVqdWtL62wfb3KalpLa1dX1VpgRx3ZTYyM5KCrcw/kwAAAQD3wF7DU3NSGEVMUlx48d8/DwYNxPbLIyMskBmGkAwLbhXmj85PIPtmw5eOBzZWLS+Anjf/jhceiiRYaXYYzZ+qIqLuF8JAAAiIRf8Zphr1Ktfj8h8dw/jETK5OfmpW7dypw6j3Q+XVPD30gAALAgHM9olIlJ7HnK5uTkBKXS6JVFewrZp60trbCAAgBbhUuhwRiXl5Uxkb6x0YrAoAWhi4yYgbUU1drS+lHOTnK6T1XiPNIZVk8AYKtwvHSqVKs1VZoRI0YghLx9vJlQGsPLPKdNk0gk7m7jEUINjVcRQqriEqOqBACAtcOvjaZP2EIDAICtAvloAADgHRAaAAB4B4QGAADeAaEBAIB3QGgAAOAdEBoAAHjnN5YeAAAAImLvnqKW1lbTrw8ICjS6ZVoPEBoAAP5DRUVFeGSE6dc7OjqachkHQsOTBAIAIDBaivKZM8domjoz4UBoeJJAAAAE5tTJU3K5Hx93Nldo+JNAAAAERldbm5CUyMedzRUa/iRwMIMx1nxZBVtMAYGxt7c32p6dmXnxwsUff/zx1nffyef5r4yL6++dzXVv62prp3p6mnkTQI/0bdvXr1uXlpJq6YEAg4hKtfrFGTP0 <script id="examples" type="application/json">{"unit": "Ⅱ. 삼각함수 — 06. 삼각함수의 그래프", "source": "대수 (본책, 교사용) · 대표 예제", "count": 13, "examples": [{"topic": "삼각함수의 그래프", "no": 1, "title": "사인함수와 코사인함수의 뜻과 성질", "problem_intro": "다음 함수의 최댓값과 최솟값, 주기를 각각 구하시오.", "problem_parts": ["\\(y=2\\sin\\!\\left(x-\\dfrac{\\pi}{2}\\right)\\)", "\\(y=\\cos\\!\\left(2x-\\dfrac{\\pi}{3}\\right)-1\\)"], "approach": ["\\(y=a\\sin(bx+c)+d\\) 꼴은 최댓값 \\(|a|+d\\), 최솟값 \\(-|a|+d\\), 주기 \\(\\dfrac{2\\pi}{|b|}\\)임을 이용한다."], "solution": ["⑴ \\(y=2\\sin\\!\\left(x-\\dfrac{\\pi}{2}\\right)\\)에서 \\(a=2,\\ b=1,\\ d=0\\)", "\\(\\therefore\\) 최댓값 \\(|2|+0=2\\), 최솟값 \\(-|2|+0=-2\\), 주기 \\(\\dfrac{2\\pi}{|1|}=2\\pi\\)", "⑵ \\(y=\\cos\\!\\left(2x-\\dfrac{\\pi}{3}\\right)-1\\)에서 \\(a=1,\\ b=2,\\ d=-1\\)", "\\(\\therefore\\) 최댓값 \\(|1|+(-1)=0\\), 최솟값 \\(-|1|+(-1)=-2\\), 주기 \\(\\dfrac{2\\pi}{|2|}=\\pi\\)"], "answer": "⑴ 최댓값 2, 최솟값 −2, 주기 2π   ⑵ 최댓값 0, 최솟값 −2, 주기 π", "bible": "\\(y=a\\sin(bx+c)+d\\)의 그래프는 \\(y=a\\sin bx\\)를 \\(x\\)축으로 \\(-\\dfrac{c}{b}\\), \\(y\\)축으로 \\(d\\)만큼 평행이동한 것이다. 평행이동·확대축소는 최댓값·최솟값·주기를 \\(a,\\ b,\\ d\\)만으로 결정하므로 \\(c\\)는 영향을 주지 않는다."}, {"topic": "삼각함수의 그래프", "no": 2, "title": "탄젠트함수의 뜻과 성질", "problem_intro": "다음 함수의 주기를 구하시오.", "problem_parts": ["\\(y=\\tan\\!\\left(x-\\dfrac{\\pi}{4}\\right)\\)", "\\(y=\\dfrac{1}{2}\\tan\\!\\left(3x-\\dfrac{\\pi}{2}\\right)\\)"], "approach": ["\\(y=a\\tan(bx+c)+d\\) 꼴의 주기는 \\(\\dfrac{\\pi}{|b|}\\)이고, 최댓값과 최솟값은 없다."], "solution": ["⑴ \\(y=\\tan\\!\\left(x-\\dfrac{\\pi}{4}\\right)\\)에서 \\(b=1\\)", "\\(\\therefore\\) 주기 \\(\\dfrac{\\pi}{|1|}=\\pi\\)", "⑵ \\(y=\\dfrac{1}{2}\\tan\\!\\left(3x-\\dfrac{\\pi}{2}\\right)\\)에서 \\(b=3\\)", "\\(\\therefore\\) 주기 \\(\\dfrac{\\pi}{|3|}=\\dfrac{\\pi}{3}\\)"], "answer": "⑴ 주기 π   ⑵ 주기 π/3", "bible": "탄젠트함수의 주기는 \\(\\dfrac{\\pi}{|b|}\\)로 \\(b\\)에 의해서만 정해진다. \\(a\\)는 그래프의 모양(기울기)에만 영향을 주고 주기를 바꾸지 않으며, \\(c,\\ d\\)는 평행이동이므로 역시 주기와 무관하다."}, {"topic": "삼각함수의 그래프", "no": 3, "title": "삼각함수의 미정계수 구하기", "problem_intro": "다음 물음에 답하시오.", "problem_parts": ["함수 \\(f(x)=a\\cos\\!\\left(bx-\\dfrac{\\pi}{3}\\right)+c\\)의 최댓값이 \\(4\\), 주기가 \\(\\pi\\)이고 \\(f\\!\\left(\\dfrac{\\pi}{3}\\right)=\\dfrac{5}{2}\\)일 때, 상수 \\(a,\\ b,\\ c\\)에 대하여 \\(abc\\)의 값을 구하시오. (단, \\(a>0,\\ b>0\\))", "함수 \\(y=a\\sin bx+c\\) (\\(a>0,\\ b>0\\))의 최댓값이 \\(3\\), 최솟값이 \\(0\\), 주기가 \\(\\dfrac{\\pi}{2}\\)일 때, \\(a+2b+3c\\)의 값을 구하시오."], "approach": ["최댓값 \\(=|a|+c\\), 최솟값 \\(=-|a|+c\\), 주기 \\(=\\dfrac{2\\pi}{|b|}\\)임을 이용하여 미정계수를 연립방정식으로 구한다."], "solution": ["⑴ 최댓값이 \\(4\\)이고 \\(a>0\\)이므로 \\(a+c=4\\) \\(\\cdots\\) ㉠", "주기가 \\(\\pi\\)이고 \\(b>0\\)이므로 \\(\\dfrac{2\\pi}{b}=\\pi\\) \\(\\therefore b=2\\)", "\\(f\\!\\left(\\dfrac{\\pi}{3}\\right)=a\\cos\\!\\left(2\\cdot\\dfrac{\\pi}{3}-\\dfrac{\\pi}{3}\\right)+c=a\\cos\\dfrac{\\pi}{3}+c=\\dfrac{a}{2}+c=\\dfrac{5}{2}\\) \\(\\cdots\\) ㉡", "㉠, ㉡을 연립하면 \\(a=3,\\ c=1\\)", "\\(\\therefore abc=3\\times2\\times1=6\\)", "⑵ 최댓값 \\(3\\), 최솟값 \\(0\\)이므로 \\(a+c=3,\\ -a+c=0\\) \\(\\therefore a=\\dfrac{3}{2},\\ c=\\dfrac{3}{2}\\)", "주기가 \\(\\dfrac{\\pi}{2}\\)이므로 \\(\\dfrac{2\\pi}{b}=\\dfrac{\\pi}{2}\\) \\(\\therefore b=4\\)", "\\(\\therefore a+2b+3c=\\dfrac{3}{2}+2\\times4+3\\times\\dfrac{3}{2}=\\dfrac{3}{2}+8+\\dfrac{9}{2}=14\\)"], "answer": "⑴ 6   ⑵ 14", "bible": "최댓값과 최솟값이 모두 주어지면 \\(|a|=\\dfrac{(\\text{최댓값})-(\\text{최솟값})}{2}\\), \\(c=\\dfrac{(\\text{최댓값})+(\\text{최솟값})}{2}\\)로 한 번에 구할 수 있다. 주기로는 \\(b\\), 한 점의 함숫값으로는 남은 미정계수를 결정한다."}, {"topic": "삼각함수의 그래프", "no": 4, "title": "절댓값 기호를 포함한 삼각함수", "problem_intro": "다음 함수의 최댓값과 최솟값을 각각 구하시오.", "problem_parts": ["\\(y=\\sin|x|+1\\)", "\\(y=|\\tan 2x|\\)"], "approach": ["\\(y=\\sin|x|\\)는 \\(x\\ge0\\)인 부분을 \\(y\\)축에 대칭이동한 그래프, \\(y=|\\tan 2x|\\)는 \\(y<0\\)인 부분을 \\(x\\)축에 대칭이동한 그래프임을 이용한다."], "solution": ["⑴ \\(y=\\sin|x|\\)의 치역은 \\(\\{y\\,|\\,-1\\le y\\le1\\}\\)이므로 \\(y=\\sin|x|+1\\)의 치역은 \\(\\{y\\,|\\,0\\le y\\le2\\}\\)", "\\(\\therefore\\) 최댓값 \\(2\\), 최솟값 \\(0\\)", "⑵ \\(y=\\tan 2x\\)의 \\(y<0\\)인 부분을 \\(x\\)축에 대하여 대칭이동하면 함숫값이 모두 \\(0\\) 이상이고 위로 한 =\\cos 10^\\circ\\)이므로 \\(\\sin^2 80^\\circ=\\cos^2 10^\\circ\\)", "같은 방법으로 \\(10^\\circ\\)와 \\(80^\\circ\\), \\(20^\\circ\\)와 \\(70^\\circ\\), \\(30^\\circ\\)와 \\(60^\\circ\\), \\(40^\\circ\\)와 \\(50^\\circ\\)를 짝지으면", "\\((\\sin^2 10^\\circ+\\cos^2 10^\\circ)+\\cdots+(\\sin^2 40^\\circ+\\cos^2 40^\\circ)+\\sin^2 90^\\circ\\)", "\\(=\\underbrace{1+1+1+1}_{4\\text{개}}+1=5\\)", "⑵ \\(\\tan 89^\\circ=\\tan(90^\\circ-1^\\circ)=\\dfrac{1}{\\tan 1^\\circ}\\)이므로 \\(\\tan 1^\\circ\\times\\tan 89^\\circ=1\\)", "같은 방법으로 \\(\\tan k^\\circ\\times\\tan(90^\\circ-k^\\circ)=1\\) (\\(k=1,\\ 2,\\ \\cdots,\\ 44\\))이고 가운데 \\(\\tan 45^\\circ=1\\)", "\\(\\therefore (\\tan1^\\circ\\tan89^\\circ)\\times\\cdots\\times(\\tan44^\\circ\\tan46^\\circ)\\times\\tan45^\\circ=1\\)"], "answer": "⑴ 5   ⑵ 1"}, {"topic": "여러 가지 각의 삼각함수", "no": 3, "title": "삼각함수를 포함한 식의 최대·최소 – 일차식 꼴", "problem_intro": "다음 함수의 최댓값과 최솟값을 각각 구하시오.", "problem_parts": ["\\(y=3\\sin x+\\cos\\!\\left(x-\\dfrac{\\pi}{2}\\right)-1\\)", "\\(y=|2\\sin x+1|-4\\)"], "approach": ["여러 가지 각의 공식으로 한 종류의 삼각함수로 통일한 뒤, \\(-1\\le\\sin x\\le1\\)의 범위에서 최댓값·최솟값을 구한다."], "solution": ["⑴ \\(\\cos\\!\\left(x-\\dfrac{\\pi}{2}\\right)=\\cos\\!\\left(\\dfrac{\\pi}{2}-x\\right)=\\sin x\\)이므로", "\\(y=3\\sin x+\\sin x-1=4\\sin x-1\\)", "\\(-1\\le\\sin x\\le1\\)에서 \\(-5\\le 4\\sin x-1\\le3\\)", "\\(\\therefore\\) 최댓값 \\(3\\), 최솟값 \\(-5\\)", "⑵ \\(\\sin x=t\\)로 놓으면 \\(-1\\le t\\le1\\)이고 \\(y=|2t+1|-4\\)", "\\(t=1\\)일 때 최댓값 \\(|3|-4=-1\\), \\(t=-\\dfrac{1}{2}\\)일 때 최솟값 \\(0-4=-4\\)"], "answer": "⑴ 최댓값 3, 최솟값 −5   ⑵ 최댓값 −1, 최솟값 −4", "bible": "\\(\\sin\\)과 \\(\\cos\\)이 섞인 일차식은 \\(\\dfrac{\\pi}{2}\\pm x,\\ \\pi\\pm x\\) 등의 공식으로 한 종류로 통일하는 것이 핵심이다. 절댓값이 있으면 \\(\\sin x=t\\)로 치환한 뒤 \\(t\\)에 대한 그래프로 끝점·꼭짓점에서 최대·최소를 따진다."}, {"topic": "여러 가지 각의 삼각함수", "no": 4, "title": "삼각함수를 포함한 식의 최대·최소 – 이차식·유리식 꼴", "problem_intro": "다음 함수의 최댓값과 최솟값을 각각 구하시오.", "problem_parts": ["\\(y=\\sin^2 x+\\cos x+1\\)", "\\(y=\\dfrac{\\sin x}{-\\sin x+2}\\)"], "approach": ["\\(\\sin^2 x (x\\)에서 성립하려면 \\(\\dfrac{D}{4}=(2\\cos\\theta)^2-3\\le0\\)", "\\((2\\cos\\theta+\\sqrt3)(2\\cos\\theta-\\sqrt3)\\le0\\) \\(\\therefore -\\dfrac{\\sqrt3}{2}\\le\\cos\\theta\\le\\dfrac{\\sqrt3}{2}\\)", "\\(0\\le\\theta<2\\pi\\)에서 \\(\\dfrac{\\pi}{6}\\le\\theta\\le\\dfrac{5}{6}\\pi\\) 또는 \\(\\dfrac{7}{6}\\pi\\le\\theta\\le\\dfrac{11}{6}\\pi\\)"], "answer": "⑴ π/2 ≤ θ ≤ 3/2 π   ⑵ π/6 ≤ θ ≤ 5/6 π 또는 7/6 π ≤ θ ≤ 11/6 π", "bible": "계수에 삼각함수가 들어간 이차방정식·이차부등식은 판별식 \\(D\\)를 \\(\\theta\\)에 대한 조건으로 바꾼다. '실근을 가진다'는 \\(D\\ge0\\), '모든 실수에서 성립'(아래로 볼록)은 \\(D\\le0\\)이며, 이렇게 얻은 부등식을 삼각부등식으로 풀면 된다."}]}</script>
<script>
const CONCEPTS = JSON.parse(document.getElementById('concepts').textContent).concepts;
const EXAMPLES = JSON.parse(document.getElementById('examples').textContent).examples;
const THEME = {'삼각함수의 그래프':'ar','여러 가지 각의 삼각함수':'ge','삼각방정식과 삼각부등식':'pp'};
const tkey = x => THEME[x.topic] || 'ar';
const isGeo = x => tkey(x) === 'ge';
const cardCls = x => { const t = tkey(x); return t==='ge' ? 'ge geo' : t==='pp' ? 'pp' : 'ar'; };
const mod = x => { const t = tkey(x); return t==='ge' ? ' geo' : t==='pp' ? ' pp' : ''; };
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

let mode = 'concept';          // 'concept' | 'example'
let idx = { concept:0, example:0 };  // 모드별 현재 위치 기억
let showSol = false;           // 예제 해설 펼침 여부

function list(){ return mode === 'concept' ? CONCEPTS : EXAMPLES; }

/* ── 라인/블록 (예제 해설용) ── */
function lineEl(text){
  const t = text.trim();
  const div = document.createElement('div');
  const isEq = t.startsWith('\\(') || t.startsWith('\\[');
  div.className = 'line' + (isEq ? ' eq' : '');
  div.innerHTML = esc(text).replace(/(（[^）]*）|\([^()]*이용[^()]*\))\s*$/u, '<span class="note">$1</span>');
  return div;
}
function blockEl(labelText, labelClass, lines){
  const wrap = document.createElement('div'); wrap.className = 'block';
  const lab = document.createElement('span'); lab.className = 'label ' + labelClass; lab.textContent = labelText;
  wrap.appendChild(lab);
  const box = document.createElement('div'); box.className = 'lines';
  lines.forEach(l => box.appendChild(lineEl(l)));
  wrap.appendChild(box);
  return wrap;
}

/* ── 번호 그리드 ── */
const gridNav = document.getElementById('gridNav');
function buildGrid(){
  gridNav.innerHTML = '';
  const data = list();
  [['삼각함수의 그래프','삼각함수의 그래프','ar'],['여러 가지 각의 삼각함수','여러 가지 각의 삼각함수','ge'],['삼각방정식과 삼각부등식','삼각방정식과 삼각부등식','pp']].forEach(([label,topic,cls])=>{
    const row = document.createElement('div'); row.className = 'gn-row';
    const lab = document.createElement('div'); lab.className = 'gn-label ' + cls; lab.textContent = label;
    const nums = document.createElement('div'); nums.className = 'gn-nums';

      if(x.topic !== topic) return;

      b.textContent = x.no;
      b.dataset.idx = i;
      b.addEventListener('click', ()=> goTo(i));
      nums.appendChild(b);
    });
    row.appendChild(lab); row.appendChild(nums);
    gridNav.appendChild(row);
  });
  updateGrid();
}
function updateGrid(){
  document.querySelectorAll('.gn-num').forEach(b=>{
    b.classList.toggle('active', Number(b.dataset.idx) === idx[mode]);
  });
}

/* ── 렌더 ── */
const viewer = document.getElementById('viewer');
function render(){
  const data = list();
  const cur = idx[mode];
  const x = data[cur];
  const geo = isGeo(x);
  viewer.innerHTML = '';

  if(mode === 'concept'){
    const card = document.createElement('section');
    card.className = 'card cv ' + cardCls(x);
    const head = document.createElement('div'); head.className = 'card-head';
    head.innerHTML =
      `<span class="badge${mod(x)}">개념 <span class="num">${String(x.no).padStart(2,'0')}</span></span>`+
      `<span class="topic-tag${mod(x)}">${x.topic}</span>`+
      `<span class="ex-title${mod(x)}">${x.title}</span>`;
    card.appendChild(head);
    const body = document.createElement('div');
    body.innerHTML = x.html;   // 개념 본문은 완성된 HTML 그대로
    card.appendChild(body);
    viewer.appendChild(card);
  } else {
    const card = document.createElement('section');
    card.className = 'card' + mod(x);
    const head = document.createElement('div'); head.className = 'card-head';
    head.innerHTML =
      `<span class="badge${mod(x)}">대표 예제 <span class="num">${String(x.no).padStart(2,'0')}</span></span>`+
      `<span class="topic-tag${mod(x)}">${x.topic}</span>`+
      `<span class="ex-title${mod(x)}">${esc(x.title)}</span>`;
    card.appendChild(head);

    const prob = document.createElement('div'); prob.className = 'problem' + mod(x);
    prob.appendChild(Object.assign(document.createElement('div'),{className:'intro',innerHTML:esc(x.problem_intro)}));
    if(x.problem_parts && x.problem_parts.length){
      const ol = document.createElement('ol'); ol.className='parts';
      x.problem_parts.forEach(p=>{ const li=document.createElement('li'); li.innerHTML=esc(p); ol.appendChild(li); });
      prob.appendChild(ol);
    }
    card.appendChild(prob);

    const bar = document.createElement('div'); bar.className = 'sol-bar';
    bar.innerHTML =
      `<span class="lbl">풀이·해설</span>`+
      `<label class="switch"><input type="checkbox" id="solSwitch"${showSol?' checked':''}><span class="slider"></span></label>`+
      `<span class="sol-state" id="solState">${showSol?'펼침':'접힘'}</span>`;
    card.appendChild(bar);

    const sol = document.createElement('div'); sol.className = 'solution' + (showSol?' open':'');
    if(x.approach && x.approach.length) sol.appendChild(blockEl('바로 접근','approach',x.approach));
    if(x.solution && x.solution.length) sol.appendChild(blockEl('바른 풀이','solve',x.solution));
    if(x.alt_solution && x.alt_solution.length) sol.appendChild(blockEl('다른 풀이','alt',x.alt_solution));
    const ans = document.createElement('div'); ans.className='answer';
    ans.innerHTML = `<span class="k">정답</span><span>${esc(x.answer)}</span>`;
    sol.appendChild(ans);
    if(x.bible){
      const b = document.createElement('div'); b.className='bible';
      b.innerHTML = `<span class="tag">Bible Says</span><div class="body">${esc(x.bible)}</div>`;
      sol.appendChild(b);
    }
    card.appendChild(sol);
    viewer.appendChild(card);

    const sw = document.getElementById('solSwitch');
    sw.addEventListener('change', ()=>{
      showSol = sw.checked;
      sol.classList.toggle('open', showSol);
      document.getElementById('solState').textContent = showSol ? '펼침' : '접힘';
      if(showSol) requestAnimationFrame(()=>fitMath(sol));
    });
  }

  updateGrid();
  document.getElementById('counter').textContent = `${cur+1} / ${data.length}`;
  document.getElementById('prevBtn').disabled = cur === 0;
  document.getElementById('nextBtn').disabled = cur === data.length - 1;
  viewer.scrollTop = 0;
  typesetNode(viewer);
}

function goTo(i){
  const data = list();
  idx[mode] = Math.max(0, Math.min(data.length-1, i));
  render();
}
function setMode(m){
  if(m === mode) return;
  mode = m;
  document.querySelectorAll('.mode-tab').forEach(b=> b.classList.toggle('active', b.dataset.mode===m));
  buildGrid();
  render();
}

/* ── MathJax typeset (해당 노드만) ── */
function typesetNode(node){
  if(window.MathJax && window.MathJax.typesetPromise){
    window.MathJax.typesetClear && window.MathJax.typesetClear([node]);
    window.MathJax.typesetPromise([node]).then(()=>fitMath(node)).catch(e=>console.error('MathJax:', e));
  } else {
    setTimeout(()=>typesetNode(node), 50);
  }
}
/* 폭을 넘는 수식은 스크롤 대신 글자 크기를 줄여 맞춘다 (칸 기준 반복 축소) */
function fitMath(node){
  const root = node || document;
  root.querySelectorAll('mjx-container').forEach(m=>{ m.style.fontSize=''; });
  const sel = '.line,.derive-line,.formula-math,.def-body,.intro,.prose,.note,.body,.answer,.example-list li,ol.parts li,td,th';
  root.querySelectorAll(sel).forEach(box=>{
    let guard=0;
    while(box.scrollWidth - box.clientWidth > 1 && guard++ < 6){
      const mjs = box.querySelectorAll('mjx-container');
      if(!mjs.length) break;
      const ratio = Math.max(0.45, (box.clientWidth/box.scrollWidth)*0.98);
      let changed=false;
      mjs.forEach(m=>{
        const cur = parseFloat(getComputedStyle(m).fontSize);
        const next = cur*ratio;
        if(next < cur-0.1){ m.style.fontSize = next.toFixed(2)+'px'; changed=true; }
      });
      if(!changed) break;
    }
  });
}
let _fitRsz=null;
window.addEventListener('resize', ()=>{ clearTimeout(_fitRsz); _fitRsz=setTimeout(()=>fitMath(document.getElementById('viewer')), 200); });

/* ── 컨트롤 ── */
document.getElementById('modeTabs').addEventListener('click', e=>{
  const b = e.target.closest('.mode-tab'); if(b) setMode(b.dataset.mode);
});
document.getElementById('prevBtn').addEventListener('click', ()=> goTo(idx[mode]-1));
document.getElementById('nextBtn').addEventListener('click', ()=> goTo(idx[mode]+1));
document.addEventListener('keydown', ev=>{
  if(ev.key === 'ArrowLeft') goTo(idx[mode]-1);
  else if(ev.key === 'ArrowRight') goTo(idx[mode]+1);
});
let tx=null, ty=null;
viewer.addEventListener('touchstart', e=>{ const t=e.changedTouches[0]; tx=t.clientX; ty=t.clientY; }, {passive:true});
viewer.addEventListener('touchend', e=>{
  if(tx===null) return;
  const t=e.changedTouches[0];
  const dx=t.clientX-tx, dy=t.clientY-ty;
  if(Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)*1.5){
    if(dx < 0) goTo(idx[mode]+1); else goTo(idx[mode]-1);
  }
  tx=ty=null;
}, {passive:true});

buildGrid();
render();
</script>
</body>
</html>
