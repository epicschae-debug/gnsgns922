<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>수열의 합 · 개념 + 예제</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<script>
window.MathJax = {
  tex: { inlineMath: [['\\(', '\\)']], displayMath: [['$$','$$'],['\\[','\\]']] },
  svg: { fontCache: 'global' },
  startup: { typeset: false }
};

<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.min.js" id="MathJax-script" async></script>
<style>
  :root{
    --paper:#FAF7F0; --ink:#23262e; --muted:#6f7480;
    --navy:#22356f; --navy2:#33489a; --blue:#2f5fb0; --blue-soft:#eef5fd; --blue-line:#cfe2f7;
    --approach-bg:#e9f1fc; --approach-ink:#1f56a6;
    --solve-bg:#f3e9fb; --solve-ink:#7a3aa0;
    --alt:#9aa0ad;
    --orange:#e08327; --orange-bg:#fff8ef; --orange-line:#f1d8b4;
    --card:#ffffff; --hair:#e7e2d6;
    --geo:#197a6b; --geo-bg:#e6f4f0; --geo-line:#bfe4db;
    /* 개념 본문용 (예제 톤에 맞춤) */
    --arith:#22356f; --arith-tint:#eef5fd; --arith-edge:#cfe2f7;
    --geom:#197a6b; --geom-tint:#e6f4f0; --geom-edge:#bfe4db;
    --amber:#B7791F; --amber-tint:#FBF3E2;
  }
  *{box-sizing:border-box}
  html,body{height:100%;}
  body{
    margin:0; background:var(--paper); color:var(--ink);
    font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',system-ui,sans-serif;
    font-size:16px; line-height:1.7; -webkit-font-smoothing:antialiased; overflow:hidden;
  }
  .app{display:flex; flex-direction:column; height:100dvh; max-width:780px; margin:0 auto; background:var(--paper);}

  /* ── 상단바 ── */
  .topbar{flex:none; padding:11px 16px 10px; border-bottom:1px solid var(--hair); background:var(--paper); position:relative; z-index:5;}
  .top-row{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:9px;}
  .ttl .eyebrow{font-size:.72rem; font-weight:700; color:var(--blue); letter-spacing:.03em;}
  .ttl h1{margin:.05em 0 0; font-size:1.08rem; font-weight:800; letter-spacing:-.02em;}
  /* 모드 탭 */
  .mode-tabs{display:inline-flex; background:#eee9dc; border-radius:11px; padding:3px; gap:2px; flex:none;}
  .mode-tab{
    border:none; background:transparent; color:var(--muted); font-family:inherit;
    font-weight:800; font-size:.86rem; padding:7px 16px; border-radius:9px; cursor:pointer; transition:.12s;
  }
  .mode-tab.active{background:#fff; color:var(--navy); box-shadow:0 1px 3px rgba(0,0,0,.12);}

  .grid-nav{display:flex; flex-direction:column; gap:7px;}
  .gn-row{display:grid; grid-template-columns:54px 1fr; align-items:center; gap:9px;}
  .gn-label{font-size:.7rem; font-weight:800; text-align:center; padding:4px 0; border-radius:7px;}
  .gn-label.ar{background:var(--blue-soft); color:var(--navy);}
  .gn-label.ge{background:var(--geo-bg); color:var(--geo);}
  .gn-nums{display:flex; gap:5px; flex-wrap:wrap;}
  .gn-num{
    width:30px; height:30px; border-radius:50%; border:1.5px solid var(--hair);
    background:#fff; color:var(--ink); font-weight:800; font-size:.8rem;
    font-variant-numeric:tabular-nums; cursor:pointer; display:grid; place-items:center;
    transition:.12s; padding:0; line-height:1;
  }
  .gn-num:hover{border-color:var(--blue);}
  .gn-num.ar.active{background:var(--navy); color:#fff; border-color:var(--navy); box-shadow:0 2px 6px rgba(34,53,111,.3);}
  .gn-num.ge.active{background:var(--geo); color:#fff; border-color:var(--geo); box-shadow:0 2px 6px rgba(25,122,107,.3);}

  /* ── 뷰어 ── */
  .viewer{flex:1 1 auto; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:16px;}
  .card{background:var(--card); border:1px solid var(--hair); border-radius:18px; padding:20px 20px 18px; margin:0;
    box-shadow:0 1px 2px rgba(40,40,60,.04), 0 8px 24px rgba(40,40,60,.04);}
  .card-head{display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:14px;}
  .badge{display:inline-flex; align-items:center; gap:9px;
    background:linear-gradient(135deg,var(--navy),var(--navy2)); color:#fff;
    padding:6px 8px 6px 13px; border-radius:999px; font-weight:800; font-size:.8rem;
    box-shadow:0 3px 8px rgba(34,53,111,.22);}
  .badge.geo{background:linear-gradient(135deg,#15695c,#1f8f7d);}
  .badge .num{background:#fff; color:var(--navy); width:24px; height:24px; border-radius:50%;
    display:grid; place-items:center; font-size:.88rem; font-variant-numeric:tabular-nums;}
  .badge.geo .num{color:#15695c;}
  .topic-tag{font-size:.72rem; font-weight:800; padding:3px 9px; border-radius:6px; background:var(--blue-soft); color:var(--blue);}
  .topic-tag.geo{background:var(--geo-bg); color:var(--geo);}
  .ex-title{font-size:1.04rem; font-weight:800; color:var(--blue); flex:1 1 100%; line-height:1.35;}
  .ex-title.geo{color:var(--geo);}

  /* 예제 문제 */
  .problem{background:var(--blue-soft); border:1px solid var(--blue-line); border-radius:14px; padding:15px 17px;}
  .problem.geo{background:var(--geo-bg); border-color:var(--geo-line);}
  .problem .intro{font-weight:600;}
  ol.parts{margin:.5em 0 0; padding-left:0; list-style:none; counter-reset:p;}
  ol.parts li{counter-increment:p; padding-left:1.9em; position:relative; margin:.4em 0;}
  ol.parts li::before{content:"(" counter(p) ")"; position:absolute; left:0; font-weight:700; color:var(--blue); font-variant-numeric:tabular-nums;}
  .problem.geo ol.parts li::before{color:var(--geo);}

  /* 해설 토글 */
  .sol-bar{display:flex; align-items:center; gap:12px; margin:18px 2px 4px;}
  .sol-bar .lbl{font-weight:800; font-size:.9rem; color:var(--muted);}
  .switch{position:relative; display:inline-block; width:50px; height:28px; flex:none;}
  .switch input{opacity:0; width:0; height:0;}
  .slider{position:absolute; inset:0; cursor:pointer; background:#cfcabb; border-radius:999px; transition:.2s;}
  .slider::before{content:""; position:absolute; height:22px; width:22px; left:3px; top:3px; background:#fff; border-radius:50%; transition:.2s; box-shadow:0 1px 3px rgba(0,0,0,.25);}
  .switch input:checked + .slider{background:var(--navy);}
  .card.geo .switch input:checked + .slider{background:var(--geo);}
  .switch input:checked + .slider::before{transform:translateX(22px);}
  .sol-state{font-size:.82rem; color:var(--muted); font-weight:700;}
  .solution{display:none; margin-top:6px;}
  .solution.open{display:block;}

  .block{margin-top:18px;}
  .label{display:inline-block; font-weight:800; font-size:.8rem; padding:4px 12px; border-radius:8px; margin-bottom:8px;}
  .label.approach{background:var(--approach-bg); color:var(--approach-ink);}
  .label.solve{background:var(--solve-bg); color:var(--solve-ink);}
  .label.alt{background:#fff; color:var(--alt); border:1px solid #e2e0da; font-size:.74rem; padding:3px 10px;}
  .lines{padding-left:4px;}
  .lines .line{margin:.18em 0;}
  .lines .line.eq{padding-left:1.1em; margin:.28em 0;}
  .note{color:var(--muted); font-size:.9em;}
  .answer{display:inline-flex; align-items:center; gap:10px; margin-top:18px; border:1.5px solid var(--navy); border-radius:10px; padding:6px 14px 6px 6px; font-weight:700;}
  .answer .k{background:var(--navy); color:#fff; padding:3px 10px; border-radius:6px; font-size:.8rem;}
  .card.geo .answer{border-color:var(--geo);} .card.geo .answer .k{background:var(--geo);}
  .bible{margin-top:20px; background:var(--orange-bg); border:1px solid var(--orange-line); border-radius:14px; padding:16px 18px; position:relative;}
  .bible .tag{position:absolute; top:-12px; left:16px; background:var(--orange); color:#fff; font-weight:800; font-size:.72rem; padding:3px 11px; border-radius:7px;}
  .bible .body{margin-top:6px; font-size:.93rem; color:#5a4a36;}

  /* ── 개념 본문 (concept-view) ── */
  .cv .concept-card{border-radius:14px; padding:10px 20px; margin-bottom:18px;}
  .cv.ar .concept-card{background:var(--arith-tint); border:1px solid var(--arith-edge);}
  .cv.ge .concept-card{background:var(--geom-tint); border:1px solid var(--geom-edge);}
  .cv .def-row{display:grid; grid-template-columns:130px 1fr; gap:14px; padding:13px 0; align-items:start;}
  .cv .def-row+.def-row{border-top:1px dashed var(--hair);}
  .cv .def-label{font-weight:700; font-size:14px;}
  .cv.ar .def-label{color:var(--arith);}
  .cv.ge .def-label{color:var(--geom);}
  .cv .def-body{font-size:15px;}
  .cv .concept-body{padding-left:2px;}
  .cv .prose{margin:14px 0;}
  .cv .formula{position:relative; margin:20px 0; padding:20px 20px 14px; border-radius:12px; background:var(--card); border:1px solid var(--hair);}
  .cv.ar .formula{border-left:4px solid var(--arith);}
  .cv.ge .formula{border-left:4px solid var(--geom);}
  .cv .formula-tag{position:absolute; top:-11px; left:18px; font-size:11.5px; font-weight:700; padding:3px 11px; border-radius:999px; color:#fff;}
  .cv.ar .formula-tag{background:var(--arith);}
  .cv.ge .formula-tag{background:var(--geom);}
  .cv .formula-math{overflow-x:auto;}
  .cv .note{margin:16px 0; padding:13px 18px; border-radius:10px; background:var(--amber-tint); border-left:3px solid var(--amber); font-size:14px; color:#5a4517;}
  .cv .note b{color:#3d2e0d;}
  .cv .example{margin:18px 0; padding:18px 20px 16px; border-radius:12px; background:var(--card); border:1px dashed var(--hair);}
  .cv .example-label{display:inline-block; font-weight:700; font-size:12.5px; letter-spacing:.08em; padding:3px 12px; border-radius:6px; margin-bottom:8px; color:var(--ink); background:#F0ECE0;}
  .cv .example-list{margin:6px 0 0; padding-left:1.4em;}
  .cv .example-list li{margin:9px 0; font-size:14.5px;}
  .cv .derive{margin:18px 0; padding:18px 20px; border-radius:12px; background:#FAF9F4; border:1px solid var(--hair);}
  .cv .derive-title{font-weight:700; font-size:14px; color:var(--muted); margin-bottom:10px;}
  .cv .derive-line{padding:3px 0; overflow-x:auto;}
  .cv .derive-rule{border:none; border-top:1.5px solid var(--ink); margin:6px 0;}
  .cv .tablewrap{overflow-x:auto; margin:18px 0;}
  .cv table.fin{border-collapse:collapse; width:100%; font-size:14px; background:var(--card);}
  .cv table.fin th, .cv table.fin td{border:1px solid var(--hair); padding:8px 10px; text-align:center;}
  .cv.ar table.fin thead th{background:var(--arith-tint); color:var(--arith); font-weight:700;}
  .cv.ge table.fin thead th{background:var(--geom-tint); color:var(--geom); font-weight:700;}
  .cv table.fin td:first-child, .cv table.fin th:first-child{font-weight:600; background:#FAFAF6;}
  mjx-container{overflow-x:auto; overflow-y:visible; max-width:100%;}
  /* 개념 정의칸 안의 display 수식이 윗줄/카드 경계에 가려지지 않도록 여백 확보 */
  .cv .def-body mjx-container[display="true"]{margin:.45em 0 .25em;}

  /* ── 페이저 ── */
  .pager{flex:none; display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:10px 16px calc(10px + env(safe-area-inset-bottom)); border-top:1px solid var(--hair); background:var(--paper);}
  .pager button{border:1.5px solid var(--navy); background:#fff; color:var(--navy); padding:9px 18px; border-radius:11px;
    font-size:.92rem; font-weight:800; cursor:pointer; font-family:inherit; transition:.12s; flex:1; max-width:160px;}
  .pager button:hover:not(:disabled){background:var(--navy); color:#fff;}
  .pager button:disabled{opacity:.32; cursor:default; border-color:var(--hair); color:var(--muted);}
  .pager .counter{font-weight:800; font-variant-numeric:tabular-nums; color:var(--muted); font-size:.9rem; white-space:nowrap;}

  @media (max-width:430px){
    .gn-num{width:28px; height:28px; font-size:.76rem;}
    .gn-row{grid-template-columns:48px 1fr; gap:7px;}
    .ttl h1{font-size:.98rem;}
    .mode-tab{padding:6px 13px; font-size:.82rem;}
    .viewer{padding:13px;}
    .card{padding:17px 15px 16px;}
    .pager button{padding:9px 10px;}
    .cv .def-row{grid-template-columns:1fr; gap:4px;}
  }

  /* 뒤로가기 */
  .topbar .backbtn{flex:none;width:30px;height:30px;display:grid;place-items:center;border-radius:9px;background:#eee9dc;color:var(--ink);text-decoration:none;font-size:18px;line-height:1;}
  .topbar .backbtn:active{background:#e0dac9;}
  .top-row .ttl{flex:1 1 auto;min-width:0;}
</style>
</head>

<div class="app">
  <header class="topbar">
    <div class="top-row">
      <a class="backbtn" href="sub-algebra.html" aria-label="뒤로">&#8592;</a>
      <div class="ttl">
        <div class="eyebrow">Ⅲ. 수열 · 09단원</div>

      </div>
      <div class="mode-tabs" id="modeTabs">
        <button class="mode-tab active" data-mode="concept">개념</button>
        <button class="mode-tab" data-mode="example">예제</button>
      </div>

    <div class="grid-nav" id="gridNav"></div>
  </header>
  <main class="viewer" id="viewer"></main>
  <nav class="pager">
    <button id="prevBtn">◀ 이전</button>
    <span class="counter" id="counter"></span>
    <button id="nextBtn">다음 ▶</button>
  </nav>
</div>

<script id="concepts" type="application/json">{"concepts": [{"topic": "합의 기호 ∑", "no": 1, "title": "합의 기호 ∑의 뜻", "html": "\n<div class=\"concept-card\">\n  <div class=\"def-row\">\n    <div class=\"def-label\">합의 기호 \\(\\sum\\)</div>\n    <div class=\"def-body\">수열 \\(\\{a_n\\}\\)의 첫째항부터 제\\(n\\)항까지의 합을 기호 \\(\\sum\\)를 써서 다음과 같이 나타낸다.\n      $$\\sum_{k=1}^{n} a_k = a_1+a_2+a_3+\\cdots+a_n$$\n      \\(\\sum\\)는 합을 뜻하는 Sum의 첫 글자 S에 해당하는 그리스 문자로 <b>‘시그마(sigma)’</b>라 읽는다.</div>\n  </div>\n  <div class=\"def-row\">\n    <div class=\"def-label\">부분합의 표현</div>\n    <div class=\"def-body\">\\(2\\le m\\le n\\)일 때, 제\\(m\\)항부터 제\\(n\\)항까지의 합은\n      $$\\sum_{k=m}^{n} a_k=\\sum_{k=1}^{n} a_k-\\sum_{k=1}^{m-1} a_k$$\n      와 같이 첫째항부터의 합의 차로 나타낼 수 있다.</div>\n  </div>\n</div>\n<div class=\"concept-body\">\n  <p class=\"prose\">\\(\\displaystyle\\sum_{k=1}^{n} a_k\\)는 일반항 \\(a_k\\)의 \\(k\\)에 \\(1,\\ 2,\\ 3,\\ \\cdots,\\ n\\)을 차례대로 대입하여 얻은 항들의 합을 뜻한다. 이때 \\(k\\)는 더하는 항의 위치를 나타내는 문자일 뿐이므로, 다른 문자로 바꾸어 써도 같은 합을 나타낸다.</p>\n  <div class=\"formula\">\n    <span class=\"formula-tag\">합의 기호 \\(\\sum\\)의 뜻</span>\n    <div class=\"formula-math\">\\[\\sum_{k=1}^{n} a_k=\\sum_{i=1}^{n} a_i=\\sum_{m=1}^{n} a_m=a_1+a_2+a_3+\\cdots+a_n\\]</div>\n  </div>\n  <div class=\"note\">\\(\\sum\\) 위·아래의 범위(여기서는 \\(k=1\\)부터 \\(n\\)까지)는 더하는 <b>항의 개수</b>를 결정하므로 정확히 써야 한다. 합의 기호 \\(\\sum\\)를 쓰면 첫째항이 아닌 항부터의 합도 \\(\\displaystyle\\sum_{k=m}^{n} a_k\\)와 같이 나타낼 수 있다.</div>\n  <div class=\"example\">\n    <span class=\"example-label\">보기</span>\n    <ol class=\"example-list\">\n      <li>등차수열 \\(1,\\ 4,\\ 7,\\ \\cdots,\\ 28\\)의 합 → 일반항이 \\(a_k=3k-2\\)이고 첫째항부터 제\\(10\\)항까지의 합이므로 \\(\\displaystyle 1+4+7+\\cdots+28=\\sum_{k=1}^{10}(3k-2)\\)</li>\n      <li>\\(\\displaystyle\\sum_{k=1}^{30} 2^k\\)은 \\(2^k\\)의 \\(k\\)에 \\(1,\\ 2,\\ \\cdots,\\ 30\\)을 대입하여 더한 값이므로 \\(\\displaystyle\\sum_{k=1}^{30} 2^k=2+2^2+2^3+\\cdots+2^{30}\\)</li>\n      <li>제\\(5\\)항부터 제\\(15\\)항까지의 합 → \\(\\displaystyle 3^5+3^6+\\cdots+3^{15}=\\sum_{k=5}^{15} 3^k=\\sum_{k=1}^{15} 3^k-\\sum_{k=1}^{4} 3^k\\)</li>\n    </ol>\n  </div>\n</div>\n"}, {"topic": "합의 기호 ∑", "no": 2, "title": "∑의 성질", "html": "\n<div class=\"concept-card\">\n  <div class=\"def-row\">\n    <div class=\"def-label\">\\(\\sum\\)의 성질</div>\n    <div class=\"def-body\">두 수열 \\(\\{a_n\\},\\ \\{b_n\\}\\)과 상수 \\(c\\)에 대하여 다음이 성립한다.\n      $$\\sum_{k=1}^{n}(a_k+b_k)=\\sum_{k=1}^{n}a_k+\\sum_{k=1}^{n}b_k,\\qquad \\sum_{k=1}^{n}(a_k-b_k)=\\sum_{k=1}^{n}a_k-\\sum_{k=1}^{n}b_k$$\n      $$\\sum_{k=1}^{n}ca_k=c\\sum_{k=1}^{n}a_k,\\qquad \\sum_{k=1}^{n}c=cn$$</div>\n  </div>\n</div>\n<div class=\"concept-body\">\n  <p class=\"prose\">\\(\\sum\\)는 항을 차례대로 더하는 기호이므로 <b>합·차로 분리</b>할 수 있고, <b>상수는 \\(\\sum\\) 밖으로</b> 빼낼 수 있다. 특히 \\(\\displaystyle\\sum_{k=1}^{n}c\\)는 상수 \\(c\\)를 \\(n\\)번 더한 것이므로 \\(cn\\)이다.</p>\n  <div class=\"formula\">\n    <span class=\"formula-tag\">세 상수에 대한 일반형</span>\n    <div class=\"formula-math\">\\[\\sum_{k=1}^{n}(pa_k\\pm qb_k\\pm r)=p\\sum_{k=1}^{n}a_k\\pm q\\sum_{k=1}^{n}b_k\\pm rn\\quad(\\text{복부호동순})\\]</div>\n  </div>\n  <div class=\"note\"><b>주의</b> — \\(\\sum\\)는 곱셈·나눗셈·거듭제곱에 대해서는 성립하지 않는다. 일반적으로 다음 식의 좌변과 우변은 서로 다르다.\n    \\[\\sum a_kb_k\\ne\\Big(\\sum a_k\\Big)\\Big(\\sum b_k\\Big),\\quad \\sum\\frac{a_k}{b_k}\\ne\\frac{\\sum a_k}{\\sum b_k},\\quad \\sum a_k^{\\,2}\\ne\\Big(\\sum a_k\\Big)^2\\]</div>\n  <div class=\"example\">\n    <span class=\"example-label\">보기</span>\n    <ol class=\"example-list\">\n      <li>\\(\\displaystyle\\sum_{k=1}^{n}(3a_k-5b_k)=3\\sum_{k=1}^{n}a_k-5\\sum_{k=1}^{n}b_k\\)</li>\n      <li>\\(\\displaystyle\\sum_{k=1}^{20} 6=6\\times 20=120\\)</li>\n      <li>\\(\\displaystyle\\sum_{k=1}^{10}a_k=8,\\ \\sum_{k=1}^{10}b_k=-5\\)일 때 \\(\\displaystyle\\sum_{k=1}^{10}(2a_k-5b_k)=2\\times 8-5\\times(-5)=41\\)</li>\n    </ol>\n  </div>\n</div>\n"}, {"topic": "합의 기호 ∑", "no": 3, "title": "자연수의 거듭제곱의 합", "html": "\n<div class=\"concept-card\">\n  <div class=\"def-row\">\n    <div class=\"def-label\">거듭제곱의 합 공식</div>\n    <div class=\"def-body\">\n      $$\\sum_{k=1}^{n}k=\\frac{n(n+1)}{2},\\qquad \\sum_{k=1}^{n}k^2=\\frac{n(n+1)(2n+1)}{6}$$\n      $$\\sum_{k=1}^{n}k^3=\\left\\{\\frac{n(n+1)}{2}\\right\\}^2$$</div>\n  </div>\n</div>\n<div class=\"concept-body\">\n  <p class=\"prose\">\\(1\\)부터 \\(n\\)까지의 자연수의 합·제곱의 합·세제곱의 합은 위 세 공식으로 구한다. 자연수의 합은 첫째항 \\(1\\), 공차 \\(1\\)인 등차수열의 합이고, 제곱·세제곱의 합은 항등식을 이용하여 유도한다.</p>\n  <div class=\"derive\">\n    <div class=\"derive-title\">\\(\\sum k^2\\)의 유도 — 항등식 \\((k+1)^3-k^3=3k^2+3k+1\\) 이용</div>\n    <div class=\"derive-line\">\\(k=1,\\ 2,\\ 3,\\ \\cdots,\\ n\\)을 차례대로 대입하여 변끼리 모두 더하면</div>\n    <div class=\"derive-line\">\\(\\displaystyle (n+1)^3-1^3=3\\sum_{k=1}^{n}k^2+3\\sum_{k=1}^{n}k+n\\)</div>\n    <div class=\"derive-line\">\\(\\displaystyle\\sum_{k=1}^{n}k=\\frac{n(n+1)}{2}\\)을 대입하여 정리하면</div>\n    <div class=\"derive-line\">\\(\\displaystyle\\sum_{k=1}^{n}k^2=\\frac{n(n+1)(2n+1)}{6}\\)</div>\n  </div>\n  <div class=\"formula\">\n    <span class=\"formula-tag\">자연수의 거듭제곱의 합</span>\n    <div class=\"formula-math\">\\[\\sum_{k=1}^{n}k=\\frac{n(n+1)}{2},\\quad \\sum_{k=1}^{n}k^2=\\frac{n(n+1)(2n+1)}{6},\\quad \\sum_{k=1}^{n}k^3=\\left\\{\\frac{n(n+1)}{2}\\right\\}^2\\]</div>\n  </div>\n  <div class=\"note\">세제곱의 합도 항등식 \\((k+1)^4-k^4=4k^3+6k^2+4k+1\\)을 같은 방법으로 더하여 유도한다. \\(\\displaystyle\\sum k^3=\\Big(\\sum k\\Big)^2\\)이 성립함에 주목한다. 또 \\(\\displaystyle\\sum_{k=1}^{n}k(k+1)=\\sum k^2+\\sum k=\\frac{n(n+1)(n+2)}{3}\\)은 자주 쓰이므로 공식처럼 알아두면 좋다.</div>\n  <div class=\"example\">\n    <span class=\"example-label\">보기</span>\n    <ol class=\"example-list\">\n      <li>\\(\\displaystyle 1+2+3+\\cdots+10=\\sum_{k=1}^{10}k=\\frac{10\\times 11}{2}=55\\)</li>\n      <li>\\(\\displaystyle 3^2+4^2+\\cdots+10^2=\\sum_{k=1}^{10}k^2-1^2-2^2=\\frac{10\\times 11\\times 21}{6}-5=385-5=380\\)</li>\n      <li>\\(\\displaystyle\\sum_{k=1}^{20}(4k+1)=4\\times\\frac{20\\times 21}{2}+1\\times 20=840+20=860\\)</li>\n    </ol>\n  </div>\n</div>\n"}, {"topic": "여러 가지 수열의 합", "no": 1, "title": "분수 꼴로 주어진 수열의 합", "html": "\n<div class=\"concept-card\">\n  <div class=\"def-row\">\n    <div class=\"def-label\">부분분수 분해</div>\n    <div class=\"def-body\">분수 꼴 수열의 합은 일반항을 부분분수로 변형한 뒤, 연쇄적으로 소거되는 항을 정리하여 구한다.\n      $$\\frac{1}{AB}=\\frac{1}{B-A}\\left(\\frac{1}{A}-\\frac{1}{B}\\right)\\quad(\\text{단, }A\\ne 0,\\ B\\ne 0,\\ A\\ne B)$$</div>\n  </div>\n</div>\n<div class=\"concept-body\">\n  <p class=\"prose\">일반항이 분수 꼴인 수열의 합은 일반항을 부분분수로 분해한 뒤 \\(k=1,\\ 2,\\ \\cdots,\\ n\\)을 대입하면 가운데 항들이 연쇄적으로 소거된다. 이때 남는 항은 앞·뒤에서 <b>대칭이 되는 위치</b>에 있다.</p>\n  <div class=\"derive\">\n    <div class=\"derive-title\">\\(\\displaystyle\\sum_{k=1}^{10}\\frac{1}{k(k+1)}\\) 계산</div>\n    <div class=\"derive-line\">\\(\\displaystyle=\\sum_{k=1}^{10}\\left(\\frac{1}{k}-\\frac{1}{k+1}\\right)=\\left(1-\\frac{1}{2}\\right)+\\left(\\frac{1}{2}-\\frac{1}{3}\\right)+\\cdots+\\left(\\frac{1}{10}-\\frac{1}{11}\\right)\\)</div>\n    <div class=\"derive-line\">\\(\\displaystyle=1-\\frac{1}{11}=\\frac{10}{11}\\)</div>\n  </div>\n  <div class=\"formula\">\n    <span class=\"formula-tag\">자주 쓰는 식</span>\n    <div class=\"formula-math\">\\[\\sum_{k=1}^{n}\\frac{1}{k(k+1)}=\\sum_{k=1}^{n}\\left(\\frac{1}{k}-\\frac{1}{k+1}\\right),\\qquad \\sum_{k=1}^{n}\\frac{1}{k(k+a)}=\\frac{1}{a}\\sum_{k=1}^{n}\\left(\\frac{1}{k}-\\frac{1}{k+a}\\right)\\]\\[\\sum_{k=1}^{n}\\frac{1}{(k+a)(k+b)}=\\frac{1}{b-a}\\sum_{k=1}^{n}\\left(\\frac{1}{k+a}-\\frac{1}{k+b}\\right)\\quad(a\\ne b)\\]</div>\n  </div>\n  <div class=\"note\">소거 형태는 ① 이웃 항이 <b>연달아 소거</b>되는 경우(\\(\\frac{1}{k(k+1)}\\))와 ② 한 칸 <b>건너뛰며 소거</b>되는 경우(\\(\\frac{1}{k(k+2)}\\))가 있다. 건너뛰는 경우, 앞에서 두 항이 남으면 뒤에서도 두 항이 남는다.</div>\n  <div class=\"example\">\n    <span class=\"example-label\">보기</span>\n    <ol class=\"example-list\">\n      <li>\\(\\displaystyle\\sum_{k=1}^{n}\\frac{1}{k(k+1)}=1-\\frac{1}{n+1}=\\frac{n}{n+1}\\)</li>\n      <li>\\(\\displaystyle\\sum_{k=1}^{50}\\frac{1}{(k+1)(k+2)}=\\frac{1}{2}-\\frac{1}{52}=\\frac{25}{52}\\)</li>\n    </ol>\n  </div>\n</div>\n"}, {"topic": "여러 가지 수열의 합", "no": 2, "title": "분모가 무리식인 수열의 합", "html": "\n<div class=\"concept-card\">\n  <div class=\"def-row\">\n    <div class=\"def-label\">분모의 유리화</div>\n    <div class=\"def-body\">분모가 무리식이면 분모를 유리화한 뒤, 합이 \\(0\\)이 되는 항을 소거한다.\n      $$\\frac{1}{\\sqrt{k+1}+\\sqrt{k}}=\\frac{\\sqrt{k+1}-\\sqrt{k}}{(\\sqrt{k+1}+\\sqrt{k})(\\sqrt{k+1}-\\sqrt{k})}=\\sqrt{k+1}-\\sqrt{k}$$</div>\n  </div>\n</div>\n<div class=\"concept-body\">\n  <p class=\"prose\">일반항의 분모가 무리식이면 분모를 유리화하여 두 무리식의 <b>차</b>로 만든다. 그 후 \\(k=1,\\ 2,\\ \\cdots\\)를 대입하면 분수 꼴과 마찬가지로 항이 연쇄적으로 소거된다.</p>\n  <div class=\"formula\">\n    <span class=\"formula-tag\">분모가 무리식인 수열의 합</span>\n    <div class=\"formula-math\">\\[\\sum_{k=1}^{n}\\frac{1}{\\sqrt{k+1}+\\sqrt{k}}=\\sum_{k=1}^{n}\\left(\\sqrt{k+1}-\\sqrt{k}\\right)=\\sqrt{n+1}-1\\]</div>\n  </div>\n  <div class=\"note\">유리화의 일반형은 \\(\\dfrac{c}{\\sqrt{a}+\\sqrt{b}}=\\dfrac{c(\\sqrt{a}-\\sqrt{b})}{a-b}\\) (단, \\(a\\ne b\\))이다. 분모를 유리화하면 분자에 두 무리식의 차가 생겨 소거 구조가 만들어진다.</div>\n  <div class=\"example\">\n    <span class=\"example-label\">보기</span>\n    <ol class=\"example-list\">\n      <li>\\(\\displaystyle\\sum_{k=1}^{99}\\frac{1}{\\sqrt{k+1}+\\sqrt{k}}=\\sqrt{100}-\\sqrt{1}=10-1=9\\)</li>\n      <li>\\(\\displaystyle\\sum_{k=1}^{14}\\frac{1}{\\sqrt{k+2}+\\sqrt{k}}=\\frac{1}{2}\\sum_{k=1}^{14}(\\sqrt{k+2}-\\sqrt{k})=\\frac{1}{2}\\left(-1-\\sqrt{2}+\\sqrt{15}+\\sqrt{16}\\right)=\\frac{1}{2}\\left(3-\\sqrt{2}+\\sqrt{15}\\right)\\)</li>\n    </ol>\n  </div>\n</div>\n"}, {"topic": "여러 가지 수열의 합", "no": 3, "title": "계차수열", "html": "\n<div class=\"concept-card\">\n  <div class=\"def-row\">\n    <div class=\"def-label\">계차수열</div>\n    <div class=\"def-body\">수열 \\(\\{a_n\\}\\)에서 이웃하는 두 항의 차 \\(b_n=a_{n+1}-a_n\\ (n=1,\\ 2,\\ 3,\\ \\cdots)\\)으로 이루어진 수열 \\(\\{b_n\\}\\)을 \\(\\{a_n\\}\\)의 <b>계차수열</b>이라 한다.</div>\n  </div>\n  <div class=\"def-row\">\n    <div class=\"def-label\">일반항 공식</div>\n    <div class=\"def-body\">\\(\\{b_n\\}\\)이 \\(\\{a_n\\}\\)의 계차수열이면\n      $$a_n=a_1+\\sum_{k=1}^{n-1} b_k\\quad(n\\ge 2)$$</div>\n  </div>\n</div>\n<div class=\"concept-body\">\n  <p class=\"prose\">계차수열 \\(\\{b_n\\}\\)의 일반항을 먼저 구한 뒤, \\(\\displaystyle a_n=a_1+\\sum_{k=1}^{n-1}b_k\\ (n\\ge 2)\\)로 원수열의 일반항을 구한다. 구한 일반항에 \\(n=1\\)을 대입한 값이 원수열의 첫째항과 같은지 반드시 확인한다.</p>\n  <div class=\"formula\">\n    <span class=\"formula-tag\">계차수열을 이용한 일반항</span>\n    <div class=\"formula-math\">\\[a_n=a_1+\\sum_{k=1}^{n-1}b_k\\quad(n\\ge 2)\\]</div>\n  </div>\n  <div class=\"note\">계차수열이 <b>등비수열</b>이면 등비수열의 합 공식을, <b>등차수열</b>이면 자연수의 거듭제곱의 합 공식을 이용한다.</div>\n  <div class=\"example\">\n    <span class=\"example-label\">보기</span>\n    <ol class=\"example-list\">\n      <li>수열 \\(1,\\ 3,\\ 7,\\ 15,\\ 31,\\ \\cdots\\)의 계차수열은 \\(2,\\ 4,\\ 8,\\ 16,\\ \\cdots\\) (첫째항 \\(2\\), 공비 \\(2\\))이므로 \\(\\displaystyle a_n=1+\\sum_{k=1}^{n-1}2^k=1+(2^n-2)=2^n-1\\ (n\\ge 2)\\)이고, \\(n=1\\)일 때도 성립한다.</li>\n      <li>수열 \\(1,\\ 2,\\ 4,\\ 7,\\ 11,\\ \\cdots\\)의 계차수열은 \\(1,\\ 2,\\ 3,\\ 4,\\ \\cdots\\) (첫째항 \\(1\\), 공차 \\(1\\))이므로 \\(\\displaystyle a_n=1+\\sum_{k=1}^{n-1}k=1+\\frac{(n-1)n}{2}=\\frac{n^2-n+2}{2}\\ (n\\ge 2)\\)이고, \\(n=1\\)일 때도 성립한다.</li>\n    </ol>\n  </div>\n</div>\n"}]}</script>
<script id="examples" type="application/json">{"unit": "Ⅲ. 수열 — 09. 수열의 합", "source": "수학의 바이블 개념ON 대수 (본책, 교사용) · 대표 예제", "count": 7, "examples": [{"no": 1, "topic": "합의 기호 ∑", "title": "∑의 뜻과 성질", "problem_intro": "다음 물음에 답하시오.", "problem_parts": ["\\(\\displaystyle\\sum_{k=1}^{n} a_k=2n+1\\)일 때, \\(\\displaystyle\\sum_{k=1}^{30}(a_{2k-1}+a_{2k})\\)의 값을 구하시오.", "\\(\\displaystyle\\sum_{k=1}^{10}(2a_k-b_k)=25\\), \\(\\displaystyle\\sum_{k=1}^{10}(a_k+b_k)=-13\\)일 때, \\(\\displaystyle\\sum_{k=1}^{10}(a_k-b_k)\\)의 값을 구하시오."], "approach": ["⑴ \\(\\displaystyle\\sum_{k=1}^{30}(a_{2k-1}+a_{2k})\\)의 \\(k\\)에 \\(1,\\ 2,\\ \\cdots,\\ 30\\)을 대입하여 \\(\\sum\\)를 쓰지 않는 덧셈식으로 나타낸다.", "⑵ \\(\\sum(a_k+b_k)=\\sum a_k+\\sum b_k\\), \\(\\sum(a_k-b_k)=\\sum a_k-\\sum b_k\\)를 이용해 \\(\\sum a_k,\\ \\sum b_k\\)를 구한다."], "solution": ["⑴ \\(\\displaystyle\\sum_{k=1}^{30}(a_{2k-1}+a_{2k})=(a_1+a_2)+(a_3+a_4)+\\cdots+(a_{59}+a_{60})\\)", "\\(\\displaystyle=\\sum_{k=1}^{60}a_k=2\\times 60+1=121\\)", "⑵ \\(\\displaystyle\\sum_{k=1}^{10}(2a_k-b_k)=25\\)에서 \\(\\displaystyle 2\\sum_{k=1}^{10}a_k-\\sum_{k=1}^{10}b_k=25\\)", "\\(\\displaystyle\\sum_{k=1}^{10}(a_k+b_k)=-13\\)에서 \\(\\displaystyle\\sum_{k=1}^{10}a_k+\\sum_{k=1}^{10}b_k=-13\\)", "두 식을 연립하면 \\(\\displaystyle\\sum_{k=1}^{10}a_k=4,\\ \\sum_{k=1}^{10}b_k=-17\\)", "\\(\\displaystyle\\therefore \\sum_{k=1}^{10}(a_k-b_k)=\\sum_{k=1}^{10}a_k-\\sum_{k=1}^{10}b_k=4-(-17)=21\\)"], "alt_solution": [], "answer": "⑴ \\(121\\)　⑵ \\(21\\)", "bible": "기호 \\(\\sum\\)의 뜻을 이용한 문제는 \\(\\sum\\)를 쓰지 않는 덧셈식으로 바꾸면 편리할 때가 있다. \\(\\displaystyle\\sum_{k=1}^{n}(a_{2k-1}+a_{2k})=(a_1+a_2)+(a_3+a_4)+\\cdots+(a_{2n-1}+a_{2n})=\\sum_{k=1}^{2n}a_k\\)임을 기억한다."}, {"no": 2, "topic": "합의 기호 ∑", "title": "∑와 등차수열, 등비수열", "problem_intro": "다음 물음에 답하시오.", "problem_parts": ["등차수열 \\(\\{a_n\\}\\)에 대하여 \\(a_2=9,\\ a_5=21\\)일 때, \\(\\displaystyle\\sum_{k=4}^{10} a_k\\)의 값을 구하시오.", "공비가 음수인 등비수열 \\(\\{a_n\\}\\)에 대하여 \\(a_7=81a_3\\), \\(\\displaystyle\\sum_{k=1}^{5} a_k=122\\)일 때, \\(a_4\\)의 값을 구하시오."], "approach": ["첫째항 \\(a\\), 공차 \\(d\\)인 등차수열이면 \\(\\displaystyle\\sum_{k=1}^{n}a_k=\\frac{n\\{2a+(n-1)d\\}}{2}\\)이다.", "첫째항 \\(a\\), 공비 \\(r\\,(r\\ne 1)\\)인 등비수열이면 \\(\\displaystyle\\sum_{k=1}^{n}a_k=\\frac{a(1-r^n)}{1-r}\\)이다."], "solution": ["⑴ 등차수열의 첫째항을 \\(a\\), 공차를 \\(d\\)라 하면", "\\(a_2=a+d=9,\\ a_5=a+4d=21\\)", "두 식을 연립하면 \\(a=5,\\ d=4\\)", "\\(\\displaystyle\\sum_{k=4}^{10}a_k=\\sum_{k=1}^{10}a_k-\\sum_{k=1}^{3}a_k=\\frac{10(2\\times 5+9\\times 4)}{2}-\\frac{3(2\\times 5+2\\times 4)}{2}\\)", "\\(\\displaystyle=230-27=203\\)", "⑵ 등비수열의 첫째항을 \\(a\\), 공비를 \\(r\\,(r<0)\\)이라 하면", "\\(a_7=81a_3\\)에서 \\(ar^6=81ar^2,\\ r^4=81\\)", "\\(\\therefore r=-3\\ (\\because r<0)\\)", "\\(\\displaystyle\\sum_{k=1}^{5}a_k=122\\)에서 \\(\\displaystyle\\frac{a\\{1-(-3)^5\\}}{1-(-3)}=122,\\ 61a=122 \\therefore a=2\\)", "따라서 \\(a_n=2\\times(-3)^{n-1}\\)이므로 \\(a_4=2\\times(-3)^3=-54\\)"], "alt_solution": ["⑴ \\(\\displaystyle\\sum_{k=4}^{10}a_k\\)는 첫째항 \\(a_4=17\\), 공차 \\(4\\), 항수 \\(7\\)인 등차수열의 합으로 구할 수도 있다.", "\\(\\displaystyle\\sum_{k=4}^{10}a_k=\\frac{7(2\\times 17+6\\times 4)}{2}=203\\)"], "answer": "⑴ \\(203\\)　⑵ \\(-54\\)", "bible": "수열 \\(\\{a_n\\}\\)에 대하여 \\(\\displaystyle\\sum_{k=1}^{n}a_k\\)는 첫째항부터 제\\(n\\)항까지의 합 \\(S_n\\)의 다른 표현이다. 즉 \\(\\displaystyle S_n=a_1+a_2+\\cdots+a_n=\\sum_{k=1}^{n}a_k\\)이므로 등차·등비수열의 합 공식을 그대로 쓸 수 있다."}, {"no": 3, "topic": "합의 기호 ∑", "title": "자연수의 거듭제곱의 합", "problem_intro": "다음 식의 값을 구하시오.", "problem_parts": ["\\(\\displaystyle\\sum_{k=1}^{5} k(k+1)(k+2)\\)", "\\(\\displaystyle\\sum_{k=1}^{8}\\frac{1+2+3+\\cdots+k}{k+1}\\)", "\\(1\\times 10+2\\times 9+3\\times 8+\\cdots+10\\times 1\\)"], "approach": ["\\(\\sum\\)의 성질로 식을 전개한 뒤 \\(\\displaystyle\\sum k=\\frac{n(n+1)}{2}\\), \\(\\displaystyle\\sum k^2=\\frac{n(n+1)(2n+1)}{6}\\), \\(\\displaystyle\\sum k^3=\\left\\{\\frac{n(n+1)}{2}\\right\\}^2\\)을 이용한다."], "solution": ["⑴ \\(\\displaystyle\\sum_{k=1}^{5}k(k+1)(k+2)=\\sum_{k=1}^{5}(k^3+3k^2+2k)=\\sum_{k=1}^{5}k^3+3\\sum_{k=1}^{5}k^2+2\\sum_{k=1}^{5}k\\)", "\\(\\displaystyle=\\left(\\frac{5\\times 6}{2}\\right)^2+3\\times\\frac{5\\times 6\\times 11}{6}+2\\times\\frac{5\\times 6}{2}\\)", "\\(\\displaystyle=225+165+30=420\\)", "⑵ \\(\\displaystyle 1+2+\\cdots+k=\\frac{k(k+1)}{2}\\)이므로 일반항은 \\(\\displaystyle\\frac{\\frac{k(k+1)}{2}}{k+1}=\\frac{k}{2}\\)", "\\(\\displaystyle\\sum_{k=1}^{8}\\frac{1+2+\\cdots+k}{k+1}=\\sum_{k=1}^{8}\\frac{k}{2}=\\frac{1}{2}\\sum_{k=1}^{8}k=\\frac{1}{2}\\times\\frac{8\\times 9}{2}=18\\)", "⑶ 수열 \\(1\\times 10,\\ 2\\times 9,\\ \\cdots,\\ 10\\times 1\\)의 일반항을 \\(a_n\\)이라 하면 \\(a_n=n(11-n)=-n^2+11n\\)", "\\(\\displaystyle 1\\times 10+\\cdots+10\\times 1=\\sum_{k=1}^{10}(-k^2+11k)=-\\sum_{k=1}^{10}k^2+11\\sum_{k=1}^{10}k\\)", "\\(\\displaystyle=-\\frac{10\\times 11\\times 21}{6}+11\\times\\frac{10\\times 11}{2}=-385+605=220\\)"], "alt_solution": [], "answer": "⑴ \\(420\\)　⑵ \\(18\\)　⑶ \\(220\\)", "bible": "\\(\\displaystyle\\sum_{k=1}^{10}k=\\frac{10\\times 11}{2}=55\\), \\(\\displaystyle\\sum_{k=1}^{10}k^2=\\frac{10\\times 11\\times 21}{6}=385\\)는 자주 나오는 값이므로 공식처럼 알아두면 좋다. 곱으로 된 일반항은 전개하여 거듭제곱의 합으로 바꾼다."}, {"no": 4, "topic": "합의 기호 ∑", "title": "∑를 여러 개 포함한 식의 계산", "problem_intro": "다음 식의 값을 구하시오.", "problem_parts": ["\\(\\displaystyle\\sum_{n=1}^{10}\\left\\{\\sum_{m=1}^{n}\\left(\\sum_{k=1}^{m}4\\right)\\right\\}\\)", "\\(\\displaystyle\\sum_{n=1}^{4}\\left(\\sum_{m=1}^{n}mn\\right)\\)"], "approach": ["여러 개의 \\(\\sum\\)를 포함한 식에서는 항을 나타내는 문자와 상수를 나타내는 문자를 잘 구분하여 안쪽 \\(\\sum\\)부터 계산한다.", "예를 들어 \\(\\displaystyle\\sum_{m=1}^{n}mn\\)에서 \\(m\\)은 항, \\(n\\)은 상수이므로 \\(\\displaystyle\\sum_{m=1}^{n}mn=n\\sum_{m=1}^{n}m=n\\times\\frac{n(n+1)}{2}\\)이다."], "solution": ["⑴ 안쪽부터: \\(\\displaystyle\\sum_{k=1}^{m}4=4m\\)", "\\(\\displaystyle\\sum_{m=1}^{n}4m=4\\times\\frac{n(n+1)}{2}=2n^2+2n\\)", "\\(\\displaystyle\\sum_{n=1}^{10}(2n^2+2n)=2\\sum_{n=1}^{10}n^2+2\\sum_{n=1}^{10}n\\)", "\\(\\displaystyle=2\\times\\frac{10\\times 11\\times 21}{6}+2\\times\\frac{10\\times 11}{2}=770+110=880\\)", "⑵ 안쪽: \\(\\displaystyle\\sum_{m=1}^{n}mn=n\\times\\frac{n(n+1)}{2}=\\frac{1}{2}(n^3+n^2)\\)", "\\(\\displaystyle\\sum_{n=1}^{4}\\frac{1}{2}(n^3+n^2)=\\frac{1}{2}\\left(\\sum_{n=1}^{4}n^3+\\sum_{n=1}^{4}n^2\\right)\\)", "\\(\\displaystyle=\\frac{1}{2}\\left\\{\\left(\\frac{4\\times 5}{2}\\right)^2+\\frac{4\\times 5\\times 9}{6}\\right\\}=\\frac{1}{2}(100+30)=65\\)"], "alt_solution": [], "answer": "⑴ \\(880\\)　⑵ \\(65\\)", "bible": "\\(\\displaystyle\\sum_{k=1}^{n}k(k+1)=\\sum k^2+\\sum k=\\frac{n(n+1)(n+2)}{3}\\)은 자주 쓰이므로 공식처럼 알아두면 좋다. ⑴에서 \\(\\displaystyle\\sum_{n=1}^{10}(2n^2+2n)=2\\sum_{n=1}^{10}n(n+1)=2\\times\\frac{10\\times 11\\times 12}{3}=880\\)으로 빠르게 계산할 수 있다."}, {"no": 5, "topic": "합의 기호 ∑", "title": "∑로 표현된 수열의 합과 일반항 사이의 관계", "problem_intro": "수열 \\(\\{a_n\\}\\)에 대하여 \\(\\displaystyle\\sum_{k=1}^{n} a_k=n^2\\)일 때, \\(\\displaystyle\\sum_{k=1}^{6} a_{2k+1}\\)의 값을 구하시오.", "problem_parts": [], "approach": ["\\(\\displaystyle\\sum_{k=1}^{n}a_k\\)는 첫째항부터 제\\(n\\)항까지의 합 \\(S_n\\)이므로 \\(\\displaystyle S_n=\\sum_{k=1}^{n}a_k\\)로 놓고 \\(S_n\\)과 \\(a_n\\)의 관계로 \\(a_n\\)을 구한다.", "\\(a_1=S_1\\), \\(n\\ge 2\\)이면 \\(a_n=S_n-S_{n-1}\\)을 이용한다."], "solution": ["\\(\\displaystyle S_n=\\sum_{k=1}^{n}a_k=n^2\\)이라 하면", "\\(n=1\\)일 때, \\(a_1=S_1=1^2=1\\)", "\\(n\\ge 2\\)일 때, \\(a_n=S_n-S_{n-1}=n^2-(n-1)^2=2n-1\\)", "\\(a_1=1\\)은 \\(2n-1\\)에 \\(n=1\\)을 대입한 값과 같으므로 \\(a_n=2n-1\\)", "\\(\\therefore a_{2k+1}=2(2k+1)-1=4k+1\\)", "\\(\\displaystyle\\therefore \\sum_{k=1}^{6}a_{2k+1}=\\sum_{k=1}^{6}(4k+1)=4\\times\\frac{6\\times 7}{2}+6=84+6=90\\)"], "alt_solution": ["\\(a_n=2n-1\\)에서 \\(a_{2k+1}\\)은 \\(k=1\\)일 때 \\(a_3=5\\), \\(k=6\\)일 때 \\(a_{13}=25\\)이고 더하는 항의 수는 \\(6\\)이다.", "수열 \\(\\{a_{2k+1}\\}\\)은 공차 \\(4\\)인 등차수열이므로 \\(\\displaystyle\\sum_{k=1}^{6}a_{2k+1}=\\frac{6(5+25)}{2}=90\\)"], "answer": "\\(90\\)", "bible": "수열 \\(\\{a_n\\}\\)에 대하여 \\(\\displaystyle\\sum_{k=1}^{n}a_k\\)가 주어지면 (i) \\(\\displaystyle a_1=S_1=\\sum_{k=1}^{1}a_k\\), (ii) \\(n\\ge 2\\)이면 \\(\\displaystyle a_n=S_n-S_{n-1}=\\sum_{k=1}^{n}a_k-\\sum_{k=1}^{n-1}a_k\\)를 이용하여 일반항 \\(a_n\\)을 구한다. 구한 일반항이 \\(n=1\\)에서도 성립하는지 반드시 확인한다."}, {"no": 1, "topic": "여러 가지 수열의 합", "title": "분수 꼴로 주어진 수열의 합", "problem_intro": "다음 수열의 첫째항부터 제\\(n\\)항까지의 합을 구하시오.", "problem_parts": ["\\(\\dfrac{1}{1\\times 2},\\ \\dfrac{1}{2\\times 3},\\ \\dfrac{1}{3\\times 4},\\ \\dfrac{1}{4\\times 5},\\ \\cdots\\)", "\\(\\dfrac{1}{2^2-1},\\ \\dfrac{1}{3^2-1},\\ \\dfrac{1}{4^2-1},\\ \\dfrac{1}{5^2-1},\\ \\cdots\\)"], "approach": ["일반항을 부분분수로 변형하여 계산한다. \\(\\dfrac{1}{AB}=\\dfrac{1}{B-A}\\left(\\dfrac{1}{A}-\\dfrac{1}{B}\\right)\\) (단, \\(A\\ne 0,\\ B\\ne 0,\\ A\\ne B\\))."], "solution": ["⑴ 일반항을 \\(a_n\\)이라 하면 \\(\\displaystyle a_n=\\frac{1}{n(n+1)}=\\frac{1}{n}-\\frac{1}{n+1}\\)", "\\(\\displaystyle\\sum_{k=1}^{n}a_k=\\sum_{k=1}^{n}\\left(\\frac{1}{k}-\\frac{1}{k+1}\\right)=\\left(1-\\frac{1}{2}\\right)+\\left(\\frac{1}{2}-\\frac{1}{3}\\right)+\\cdots+\\left(\\frac{1}{n}-\\frac{1}{n+1}\\right)\\)", "\\(\\displaystyle=1-\\frac{1}{n+1}=\\frac{n}{n+1}\\)", "⑵ 일반항을 \\(a_n\\)이라 하면 \\(\\displaystyle a_n=\\frac{1}{(n+1)^2-1}=\\frac{1}{n(n+2)}=\\frac{1}{2}\\left(\\frac{1}{n}-\\frac{1}{n+2}\\right)\\)", "\\(\\displaystyle\\sum_{k=1}^{n}a_k=\\frac{1}{2}\\sum_{k=1}^{n}\\left(\\frac{1}{k}-\\frac{1}{k+2}\\right)\\)", "\\(\\displaystyle=\\frac{1}{2}\\left\\{\\left(1-\\frac{1}{3}\\right)+\\left(\\frac{1}{2}-\\frac{1}{4}\\right)+\\cdots+\\left(\\frac{1}{n}-\\frac{1}{n+2}\\right)\\right\\}\\)", "\\(\\displaystyle=\\frac{1}{2}\\left(1+\\frac{1}{2}-\\frac{1}{n+1}-\\frac{1}{n+2}\\right)=\\frac{n(3n+5)}{4(n+1)(n+2)}\\)"], "alt_solution": [], "answer": "⑴ \\(\\dfrac{n}{n+1}\\)　⑵ \\(\\dfrac{n(3n+5)}{4(n+1)(n+2)}\\)", "bible": "분수 꼴 수열의 합에서 자주 쓰는 식: \\(\\displaystyle\\sum\\frac{1}{k(k+1)}=\\sum\\left(\\frac{1}{k}-\\frac{1}{k+1}\\right)\\), \\(\\displaystyle\\sum\\frac{1}{k(k+a)}=\\frac{1}{a}\\sum\\left(\\frac{1}{k}-\\frac{1}{k+a}\\right)\\), \\(\\displaystyle\\sum\\frac{1}{(k+a)(k+b)}=\\frac{1}{b-a}\\sum\\left(\\frac{1}{k+a}-\\frac{1}{k+b}\\right)\\). 건너뛰며 소거될 때는 앞·뒤에서 같은 개수의 항이 남는다."}, {"no": 2, "topic": "여러 가지 수열의 합", "title": "무리식, 로그 꼴로 주어진 수열의 합", "problem_intro": "다음 식의 값을 구하시오.", "problem_parts": ["\\(\\displaystyle\\sum_{k=1}^{40}\\frac{3}{\\sqrt{3k+1}+\\sqrt{3k-2}}\\)", "\\(\\displaystyle\\sum_{k=1}^{48}\\log_5\\frac{k+2}{k+1}\\)"], "approach": ["⑴ 분모가 무리식이면 분모를 유리화하여 소거한다.", "⑵ 로그 꼴이면 로그의 성질 \\(\\log_a M+\\log_a N=\\log_a MN\\)을 이용한다."], "solution": ["⑴ \\(\\displaystyle\\sum_{k=1}^{40}\\frac{3}{\\sqrt{3k+1}+\\sqrt{3k-2}}=\\sum_{k=1}^{40}\\frac{3(\\sqrt{3k+1}-\\sqrt{3k-2})}{(3k+1)-(3k-2)}\\)", "\\(\\displaystyle=\\sum_{k=1}^{40}(\\sqrt{3k+1}-\\sqrt{3k-2})\\)", "\\(\\displaystyle=(\\sqrt{4}-\\sqrt{1})+(\\sqrt{7}-\\sqrt{4})+\\cdots+(\\sqrt{121}-\\sqrt{118})\\)", "\\(\\displaystyle=\\sqrt{121}-\\sqrt{1}=11-1=10\\)", "⑵ \\(\\displaystyle\\sum_{k=1}^{48}\\log_5\\frac{k+2}{k+1}=\\log_5\\frac{3}{2}+\\log_5\\frac{4}{3}+\\cdots+\\log_5\\frac{50}{49}\\)", "\\(\\displaystyle=\\log_5\\left(\\frac{3}{2}\\times\\frac{4}{3}\\times\\cdots\\times\\frac{50}{49}\\right)=\\log_5\\frac{50}{2}\\)", "\\(\\displaystyle=\\log_5 25=\\log_5 5^2=2\\)"], "alt_solution": [], "answer": "⑴ \\(10\\)　⑵ \\(2\\)", "bible": "분모가 무리식이면 \\(\\dfrac{c}{\\sqrt{a}+\\sqrt{b}}=\\dfrac{c(\\sqrt{a}-\\sqrt{b})}{a-b}\\)로 유리화한다. 로그 꼴은 \\(\\log_a\\dfrac{M}{N}=\\log_a M-\\log_a N\\), \\(\\log_a MN=\\log_a M+\\log_a N\\)을 이용해 곱·약분으로 소거한다."}]}</script>
<script>
const CONCEPTS = JSON.parse(document.getElementById('concepts').textContent).concepts;
const EXAMPLES = JSON.parse(document.getElementById('examples').textContent).examples;
const isGeo = x => x.topic === '여러 가지 수열의 합';
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

let mode = 'concept';          // 'concept' | 'example'
let idx = { concept:0, example:0 };  // 모드별 현재 위치 기억
let showSol = false;           // 예제 해설 펼침 여부

function list(){ return mode === 'concept' ? CONCEPTS : EXAMPLES; }

/* ── 라인/블록 (예제 해설용) ── */
function lineEl(text){
  const t = text.trim();
  const div = document.createElement('div');
  const isEq = t.startsWith('\\(') || t.startsWith('\\[');
  div.className = 'line' + (isEq ? ' eq' : '');
  div.innerHTML = esc(text).replace(/(（[^）]*）|\([^()]*이용[^()]*\))\s*$/u, '<span class="note">$1</span>');
  return div;
}
function blockEl(labelText, labelClass, lines){
  const wrap = document.createElement('div'); wrap.className = 'block';
  const lab = document.createElement('span'); lab.className = 'label ' + labelClass; lab.textContent = labelText;
  wrap.appendChild(lab);
  const box = document.createElement('div'); box.className = 'lines';
  lines.forEach(l => box.appendChild(lineEl(l)));
  wrap.appendChild(box);
  return wrap;
}

/* ── 번호 그리드 ── */
const gridNav = document.getElementById('gridNav');
function buildGrid(){
  gridNav.innerHTML = '';
  const data = list();
  [['∑ 기호','합의 기호 ∑','ar'],['여러 가지','여러 가지 수열의 합','ge']].forEach(([label,topic,cls])=>{
    const row = document.createElement('div'); row.className = 'gn-row';
    const lab = document.createElement('div'); lab.className = 'gn-label ' + cls; lab.textContent = label;
    const nums = document.createElement('div'); nums.className = 'gn-nums';
    data.forEach((x,i)=>{
      if(x.topic !== topic) return;
      const b = document.createElement('button');
      b.className = 'gn-num ' + cls;
      b.textContent = x.no;
      b.dataset.idx = i;
      b.addEventListener('click', ()=> goTo(i));
      nums.appendChild(b);
    });
    row.appendChild(lab); row.appendChild(nums);
    gridNav.appendChild(row);
  });
  updateGrid();
}
function updateGrid(){
  document.querySelectorAll('.gn-num').forEach(b=>{
    b.classList.toggle('active', Number(b.dataset.idx) === idx[mode]);
  });
}

/* ── 렌더 ── */
const viewer = document.getElementById('viewer');
function render(){
  const data = list();
  const cur = idx[mode];
  const x = data[cur];
  const geo = isGeo(x);
  viewer.innerHTML = '';

  if(mode === 'concept'){
    const card = document.createElement('section');
    card.className = 'card cv ' + (geo ? 'ge geo' : 'ar');
    const head = document.createElement('div'); head.className = 'card-head';
    head.innerHTML =
      `<span class="badge${geo?' geo':''}">개념 <span class="num">${String(x.no).padStart(2,'0')}</span></span>`+
      `<span class="topic-tag${geo?' geo':''}">${x.topic}</span>`+
      `<span class="ex-title${geo?' geo':''}">${x.title}</span>`;
    card.appendChild(head);
    const body = document.createElement('div');
    body.innerHTML = x.html;   // 개념 본문은 완성된 HTML 그대로
    card.appendChild(body);
    viewer.appendChild(card);
  } else {
    const card = document.createElement('section');
    card.className = 'card' + (geo ? ' geo':'');
    const head = document.createElement('div'); head.className = 'card-head';
    head.innerHTML =
      `<span class="badge${geo?' geo':''}">대표 예제 <span class="num">${String(x.no).padStart(2,'0')}</span></span>`+
      `<span class="topic-tag${geo?' geo':''}">${x.topic}</span>`+
      `<span class="ex-title${geo?' geo':''}">${esc(x.title)}</span>`;
    card.appendChild(head);

    const prob = document.createElement('div'); prob.className = 'problem' + (geo?' geo':'');
    prob.appendChild(Object.assign(document.createElement('div'),{className:'intro',innerHTML:esc(x.problem_intro)}));
    if(x.problem_parts && x.problem_parts.length){
      const ol = document.createElement('ol'); ol.className='parts';
      x.problem_parts.forEach(p=>{ const li=document.createElement('li'); li.innerHTML=esc(p); ol.appendChild(li); });
      prob.appendChild(ol);
    }
    card.appendChild(prob);

    const bar = document.createElement('div'); bar.className = 'sol-bar';
    bar.innerHTML =
      `<span class="lbl">풀이·해설</span>`+
      `<label class="switch"><input type="checkbox" id="solSwitch"${showSol?' checked':''}><span class="slider"></span></label>`+
      `<span class="sol-state" id="solState">${showSol?'펼침':'접힘'}</span>`;
    card.appendChild(bar);

    const sol = document.createElement('div'); sol.className = 'solution' + (showSol?' open':'');
    if(x.approach && x.approach.length) sol.appendChild(blockEl('바로 접근','approach',x.approach));
    if(x.solution && x.solution.length) sol.appendChild(blockEl('바른 풀이','solve',x.solution));
    if(x.alt_solution && x.alt_solution.length) sol.appendChild(blockEl('다른 풀이','alt',x.alt_solution));
    const ans = document.createElement('div'); ans.className='answer';
    ans.innerHTML = `<span class="k">정답</span><span>${esc(x.answer)}</span>`;
    sol.appendChild(ans);
    if(x.bible){
      const b = document.createElement('div'); b.className='bible';
      b.innerHTML = `<span class="tag">Bible Says</span><div class="body">${esc(x.bible).replace(/\n/g,'<br>')}</div>`;
      sol.appendChild(b);
    }
    card.appendChild(sol);
    viewer.appendChild(card);

    const sw = document.getElementById('solSwitch');
    sw.addEventListener('change', ()=>{
      showSol = sw.checked;
      sol.classList.toggle('open', showSol);
      document.getElementById('solState').textContent = showSol ? '펼침' : '접힘';
    });
  }

  updateGrid();
  document.getElementById('counter').textContent = `${cur+1} / ${data.length}`;
  document.getElementById('prevBtn').disabled = cur === 0;
  document.getElementById('nextBtn').disabled = cur === data.length - 1;
  viewer.scrollTop = 0;
  typesetNode(viewer);
}

function goTo(i){
  const data = list();
  idx[mode] = Math.max(0, Math.min(data.length-1, i));
  render();
}
function setMode(m){
  if(m === mode) return;
  mode = m;
  document.querySelectorAll('.mode-tab').forEach(b=> b.classList.toggle('active', b.dataset.mode===m));
  buildGrid();
  render();
}

/* ── MathJax typeset (해당 노드만) ── */
function typesetNode(node){
  if(window.MathJax && window.MathJax.typesetPromise){
    window.MathJax.typesetClear && window.MathJax.typesetClear([node]);
    window.MathJax.typesetPromise([node]).catch(e=>console.error('MathJax:', e));
  } else {
    setTimeout(()=>typesetNode(node), 50);
  }
}

/* ── 컨트롤 ── */
document.getElementById('modeTabs').addEventListener('click', e=>{
  const b = e.target.closest('.mode-tab'); if(b) setMode(b.dataset.mode);
});
document.getElementById('prevBtn').addEventListener('click', ()=> goTo(idx[mode]-1));
document.getElementById('nextBtn').addEventListener('click', ()=> goTo(idx[mode]+1));
document.addEventListener('keydown', ev=>{
  if(ev.key === 'ArrowLeft') goTo(idx[mode]-1);
  else if(ev.key === 'ArrowRight') goTo(idx[mode]+1);
});
let tx=null, ty=null;
viewer.addEventListener('touchstart', e=>{ const t=e.changedTouches[0]; tx=t.clientX; ty=t.clientY; }, {passive:true});
viewer.addEventListener('touchend', e=>{
  if(tx===null) return;
  const t=e.changedTouches[0];
  const dx=t.clientX-tx, dy=t.clientY-ty;
  if(Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)*1.5){
    if(dx < 0) goTo(idx[mode]+1); else goTo(idx[mode]-1);
  }
  tx=ty=null;
}, {passive:true});

buildGrid();
render();
</script>
</body>
</html>
