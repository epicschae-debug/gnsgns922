<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>경북대 의예 논술 기출</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<style>:root{--ink:#0c1019;--ink-2:#141a26;--ink-3:#1c2433;--line:#28324a;--text:#eef2fb;--muted:#8893ad;--gold:#f5b544;--gold-soft:#f5b54422;--mint:#5fd6b4;--red:#ff8d76;--r:18px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Pretendard',system-ui,sans-serif;background:var(--ink);color:var(--text);height:100vh;height:100dvh;overflow:hidden;background-image:radial-gradient(900px 480px at 50% -8%,#1d2740 0,transparent 60%),radial-gradient(var(--line) 1px,transparent 1px);background-size:100% 100%,22px 22px;background-attachment:fixed;display:flex;justify-content:center;padding:0 14px calc(12px + env(safe-area-inset-bottom));line-height:1.55}
.app{width:100%;max-width:440px;padding-top:calc(20px + env(safe-area-inset-top));height:100%;display:flex;flex-direction:column}
.top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.back{width:38px;height:38px;flex:none;border-radius:11px;background:var(--ink-2);border:1px solid var(--line);display:grid;place-items:center;color:var(--text);text-decoration:none;font-size:20px}
.back:active{background:var(--ink-3)}
.htitle{font-size:19px;font-weight:800;letter-spacing:-.02em}
.hsub{font-size:12px;color:var(--muted);margin-top:1px}

/* ===== 문제 카드 ===== */
.qcard{background:linear-gradient(180deg,#18202f,#121826);border:1px solid var(--line);border-radius:16px;padding:17px 16px 14px;box-shadow:0 12px 34px #0007;flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden}
.qhead{flex:none;display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:11px}
.qsrc{font-size:12px;color:var(--gold);font-weight:700;letter-spacing:.02em;display:flex;align-items:center;gap:6px}
.qtoday{font-size:10px;background:var(--gold);color:#0c1019;font-weight:800;padding:2px 7px;border-radius:999px;letter-spacing:.02em}
.qtotal{flex:none;font-size:12px;font-weight:800;color:var(--text);background:#202c44;border:1px solid #30405f;padding:5px 11px;border-radius:999px}
.qtags{flex:none;display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid #232e47}
.tag{font-size:11.5px;font-weight:600;padding:4px 10px;border-radius:8px;background:#1b2540;color:#aeb9d4;border:1px solid #2a3754}
.tag.lv{font-weight:700}
.tag.easy{color:var(--mint);border-color:#5fd6b455;background:#5fd6b417}
.tag.mid{color:var(--gold);border-color:#f5b54455;background:var(--gold-soft)}
.tag.hard{color:var(--red);border-color:#ff8d7655;background:#ff8d7615}
.qbody{font-size:14.5px;line-height:1.7;color:#e9eef8;flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding-right:4px;scrollbar-width:thin;scrollbar-color:#2a3754 transparent}
.qbody::-webkit-scrollbar{width:4px}
.qbody::-webkit-scrollbar-thumb{background:#2a3754;border-radius:99px}
.stem{margin-bottom:15px}
.sub{display:flex;gap:10px;align-items:flex-start;margin:12px 0}
.sub .num{flex:none;width:23px;height:23px;border-radius:50%;background:var(--gold-soft);color:var(--gold);font-size:12px;font-weight:700;display:grid;place-items:center;margin-top:2px}
.sub .stxt{flex:1}
.sub .pt{flex:none;font-size:11px;color:var(--muted);font-weight:700;margin-top:4px;white-space:nowrap}
.qfig{margin-top:15px;background:#fff;border-radius:11px;padding:9px}
.qfig img{width:100%;display:block;border-radius:5px}
.qfig .cap{text-align:center;font-size:11px;color:#7d8aa5;margin-top:5px}
.katex{font-size:1.02em}

.nav{flex:none;display:flex;align-items:center;gap:10px;margin-top:12px}
.nav button{flex:1;height:46px;border-radius:13px;border:1px solid var(--line);background:var(--ink-2);color:var(--text);font-size:15px;font-weight:600;font-family:inherit}
.nav button:active{background:var(--ink-3)}
.nav button:disabled{opacity:.35}
.idx{flex:none;min-width:50px;text-align:center;font-size:14px;color:var(--muted);font-variant-numeric:tabular-nums}
.todaybtn{margin-top:9px;height:40px;width:100%;border-radius:12px;border:1px solid #f5b54455;background:var(--gold-soft);color:var(--gold);font-size:13px;font-weight:700;font-family:inherit}

.sec{font-size:13px;color:var(--muted);font-weight:700;margin:26px 2px 11px}
.notice{background:var(--ink-2);border:1px solid var(--line);border-radius:14px;padding:15px 16px;font-size:14px;color:#dbe2f0;line-height:1.6}
.notice .ndate{font-size:11.5px;color:var(--gold);font-weight:700;margin-bottom:7px}
.dday{background:linear-gradient(135deg,#2a1f12,#161019);border:1px solid #3a2f1c;border-radius:16px;padding:18px;text-align:center;position:relative;overflow:hidden}
.dday::after{content:'';position:absolute;right:-30px;top:-30px;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,#f5b54422,transparent 70%)}
.dday .lab{font-size:12.5px;color:var(--muted)}
.dday .big{font-size:38px;font-weight:800;color:var(--gold);letter-spacing:-.02em;margin:3px 0;line-height:1.1}
.dday .sub2{font-size:12px;color:var(--muted)}
.menu{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.mbtn{background:var(--ink-2);border:1px solid var(--line);border-radius:14px;padding:16px 8px;text-align:center;text-decoration:none;color:inherit;display:block;transition:.15s}
.mbtn:active{background:var(--ink-3)}
.mbtn .mi{font-size:22px;display:block;margin-bottom:7px}
.mbtn b{font-size:13px;font-weight:600;display:block}
.mbtn.kakao{background:#3b2f0e;border-color:#5a4a16}
.mbtn.kakao .mi{color:var(--gold)}
.foot{text-align:center;color:var(--muted);font-size:11px;margin-top:26px;line-height:1.6}
.ipsibtn{margin-left:auto;flex:none;font-size:11.5px;font-weight:700;color:var(--gold);background:var(--gold-soft);border:1px solid #f5b54455;padding:6px 11px;border-radius:99px;text-decoration:none}
.ipsibtn:active{background:#f5b54333}

/* ===== 해설 토글 ===== */
.fold{margin-top:16px;border-top:1px solid #232e47;padding-top:14px}
.foldbtn{width:100%;height:42px;border-radius:12px;border:1px solid #f5b54455;
  background:var(--gold-soft);color:var(--gold);font-size:13.5px;font-weight:700;
  font-family:inherit;display:flex;align-items:center;justify-content:center;gap:7px;cursor:pointer}
.foldbtn:active{background:#f5b54333}
.foldbtn::before{content:'\25B6';font-size:9px;transition:transform .18s}
.foldbtn.open::before{transform:rotate(90deg)}
.foldbox{display:none;margin-top:12px;animation:fade .2s ease}
.foldbox.open{display:block}
@keyframes fade{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.foldbox p{margin:9px 0;font-size:13.5px;line-height:1.72;color:#e3e9f6}
.foldbox p b{color:var(--gold)}
.foldbox .boxed,.foldbox .ans{color:var(--mint);font-weight:700}
.gp{margin-top:13px;background:#13233a;border:1px solid #27496e;border-left:3px solid var(--gold);
  border-radius:10px;padding:11px 13px;font-size:12.8px;line-height:1.7;color:#c7d3ea}
.gp::before{content:'\1F4CC \00a0\CC44\C810 \D575\C2EC \D3EC\C778\D2B8';display:block;
  color:var(--gold);font-weight:800;font-size:11.5px;margin-bottom:5px;letter-spacing:.01em}
.foldbox .katex{font-size:.99em}


/* ==== 행간/수식 간격 여유 ==== */
.qbody{line-height:2.05;font-size:14px}
.stem{line-height:2.05;margin-bottom:20px}
.stem br{display:block;content:'';margin-top:6px}
.sub{margin:20px 0;align-items:flex-start}
.sub .stxt{line-height:2.05}
.sub .stxt br{display:block;content:'';margin-top:6px}
.katex{font-size:1.04em;line-height:1.2}
.qbody .katex-display{margin:.6em 0}
.foldbox p{line-height:1.95}
</style></head><body>

/* ===== 문제 등록. 수식은 $…$ 안에 LaTeX. 기하(이차곡선) 문제는 넣지 않음 ===== */
const PROBLEMS = [
 {
  "no": "2022 기출 · 자연Ⅱ 1",
  "topic": "미적분 · 합성함수 · 적분법",
  "level": "상",
  "total": "110점",
  "stem": "<b>[제시문]</b><br>(가) $\\{f(g(x))\\}'=f'(g(x))g'(x)$<br>(나) (치환적분) $\\displaystyle\\int_a^b f(t)\\,dt=\\int_\\alpha^\\beta f(g(x))g'(x)\\,dx$<br>(다) (부분적분) $\\displaystyle\\int_a^b f(x)g'(x)\\,dx=\\big[f(x)g(x)\\big]_a^b-\\int_a^b f'(x)g(x)\\,dx$<br><br><b>[문항]</b><br>실수 전체에서 도함수가 연속인 두 함수 $f(x),g(x)$가 다음을 모두 만족시킨다.<br>(1) 모든 실수 $x$: $\\left\\{f\\!\\left(x+\\tfrac14\\right)\\right\\}^2+\\left\\{f\\!\\left(x-\\tfrac14\\right)\\right\\}^2=1$<br>(2) 모든 실수 $x$: $f(x)\\,f\\!\\left(x+\\tfrac12\\right)=3g(x)-16\\{g(x)\\}^3$<br>(3) $\\left(-\\tfrac14,0\\right)$에서 $-\\tfrac12&lt;g(x)&lt;0$<br>(4) $f\\!\\left(\\tfrac{5}{12}\\right)=-\\dfrac{\\sqrt2}{2},\\ g(0)=0$",
  "subs": [
   [
    "1",
    "<b>【1-1】</b> 모든 정수 $n$에 대하여 $|f'(n)|=|f'(0)|$이 성립함을 증명하시오. (단, $f(0)\\ne0$)",
    "20점"
   ],
   [
    "2",

    "30점"

    "<b>【1-3】</b> $\\displaystyle\\int_{-\\frac1{12}}^{0} f'(x)g(x)\\big[f(x)-2\\{f(x)\\}^3\\big]\\,dx=\\dfrac{q}{p}$라 할 때 $p+q$의 값을 구하시오. (단, $p,q$는 서로소인 자연수)",

  "fig": null,
  "sol": "<p><b>【1-1】</b> 조건 (1) $f(x+\\tfrac12)^2+f(x)^2=1$ 에서 $x$ 대신 $x+\\tfrac12$을 넣으면 $f(x+1)^2+f(x+\\tfrac12)^2=1$, 따라서 $f(x)^2=f(x+1)^2$. 정수 $n$에 대해 $|f(n)|=|f(0)|\\,(\\ne0)$. 양변을 미분한 $2f(x)f'(x)=2f(x+1)f'(x+1)$에서 $|f(n)||f'(n)|=|f(n+1)||f'(n+1)|$ 이고 $|f(n)|=|f(n+1)|$ 이므로 $|f'(n)|=|f'(n+1)|$. 따라서 <b>$|f'(n)|=|f'(0)|$</b>.</p>\n<p><b>【1-2】</b> $g\\!\\left(-\\tfrac1{12}\\right)=a$ 라 하면 조건 (2)로 $f\\!\\left(-\\tfrac1{12}\\right)f\\!\\left(\\tfrac{5}{12}\\right)=3a-16a^3$, 조건 (1)로 $f\\!\\left(-\\tfrac1{12}\\right)^2+f\\!\\left(\\tfrac5{12}\\right)^2=1$, 조건 (4)의 $f\\!\\left(\\tfrac5{12}\\right)=-\\tfrac{\\sqrt2}{2}$ 에서 $f\\!\\left(-\\tfrac1{12}\\right)=\\pm\\tfrac{\\sqrt2}{2}$ 이므로 $16a^3-3a\\pm\\tfrac12=0$. 조건 (3)에 의해 <span class=\"ans\">$g\\!\\left(-\\dfrac1{12}\\right)=-\\dfrac14$</span>.</p>\n<p><b>【1-3】</b> $h(x)=\\tfrac12f(x)^2-\\tfrac12f(x)^4=\\tfrac12f(x)^2f(x+\\tfrac12)^2$ 이므로 주어진 적분은 $\\displaystyle\\int_{-1/12}^{0}g(x)h'(x)\\,dx=\\Big[g(x)h(x)\\Big]_{-1/12}^{0}-\\tfrac12\\!\\int_{-1/12}^{0}\\!\\big(3g(x)-16g(x)^3\\big)^2 g'(x)\\,dx$. $u=g(x)$로 치환하면 $=-g\\!\\left(-\\tfrac1{12}\\right)h\\!\\left(-\\tfrac1{12}\\right)-\\tfrac12\\!\\int_{-1/4}^{0}\\!(3u-16u^3)^2\\,du=\\dfrac1{32}-\\dfrac12\\cdot\\dfrac{17}{560}=\\dfrac{9}{560}$. 따라서 $p=560,q=9$, <span class=\"ans\">$p+q=569$</span>.</p>\n<div class=\"gp\"><b>【1-1】</b> $|f(n)|=|f(0)|$ 임을 확인(5) · $|f'(n)|=|f'(n+1)|$ 임을 증명(15)<br><b>【1-2】</b> $16a^3-3a\\pm\\tfrac12=0$ 유도(20) · $a$의 값 구함(10)<br><b>【1-3】</b> 부분적분으로 $-g\\!\\left(-\\tfrac1{12}\\right)h\\!\\left(-\\tfrac1{12}\\right)-\\tfrac12\\!\\int_{-1/4}^{0}(3u-16u^3)^2du$로 표현(40) · 정적분 값을 $\\dfrac qp$로 표현(15) · $p+q$ 구함(5)</div>"

  "level": "상",
  "total": "120점",
  "stem": "<b>[제시문]</b><br>(가) 곡선 $y=x^2$ 위의 점 $(x_0,y_0)$에서의 접선 $y-y_0=2x_0(x-x_0)$<br>(나) $\\tan(\\alpha\\pm\\beta)=\\dfrac{\\tan\\alpha\\pm\\tan\\beta}{1\\mp\\tan\\alpha\\tan\\beta}$<br>(다) 수렴하는 수열의 극한 성질 (샌드위치, 합·차·곱·몫)<br><br><b>[문항]</b><br>수열 $\\{a_n\\}$이 모든 자연수 $n$에 대하여 다음을 만족시킨다.<br>(1) $0&lt;a_n&lt;a_{n+1}$<br>(2) 점 $\\mathrm{A}_n(a_n,a_n^{\\,2})$은 곡선 $P:y=x^2$ 위의 점<br>(3) $P$ 위의 점 $\\mathrm{A}_{n+1}$에서의 접선이 두 직선 $\\mathrm{A}_n\\mathrm{A}_{n+1},\\ \\mathrm{A}_{n+1}\\mathrm{A}_{n+2}$와 이루는 예각의 크기가 서로 같다.<br>$r_n=\\dfrac{a_{n+1}}{a_n},\\ s_n=\\dfrac{a_{n+2}-a_{n+1}}{a_{n+1}-a_n}$이라 하자.",

    "30점"
   ],
   [
    "3",
    "<b>【2-3】</b> $\\displaystyle\\lim_{n\\to\\infty}(r_n-s_n)=0$이 성립함을 증명하시오.",
    "20점"
   ],
   [

  "sol": "<p><b>【2-1】</b> 직선 $\\mathrm{A}_n\\mathrm{A}_{n+1}$의 기울기를 $\\tan\\alpha_n=a_{n+1}+a_n$, 점 $\\mathrm{A}_{n+1}$에서의 접선 기울기를 $\\tan\\beta_{n+1}=2a_{n+1}$ 이라 하자. 조건 (3)에서 $\\alpha_n+\\alpha_{n+1}=2\\beta_{n+1}$ 이므로 제시문 (나)로 $\\tan(\\alpha_n+\\alpha_{n+1})=\\tan2\\beta_{n+1}$, 즉 $\\dfrac{(a_{n+1}+a_n)+(a_{n+2}+a_{n+1})}{1-(a_{n+1}+a_n)(a_{n+2}+a_{n+1})}=\\dfrac{4a_{n+1}}{1-4a_{n+1}^2}$. $a_{n+2}$에 대해 정리하면 $a_{n+2}=\\dfrac{4a_{n+1}^3+2a_{n+1}-a_n}{1+4a_na_{n+1}}$, 따라서 <span class=\"ans\">$p=4,\\ q=2$</span>.</p>\n<p><b>【2-2】</b> $s_n=\\dfrac{a_{n+2}-a_{n+1}}{a_{n+1}-a_n}$ 에 【2-1】을 대입하면 $s_n=\\dfrac{1+4a_{n+1}^2}{1+4a_na_{n+1}}$ 이고 $a_n&lt;a_{n+1}$ 이므로 $s_n&gt;1$. 따라서 $a_{n+2}-a_{n+1}&gt;a_{n+1}-a_n&gt;\\cdots&gt;a_2-a_1&gt;0$. $d=a_2-a_1$이라 하면 $a_{n+2}&gt;a_1+(n+1)d$ 이므로 $0&lt;\\dfrac1{a_{n+2}}&lt;\\dfrac1{a_1+(n+1)d}$, 제시문 (다)에 의해 <span class=\"ans\">$\\displaystyle\\lim_{n\\to\\infty}\\dfrac1{a_n}=0$</span>.</p>\n<p><b>【2-3】</b> $r_n-s_n=\\dfrac{a_{n+1}^2-a_na_{n+2}}{a_n(a_{n+1}-a_n)}=\\dfrac{a_{n+1}-a_n}{a_n(1+4a_na_{n+1})}$. 분자·분모를 $a_na_{n+1}$로 나누고 $\\displaystyle\\lim\\dfrac1{a_n}=0$을 쓰면 <span class=\"ans\">$\\displaystyle\\lim_{n\\to\\infty}(r_n-s_n)=0$</span>.</p>\n<p><b>【2-4】</b> $\\lim(r_n-s_n)=0,\\ \\lim s_n=3$ 이므로 $\\displaystyle\\lim_{n\\to\\infty}\\dfrac{a_{n+1}}{a_n}=\\lim r_n=3$. 사각형 $\\mathrm{A}_n\\mathrm{H}_n\\mathrm{H}_{n+1}\\mathrm{A}_{n+1}$의 넓이 $R_n=\\dfrac{(a_{n+1}^2+a_n^2)(a_{n+1}-a_n)}{2}$, 아랫부분 $D_n=\\displaystyle\\int_{a_n}^{a_{n+1}}\\!x^2dx=\\dfrac{a_{n+1}^3-a_n^3}{3}$, 윗부분 $U_n=R_n-D_n=\\dfrac{(a_{n+1}-a_n)^3}{6}$. 따라서 $\\displaystyle\\lim_{n\\to\\infty}\\dfrac{U_n}{D_n}=\\dfrac{(3-1)^2}{2(3^2+3+1)}=$ <span class=\"ans\">$\\dfrac{2}{13}$</span>.</p>\n<div class=\"gp\"><b>【2-1】</b> 두 직선과 접선의 기울기를 구함(5) · $\\tan$의 합·차로 관계를 표현(10) · $a_{n+2}$를 바르게 표현(15)<br><b>【2-2】</b> $s_n=\\dfrac{1+4a_{n+1}^2}{1+4a_na_{n+1}}$ 얻음(5) · $a_n&lt;a_{n+1}$로 $s_n&gt;1$ 증명(10) · $a_{n+1}&gt;a_1+n(a_2-a_1)$ 증명하여 $\\dfrac1{a_n}\\to0$ 보임(15)<br><b>【2-3】</b> $r_n-s_n=\\dfrac{a_{n+1}-a_n}{a_n(1+4a_na_{n+1})}$ 얻음(10) · $\\dfrac1{a_n}\\to0$ 이용 극한 $0$ 보임(10)<br><b>【2-4】</b> 영역을 바르게 표현(5) · $U_n,D_n$ 계산(15) · $\\lim r_n=3$ 보임(10) · $\\lim\\dfrac{U_n}{D_n}=\\dfrac2{13}$ 계산(10)</div>"

  "sol": "<p><b>【2-1】</b> 조건 (Ⅰ)에 $x=y=0$을 넣으면 $f(0)=0$. $y=h$를 넣어 $f(x+h)=2023^h f(x)+2023^x f(h)$, 양변에서 $f(x)$를 빼고 $h$로 나누면 $\\dfrac{f(x+h)-f(x)}{h}=\\dfrac{2023^h-1}{h}f(x)+2023^x\\dfrac{f(h)-f(0)}{h}$. $h\\to0$ 극한과 미분계수의 정의로 $f'(x)=\\ln2023\\,f(x)+2023^x f'(0)$, 즉 $f'(x)-f(x)\\ln2023=2023^x f'(0)$. ∎</p>\n<p><b>【2-2】</b> 곱의 미분법으로 $\\{2023^{-x}f(x)\\}'=2023^{-x}\\{f'(x)-f(x)\\ln2023\\}=f'(0)$ (∵【2-1】). $h(x)=2023^{-x}f(x)$로 두면 $h'(x)=f'(0)$(상수)이라 $h(x)=f'(0)x+C$, $h(0)=f(0)=0$에서 $C=0$. 따라서 $f(x)=f'(0)\\,x\\cdot2023^x$. $f(2023)=2023$에서 $f'(0)=2023^{-2023}$이므로 <span class=\"ans\">$f(x)=x\\cdot2023^{\\,x-2023}$</span>.</p>\n<p><b>【2-3】</b> 조건 (Ⅱ)에 $x=y=0$과 $g(x)&gt;0$을 쓰면 $g(0)=1$. $xy(2x^2+3xy+2y^2)=\\dfrac{(x+y)^4-x^4-y^4}{2}$이므로 $2023^{-\\frac{(x+y)^4}{2}}g(x+y)=\\left(2023^{-\\frac{x^4}{2}}g(x)\\right)\\!\\left(2023^{-\\frac{y^4}{2}}g(y)\\right)$. $k(x)=\\log_{2023}\\!\\left(2023^{-\\frac{x^4}{2}}g(x)\\right)$로 두면 $k(x+y)=k(x)+k(y)$, $k(0)=0$이고 미분계수의 정의로 $k(x)=cx$. 따라서 $g(x)=2023^{\\frac{x^4}{2}+cx}$이고 $g(2023)=2023$에서 $c=-\\dfrac{2023^3}{2}+\\dfrac{1}{2023}$이므로 <span class=\"ans\">$g(x)=2023^{\\frac{x^4-2023^3 x}{2}+\\frac{x}{2023}}$</span>.</p>\n<div class=\"gp\"><b>【2-1】</b> $x=y=0$ 대입 $f(0)=0$ 구함(5) · $\\dfrac{f(x+h)-f(x)}{h}=\\dfrac{2023^h-1}{h}f(x)+2023^x\\dfrac{f(h)-f(0)}{h}$ 유도(10) · 극한·도함수 정의로 $f'(x)-f(x)\\ln2023=2023^x f'(0)$ 유도(10)<br><b>【2-2】</b> $\\{2023^{-x}f(x)\\}'=f'(0)$ 보임(15) · $h(x)=2023^{-x}f(x)=f'(0)x+C,\\ C=0$ 보임(10) · $f(x)=f'(0)x\\cdot2023^x$ 구함(5) · $f(2023)=2023$로 $f(x)=x\\cdot2023^{x-2023}$ 구함(10)<br><b>【2-3】</b> $g(0)=1$ 구함(5) · $2023^{-\\frac{(x+y)^4}{2}}g(x+y)=2023^{-\\frac{x^4}{2}}g(x)\\cdot2023^{-\\frac{y^4}{2}}g(y)$ 보임(10) · $k(x)=\\log_{2023}(2023^{-x^4/2}g(x))$로 $k(x+y)=k(x)+k(y)$ 보임(10) · $k(0)=0,\\ k(x)=cx$ 보임(10) · $g(2023)=2023$로 $g(x)$ 구함(10)</div>"

  "sol": "<p><b>【3-1】</b> $h(x)$의 부정적분을 $F(x)$라 하면, 평균값 정리에 의해 각 자연수 $i$에 대하여 $h(c_i)=F(i+1)-F(i)$인 $c_i\\in(i,i+1)$이 존재한다. $h$가 $[m,\\infty)$에서 감소하므로 $i\\ge m$에서 $h(i+1)&lt;h(c_i)&lt;h(i)$이고, 따라서 $\\displaystyle\\sum_{i=m+1}^{n+1}h(i)&lt;F(n+1)-F(m)&lt;\\sum_{i=m}^{n}h(i)$. 치환적분법으로 $F(n+1)-F(m)=\\displaystyle\\int_m^{n+1}f(g(x))g'(x)\\,dx=\\int_{g(m)}^{g(n+1)}f(u)\\,du$이므로 주어진 부등식이 성립한다. ∎</p>\n<p><b>【3-2】</b> $f(x)=2^{1/x}$, $g(x)=\\dfrac{1}{x+3}$로 두면 $h(x)=f(g(x))g'(x)=\\dfrac{-2^{x+3}}{(x+3)^2}$이고, $x&gt;1$에서 $h'(x)&lt;0$이라 $h$는 $[1,\\infty)$에서 감소한다. $g(1)=\\tfrac14$, $g(4)=\\tfrac17$이므로 【3-1】을 $m=1,\\ n=3$에 적용하면 $\\dfrac12\\displaystyle\\int_{1/7}^{1/4}2^{1/x}\\,dx$가 $\\dfrac{2^3}{4^2}+\\dfrac{2^4}{5^2}+\\dfrac{2^5}{6^2}\\approx2.03$과 $\\dfrac{2^4}{5^2}+\\dfrac{2^5}{6^2}+\\dfrac{2^6}{7^2}\\approx2.84$ 사이에 있다. 따라서 정수부분은 <span class=\"ans\">$2$</span>.</p>\n<p><b>【3-3】</b> $f(x)=-\\ln x$, $g(x)=\\dfrac{x^2+1}{x+1}$로 두면 $h(x)=f(g(x))g'(x)=\\left\\{-\\ln\\dfrac{x^2+1}{x+1}\\right\\}\\dfrac{x^2+2x-1}{(x+1)^2}$이고 $h(1)=0$, $h$는 $[1,\\infty)$에서 감소한다. 【3-1】을 적용하면 $a_n$을 정하는 합이 $\\displaystyle\\int_1^{\\frac{n^2+2n+2}{n+2}}(-\\ln x)\\,dx$로 끼이고, 부분적분 $\\displaystyle\\int(-\\ln x)\\,dx=-x(\\ln x-1)+C$를 이용하면 모든 자연수 $n$에서 $c_n&lt;a_n&lt;b_n$인 두 수열 $\\{b_n\\},\\{c_n\\}$을 얻는다. $\\displaystyle\\lim_{n\\to\\infty}b_n=\\lim_{n\\to\\infty}c_n=-4$이므로 수열의 극한의 대소관계에 의해 <span class=\"ans\">$\\displaystyle\\lim_{n\\to\\infty}a_n=-4$</span>.</p>\n<div class=\"gp\"><b>【3-1】</b> 평균값 정리로 $h(c_i)=F(i+1)-F(i)$, $c_i\\in(i,i+1)$ 보임(5) · $i\\ge m$에서 $h(i+1)&lt;h(c_i)&lt;h(i)$ 보임(5) · $\\sum_{i=m+1}^{n+1}h(i)&lt;F(n+1)-F(m)&lt;\\sum_{i=m}^{n}h(i)$ 유도(10) · 치환적분으로 $F(n+1)-F(m)=\\int_{g(m)}^{g(n+1)}f(u)du$ 보임(10)<br><b>【3-2】</b> $f(x)=2^{1/x},\\ g(x)=\\dfrac{1}{x+3}$ 설정(5) · $h$가 $[1,\\infty)$에서 감소 보임(10) · $2&lt;\\dfrac12\\int_{1/7}^{1/4}2^{1/x}dx&lt;3$ 보임(20) · 정수부분 $2$ 구함(5)<br><b>【3-3】</b> $f(x)=-\\ln x,\\ g(x)=\\dfrac{x^2+1}{x+1}$ 설정(5) · $h$가 $[1,\\infty)$에서 감소 보임(10) · $c_n\\le a_n$인 수열 $   "sol": "<p><b>【1-1】</b> $f$가 일대일이 아니라고 가정하면 $f(a)=f(b)$인 서로 다른 $a,b\\,(a&lt;b)$가 존재한다. 제시문 (나)에 의해 $0=\\dfrac{f(b)-f(a)}{b-a}=f'(c)$인 $c\\in(a,b)$가 존재하여 $f'(x)\\ne0$ 가정에 모순이다. 따라서 $f$는 <b>일대일함수</b>이다.</p>\n<p><b>【1-2】</b> $k=1$일 때 $f(x)=p\\!\\left(\\dfrac{4}{e^{-x}+1}\\right)$. $\\displaystyle\\lim_{x\\to-\\infty}\\dfrac{4}{e^{-x}+1}=0$ 이므로 $4=\\displaystyle\\lim_{x\\to-\\infty}f(x)=p(0)$. 따라서 <span class=\"ans\">$p(0)=4$</span>.</p>\n<p><b>【1-3】</b> $g(x)=\\dfrac{(k-1)e^{-x}+2|k|-|k-1|+|k-2|+1}{e^{-x}+1}$ 라 하면 $g'(x)=\\dfrac{(2|k|-|k-1|+|k-2|-k+2)e^{-x}}{(e^{-x}+1)^2}&gt;0$ 이므로 $g$는 증가·일대일이고 치역은 $\\{\\,k-1&lt;y&lt;2|k|-|k-1|+|k-2|+1\\,\\}$. $f=p\\circ g$가 일대일이 아니면 $f'=p'(g)g'=0$, 즉 $p'(x)=0$이 그 열린구간에 적어도 하나 존재한다. $k=0$이면 $(-1,2)$, $k=3$ 또는 $k=7$이면 각각 $(2,6),(6,14)$에 실근이 존재한다.</p>\n<p><b>【1-4】</b> $p'(x)=0$의 세 실근 $\\alpha&lt;\\beta&lt;\\gamma$에 대해 일대일 조건 $A$를 분석하면 $\\gamma=8,\\ \\beta=4,\\ \\alpha=0$. 따라서 $p'(x)=4ax(x-4)(x-8)$, $p(x)=ax^4-16ax^3+64ax^2+4$. $p(x)-mx-4=x(ax^3-16ax^2+64ax-m)$ 이므로 $h(m)$은 $q(x)=ax^3-16ax^2+64ax=ax(x-8)^2$의 그래프와 $y=m$의 교점 개수보다 $1$ 크다. $q'(x)=a(x-8)(3x-8)$ 이므로 $h(m)$은 $m=0$ 또는 $m=q\\!\\left(\\dfrac83\\right)=\\dfrac{2048}{27}a$에서 불연속. $m=64$에서 불연속이므로 $64=\\dfrac{2048}{27}a$, <span class=\"ans\">$a=\\dfrac{27}{32}$</span>.</p>\n<div class=\"gp\"><b>【1-1】</b> $f(a)=f(b)$인 두 실수 존재를 찾음(10) · 평균값정리로 $f'(c)=0$인 $c\\in(a,b)$ 존재를 찾음(10) · 가정에 모순되어 일대일임을 보임(10)<br><b>【1-2】</b> $k=1$일 때 $f(x)=p\\!\\left(\\tfrac{4}{e^{-x}+1}\\right)$ 찾음(5) · $\\lim=0$ 이용 $4=p(0)$ 찾음(10)<br><b>【1-3】</b> $g'(x)&gt;0$ 증가·일대일 찾음(5) · 치역 찾음(10) · $f$ 일대일 아니면 $p'(x)=0$ 실근이 해당 구간에 존재함을 찾음(15) · $k=0,3,7$에서 $(-1,2),(2,6),(6,14)$에 존재함을 찾음(15)<br><b>【1-4】</b> $p'(x)=4ax(x-4)(x-8)$ 찾음(30) · $p(x)-mx-4=x(ax^3-16ax^2+64ax-m)$ 찾음(5) · $h(m)$이 $m=0$ 또는 $q\\!\\left(\\tfrac83\\right)$에서 불연속 찾음(5) · $a=\\dfrac{27}{32}$ 찾음(10)</div>"

const LV={"중하":"easy","중":"easy","중상":"mid","상":"hard"};
const N=PROBLEMS.length;
const now=new Date();
const doy=Math.floor((now-new Date(now.getFullYear(),0,0))/86400000);
const todayIdx=((doy%N)+N)%N;
let cur=0;
function renderProblem(){
  const p=PROBLEMS[cur];
  document.getElementById('qsrc').innerHTML=p.no+(cur===todayIdx?' <span class="qtoday">오늘</span>':'');
  document.getElementById('qtotal').textContent='총 '+p.total;
  document.getElementById('qtags').innerHTML='<span class="tag">'+p.topic+'</span><span class="tag lv '+(LV[p.level]||'mid')+'">난이도 '+p.level+'</span>';
  let h='<div class="stem">'+p.stem+'</div>';
  p.subs.forEach(s=>{h+='<div class="sub"><span class="num">'+s[0]+'</span><span class="stxt">'+s[1]+'</span><span class="pt">'+s[2]+'</span></div>';});
  if(p.fig) h+='<div class="qfig"><img src="'+p.fig+'" alt="그림"><div class="cap">[그림]</div></div>';
  if(p.sol) h+='<div class="fold"><button class="foldbtn" type="button">해설 보기</button><div class="foldbox">'+p.sol+'</div></div>';
  document.getElementById('qbody').innerHTML=h;
  document.getElementById('qbody').scrollTop=0;
  document.getElementById('idx').textContent=(cur+1)+' / '+N;
  document.getElementById('prev').disabled=(cur===0);
  document.getElementById('next').disabled=(cur===N-1);
  if(window.renderMathInElement) renderMathInElement(document.getElementById('qbody'),{delimiters:[{left:'$',right:'$',display:false}],throwOnError:false});
}

document.addEventListener('click',function(e){
  var b=e.target.closest('.foldbtn'); if(!b) return;
  var box=b.nextElementSibling;
  var open=box.classList.toggle('open');
  b.classList.toggle('open',open);
  b.textContent=open?'\ud574\uc124 \uc811\uae30':'\ud574\uc124 \ubcf4\uae30';
});

function go(d){cur=Math.min(N-1,Math.max(0,cur+d));renderProblem();}
function goToday(){cur=todayIdx;renderProblem();}
document.addEventListener('DOMContentLoaded',renderProblem);
window.addEventListener('load',renderProblem);
